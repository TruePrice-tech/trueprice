name: SEO sitemap refresh + IndexNow ping

# On every push to main (and weekly Monday 5am UTC, and manual dispatch):
#  1. Rewrite sitemap-*.xml lastmods from per-file git mtime so search
#     engines see accurate dates and prioritize recrawls correctly.
#  2. Commit + push if anything changed (with [skip ci] to prevent loops —
#     GitHub Actions skips workflows for commits with that marker).
#  3. Ping IndexNow so Bing/Yandex see fresh URLs immediately.
#
# Per-push wiring (vs the prior weekly-only cadence) ensures lastmods
# track today's edits today instead of lagging up to a week. The rewrite
# script is idempotent — if no HTML changed, no commit fires, no loop.

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 5 * * 1'   # Monday 05:00 UTC (safety net if a push misses)
  workflow_dispatch:

jobs:
  refresh-and-ping:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history needed for git mtime per file
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Rewrite sitemap lastmods from git mtime
        run: node scripts/_seo-rewrite-sitemap-lastmod-from-git.js

      - name: Commit sitemap changes (if any)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add sitemap*.xml
          if git diff --cached --quiet; then
            echo "No sitemap changes to commit."
          else
            git commit -m "chore(seo): rewrite sitemap lastmods from git mtime [skip ci]"
            git push
          fi

      - name: IndexNow ping
        run: node scripts/indexnow-push.js
