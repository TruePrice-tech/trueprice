<div class="faq-answer"><p>The optimal window for roof replacement in Albuquerque is spring or fall, moderate temperatures allow proper material adhesion and curing. Scheduling during off-peak periods can save 10-15% on labor costs since contractors have more availability and may offer competitive pricing to fill their calendar. Avoid scheduling immediately after a major storm event when contractor demand (and prices) spike.</p></div>

    btn.disabled = true; btn.textContent = 'Sending...';
    fetch('/api/analytics', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({type:'email_signup', email:email, source:'city_page'}) })
      .then(function(r){return r.json()})
      .then(function(d){ status.style.color='#166534'; status.textContent='Thanks! We\u2019ll keep you posted.'; form.reset(); localStorage.setItem('tp_subscribed','1'); })
      .catch(function(){ status.style.color='#b91c1c'; status.textContent='Something went wrong. Try again.'; });
    btn.disabled = false; btn.textContent = 'Send guides';
  });
})();
