<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="/favicon.png" type="image/png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Burrow | Woogoro</title>
  <meta name="robots" content="noindex,nofollow,noarchive,nosnippet" />
  <link rel="canonical" href="https://woogoro.com/beta/burrow.html" />
  <link rel="stylesheet" href="/css/woogoro.min.css" />
  <style>
    .bw-wrap { max-width: 880px; margin: 32px auto 64px; padding: 0 20px; }
    .bw-row { display: flex; align-items: center; justify-content: space-between; gap: 16px; margin-bottom: 24px; }
    .bw-greet { font-size: 14px; color: #475569; }
    .bw-greet strong { color: #0f172a; }
    .bw-logout { color: #64748b; font-size: 13px; text-decoration: none; }
    .bw-logout:hover { color: #1e3a5f; text-decoration: underline; }

    .bw-state { background: #fff; border: 1px solid #e2e8f0; border-radius: 16px; padding: 28px; box-shadow: 0 1px 2px rgba(15,23,42,.04); }
    .bw-loading { text-align: center; padding: 60px 20px; color: #64748b; font-size: 14px; }
    .bw-error { background: #fef2f2; border: 1px solid #fecaca; color: #b91c1c; border-radius: 12px; padding: 16px 18px; font-size: 14px; }

    .bw-hero { background: linear-gradient(135deg, #fefce8 0%, #fef3c7 100%); border: 1px solid #fde68a; border-radius: 16px; padding: 24px; display: flex; gap: 20px; align-items: center; margin-bottom: 20px; }
    .bw-hero-iris { width: 96px; height: 96px; flex-shrink: 0; border-radius: 50%; background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,.06); padding: 6px; box-sizing: border-box; }
    .bw-hero-iris img { width: 100%; height: 100%; object-fit: contain; }
    .bw-hero-text { flex: 1; min-width: 0; }
    .bw-hero-title { font-size: 18px; font-weight: 700; color: #78350f; margin: 0 0 4px; }
    .bw-hero-sub { font-size: 13px; color: #92400e; line-height: 1.5; margin: 0; }
    @media (max-width: 520px) { .bw-hero { flex-direction: column; text-align: center; } .bw-hero-iris { width: 72px; height: 72px; } }

    .bw-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
    @media (max-width: 600px) { .bw-grid { grid-template-columns: 1fr; } }

    .bw-stat { background: #fff; border: 1px solid #e2e8f0; border-radius: 14px; padding: 20px; }
    .bw-stat-label { font-size: 11px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: #64748b; margin-bottom: 6px; }
    .bw-stat-value { font-size: 32px; font-weight: 800; color: #0f172a; line-height: 1.1; }
    .bw-stat-sub { font-size: 12px; color: #64748b; margin-top: 4px; }
    .bw-stat-progress { margin-top: 10px; height: 6px; background: #f1f5f9; border-radius: 999px; overflow: hidden; }
    .bw-stat-progress div { height: 100%; background: linear-gradient(90deg, #f59e0b, #ec4899); border-radius: 999px; transition: width .3s; }

    .bw-section-h { font-size: 13px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: #475569; margin: 24px 0 12px; display: flex; justify-content: space-between; align-items: baseline; }
    .bw-section-h a { font-weight: 600; font-size: 12px; letter-spacing: 0; text-transform: none; color: #1e3a5f; text-decoration: none; }
    .bw-section-h a:hover { text-decoration: underline; }

    .bw-collection { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 12px; }
    .bw-cell { aspect-ratio: 1; border: 1px dashed #cbd5e1; border-radius: 12px; display: flex; align-items: center; justify-content: center; flex-direction: column; padding: 8px; text-align: center; font-size: 11px; color: #94a3b8; background: #f8fafc; }
    .bw-cell.has-w { border-style: solid; border-color: #1e3a5f; background: #fff; color: #0f172a; }
    .bw-cell .icon { font-size: 22px; margin-bottom: 4px; }
    .bw-cell .vw-art { width: 70%; height: auto; max-height: 60%; object-fit: contain; margin-bottom: 4px; }

    .bw-ledger { background: #fff; border: 1px solid #e2e8f0; border-radius: 14px; overflow: hidden; }
    .bw-ledger table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .bw-ledger th, .bw-ledger td { padding: 10px 14px; text-align: left; border-bottom: 1px solid #f1f5f9; }
    .bw-ledger tr:last-child td { border-bottom: none; }
    .bw-ledger th { background: #f8fafc; font-size: 11px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: #64748b; }
    .bw-ledger td.amt { font-weight: 700; text-align: right; font-variant-numeric: tabular-nums; }
    .bw-ledger td.amt.issue { color: #166534; }
    .bw-ledger td.amt.spend { color: #991b1b; }
    .bw-ledger td .src-label { font-size: 13px; color: #0f172a; }
    .bw-ledger td .src-meta { display: block; font-size: 11px; color: #64748b; margin-top: 2px; }
    .bw-empty { padding: 28px; text-align: center; color: #94a3b8; font-size: 13px; }

    .bw-waitlist { background: #fffbeb; border: 1px solid #fde68a; color: #78350f; border-radius: 12px; padding: 18px 20px; font-size: 14px; margin-bottom: 20px; }
    .bw-waitlist strong { color: #78350f; }

    .bw-actions { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
    @media (max-width: 720px) { .bw-actions { grid-template-columns: 1fr; } }
    .bw-action { display: block; padding: 16px 18px; background: #1e3a5f; color: #fff; border-radius: 12px; text-decoration: none; font-weight: 700; font-size: 14px; text-align: center; line-height: 1.3; }
    .bw-action:hover { background: #15314f; }
    .bw-action.alt { background: #fff; color: #1e3a5f; border: 1px solid #1e3a5f; }
    .bw-action.alt:hover { background: #f8fafc; }
    .bw-action.gold { background: #f59e0b; color: #fff; }
    .bw-action.gold:hover { background: #d97706; }
    .bw-action small { display: block; font-weight: 500; opacity: .85; font-size: 11px; margin-top: 2px; }

    .bw-receipts { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 14px; }
    .bw-rw { background: #fff; border: 1px solid #e2e8f0; border-radius: 14px; padding: 14px; display: flex; flex-direction: column; align-items: center; text-align: center; position: relative; transition: transform .15s, box-shadow .15s; }
    .bw-rw:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(15,23,42,.08); }
    .bw-rw.redeemed { opacity: .55; filter: grayscale(.4); }
    .bw-rw img { width: 96px; height: 96px; object-fit: contain; margin: 4px 0 8px; }
    .bw-rw-tier { font-size: 11px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; padding: 2px 10px; border-radius: 999px; margin-bottom: 6px; }
    .bw-rw-tier.bronze   { background: #fde2c4; color: #7c2d12; }
    .bw-rw-tier.silver   { background: #e5e7eb; color: #1f2937; }
    .bw-rw-tier.gold     { background: #fde68a; color: #78350f; }
    .bw-rw-tier.platinum { background: linear-gradient(135deg, #e0f2fe, #fce7f3); color: #1e3a5f; box-shadow: inset 0 0 0 1px #bae6fd; }
    .bw-rw-vertical { font-size: 12px; color: #475569; text-transform: capitalize; margin-bottom: 4px; }
    .bw-rw-amount { font-size: 13px; color: #64748b; margin-bottom: 8px; }
    .bw-rw-woo { font-size: 18px; font-weight: 800; color: #0f172a; margin-bottom: 12px; line-height: 1; }
    .bw-rw-woo small { font-size: 10px; font-weight: 700; letter-spacing: .08em; color: #64748b; text-transform: uppercase; display: block; margin-top: 2px; }
    .bw-rw-actions { display: flex; gap: 6px; width: 100%; }
    .bw-rw-btn { flex: 1; padding: 8px 6px; border-radius: 8px; font-size: 12px; font-weight: 700; border: 0; cursor: pointer; font-family: inherit; }
    .bw-rw-btn.cash { background: #f59e0b; color: #fff; }
    .bw-rw-btn.cash:hover { background: #d97706; }
    .bw-rw-btn.cash:disabled { background: #cbd5e1; cursor: not-allowed; }
    .bw-rw-btn.keep { background: #fff; color: #1e3a5f; border: 1px solid #cbd5e1; }
    .bw-rw-btn.keep:hover { background: #f8fafc; border-color: #1e3a5f; }
    .bw-rw-redeemed-badge { font-size: 11px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: #475569; padding: 6px 0; }
    .bw-rw-keep-caption { font-size: 10px; color: #94a3b8; margin-top: 6px; line-height: 1.3; }
    .bw-rw-error { font-size: 11px; color: #b91c1c; margin-top: 8px; line-height: 1.3; }

    /* ========== Vaudeville hook cash-in animation v2 ==========
       Hook now ENTERS FROM THE SIDE (not from above) like a real
       vaudeville stage hook coming in from the wings. Two-layer SVG
       trick gives a 3D wrap-around: shaft renders BEHIND the character
       (z-index 4) and the curled tip-grip renders IN FRONT of the
       character (z-index 6) — when they overlap on the character
       (z-index 5), the hook visually wraps around the woogoro.
       Coins are now metallic discs with "W" face + rotateY flip
       on fall so they read as coins, not balls. */
    .bw-rw { overflow: visible; }
    .bw-rw.vh-active { animation: vh-card-shake .35s ease-out; }
    .bw-rw.vh-active .bw-rw-actions,
    .bw-rw.vh-active .bw-rw-keep-caption { opacity: 0; transition: opacity .2s; }
    @keyframes vh-card-shake {
      0%   { transform: translate(0, 0) rotate(0); }
      25%  { transform: translate(-2px, 1px) rotate(-1deg); }
      50%  { transform: translate(2px, -1px) rotate(1deg); }
      75%  { transform: translate(-1px, 1px) rotate(-.5deg); }
      100% { transform: translate(0, 0) rotate(0); }
    }

    /* During yank the character image MUST sit between hook layers. */
    .bw-rw.vh-yanking img,
    .bw-rw.vh-active img { position: relative; z-index: 5; }

    /* HOOK SHAFT (back layer): the wooden pole part that comes in from
       the wings. Sits BEHIND the character. */
    .bw-rw-hook-shaft {
      position: absolute;
      top: 38px; /* roughly aligned with the character's torso */
      width: 220px; height: 40px;
      pointer-events: none; z-index: 4;
      opacity: 0;
      filter: drop-shadow(2px 3px 4px rgba(0,0,0,.35));
    }
    .bw-rw-hook-shaft.left  { left: -240px; transform: translateX(0); }
    .bw-rw-hook-shaft.right { right: -240px; transform: scaleX(-1); }

    /* HOOK TIP (front layer): the curled metal hook that wraps the
       character. Sits IN FRONT of the character. Same SVG geometry as
       the shaft's tip portion so they overlap perfectly. */
    .bw-rw-hook-tip {
      position: absolute;
      top: 30px;
      width: 60px; height: 60px;
      pointer-events: none; z-index: 6;
      opacity: 0;
      filter: drop-shadow(0 2px 3px rgba(0,0,0,.4));
    }
    .bw-rw-hook-tip.left  { left: -60px; }
    .bw-rw-hook-tip.right { right: -60px; transform: scaleX(-1); }

    /* Hook entry: swings in from the side toward the character */
    .bw-rw.vh-active .bw-rw-hook-shaft.left  { animation: vh-hook-in-left  var(--vh-descend, .55s) cubic-bezier(.2,.8,.4,1) forwards; }
    .bw-rw.vh-active .bw-rw-hook-shaft.right { animation: vh-hook-in-right var(--vh-descend, .55s) cubic-bezier(.2,.8,.4,1) forwards; }
    .bw-rw.vh-active .bw-rw-hook-tip.left    { animation: vh-tip-in-left   var(--vh-descend, .55s) cubic-bezier(.2,.8,.4,1) forwards; }
    .bw-rw.vh-active .bw-rw-hook-tip.right   { animation: vh-tip-in-right  var(--vh-descend, .55s) cubic-bezier(.2,.8,.4,1) forwards; }
    @keyframes vh-hook-in-left {
      0%   { left: -240px; opacity: 0; }
      20%  { opacity: 1; }
      100% { left: -10px; opacity: 1; }
    }
    @keyframes vh-hook-in-right {
      0%   { right: -240px; opacity: 0; }
      20%  { opacity: 1; }
      100% { right: -10px; opacity: 1; }
    }
    @keyframes vh-tip-in-left {
      0%   { left: -60px; opacity: 0; }
      30%  { opacity: 1; }
      100% { left: 110px; opacity: 1; }
    }
    @keyframes vh-tip-in-right {
      0%   { right: -60px; opacity: 0; }
      30%  { opacity: 1; }
      100% { right: 110px; opacity: 1; transform: scaleX(-1); }
    }

    /* Yank phase: woogoro + hook layers all exit together */
    .bw-rw.vh-yanking img { animation: var(--vh-yank-keyframes, vh-yank-left) var(--vh-yank, .35s) ease-in forwards; }
    .bw-rw.vh-yanking .bw-rw-hook-shaft.left,
    .bw-rw.vh-yanking .bw-rw-hook-tip.left   { animation: vh-hook-out-left  var(--vh-yank, .35s) ease-in forwards; }
    .bw-rw.vh-yanking .bw-rw-hook-shaft.right,
    .bw-rw.vh-yanking .bw-rw-hook-tip.right  { animation: vh-hook-out-right var(--vh-yank, .35s) ease-in forwards; }
    @keyframes vh-yank-left {
      0%   { transform: translate(0, 0) rotate(0); opacity: 1; }
      30%  { transform: translate(-30px, -8px) rotate(-12deg); opacity: 1; }
      100% { transform: translate(-300px, -50px) rotate(-25deg); opacity: 0; }
    }
    @keyframes vh-yank-right {
      0%   { transform: translate(0, 0) rotate(0); opacity: 1; }
      30%  { transform: translate(30px, -8px) rotate(12deg); opacity: 1; }
      100% { transform: translate(300px, -50px) rotate(25deg); opacity: 0; }
    }
    @keyframes vh-hook-out-left {
      0%   { transform: translate(0, 0) rotate(0); opacity: 1; }
      100% { transform: translate(-320px, -40px) rotate(-12deg); opacity: 0; }
    }
    @keyframes vh-hook-out-right {
      0%   { transform: translate(0, 0) scaleX(-1) rotate(0); opacity: 1; }
      100% { transform: translate(320px, -40px) scaleX(-1) rotate(-12deg); opacity: 0; }
    }

    /* COINS v2: actual minted-coin look, not balls.
       - Layered radial gradient + inset shadows for metallic disc depth
       - rotateY flip during fall reads as a tossed coin
       - "W" face via ::before pseudo-element
    */
    .bw-vh-coin {
      position: absolute; left: 50%; top: 40%;
      width: var(--vh-coin-size, 24px); height: var(--vh-coin-size, 24px);
      border-radius: 50%;
      background:
        radial-gradient(circle at 35% 30%, #ffe9a3 0%, #f59e0b 50%, #b45309 100%);
      box-shadow:
        inset 0 0 0 1.5px rgba(0,0,0,.30),
        inset 0 -2px 4px rgba(0,0,0,.30),
        inset 0 2px 3px rgba(255,255,255,.55),
        0 2px 5px rgba(0,0,0,.30);
      pointer-events: none; z-index: 4;
      transform: translate(-50%, -50%) scale(0) rotateY(0);
      animation: vh-coin-drop var(--vh-coin-dur, 1.2s) cubic-bezier(.4, 0, .55, 1.35) forwards;
      animation-delay: var(--vh-coin-delay, 0ms);
    }
    .bw-vh-coin::before {
      content: "W";
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      font-weight: 900; font-style: italic;
      font-size: calc(var(--vh-coin-size, 24px) * 0.55);
      color: rgba(0,0,0,.40);
      text-shadow: 0 1px 0 rgba(255,255,255,.45);
      line-height: 1;
    }
    .bw-vh-coin.gold {
      background: radial-gradient(circle at 35% 30%, #fff5b8 0%, #facc15 40%, #ca8a04 75%, #78350f 100%);
    }
    .bw-vh-coin.gold::before { color: rgba(75, 35, 5, .45); }
    .bw-vh-coin.platinum {
      background: radial-gradient(circle at 35% 30%, #ffffff 0%, #f1f5f9 40%, #94a3b8 75%, #475569 100%);
    }
    .bw-vh-coin.platinum::before { color: rgba(15, 23, 42, .50); }
    .bw-vh-coin.jewel {
      width: calc(var(--vh-coin-size, 24px) * .65);
      height: calc(var(--vh-coin-size, 24px) * .65);
      border-radius: 4px;
      background: linear-gradient(135deg, #fbcfe8 0%, #ec4899 50%, #9d174d 100%);
      box-shadow:
        0 0 12px rgba(236, 72, 153, .7),
        inset 0 1px 2px rgba(255,255,255,.6),
        inset 0 -1px 2px rgba(0,0,0,.3),
        0 2px 4px rgba(0,0,0,.3);
    }
    .bw-vh-coin.jewel::before { content: ""; }
    @keyframes vh-coin-drop {
      0%   { transform: translate(-50%, -50%) scale(0) rotateY(0deg); opacity: 0; }
      12%  { opacity: 1; transform: translate(-50%, -50%) scale(.4) rotateY(45deg); }
      45%  {
        opacity: 1;
        transform: translate(calc(-50% + var(--vh-coin-x, 0px) * .9), calc(-50% + var(--vh-coin-y, 80px) * .9)) scale(1) rotateY(calc(var(--vh-coin-flip, 540deg) * .65));
      }
      80%  {
        opacity: 1;
        transform: translate(calc(-50% + var(--vh-coin-x, 0px)), calc(-50% + var(--vh-coin-y, 80px))) scale(1) rotateY(var(--vh-coin-flip, 540deg));
      }
      100% {
        transform: translate(calc(-50% + var(--vh-coin-x, 0px)), calc(-50% + var(--vh-coin-y, 80px))) scale(1) rotateY(var(--vh-coin-flip, 540deg));
        opacity: 0;
      }
    }

    /* Sparkle trail (gold + platinum). Tiny rotating stars that appear
       along the Woogoro exit path with staggered delays. */
    .bw-vh-sparkle {
      position: absolute; left: 50%; top: 40%;
      width: 14px; height: 14px;
      pointer-events: none; z-index: 3;
      color: #fbbf24;
      transform: translate(-50%, -50%) scale(0);
      animation: vh-sparkle var(--vh-sparkle-dur, .8s) ease-out forwards;
      animation-delay: var(--vh-sparkle-delay, 0ms);
    }
    .bw-vh-sparkle::before {
      content: "";
      position: absolute; inset: 0;
      background:
        linear-gradient(0deg,   transparent 45%, currentColor 45%, currentColor 55%, transparent 55%),
        linear-gradient(90deg,  transparent 45%, currentColor 45%, currentColor 55%, transparent 55%),
        linear-gradient(45deg,  transparent 47%, currentColor 47%, currentColor 53%, transparent 53%),
        linear-gradient(135deg, transparent 47%, currentColor 47%, currentColor 53%, transparent 53%);
    }
    .bw-vh-sparkle.platinum { color: #f9a8d4; width: 18px; height: 18px; }
    @keyframes vh-sparkle {
      0%   { transform: translate(calc(-50% + var(--vh-sparkle-x0, 0px)), calc(-50% + var(--vh-sparkle-y0, 0px))) scale(0) rotate(0); opacity: 0; }
      30%  { opacity: 1; transform: translate(calc(-50% + var(--vh-sparkle-x1, 0px)), calc(-50% + var(--vh-sparkle-y1, 0px))) scale(1) rotate(180deg); }
      100% { transform: translate(calc(-50% + var(--vh-sparkle-x1, 0px)), calc(-50% + var(--vh-sparkle-y1, 0px))) scale(.4) rotate(360deg); opacity: 0; }
    }

    /* Red carpet (platinum only). A thin red rectangle that scales out
       from the Woogoro's launch point, dwells, and retracts on settle. */
    .bw-vh-carpet {
      position: absolute; left: 50%; top: 50%;
      width: 0; height: 14px;
      background: linear-gradient(180deg, #dc2626 0%, #991b1b 100%);
      border-top: 1px solid rgba(255,255,255,.3);
      transform: translate(-50%, -50%);
      pointer-events: none; z-index: 1;
      animation: vh-carpet 2.6s cubic-bezier(.55, 0, .45, 1) forwards;
    }
    @keyframes vh-carpet {
      0%   { width: 0; opacity: 0; }
      18%  { width: 220px; opacity: 1; }
      75%  { width: 220px; opacity: 1; }
      100% { width: 0; opacity: 0; }
    }

    /* Money sack: drops in where the Woogoro stood, after the yank
       completes. Bounces in with a slight overshoot. Sits as the
       centerpiece while coins shower around it. */
    .bw-vh-sack {
      position: absolute;
      left: 50%; top: 38%;
      width: 80px; height: 100px;
      transform: translate(-50%, -180%) scale(.3) rotate(-15deg);
      pointer-events: none; z-index: 3;
      opacity: 0;
      filter: drop-shadow(0 5px 7px rgba(0,0,0,.4));
      animation: vh-sack-drop var(--vh-sack-dur, .65s) cubic-bezier(.34, 1.56, .64, 1) forwards;
      animation-delay: var(--vh-sack-delay, 0ms);
    }
    .bw-vh-sack.platinum { width: 90px; height: 112px; }
    @keyframes vh-sack-drop {
      0%   { transform: translate(-50%, -180%) scale(.3) rotate(-15deg); opacity: 0; }
      30%  { opacity: 1; }
      62%  { transform: translate(-50%, -45%)  scale(1.12) rotate(3deg);  opacity: 1; }
      78%  { transform: translate(-50%, -52%)  scale(.94)  rotate(-2deg); opacity: 1; }
      90%  { transform: translate(-50%, -49%)  scale(1.02) rotate(1deg);  opacity: 1; }
      100% { transform: translate(-50%, -50%)  scale(1)    rotate(0);     opacity: 1; }
    }

    /* Lens flare (platinum only). One brief radial flash when coins peak. */
    .bw-vh-flare {
      position: absolute; left: 50%; top: 45%;
      width: 200px; height: 200px;
      transform: translate(-50%, -50%) scale(0);
      background: radial-gradient(circle, rgba(253, 230, 138, .9) 0%, rgba(245, 158, 11, .5) 30%, transparent 70%);
      pointer-events: none; z-index: 3;
      mix-blend-mode: screen;
      animation: vh-flare 1.1s ease-out forwards;
      animation-delay: var(--vh-flare-delay, 1.5s);
    }
    @keyframes vh-flare {
      0%   { transform: translate(-50%, -50%) scale(0); opacity: 0; }
      35%  { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(1.8); opacity: 0; }
    }

    .bw-stash-strip { background: linear-gradient(135deg, #fffbeb, #fef3c7); border: 1px solid #fde68a; border-radius: 12px; padding: 12px 16px; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; gap: 12px; font-size: 13px; color: #78350f; }
    .bw-stash-strip strong { font-weight: 800; }

    .bw-orders { display: grid; gap: 10px; }
    .bw-order { background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; padding: 14px 16px; display: flex; justify-content: space-between; gap: 12px; align-items: center; }
    .bw-order-main { flex: 1; min-width: 0; }
    .bw-order-name { font-weight: 700; color: #0f172a; font-size: 14px; }
    .bw-order-meta { color: #64748b; font-size: 12px; margin-top: 2px; }
    .bw-order-status { font-size: 11px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; padding: 4px 10px; border-radius: 999px; white-space: nowrap; }
    .bw-order-status.placed { background: #fef3c7; color: #92400e; }
    .bw-order-status.fulfilled { background: #dbeafe; color: #1e40af; }
    .bw-order-status.shipped { background: #d1fae5; color: #065f46; }
    .bw-order-status.delivered { background: #e2e8f0; color: #475569; }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a class="logo" href="/"><picture><source srcset="/images/Iris/Iris-color%20side%20silhouette.webp" type="image/webp"/><img class="logo-mark" src="/images/Iris/Iris-color%20side%20silhouette.png" alt="" width="32" height="32" /></picture><span class="logo-text">Woogoro</span></a>
    </div>
  </header>

  <main>
    <div class="bw-wrap">
      <div id="bwLoading" class="bw-loading">Loading your burrow&hellip;</div>
      <div id="bwContent" style="display:none;"></div>
    </div>
  </main>

  <script>
    (function () {
      var loading = document.getElementById("bwLoading");
      var content = document.getElementById("bwContent");

      var VERTICALS = [
        ["roofing", "Roofing"],["hvac", "HVAC"],["plumbing", "Plumbing"],
        ["electrical", "Electrical"],["windows", "Windows"],["siding", "Siding"],
        ["gutters", "Gutters"],["insulation", "Insulation"],["painting", "Painting"],
        ["concrete", "Concrete"],["foundation", "Foundation"],["fencing", "Fencing"],
        ["garage_door", "Garage Door"],["landscaping", "Landscaping"],["kitchen", "Kitchen"],
        ["solar", "Solar"],["moving", "Moving"],["auto_repair", "Auto Repair"],
        ["medical", "Medical"],["legal", "Legal"]
      ];

      // Slug -> naked Vertical Woogoro filename (under /images/Vertical Woogoro/).
      // Some files don't match the slug (windows -> Window singular,
      // gutters -> Gutter singular, auto_repair -> Auto, etc.).
      // Future: an accessories layer will overlay hats/outfits on top of
      // these base sprites.
      var VERTICAL_ART = {
        roofing: "Roofing.png", hvac: "HVAC.png", plumbing: "Plumbing.png",
        electrical: "Electrical.png", windows: "Window.png", siding: "Siding.png",
        gutters: "Gutter.png", insulation: "Insulation.png", painting: "Painting.png",
        concrete: "Concrete.png", foundation: "Foundation.png", fencing: "Fencing.png",
        garage_door: "Garage Door.png", landscaping: "Landscaping.png", kitchen: "Kitchen.png",
        solar: "Solar.png", moving: "Moving.png", auto_repair: "Auto.png",
        medical: "Medical.png", legal: "Legal.png",
      };

      function esc(s) {
        return String(s == null ? "" : s).replace(/[&<>"']/g, function (c) {
          return ({ "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;" })[c];
        });
      }

      function fmtTs(ms) {
        if (!ms) return "";
        try {
          var d = new Date(ms);
          var diff = Date.now() - ms;
          if (diff < 60000) return "just now";
          if (diff < 3600000) return Math.floor(diff / 60000) + "m ago";
          if (diff < 86400000) return Math.floor(diff / 3600000) + "h ago";
          if (diff < 7 * 86400000) return Math.floor(diff / 86400000) + "d ago";
          return d.toLocaleDateString();
        } catch (e) { return ""; }
      }

      // Iris mood + greeting key off streak length. Mirrors the streak-state
      // copy doc; tweak here if we adjust the milestones.
      function irisFor(streakDays) {
        if (!streakDays || streakDays <= 0) return {
          img: "Iris-sad",
          title: "Your burrow's a bit quiet.",
          sub: "Submit a verified quote or receipt to start a streak. Iris is waiting.",
        };
        if (streakDays < 3) return {
          img: "Iris-peeking",
          title: "Day " + streakDays + ". Off to a start!",
          sub: "Keep going. Hit 3 days in a row and Iris will cheer up.",
        };
        if (streakDays < 7) return {
          img: "Iris-happy",
          title: "Day " + streakDays + ". Iris is happy.",
          sub: (7 - streakDays) + " more day" + (7 - streakDays === 1 ? "" : "s") + " to your first weekly milestone.",
        };
        if (streakDays < 14) return {
          img: "Iris-happy",
          title: "Day " + streakDays + ". Streak unlocked.",
          sub: "Two-week milestone in " + (14 - streakDays) + " day" + (14 - streakDays === 1 ? "" : "s") + ". Future streak bonuses will land in Woo Cash.",
        };
        if (streakDays < 30) return {
          img: "Iris-catching",
          title: "Day " + streakDays + ". Iris is catching them all.",
          sub: (30 - streakDays) + " more day" + (30 - streakDays === 1 ? "" : "s") + " to a 30-day milestone.",
        };
        return {
          img: "Iris-laurel%20seal%20180",
          title: "Day " + streakDays + ". Hall of Fame.",
          sub: "You're in rare territory. Iris approves.",
        };
      }

      // Convert a ledger source like "receipt:r_abc123" into a friendly label.
      function srcLabel(source, meta) {
        var parts = String(source || "").split(":");
        var kind = parts[0];
        var id = parts[1] || "";
        var v = (meta && meta.vertical) ? String(meta.vertical).replace(/_/g, " ") : "";
        if (kind === "receipt") return { label: "Verified receipt" + (v ? " — " + v : ""), meta: id };
        if (kind === "quote")   return { label: "Verified quote" + (v ? " — " + v : ""), meta: id };
        if (kind === "redeem")  return { label: "Redemption" + (meta && meta.itemLabel ? " — " + meta.itemLabel : ""), meta: id };
        if (kind === "bonus")   return { label: "Bonus" + (parts[1] ? " — " + parts[1].replace(/_/g, " ") : ""), meta: "" };
        if (kind === "admin")   return { label: "Admin adjustment" + (parts[1] ? " — " + parts[1] : ""), meta: "" };
        return { label: source, meta: "" };
      }

      function renderWaitlist(state) {
        return '' +
          '<div class="bw-row">' +
            '<div class="bw-greet">Signed in as <strong>' + esc(state.user.email) + '</strong></div>' +
            '<a class="bw-logout" href="/api/beta-logout">Sign out</a>' +
          '</div>' +
          '<div class="bw-waitlist">' +
            "<strong>You're on the waitlist.</strong> Your account is ready, but the closed beta is invite-only right now. We'll email you when your spot opens up." +
          '</div>' +
          '<div class="bw-state">' +
            '<p style="margin:0;color:#475569;font-size:14px;line-height:1.6;">' +
              "While you wait: keep using Woogoro estimators normally. When the beta opens to you, every verified quote and receipt you submit earns a Woogoro and Woo Cash you can spend on merch (and soon, real gift cards)." +
            '</p>' +
          '</div>';
      }

      function renderBurrow(state) {
        var collected = {};
        (state.burrow.collectedWoogoros || []).forEach(function (v) { collected[v] = true; });
        var collectedCount = Object.keys(collected).length;

        var grid = VERTICALS.map(function (row) {
          var slug = row[0], label = row[1];
          var has = !!collected[slug];
          var artFile = VERTICAL_ART[slug];
          var artSrc = artFile ? "/images/Vertical-Woogoro/" + encodeURIComponent(artFile) : null;
          return '<div class="bw-cell ' + (has ? 'has-w' : '') + '">' +
            (has
              ? (artSrc
                  ? '<img class="vw-art" src="' + artSrc + '" alt="' + esc(label) + ' Woogoro" />'
                  : '<div class="icon">&#x2728;</div>') +
                '<div style="font-weight:700;">' + esc(label) + '</div>'
              : '<div style="opacity:.4;font-weight:600;">' + esc(label) + '</div><div style="margin-top:4px;">Uncollected</div>') +
          '</div>';
        }).join("");

        var ledgerRows = (state.ledger || []).map(function (e) {
          var amt = (e.type === "issue" ? "+" : "-") + e.amount.toLocaleString();
          var s = srcLabel(e.source, e.meta);
          return '<tr>' +
            '<td>' + esc(fmtTs(e.ts)) + '</td>' +
            '<td><span class="src-label">' + esc(s.label) + '</span>' + (s.meta ? '<span class="src-meta">' + esc(s.meta) + '</span>' : '') + '</td>' +
            '<td class="amt ' + esc(e.type) + '">' + amt + '</td>' +
          '</tr>';
        }).join("");
        if (!ledgerRows) ledgerRows = '<tr><td colspan="3" class="bw-empty">No activity yet. Submit a verified receipt or quote to start earning.</td></tr>';

        var caps = state.caps || { quote: { used: 0, cap: 5 }, receipt: { used: 0, cap: 15 } };
        var iris = irisFor(state.burrow.streakDays || 0);

        // Streak progress bar to next milestone
        var sd = state.burrow.streakDays || 0;
        var nextMilestone = sd < 3 ? 3 : sd < 7 ? 7 : sd < 14 ? 14 : sd < 30 ? 30 : 100;
        var pct = Math.min(100, Math.round((sd / nextMilestone) * 100));

        // Receipt Woogoros: split into kept (cashable) and redeemed.
        // Newest first within each group.
        var rwAll = (state.burrow.receiptWoogoros || []).slice().sort(function (a, b) {
          return (b.capturedAt || 0) - (a.capturedAt || 0);
        });
        var rwKept = rwAll.filter(function (x) { return !x.redeemed; });
        var rwRedeemed = rwAll.filter(function (x) { return x.redeemed; });
        var stashWoo = rwKept.reduce(function (s, x) { return s + (Number(x.wooAmount) || 0); }, 0);

        function rwCard(rw) {
          var tier = rw.tier || "bronze";
          var art = "/images/Receipt-Woogoro/" + tier + "1.png";
          var vert = (rw.vertical || "").replace(/_/g, " ");
          var amt = Number(rw.declaredAmount) || 0;
          var woo = Number(rw.wooAmount) || 0;
          var wooSubLabel = rw.redeemed ? "cashed in" : "locked in";
          var headBits =
            '<div class="bw-rw-tier ' + esc(tier) + '">' + esc(tier) + '</div>' +
            '<img src="' + esc(art) + '" alt="' + esc(tier) + ' Receipt Woogoro" />' +
            '<div class="bw-rw-vertical">' + esc(vert) + '</div>' +
            '<div class="bw-rw-amount">$' + amt.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' receipt</div>' +
            '<div class="bw-rw-woo">' + woo.toLocaleString() + ' Woo<small>' + wooSubLabel + '</small></div>';
          if (rw.redeemed) {
            return '<div class="bw-rw redeemed">' + headBits +
              '<div class="bw-rw-redeemed-badge">Cashed in ' + esc(fmtTs(rw.redeemedAt)) + '</div>' +
            '</div>';
          }
          return '<div class="bw-rw" data-rw-id="' + esc(rw.id) + '" data-tier="' + esc(tier) + '">' + headBits +
            '<div class="bw-rw-actions">' +
              '<button class="bw-rw-btn cash" type="button" data-cash>Cash in</button>' +
            '</div>' +
            '<div class="bw-rw-keep-caption">or leave it in your burrow to collect</div>' +
          '</div>';
        }

        var rwSection = "";
        if (rwAll.length) {
          var rwGrid = rwKept.map(rwCard).join("") + rwRedeemed.map(rwCard).join("");
          var stashStrip = "";
          if (stashWoo > 0) {
            stashStrip = '<div class="bw-stash-strip">' +
              '<div><strong>' + stashWoo.toLocaleString() + ' Woo</strong> locked in ' + rwKept.length + ' Receipt Woogoro' + (rwKept.length === 1 ? '' : 's') + '. Cash in below to add to your spendable balance.</div>' +
            '</div>';
          }
          rwSection =
            '<div class="bw-section-h">Receipt Woogoros <span style="font-weight:500;color:#64748b;">' + rwKept.length + ' kept &bull; ' + rwRedeemed.length + ' cashed in</span></div>' +
            stashStrip +
            '<div class="bw-receipts">' + rwGrid + '</div>' +
            '<p style="font-size:10px;color:#94a3b8;margin:10px 0 0;line-height:1.4;">Cashing in is permanent. Woo Cash has no monetary value on its own. <a href="/terms.html#rewards-program" style="color:inherit;text-decoration:underline;">Rewards terms</a>.</p>';
        }

        // Orders
        var orders = (state.orders || []);
        var ordersHtml = "";
        if (orders.length) {
          ordersHtml = '<div class="bw-section-h">Recent orders</div><div class="bw-orders">' +
            orders.map(function (o) {
              return '<div class="bw-order">' +
                '<div class="bw-order-main">' +
                  '<div class="bw-order-name">' + esc(o.itemLabel || o.itemSlug) + '</div>' +
                  '<div class="bw-order-meta">' + (o.wooCost || 0).toLocaleString() + ' Woo &bull; placed ' + esc(fmtTs(o.placedAt)) + (o.trackingNumber ? ' &bull; tracking ' + esc(o.trackingNumber) : '') + '</div>' +
                '</div>' +
                '<span class="bw-order-status ' + esc(o.status) + '">' + esc(o.status) + '</span>' +
              '</div>';
            }).join("") +
          '</div>';
        }

        return '' +
          '<div class="bw-row">' +
            '<div class="bw-greet">Signed in as <strong>' + esc(state.user.email) + '</strong></div>' +
            '<a class="bw-logout" href="/api/beta-logout">Sign out</a>' +
          '</div>' +
          '<div class="bw-hero">' +
            '<div class="bw-hero-iris">' +
              '<picture>' +
                '<source srcset="/images/Iris/' + iris.img + '.webp" type="image/webp">' +
                '<img src="/images/Iris/' + iris.img + '.png" alt="Iris">' +
              '</picture>' +
            '</div>' +
            '<div class="bw-hero-text">' +
              '<p class="bw-hero-title">' + esc(iris.title) + '</p>' +
              '<p class="bw-hero-sub">' + esc(iris.sub) + '</p>' +
            '</div>' +
          '</div>' +
          '<div class="bw-actions">' +
            '<a class="bw-action" href="/beta/submit-receipt.html">Submit a receipt<small>500&ndash;5,000 Woo by tier &bull; ' + caps.receipt.used + '/' + caps.receipt.cap + ' this week</small></a>' +
            '<a class="bw-action alt" href="/beta/submit-quote.html">Submit a quote<small>+100 Woo &bull; ' + caps.quote.used + '/' + caps.quote.cap + ' this week</small></a>' +
            (state.canRedeem
              ? '<a class="bw-action gold" href="/beta/redeem.html">Redeem Woo Cash<small>Merch &mdash; gift cards soon</small></a>'
              : '<span class="bw-action" style="opacity:.65;cursor:not-allowed;background:#f1f5f9;color:#64748b;border-color:#e2e8f0;" title="Redemption unlocks once your account is verified.">Redeem Woo Cash<small>Unlocks after verification</small></span>') +
          '</div>' +
          (state.canRedeem ? '' :
            '<div style="background:#f0f9ff;border:1px solid #bae6fd;border-radius:8px;padding:12px 14px;margin:0 0 16px;font-size:13px;color:#1e3a8a;line-height:1.5;">' +
              '<strong>Redemption pending verification.</strong> You can earn Woogoros, cash in for Woo Cash, and watch it grow now. Merch redemption unlocks once your submission patterns are reviewed. Want priority? Reply to any Woogoro email or write <a href="mailto:hello@woogoro.com" style="color:#1e3a8a;">hello@woogoro.com</a>.' +
            '</div>') +
          '<div class="bw-grid">' +
            '<div class="bw-stat">' +
              '<div class="bw-stat-label">Woo Cash</div>' +
              '<div class="bw-stat-value">' + (state.balance || 0).toLocaleString() + '</div>' +
              '<div class="bw-stat-sub">Spend on merch (gift cards coming)</div>' +
            '</div>' +
            '<div class="bw-stat">' +
              '<div class="bw-stat-label">Streak</div>' +
              '<div class="bw-stat-value">' + sd + ' <span style="font-size:14px;color:#64748b;font-weight:600;">day' + (sd === 1 ? '' : 's') + '</span></div>' +
              '<div class="bw-stat-sub">Next milestone at ' + nextMilestone + ' days</div>' +
              '<div class="bw-stat-progress"><div style="width:' + pct + '%"></div></div>' +
            '</div>' +
          '</div>' +
          '<div class="bw-section-h">Your Woogoros <span style="font-weight:500;color:#64748b;">' + collectedCount + ' of ' + VERTICALS.length + ' collected</span></div>' +
          '<div class="bw-collection">' + grid + '</div>' +
          rwSection +
          ordersHtml +
          '<div class="bw-section-h">Saved watches <span style="font-weight:500;color:#64748b;">price alerts on areas you care about</span></div>' +
          '<div id="bw-watches-section">' +
            '<div id="bw-watches-list" style="margin-bottom:12px;">Loading watches&hellip;</div>' +
            '<form id="bw-watch-form" style="display:flex;flex-wrap:wrap;gap:8px;align-items:flex-end;background:#f8fafc;padding:14px;border-radius:10px;border:1px solid #e2e8f0;">' +
              '<div style="flex:1;min-width:140px;">' +
                '<label style="display:block;font-size:12px;color:#475569;margin-bottom:4px;">Vertical</label>' +
                '<select id="bw-watch-vertical" required style="width:100%;padding:8px;border:1px solid #cbd5e1;border-radius:6px;font:inherit;">' +
                  '<option value="">Pick one&hellip;</option>' +
                  '<option value="hvac">HVAC</option><option value="plumbing">Plumbing</option><option value="roofing">Roofing</option>' +
                  '<option value="electrical">Electrical</option><option value="solar">Solar</option><option value="windows">Windows</option>' +
                  '<option value="siding">Siding</option><option value="painting">Painting</option><option value="garage-doors">Garage doors</option>' +
                  '<option value="fencing">Fencing</option><option value="concrete">Concrete</option><option value="landscaping">Landscaping</option>' +
                  '<option value="foundation">Foundation</option><option value="insulation">Insulation</option><option value="gutters">Gutters</option>' +
                  '<option value="kitchen">Kitchen</option><option value="moving">Moving</option><option value="auto-repair">Auto repair</option>' +
                  '<option value="medical">Medical</option><option value="legal">Legal</option>' +
                '</select>' +
              '</div>' +
              '<div style="flex:1;min-width:120px;">' +
                '<label style="display:block;font-size:12px;color:#475569;margin-bottom:4px;">City</label>' +
                '<input id="bw-watch-city" type="text" required maxlength="60" placeholder="Charlotte" style="width:100%;padding:8px;border:1px solid #cbd5e1;border-radius:6px;font:inherit;">' +
              '</div>' +
              '<div style="width:70px;">' +
                '<label style="display:block;font-size:12px;color:#475569;margin-bottom:4px;">State</label>' +
                '<input id="bw-watch-state" type="text" required maxlength="2" placeholder="NC" style="width:100%;padding:8px;border:1px solid #cbd5e1;border-radius:6px;font:inherit;text-transform:uppercase;">' +
              '</div>' +
              '<div style="width:90px;">' +
                '<label style="display:block;font-size:12px;color:#475569;margin-bottom:4px;">Threshold</label>' +
                '<select id="bw-watch-threshold" style="width:100%;padding:8px;border:1px solid #cbd5e1;border-radius:6px;font:inherit;">' +
                  '<option value="0.05">5%</option><option value="0.10" selected>10%</option><option value="0.15">15%</option>' +
                '</select>' +
              '</div>' +
              '<button type="submit" style="background:#1d4ed8;color:#fff;border:0;padding:9px 18px;border-radius:6px;font:inherit;font-weight:600;cursor:pointer;">Add watch</button>' +
            '</form>' +
            '<div id="bw-watch-msg" style="margin-top:8px;font-size:13px;min-height:18px;"></div>' +
          '</div>' +
          '<div class="bw-section-h">Recent activity</div>' +
          '<div class="bw-ledger"><table><thead><tr><th>When</th><th>Source</th><th style="text-align:right;">Amount</th></tr></thead><tbody>' + ledgerRows + '</tbody></table></div>';
      }

      function vName(slug) {
        var m = { hvac:"HVAC", plumbing:"Plumbing", roofing:"Roofing", electrical:"Electrical",
          solar:"Solar", windows:"Windows", siding:"Siding", painting:"Painting",
          "garage-doors":"Garage doors", fencing:"Fencing", concrete:"Concrete",
          landscaping:"Landscaping", foundation:"Foundation", insulation:"Insulation",
          gutters:"Gutters", kitchen:"Kitchen", moving:"Moving",
          "auto-repair":"Auto repair", medical:"Medical", legal:"Legal" };
        return m[slug] || slug;
      }

      function escapeText(s) {
        var d = document.createElement("div"); d.textContent = String(s); return d.innerHTML;
      }

      function renderWatchesList(watches) {
        var listEl = document.getElementById("bw-watches-list");
        if (!listEl) return;
        if (!watches || !watches.length) {
          listEl.innerHTML = '<div style="font-size:13px;color:#64748b;padding:8px 0;">No watches yet. Add one below to get a heads-up when prices in an area you care about move.</div>';
          return;
        }
        var rows = watches.map(function (w) {
          return '<div style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;margin-bottom:6px;font-size:14px;">' +
            '<div style="flex:1;"><strong>' + escapeText(vName(w.vertical)) + '</strong> in ' + escapeText(w.city) + ', ' + escapeText(w.state) + ' <span style="color:#94a3b8;font-size:12px;">&middot; threshold ' + ((Number(w.threshold) || 0.05) * 100).toFixed(0) + '%</span></div>' +
            '<button type="button" data-watch-id="' + escapeText(w.id) + '" class="bw-watch-remove" style="background:transparent;color:#b91c1c;border:1px solid #fecaca;padding:4px 10px;border-radius:6px;font:inherit;font-size:12px;cursor:pointer;">Remove</button>' +
            '</div>';
        }).join("");
        listEl.innerHTML = rows;
      }

      function loadWatches() {
        return fetch("/api/beta-watch-list", { credentials: "same-origin" })
          .then(function (r) { return r.ok ? r.json() : { watches: [] }; })
          .then(function (j) { renderWatchesList(j.watches || []); })
          .catch(function () { renderWatchesList([]); });
      }

      function bindWatchUI() {
        var form = document.getElementById("bw-watch-form");
        var msg = document.getElementById("bw-watch-msg");
        if (!form) return;
        form.addEventListener("submit", function (ev) {
          ev.preventDefault();
          msg.textContent = ""; msg.style.color = "#475569";
          var payload = {
            vertical: document.getElementById("bw-watch-vertical").value,
            city: document.getElementById("bw-watch-city").value.trim(),
            state: document.getElementById("bw-watch-state").value.trim().toUpperCase(),
            threshold: Number(document.getElementById("bw-watch-threshold").value),
          };
          fetch("/api/beta-watch-add", {
            method: "POST",
            credentials: "same-origin",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          }).then(function (r) { return r.json().then(function (j) { return { status: r.status, body: j }; }); })
            .then(function (res) {
              if (res.status === 200 && res.body.ok) {
                msg.style.color = "#15803d";
                msg.textContent = "Watch added.";
                form.reset();
                document.getElementById("bw-watch-threshold").value = "0.10";
                loadWatches();
              } else {
                msg.style.color = "#b91c1c";
                msg.textContent = "Could not add watch: " + (res.body.error || "unknown error");
              }
            })
            .catch(function () { msg.style.color = "#b91c1c"; msg.textContent = "Network error."; });
        });

        document.addEventListener("click", function (ev) {
          var btn = ev.target.closest && ev.target.closest(".bw-watch-remove");
          if (!btn) return;
          var id = btn.getAttribute("data-watch-id");
          if (!id) return;
          if (!confirm("Remove this watch?")) return;
          fetch("/api/beta-watch-remove", {
            method: "POST",
            credentials: "same-origin",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ id: id }),
          }).then(function () { loadWatches(); });
        });
      }

      function loadAndRender() {
        return fetch("/api/beta-burrow", { credentials: "same-origin" })
          .then(function (r) {
            if (r.status === 401) {
              location.href = "/beta/login.html";
              return null;
            }
            return r.json();
          })
          .then(function (state) {
            if (!state) return;
            loading.style.display = "none";
            content.style.display = "block";
            content.innerHTML = state.beta ? renderBurrow(state) : renderWaitlist(state);
            if (state.beta) {
              try { bindWatchUI(); loadWatches(); } catch (e) { /* watches are best-effort UI */ }
            }
          })
          .catch(function () {
            loading.style.display = "none";
            content.style.display = "block";
            content.innerHTML = '<div class="bw-error">Could not load your burrow. Please refresh, or <a href="/beta/login.html">sign in again</a>.</div>';
          });
      }

      // ===== Vaudeville hook cash-in =====
      // Tier-graded sequences. Bronze/silver are grumpy and exit stage
      // left rudely; gold/platinum are snobby and exit stage right with
      // sparkles + (platinum) red carpet + lens flare.
      var TIER_VH = {
        bronze:   { yankDir: "left",  descendMs: 350, yankMs: 220,  coinCount: 5,  coinSize: 16, coinClass: "",         sparkles: 0,  carpet: false, flare: false, jewels: 0, totalMs: 2800 },
        silver:   { yankDir: "left",  descendMs: 450, yankMs: 380,  coinCount: 8,  coinSize: 18, coinClass: "",         sparkles: 0,  carpet: false, flare: false, jewels: 0, totalMs: 3200 },
        gold:     { yankDir: "right", descendMs: 550, yankMs: 700,  coinCount: 12, coinSize: 22, coinClass: "gold",     sparkles: 7,  carpet: false, flare: false, jewels: 0, totalMs: 3900 },
        platinum: { yankDir: "right", descendMs: 750, yankMs: 1200, coinCount: 16, coinSize: 26, coinClass: "platinum", sparkles: 12, carpet: true,  flare: true,  jewels: 4, totalMs: 5500 },
      };

      // SVG_NS shorthand
      var SVG_NS = "http://www.w3.org/2000/svg";

      // Build the SHAFT (back layer) SVG: long horizontal wooden cane
      // with an OPEN shepherd's-crook curl at the far end. The crook is
      // a true J-shape with an opening, not a closed loop, so it reads
      // as a hook for catching things.
      function makeHookShaftSvg(direction) {
        var svg = document.createElementNS(SVG_NS, "svg");
        // Taller viewBox so the curl can extend above the cane line
        svg.setAttribute("viewBox", "-5 -5 230 60");
        svg.setAttribute("class", "bw-rw-hook-shaft " + direction);
        var defs = document.createElementNS(SVG_NS, "defs");
        defs.innerHTML =
          '<linearGradient id="vh-wood" x1="0" y1="0" x2="0" y2="1">' +
            '<stop offset="0" stop-color="#8b4513"/>' +
            '<stop offset=".35" stop-color="#a0522d"/>' +
            '<stop offset=".7" stop-color="#6b3410"/>' +
            '<stop offset="1" stop-color="#3d1f08"/>' +
          '</linearGradient>' +
          '<linearGradient id="vh-metal" x1="0" y1="0" x2="0" y2="1">' +
            '<stop offset="0" stop-color="#e5e7eb"/>' +
            '<stop offset=".5" stop-color="#94a3b8"/>' +
            '<stop offset="1" stop-color="#475569"/>' +
          '</linearGradient>';
        svg.appendChild(defs);
        // Wooden cane (horizontal pole). Stops short of the crook so the
        // metal portion clearly attaches at the end.
        var cane = document.createElementNS(SVG_NS, "rect");
        cane.setAttribute("x", "0"); cane.setAttribute("y", "32");
        cane.setAttribute("width", "165"); cane.setAttribute("height", "8");
        cane.setAttribute("rx", "4"); cane.setAttribute("fill", "url(#vh-wood)");
        svg.appendChild(cane);
        // Wood-grain highlight stripe (fakes a cylindrical pole)
        var hi = document.createElementNS(SVG_NS, "rect");
        hi.setAttribute("x", "2"); hi.setAttribute("y", "33");
        hi.setAttribute("width", "161"); hi.setAttribute("height", "1.5");
        hi.setAttribute("rx", "1"); hi.setAttribute("fill", "rgba(255,220,180,.45)");
        svg.appendChild(hi);
        // Brass ferrule where wood meets metal
        var ferrule = document.createElementNS(SVG_NS, "rect");
        ferrule.setAttribute("x", "162"); ferrule.setAttribute("y", "30");
        ferrule.setAttribute("width", "8"); ferrule.setAttribute("height", "12");
        ferrule.setAttribute("rx", "1.5"); ferrule.setAttribute("fill", "#b8860b");
        svg.appendChild(ferrule);
        // Open shepherd's-crook hook in metal. Path traces an inverted
        // U (top of the curl) with the tip pointing down on the LEFT
        // side, leaving the right side OPEN for catching.
        var hook = document.createElementNS(SVG_NS, "path");
        hook.setAttribute("d",
          // Start at the right edge of the cane (attach point)
          "M 168 36 " +
          // Curve UP and slightly RIGHT to the top of the curl
          "Q 200 36 205 18 " +
          // Continue UP to the apex
          "Q 209 0 192 0 " +
          // Curve down on the LEFT side forming the inner curl
          "Q 172 0 172 18 " +
          // Continue down to form the open hook tip
          "L 172 30");
        hook.setAttribute("stroke", "url(#vh-metal)");
        hook.setAttribute("stroke-width", "7");
        hook.setAttribute("stroke-linecap", "round");
        hook.setAttribute("stroke-linejoin", "round");
        hook.setAttribute("fill", "none");
        svg.appendChild(hook);
        // Inner sheen on the metal curl
        var sheen = document.createElementNS(SVG_NS, "path");
        sheen.setAttribute("d",
          "M 174 30 L 174 18 Q 174 4 192 4 Q 204 4 201 16");
        sheen.setAttribute("stroke", "rgba(255,255,255,.6)");
        sheen.setAttribute("stroke-width", "1.5");
        sheen.setAttribute("stroke-linecap", "round");
        sheen.setAttribute("fill", "none");
        svg.appendChild(sheen);
        return svg;
      }

      // Build the TIP (front overlay layer) SVG: just the curled metal
      // hook portion that wraps in front of the character. Same J-curl
      // geometry as the shaft's end but isolated so we can z-index it
      // above the character image for the 3D wrap-around illusion.
      function makeHookTipSvg(direction) {
        var svg = document.createElementNS(SVG_NS, "svg");
        svg.setAttribute("viewBox", "-5 -5 70 60");
        svg.setAttribute("class", "bw-rw-hook-tip " + direction);
        var defs = document.createElementNS(SVG_NS, "defs");
        defs.innerHTML =
          '<linearGradient id="vh-metal2" x1="0" y1="0" x2="0" y2="1">' +
            '<stop offset="0" stop-color="#f1f5f9"/>' +
            '<stop offset=".4" stop-color="#94a3b8"/>' +
            '<stop offset="1" stop-color="#334155"/>' +
          '</linearGradient>';
        svg.appendChild(defs);
        // Same crook shape as the shaft tip, scaled to fit a 60x60 box
        var curl = document.createElementNS(SVG_NS, "path");
        curl.setAttribute("d",
          "M 8 36 " +
          "Q 40 36 45 18 " +
          "Q 49 0 32 0 " +
          "Q 12 0 12 18 " +
          "L 12 30");
        curl.setAttribute("stroke", "url(#vh-metal2)");
        curl.setAttribute("stroke-width", "7");
        curl.setAttribute("stroke-linecap", "round");
        curl.setAttribute("stroke-linejoin", "round");
        curl.setAttribute("fill", "none");
        svg.appendChild(curl);
        var sheen = document.createElementNS(SVG_NS, "path");
        sheen.setAttribute("d",
          "M 14 30 L 14 18 Q 14 4 32 4 Q 44 4 41 16");
        sheen.setAttribute("stroke", "rgba(255,255,255,.65)");
        sheen.setAttribute("stroke-width", "1.5");
        sheen.setAttribute("stroke-linecap", "round");
        sheen.setAttribute("fill", "none");
        svg.appendChild(sheen);
        return svg;
      }

      // Money sack that drops in where the Woogoro stood, after the
      // yank completes. Tier-styled (bronze burlap, silver fabric, gold
      // silk, platinum satin). Centerpiece of the post-yank moment.
      var SACK_TIERS = {
        bronze:   { fillA: "#d4a373", fillB: "#7c5230", rope: "#3d240e", textColor: "rgba(60,35,10,.85)", label: "500" },
        silver:   { fillA: "#f1f5f9", fillB: "#64748b", rope: "#334155", textColor: "rgba(30,41,59,.65)", label: "1,000" },
        gold:     { fillA: "#fde68a", fillB: "#b45309", rope: "#78350f", textColor: "rgba(60,30,5,.85)", label: "2,500" },
        platinum: { fillA: "#ffffff", fillB: "#94a3b8", rope: "#475569", textColor: "rgba(15,23,42,.7)", label: "5,000" },
      };
      function makeSackSvg(tier, wooAmount) {
        var t = SACK_TIERS[tier] || SACK_TIERS.bronze;
        var label = wooAmount ? wooAmount.toLocaleString() : t.label;
        var svg = document.createElementNS(SVG_NS, "svg");
        svg.setAttribute("viewBox", "0 0 70 90");
        svg.setAttribute("class", "bw-vh-sack " + tier);
        var defs = document.createElementNS(SVG_NS, "defs");
        defs.innerHTML =
          '<radialGradient id="vh-sack-' + tier + '" cx="35%" cy="35%">' +
            '<stop offset="0" stop-color="' + t.fillA + '"/>' +
            '<stop offset="1" stop-color="' + t.fillB + '"/>' +
          '</radialGradient>';
        svg.appendChild(defs);
        // Main sack body: pear-shaped curve
        var body = document.createElementNS(SVG_NS, "path");
        body.setAttribute("d",
          "M 35 22 " +
          "Q 18 22 16 38 " +
          "Q 12 60 22 76 " +
          "Q 35 86 48 76 " +
          "Q 58 60 54 38 " +
          "Q 52 22 35 22 Z");
        body.setAttribute("fill", "url(#vh-sack-" + tier + ")");
        body.setAttribute("stroke", "rgba(0,0,0,.35)");
        body.setAttribute("stroke-width", "1");
        svg.appendChild(body);
        // Tied/wrinkled portion at top (drawstring gather)
        var gather = document.createElementNS(SVG_NS, "ellipse");
        gather.setAttribute("cx", "35"); gather.setAttribute("cy", "24");
        gather.setAttribute("rx", "14"); gather.setAttribute("ry", "4");
        gather.setAttribute("fill", t.fillB);
        gather.setAttribute("stroke", "rgba(0,0,0,.3)");
        gather.setAttribute("stroke-width", ".75");
        svg.appendChild(gather);
        // Drawstring strands sticking up (tied)
        var ropeL = document.createElementNS(SVG_NS, "path");
        ropeL.setAttribute("d", "M 28 22 Q 25 14 26 6");
        ropeL.setAttribute("stroke", t.rope);
        ropeL.setAttribute("stroke-width", "1.5");
        ropeL.setAttribute("stroke-linecap", "round");
        ropeL.setAttribute("fill", "none");
        svg.appendChild(ropeL);
        var ropeR = document.createElementNS(SVG_NS, "path");
        ropeR.setAttribute("d", "M 42 22 Q 45 14 44 6");
        ropeR.setAttribute("stroke", t.rope);
        ropeR.setAttribute("stroke-width", "1.5");
        ropeR.setAttribute("stroke-linecap", "round");
        ropeR.setAttribute("fill", "none");
        svg.appendChild(ropeR);
        // $ symbol on the front
        var sym = document.createElementNS(SVG_NS, "text");
        sym.setAttribute("x", "35"); sym.setAttribute("y", "56");
        sym.setAttribute("text-anchor", "middle");
        sym.setAttribute("font-family", "-apple-system, system-ui, sans-serif");
        sym.setAttribute("font-size", "20");
        sym.setAttribute("font-weight", "900");
        sym.setAttribute("font-style", "italic");
        sym.setAttribute("fill", t.textColor);
        sym.textContent = "$";
        svg.appendChild(sym);
        // Amount label below the $
        var amt = document.createElementNS(SVG_NS, "text");
        amt.setAttribute("x", "35"); amt.setAttribute("y", "70");
        amt.setAttribute("text-anchor", "middle");
        amt.setAttribute("font-family", "-apple-system, system-ui, sans-serif");
        amt.setAttribute("font-size", "10");
        amt.setAttribute("font-weight", "700");
        amt.setAttribute("fill", t.textColor);
        amt.textContent = label;
        svg.appendChild(amt);
        // Tier-specific accents
        if (tier === "platinum") {
          // Pink jewel pinned to the rope tie
          var jewel = document.createElementNS(SVG_NS, "circle");
          jewel.setAttribute("cx", "35"); jewel.setAttribute("cy", "9");
          jewel.setAttribute("r", "3.5");
          jewel.setAttribute("fill", "#ec4899");
          jewel.setAttribute("stroke", "#fff");
          jewel.setAttribute("stroke-width", ".6");
          svg.appendChild(jewel);
        } else if (tier === "gold") {
          // Tiny gold sparkle highlight
          var spark = document.createElementNS(SVG_NS, "path");
          spark.setAttribute("d", "M 24 40 L 26 44 L 30 46 L 26 48 L 24 52 L 22 48 L 18 46 L 22 44 Z");
          spark.setAttribute("fill", "rgba(255,255,255,.7)");
          svg.appendChild(spark);
        }
        return svg;
      }

      function spawnSparkles(card, cfg, originY) {
        // Sparkles trail along the woogoro's exit path
        var dir = cfg.yankDir === "right" ? 1 : -1;
        for (var i = 0; i < cfg.sparkles; i++) {
          var s = document.createElement("div");
          s.className = "bw-vh-sparkle" + (cfg.coinClass === "platinum" ? " platinum" : "");
          var t = (i + 1) / (cfg.sparkles + 1); // 0..1 along path
          var x0 = dir * (40 + t * 100);
          var y0 = -10 - t * 40;
          var x1 = x0 + dir * (20 + Math.random() * 30);
          var y1 = y0 - 30 - Math.random() * 30;
          s.style.setProperty("--vh-sparkle-x0", x0 + "px");
          s.style.setProperty("--vh-sparkle-y0", y0 + "px");
          s.style.setProperty("--vh-sparkle-x1", x1 + "px");
          s.style.setProperty("--vh-sparkle-y1", y1 + "px");
          s.style.setProperty("--vh-sparkle-dur", (700 + Math.random() * 300) + "ms");
          // Sparkles begin appearing partway through the yank
          s.style.setProperty("--vh-sparkle-delay", (cfg.descendMs + 100 + i * 70) + "ms");
          s.style.animationDelay = (cfg.descendMs + 100 + i * 70) + "ms";
          card.appendChild(s);
        }
      }

      function spawnVaudevilleHook(card, tier, wooAmount) {
        var cfg = TIER_VH[tier] || TIER_VH.bronze;

        // Configure tier-specific CSS variables on the card
        card.style.setProperty("--vh-descend", cfg.descendMs + "ms");
        card.style.setProperty("--vh-yank", cfg.yankMs + "ms");
        card.style.setProperty("--vh-yank-keyframes", cfg.yankDir === "right" ? "vh-yank-right" : "vh-yank-left");
        card.style.setProperty("--vh-hook-exit-keyframes", cfg.yankDir === "right" ? "vh-hook-exit-right" : "vh-hook-exit-left");

        // Insert both hook layers (shaft behind character, tip in front)
        // matching the yank direction.
        var dir = cfg.yankDir; // "left" or "right"
        var shaft = makeHookShaftSvg(dir);
        var tip   = makeHookTipSvg(dir);
        card.appendChild(shaft);
        card.appendChild(tip);

        // Phase A: card shake + hook swing-in (driven by .vh-active class)
        card.classList.add("vh-active");

        // Phase B: hook catches and yanks. Trigger after descend completes.
        setTimeout(function () { card.classList.add("vh-yanking"); }, cfg.descendMs);

        // Sparkles (gold/platinum) ride along the yank
        if (cfg.sparkles > 0) spawnSparkles(card, cfg);

        // Red carpet (platinum) rolls out around when the woogoro starts moving
        if (cfg.carpet) {
          var carpet = document.createElement("div");
          carpet.className = "bw-vh-carpet";
          carpet.style.animationDelay = (cfg.descendMs - 100) + "ms";
          card.appendChild(carpet);
        }

        // Phase C: yank completes -> sack drops in (centerpiece) +
        // coins start showering around it
        var coinPhaseStart = cfg.descendMs + cfg.yankMs;

        // Money sack: lands where the Woogoro stood, slightly before
        // coins start, so it's visible as the source of the wealth.
        var sack = makeSackSvg(tier, wooAmount);
        sack.style.setProperty("--vh-sack-delay", (coinPhaseStart - 50) + "ms");
        sack.style.animationDelay = (coinPhaseStart - 50) + "ms";
        card.appendChild(sack);
        var totalCoins = cfg.coinCount + cfg.jewels;
        for (var i = 0; i < totalCoins; i++) {
          var coin = document.createElement("div");
          var isJewel = i >= cfg.coinCount;
          coin.className = "bw-vh-coin" + (cfg.coinClass ? " " + cfg.coinClass : "") + (isJewel ? " jewel" : "");
          // Random fan-out trajectory, biased downward
          var angle = (Math.PI * 1.4) * (i / totalCoins) - Math.PI * 0.7; // -126deg..+126deg
          var dist = 60 + Math.random() * 60;
          var xEnd = Math.sin(angle) * dist;
          var yEnd = 40 + Math.abs(Math.cos(angle)) * (40 + Math.random() * 30);
          var rot = (Math.random() < .5 ? -1 : 1) * (180 + Math.random() * 540);
          coin.style.setProperty("--vh-coin-x", xEnd + "px");
          coin.style.setProperty("--vh-coin-y", yEnd + "px");
          coin.style.setProperty("--vh-coin-size", cfg.coinSize + "px");
          coin.style.setProperty("--vh-coin-dur", (1000 + Math.random() * 400) + "ms");
          // rotateY flip varies per coin so they spin like real tossed coins
          coin.style.setProperty("--vh-coin-flip", ((Math.random() < .5 ? -1 : 1) * (360 + Math.random() * 720)) + "deg");
          // Tight inter-coin spacing for a denser shower
          coin.style.setProperty("--vh-coin-delay", (coinPhaseStart + i * 22) + "ms");
          coin.style.animationDelay = (coinPhaseStart + i * 22) + "ms";
          card.appendChild(coin);
        }

        // Lens flare (platinum) at coin peak
        if (cfg.flare) {
          var flare = document.createElement("div");
          flare.className = "bw-vh-flare";
          flare.style.setProperty("--vh-flare-delay", (coinPhaseStart + 200) + "ms");
          flare.style.animationDelay = (coinPhaseStart + 200) + "ms";
          card.appendChild(flare);
        }

        return cfg.totalMs;
      }

      // Show an inline error on a card without alert() (mobile-friendly).
      function showCardError(card, btn, msg) {
        card.classList.remove("cashing");
        btn.disabled = false;
        btn.textContent = "Cash in";
        var existing = card.querySelector(".bw-rw-error");
        if (existing) existing.remove();
        var e = document.createElement("div");
        e.className = "bw-rw-error";
        e.textContent = msg;
        card.appendChild(e);
      }

      // Cash In click delegate. Buttons live inside content.innerHTML
      // which gets replaced on every render, so we delegate from content
      // (which itself doesn't get replaced).
      //
      // Animation/API are decoupled: we fire the API immediately AND
      // start the tier-graded vaudeville sequence in parallel. After
      // both are done, we reload to render the redeemed state.
      //
      // Error handling:
      //   401 expired   -> abort animation, bounce to login
      //   409 redeemed  -> abort animation, silent reload (race)
      //   other failure -> let animation finish, then surface inline error
      content.addEventListener("click", function (ev) {
        var btn = ev.target.closest && ev.target.closest("[data-cash]");
        if (!btn) return;
        var card = btn.closest(".bw-rw");
        if (!card || card.classList.contains("vh-active")) return;
        var rwId = card.getAttribute("data-rw-id");
        var tier = card.getAttribute("data-tier") || "bronze";
        if (!rwId) return;

        btn.disabled = true;
        btn.textContent = "Cashing in...";
        // Pass the woo amount from the card so the sack shows the right number
        var wooEl = card.querySelector(".bw-rw-woo");
        var wooAmount = wooEl ? parseInt(wooEl.textContent.replace(/[^0-9]/g, ""), 10) : 0;
        var animMs = spawnVaudevilleHook(card, tier, wooAmount);
        var animDone = new Promise(function (r) { setTimeout(r, animMs); });

        var apiPromise = fetch("/api/beta-cash-in-receipt", {
          method: "POST",
          credentials: "same-origin",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ receiptWoogoroId: rwId }),
        })
          .then(function (r) { return r.json().then(function (j) { return { ok: r.ok, status: r.status, body: j }; }); });

        apiPromise.then(function (res) {
          if (res.status === 401) {
            location.href = "/beta/login.html?err=expired";
            return;
          }
          if (res.status === 409 && res.body && res.body.alreadyRedeemed) {
            // Race: another tab beat us. Abort animation, just reload.
            setTimeout(loadAndRender, 200);
            return;
          }
          if (!res.ok || !res.body || !res.body.success) {
            // Wait for animation to finish, then revert + show error.
            animDone.then(function () {
              card.classList.remove("vh-active", "vh-yanking");
              // Remove animation children (hook, coins, sparkles, etc.)
              card.querySelectorAll(".bw-rw-hook-shaft, .bw-rw-hook-tip, .bw-vh-coin, .bw-vh-sparkle, .bw-vh-carpet, .bw-vh-flare, .bw-vh-sack").forEach(function (n) { n.remove(); });
              var msg = (res.body && res.body.error) || "Cash in failed. Try again in a moment.";
              showCardError(card, btn, msg);
            });
            return;
          }
          // Success: let animation finish before reloading.
          animDone.then(loadAndRender);
        }).catch(function () {
          animDone.then(function () {
            card.classList.remove("vh-active", "vh-yanking");
            card.querySelectorAll(".bw-rw-hook-shaft, .bw-rw-hook-tip, .bw-vh-coin, .bw-vh-sparkle, .bw-vh-carpet, .bw-vh-flare, .bw-vh-sack").forEach(function (n) { n.remove(); });
            showCardError(card, btn, "Network error. Try again.");
          });
        });
      });

      loadAndRender();
    })();
  </script>
</body>
