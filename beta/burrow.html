<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="/favicon.png" type="image/png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Burrow | Woogoro</title>
  <meta name="robots" content="noindex,nofollow,noarchive,nosnippet" />
  <link rel="canonical" href="https://woogoro.com/beta/burrow.html" />
  <link rel="stylesheet" href="/css/woogoro.min.css" />
  <style>
    .bw-wrap { max-width: 880px; margin: 32px auto 64px; padding: 0 20px; }
    .bw-row { display: flex; align-items: center; justify-content: space-between; gap: 16px; margin-bottom: 24px; }
    .bw-greet { font-size: 14px; color: #475569; }
    .bw-greet strong { color: #0f172a; }
    .bw-logout { color: #64748b; font-size: 13px; text-decoration: none; }
    .bw-logout:hover { color: #1e3a5f; text-decoration: underline; }

    .bw-state { background: #fff; border: 1px solid #e2e8f0; border-radius: 16px; padding: 28px; box-shadow: 0 1px 2px rgba(15,23,42,.04); }
    .bw-loading { text-align: center; padding: 60px 20px; color: #64748b; font-size: 14px; }
    .bw-error { background: #fef2f2; border: 1px solid #fecaca; color: #b91c1c; border-radius: 12px; padding: 16px 18px; font-size: 14px; }

    .bw-hero { background: linear-gradient(135deg, #fefce8 0%, #fef3c7 100%); border: 1px solid #fde68a; border-radius: 16px; padding: 24px; display: flex; gap: 20px; align-items: center; margin-bottom: 20px; }
    .bw-hero-iris { width: 96px; height: 96px; flex-shrink: 0; border-radius: 50%; background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,.06); padding: 6px; box-sizing: border-box; }
    .bw-hero-iris img { width: 100%; height: 100%; object-fit: contain; }
    .bw-hero-text { flex: 1; min-width: 0; }
    .bw-hero-title { font-size: 18px; font-weight: 700; color: #78350f; margin: 0 0 4px; }
    .bw-hero-sub { font-size: 13px; color: #92400e; line-height: 1.5; margin: 0; }
    @media (max-width: 520px) { .bw-hero { flex-direction: column; text-align: center; } .bw-hero-iris { width: 72px; height: 72px; } }

    .bw-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
    @media (max-width: 600px) { .bw-grid { grid-template-columns: 1fr; } }

    .bw-stat { background: #fff; border: 1px solid #e2e8f0; border-radius: 14px; padding: 20px; }
    .bw-stat-label { font-size: 11px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: #64748b; margin-bottom: 6px; }
    .bw-stat-value { font-size: 32px; font-weight: 800; color: #0f172a; line-height: 1.1; }
    .bw-stat-sub { font-size: 12px; color: #64748b; margin-top: 4px; }
    .bw-stat-progress { margin-top: 10px; height: 6px; background: #f1f5f9; border-radius: 999px; overflow: hidden; }
    .bw-stat-progress div { height: 100%; background: linear-gradient(90deg, #f59e0b, #ec4899); border-radius: 999px; transition: width .3s; }

    .bw-section-h { font-size: 13px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: #475569; margin: 24px 0 12px; display: flex; justify-content: space-between; align-items: baseline; }
    .bw-section-h a { font-weight: 600; font-size: 12px; letter-spacing: 0; text-transform: none; color: #1e3a5f; text-decoration: none; }
    .bw-section-h a:hover { text-decoration: underline; }

    .bw-collection { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 12px; }
    .bw-cell { aspect-ratio: 1; border: 1px dashed #cbd5e1; border-radius: 12px; display: flex; align-items: center; justify-content: center; flex-direction: column; padding: 10px; text-align: center; font-size: 11px; color: #94a3b8; background: #f8fafc; }
    .bw-cell.has-w { border-style: solid; border-color: #1e3a5f; background: #fff; color: #0f172a; }
    .bw-cell .icon { font-size: 22px; margin-bottom: 4px; }

    .bw-ledger { background: #fff; border: 1px solid #e2e8f0; border-radius: 14px; overflow: hidden; }
    .bw-ledger table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .bw-ledger th, .bw-ledger td { padding: 10px 14px; text-align: left; border-bottom: 1px solid #f1f5f9; }
    .bw-ledger tr:last-child td { border-bottom: none; }
    .bw-ledger th { background: #f8fafc; font-size: 11px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: #64748b; }
    .bw-ledger td.amt { font-weight: 700; text-align: right; font-variant-numeric: tabular-nums; }
    .bw-ledger td.amt.issue { color: #166534; }
    .bw-ledger td.amt.spend { color: #991b1b; }
    .bw-ledger td .src-label { font-size: 13px; color: #0f172a; }
    .bw-ledger td .src-meta { display: block; font-size: 11px; color: #64748b; margin-top: 2px; }
    .bw-empty { padding: 28px; text-align: center; color: #94a3b8; font-size: 13px; }

    .bw-waitlist { background: #fffbeb; border: 1px solid #fde68a; color: #78350f; border-radius: 12px; padding: 18px 20px; font-size: 14px; margin-bottom: 20px; }
    .bw-waitlist strong { color: #78350f; }

    .bw-actions { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
    @media (max-width: 720px) { .bw-actions { grid-template-columns: 1fr; } }
    .bw-action { display: block; padding: 16px 18px; background: #1e3a5f; color: #fff; border-radius: 12px; text-decoration: none; font-weight: 700; font-size: 14px; text-align: center; line-height: 1.3; }
    .bw-action:hover { background: #15314f; }
    .bw-action.alt { background: #fff; color: #1e3a5f; border: 1px solid #1e3a5f; }
    .bw-action.alt:hover { background: #f8fafc; }
    .bw-action.gold { background: #f59e0b; color: #fff; }
    .bw-action.gold:hover { background: #d97706; }
    .bw-action small { display: block; font-weight: 500; opacity: .85; font-size: 11px; margin-top: 2px; }

    .bw-receipts { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 14px; }
    .bw-rw { background: #fff; border: 1px solid #e2e8f0; border-radius: 14px; padding: 14px; display: flex; flex-direction: column; align-items: center; text-align: center; position: relative; transition: transform .15s, box-shadow .15s; }
    .bw-rw:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(15,23,42,.08); }
    .bw-rw.redeemed { opacity: .55; filter: grayscale(.4); }
    .bw-rw img { width: 96px; height: 96px; object-fit: contain; margin: 4px 0 8px; }
    .bw-rw-tier { font-size: 11px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; padding: 2px 10px; border-radius: 999px; margin-bottom: 6px; }
    .bw-rw-tier.bronze   { background: #fde2c4; color: #7c2d12; }
    .bw-rw-tier.silver   { background: #e5e7eb; color: #1f2937; }
    .bw-rw-tier.gold     { background: #fde68a; color: #78350f; }
    .bw-rw-tier.platinum { background: linear-gradient(135deg, #e0f2fe, #fce7f3); color: #1e3a5f; box-shadow: inset 0 0 0 1px #bae6fd; }
    .bw-rw-vertical { font-size: 12px; color: #475569; text-transform: capitalize; margin-bottom: 4px; }
    .bw-rw-amount { font-size: 13px; color: #64748b; margin-bottom: 8px; }
    .bw-rw-woo { font-size: 18px; font-weight: 800; color: #0f172a; margin-bottom: 12px; line-height: 1; }
    .bw-rw-woo small { font-size: 10px; font-weight: 700; letter-spacing: .08em; color: #64748b; text-transform: uppercase; display: block; margin-top: 2px; }
    .bw-rw-actions { display: flex; gap: 6px; width: 100%; }
    .bw-rw-btn { flex: 1; padding: 8px 6px; border-radius: 8px; font-size: 12px; font-weight: 700; border: 0; cursor: pointer; font-family: inherit; }
    .bw-rw-btn.cash { background: #f59e0b; color: #fff; }
    .bw-rw-btn.cash:hover { background: #d97706; }
    .bw-rw-btn.cash:disabled { background: #cbd5e1; cursor: not-allowed; }
    .bw-rw-btn.keep { background: #fff; color: #1e3a5f; border: 1px solid #cbd5e1; }
    .bw-rw-btn.keep:hover { background: #f8fafc; border-color: #1e3a5f; }
    .bw-rw-redeemed-badge { font-size: 11px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: #475569; padding: 6px 0; }
    .bw-rw-keep-caption { font-size: 10px; color: #94a3b8; margin-top: 6px; line-height: 1.3; }
    .bw-rw-error { font-size: 11px; color: #b91c1c; margin-top: 8px; line-height: 1.3; }

    /* Cash-in placeholder animation: coin burst around the card.
       Full vaudeville hook ships at G4. */
    .bw-rw.cashing { animation: bw-cashing .8s ease-out; }
    @keyframes bw-cashing {
      0%   { transform: scale(1); }
      30%  { transform: scale(1.08) rotate(-2deg); }
      60%  { transform: scale(.92) rotate(3deg); }
      100% { transform: scale(1) rotate(0); }
    }
    .bw-coin {
      position: absolute; left: 50%; top: 50%; width: 18px; height: 18px;
      background: radial-gradient(circle at 35% 35%, #fde68a, #f59e0b 70%);
      border-radius: 50%; box-shadow: 0 1px 3px rgba(0,0,0,.2);
      pointer-events: none;
      animation: bw-coin-fly .9s ease-out forwards;
    }
    @keyframes bw-coin-fly {
      0%   { transform: translate(-50%, -50%) scale(.4); opacity: 0; }
      20%  { opacity: 1; }
      100% { transform: translate(var(--bw-coin-x, 60px), var(--bw-coin-y, -60px)) scale(1); opacity: 0; }
    }

    .bw-stash-strip { background: linear-gradient(135deg, #fffbeb, #fef3c7); border: 1px solid #fde68a; border-radius: 12px; padding: 12px 16px; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; gap: 12px; font-size: 13px; color: #78350f; }
    .bw-stash-strip strong { font-weight: 800; }

    .bw-orders { display: grid; gap: 10px; }
    .bw-order { background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; padding: 14px 16px; display: flex; justify-content: space-between; gap: 12px; align-items: center; }
    .bw-order-main { flex: 1; min-width: 0; }
    .bw-order-name { font-weight: 700; color: #0f172a; font-size: 14px; }
    .bw-order-meta { color: #64748b; font-size: 12px; margin-top: 2px; }
    .bw-order-status { font-size: 11px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; padding: 4px 10px; border-radius: 999px; white-space: nowrap; }
    .bw-order-status.placed { background: #fef3c7; color: #92400e; }
    .bw-order-status.fulfilled { background: #dbeafe; color: #1e40af; }
    .bw-order-status.shipped { background: #d1fae5; color: #065f46; }
    .bw-order-status.delivered { background: #e2e8f0; color: #475569; }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a class="logo" href="/"><picture><source srcset="/images/Iris/Iris%20color%20side%20silhouette.webp" type="image/webp"/><img class="logo-mark" src="/images/Iris/Iris%20color%20side%20silhouette.png" alt="" width="32" height="32" /></picture><span class="logo-text">Woogoro</span></a>
    </div>
  </header>

  <main>
    <div class="bw-wrap">
      <div id="bwLoading" class="bw-loading">Loading your burrow&hellip;</div>
      <div id="bwContent" style="display:none;"></div>
    </div>
  </main>

  <script>
    (function () {
      var loading = document.getElementById("bwLoading");
      var content = document.getElementById("bwContent");

      var VERTICALS = [
        ["roofing", "Roofing"],["hvac", "HVAC"],["plumbing", "Plumbing"],
        ["electrical", "Electrical"],["windows", "Windows"],["siding", "Siding"],
        ["gutters", "Gutters"],["insulation", "Insulation"],["painting", "Painting"],
        ["concrete", "Concrete"],["foundation", "Foundation"],["fencing", "Fencing"],
        ["garage_door", "Garage Door"],["landscaping", "Landscaping"],["kitchen", "Kitchen"],
        ["solar", "Solar"],["moving", "Moving"],["auto_repair", "Auto Repair"],
        ["medical", "Medical"],["legal", "Legal"]
      ];

      function esc(s) {
        return String(s == null ? "" : s).replace(/[&<>"']/g, function (c) {
          return ({ "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;" })[c];
        });
      }

      function fmtTs(ms) {
        if (!ms) return "";
        try {
          var d = new Date(ms);
          var diff = Date.now() - ms;
          if (diff < 60000) return "just now";
          if (diff < 3600000) return Math.floor(diff / 60000) + "m ago";
          if (diff < 86400000) return Math.floor(diff / 3600000) + "h ago";
          if (diff < 7 * 86400000) return Math.floor(diff / 86400000) + "d ago";
          return d.toLocaleDateString();
        } catch (e) { return ""; }
      }

      // Iris mood + greeting key off streak length. Mirrors the streak-state
      // copy doc; tweak here if we adjust the milestones.
      function irisFor(streakDays) {
        if (!streakDays || streakDays <= 0) return {
          img: "Iris%20sad",
          title: "Your burrow's a bit quiet.",
          sub: "Submit a verified quote or receipt to start a streak. Iris is waiting.",
        };
        if (streakDays < 3) return {
          img: "Iris%20peeking",
          title: "Day " + streakDays + ". Off to a start!",
          sub: "Keep going. Hit 3 days in a row and Iris will cheer up.",
        };
        if (streakDays < 7) return {
          img: "Iris%20happy",
          title: "Day " + streakDays + ". Iris is happy.",
          sub: (7 - streakDays) + " more day" + (7 - streakDays === 1 ? "" : "s") + " to your first weekly milestone.",
        };
        if (streakDays < 14) return {
          img: "Iris%20happy",
          title: "Day " + streakDays + ". Streak unlocked.",
          sub: "Two-week milestone in " + (14 - streakDays) + " day" + (14 - streakDays === 1 ? "" : "s") + ". Future streak bonuses will land in Woo Cash.",
        };
        if (streakDays < 30) return {
          img: "Iris%20catching",
          title: "Day " + streakDays + ". Iris is catching them all.",
          sub: (30 - streakDays) + " more day" + (30 - streakDays === 1 ? "" : "s") + " to a 30-day milestone.",
        };
        return {
          img: "Iris%20laurel%20seal%20180",
          title: "Day " + streakDays + ". Hall of Fame.",
          sub: "You're in rare territory. Iris approves.",
        };
      }

      // Convert a ledger source like "receipt:r_abc123" into a friendly label.
      function srcLabel(source, meta) {
        var parts = String(source || "").split(":");
        var kind = parts[0];
        var id = parts[1] || "";
        var v = (meta && meta.vertical) ? String(meta.vertical).replace(/_/g, " ") : "";
        if (kind === "receipt") return { label: "Verified receipt" + (v ? " — " + v : ""), meta: id };
        if (kind === "quote")   return { label: "Verified quote" + (v ? " — " + v : ""), meta: id };
        if (kind === "redeem")  return { label: "Redemption" + (meta && meta.itemLabel ? " — " + meta.itemLabel : ""), meta: id };
        if (kind === "bonus")   return { label: "Bonus" + (parts[1] ? " — " + parts[1].replace(/_/g, " ") : ""), meta: "" };
        if (kind === "admin")   return { label: "Admin adjustment" + (parts[1] ? " — " + parts[1] : ""), meta: "" };
        return { label: source, meta: "" };
      }

      function renderWaitlist(state) {
        return '' +
          '<div class="bw-row">' +
            '<div class="bw-greet">Signed in as <strong>' + esc(state.user.email) + '</strong></div>' +
            '<a class="bw-logout" href="/api/beta-logout">Sign out</a>' +
          '</div>' +
          '<div class="bw-waitlist">' +
            "<strong>You're on the waitlist.</strong> Your account is ready, but the closed beta is invite-only right now. We'll email you when your spot opens up." +
          '</div>' +
          '<div class="bw-state">' +
            '<p style="margin:0;color:#475569;font-size:14px;line-height:1.6;">' +
              "While you wait: keep using Woogoro estimators normally. When the beta opens to you, every verified quote and receipt you submit earns a Woogoro and Woo Cash you can spend on merch (and soon, real gift cards)." +
            '</p>' +
          '</div>';
      }

      function renderBurrow(state) {
        var collected = {};
        (state.burrow.collectedWoogoros || []).forEach(function (v) { collected[v] = true; });
        var collectedCount = Object.keys(collected).length;

        var grid = VERTICALS.map(function (row) {
          var slug = row[0], label = row[1];
          var has = !!collected[slug];
          return '<div class="bw-cell ' + (has ? 'has-w' : '') + '">' +
            (has
              ? '<div class="icon">&#x2728;</div><div style="font-weight:700;">' + esc(label) + '</div>'
              : '<div style="opacity:.4;font-weight:600;">' + esc(label) + '</div><div style="margin-top:4px;">Uncollected</div>') +
          '</div>';
        }).join("");

        var ledgerRows = (state.ledger || []).map(function (e) {
          var amt = (e.type === "issue" ? "+" : "-") + e.amount.toLocaleString();
          var s = srcLabel(e.source, e.meta);
          return '<tr>' +
            '<td>' + esc(fmtTs(e.ts)) + '</td>' +
            '<td><span class="src-label">' + esc(s.label) + '</span>' + (s.meta ? '<span class="src-meta">' + esc(s.meta) + '</span>' : '') + '</td>' +
            '<td class="amt ' + esc(e.type) + '">' + amt + '</td>' +
          '</tr>';
        }).join("");
        if (!ledgerRows) ledgerRows = '<tr><td colspan="3" class="bw-empty">No activity yet. Submit a verified receipt or quote to start earning.</td></tr>';

        var caps = state.caps || { quote: { used: 0, cap: 5 }, receipt: { used: 0, cap: 15 } };
        var iris = irisFor(state.burrow.streakDays || 0);

        // Streak progress bar to next milestone
        var sd = state.burrow.streakDays || 0;
        var nextMilestone = sd < 3 ? 3 : sd < 7 ? 7 : sd < 14 ? 14 : sd < 30 ? 30 : 100;
        var pct = Math.min(100, Math.round((sd / nextMilestone) * 100));

        // Receipt Woogoros: split into kept (cashable) and redeemed.
        // Newest first within each group.
        var rwAll = (state.burrow.receiptWoogoros || []).slice().sort(function (a, b) {
          return (b.capturedAt || 0) - (a.capturedAt || 0);
        });
        var rwKept = rwAll.filter(function (x) { return !x.redeemed; });
        var rwRedeemed = rwAll.filter(function (x) { return x.redeemed; });
        var stashWoo = rwKept.reduce(function (s, x) { return s + (Number(x.wooAmount) || 0); }, 0);

        function rwCard(rw) {
          var tier = rw.tier || "bronze";
          var art = "/images/Receipt%20Woogoro/" + tier + "1.png";
          var vert = (rw.vertical || "").replace(/_/g, " ");
          var amt = Number(rw.declaredAmount) || 0;
          var woo = Number(rw.wooAmount) || 0;
          var wooSubLabel = rw.redeemed ? "cashed in" : "locked in";
          var headBits =
            '<div class="bw-rw-tier ' + esc(tier) + '">' + esc(tier) + '</div>' +
            '<img src="' + esc(art) + '" alt="' + esc(tier) + ' Receipt Woogoro" />' +
            '<div class="bw-rw-vertical">' + esc(vert) + '</div>' +
            '<div class="bw-rw-amount">$' + amt.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' receipt</div>' +
            '<div class="bw-rw-woo">' + woo.toLocaleString() + ' Woo<small>' + wooSubLabel + '</small></div>';
          if (rw.redeemed) {
            return '<div class="bw-rw redeemed">' + headBits +
              '<div class="bw-rw-redeemed-badge">Cashed in ' + esc(fmtTs(rw.redeemedAt)) + '</div>' +
            '</div>';
          }
          return '<div class="bw-rw" data-rw-id="' + esc(rw.id) + '">' + headBits +
            '<div class="bw-rw-actions">' +
              '<button class="bw-rw-btn cash" type="button" data-cash>Cash in</button>' +
            '</div>' +
            '<div class="bw-rw-keep-caption">or leave it in your burrow to collect</div>' +
          '</div>';
        }

        var rwSection = "";
        if (rwAll.length) {
          var rwGrid = rwKept.map(rwCard).join("") + rwRedeemed.map(rwCard).join("");
          var stashStrip = "";
          if (stashWoo > 0) {
            stashStrip = '<div class="bw-stash-strip">' +
              '<div><strong>' + stashWoo.toLocaleString() + ' Woo</strong> locked in ' + rwKept.length + ' Receipt Woogoro' + (rwKept.length === 1 ? '' : 's') + '. Cash in below to add to your spendable balance.</div>' +
            '</div>';
          }
          rwSection =
            '<div class="bw-section-h">Receipt Woogoros <span style="font-weight:500;color:#64748b;">' + rwKept.length + ' kept &bull; ' + rwRedeemed.length + ' cashed in</span></div>' +
            stashStrip +
            '<div class="bw-receipts">' + rwGrid + '</div>';
        }

        // Orders
        var orders = (state.orders || []);
        var ordersHtml = "";
        if (orders.length) {
          ordersHtml = '<div class="bw-section-h">Recent orders</div><div class="bw-orders">' +
            orders.map(function (o) {
              return '<div class="bw-order">' +
                '<div class="bw-order-main">' +
                  '<div class="bw-order-name">' + esc(o.itemLabel || o.itemSlug) + '</div>' +
                  '<div class="bw-order-meta">' + (o.wooCost || 0).toLocaleString() + ' Woo &bull; placed ' + esc(fmtTs(o.placedAt)) + (o.trackingNumber ? ' &bull; tracking ' + esc(o.trackingNumber) : '') + '</div>' +
                '</div>' +
                '<span class="bw-order-status ' + esc(o.status) + '">' + esc(o.status) + '</span>' +
              '</div>';
            }).join("") +
          '</div>';
        }

        return '' +
          '<div class="bw-row">' +
            '<div class="bw-greet">Signed in as <strong>' + esc(state.user.email) + '</strong></div>' +
            '<a class="bw-logout" href="/api/beta-logout">Sign out</a>' +
          '</div>' +
          '<div class="bw-hero">' +
            '<div class="bw-hero-iris">' +
              '<picture>' +
                '<source srcset="/images/Iris/' + iris.img + '.webp" type="image/webp">' +
                '<img src="/images/Iris/' + iris.img + '.png" alt="Iris">' +
              '</picture>' +
            '</div>' +
            '<div class="bw-hero-text">' +
              '<p class="bw-hero-title">' + esc(iris.title) + '</p>' +
              '<p class="bw-hero-sub">' + esc(iris.sub) + '</p>' +
            '</div>' +
          '</div>' +
          '<div class="bw-actions">' +
            '<a class="bw-action" href="/beta/submit-receipt.html">Submit a receipt<small>500&ndash;5,000 Woo by tier &bull; ' + caps.receipt.used + '/' + caps.receipt.cap + ' this week</small></a>' +
            '<a class="bw-action alt" href="/beta/submit-quote.html">Submit a quote<small>+100 Woo &bull; ' + caps.quote.used + '/' + caps.quote.cap + ' this week</small></a>' +
            '<a class="bw-action gold" href="/beta/redeem.html">Redeem Woo Cash<small>Merch &mdash; gift cards soon</small></a>' +
          '</div>' +
          '<div class="bw-grid">' +
            '<div class="bw-stat">' +
              '<div class="bw-stat-label">Woo Cash</div>' +
              '<div class="bw-stat-value">' + (state.balance || 0).toLocaleString() + '</div>' +
              '<div class="bw-stat-sub">Spend on merch (gift cards coming)</div>' +
            '</div>' +
            '<div class="bw-stat">' +
              '<div class="bw-stat-label">Streak</div>' +
              '<div class="bw-stat-value">' + sd + ' <span style="font-size:14px;color:#64748b;font-weight:600;">day' + (sd === 1 ? '' : 's') + '</span></div>' +
              '<div class="bw-stat-sub">Next milestone at ' + nextMilestone + ' days</div>' +
              '<div class="bw-stat-progress"><div style="width:' + pct + '%"></div></div>' +
            '</div>' +
          '</div>' +
          '<div class="bw-section-h">Your Woogoros <span style="font-weight:500;color:#64748b;">' + collectedCount + ' of ' + VERTICALS.length + ' collected</span></div>' +
          '<div class="bw-collection">' + grid + '</div>' +
          rwSection +
          ordersHtml +
          '<div class="bw-section-h">Recent activity</div>' +
          '<div class="bw-ledger"><table><thead><tr><th>When</th><th>Source</th><th style="text-align:right;">Amount</th></tr></thead><tbody>' + ledgerRows + '</tbody></table></div>';
      }

      function loadAndRender() {
        return fetch("/api/beta-burrow", { credentials: "same-origin" })
          .then(function (r) {
            if (r.status === 401) {
              location.href = "/beta/login.html";
              return null;
            }
            return r.json();
          })
          .then(function (state) {
            if (!state) return;
            loading.style.display = "none";
            content.style.display = "block";
            content.innerHTML = state.beta ? renderBurrow(state) : renderWaitlist(state);
          })
          .catch(function () {
            loading.style.display = "none";
            content.style.display = "block";
            content.innerHTML = '<div class="bw-error">Could not load your burrow. Please refresh, or <a href="/beta/login.html">sign in again</a>.</div>';
          });
      }

      // Placeholder coin-burst around a card. Full vaudeville hook
      // animation ships at G4 alongside Tremendous gift cards.
      function spawnCoinBurst(card, count) {
        for (var i = 0; i < count; i++) {
          var coin = document.createElement("div");
          coin.className = "bw-coin";
          var angle = (Math.PI * 2 * i) / count + (Math.random() - 0.5) * 0.4;
          var dist = 70 + Math.random() * 40;
          coin.style.setProperty("--bw-coin-x", (Math.cos(angle) * dist) + "px");
          coin.style.setProperty("--bw-coin-y", (Math.sin(angle) * dist - 30) + "px");
          coin.style.animationDelay = (i * 30) + "ms";
          card.appendChild(coin);
        }
      }

      // Show an inline error on a card without alert() (mobile-friendly).
      function showCardError(card, btn, msg) {
        card.classList.remove("cashing");
        btn.disabled = false;
        btn.textContent = "Cash in";
        var existing = card.querySelector(".bw-rw-error");
        if (existing) existing.remove();
        var e = document.createElement("div");
        e.className = "bw-rw-error";
        e.textContent = msg;
        card.appendChild(e);
      }

      // Cash In click delegate. Buttons live inside content.innerHTML
      // which gets replaced on every render, so we delegate from content
      // (which itself doesn't get replaced).
      content.addEventListener("click", function (ev) {
        var btn = ev.target.closest && ev.target.closest("[data-cash]");
        if (!btn) return;
        var card = btn.closest(".bw-rw");
        if (!card || card.classList.contains("cashing")) return;
        var rwId = card.getAttribute("data-rw-id");
        if (!rwId) return;

        btn.disabled = true;
        btn.textContent = "Cashing in...";
        card.classList.add("cashing");
        spawnCoinBurst(card, 8);

        fetch("/api/beta-cash-in-receipt", {
          method: "POST",
          credentials: "same-origin",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ receiptWoogoroId: rwId }),
        })
          .then(function (r) { return r.json().then(function (j) { return { ok: r.ok, status: r.status, body: j }; }); })
          .then(function (res) {
            // Session expired -> bounce to login. Don't show an error,
            // the login page is the actionable next step.
            if (res.status === 401) {
              location.href = "/beta/login.html?err=expired";
              return;
            }
            // Already redeemed: someone else (or another tab) cashed it in.
            // Surface the actual state by reloading; user will see the
            // greyed-out "Cashed in" badge instead of an error popup.
            if (res.status === 409 && res.body && res.body.alreadyRedeemed) {
              setTimeout(loadAndRender, 400);
              return;
            }
            if (!res.ok || !res.body || !res.body.success) {
              var msg = (res.body && res.body.error) || "Cash in failed. Try again in a moment.";
              showCardError(card, btn, msg);
              return;
            }
            // Let the burst finish before refreshing the view.
            setTimeout(loadAndRender, 900);
          })
          .catch(function () {
            showCardError(card, btn, "Network error. Try again.");
          });
      });

      loadAndRender();
    })();
  </script>
</body>
</html>
