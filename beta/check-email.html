<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="/favicon.png" type="image/png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Check your email | Woogoro</title>
  <meta name="robots" content="noindex,nofollow,noarchive,nosnippet" />
  <link rel="canonical" href="https://woogoro.com/beta/check-email.html" />
  <link rel="stylesheet" href="/css/trueprice.min.css" />
  <style>
    .ce-wrap { max-width: 520px; margin: 56px auto; padding: 24px; text-align: center; }
    .ce-card { background: #fff; border: 1px solid #e2e8f0; border-radius: 16px; padding: 40px 28px; }
    .ce-h1 { margin: 16px 0 8px; font-size: 22px; color: #0f172a; }
    .ce-sub { color: #475569; font-size: 14px; line-height: 1.6; margin: 0 0 20px; }
    .ce-email { font-weight: 700; color: #0f172a; }
    .ce-iris { width: 96px; height: auto; }
    .ce-dev { margin-top: 24px; padding: 16px; background: #fffbeb; border: 1px solid #fde68a; border-radius: 10px; text-align: left; font-size: 13px; }
    .ce-dev code { display: block; word-break: break-all; background: #fff; padding: 8px 10px; border-radius: 6px; border: 1px solid #fde68a; margin-top: 6px; font-size: 11px; color: #92400e; }
    .ce-dev a { color: #1e3a5f; font-weight: 700; }
    .ce-foot { margin-top: 24px; font-size: 12px; color: #64748b; }
    .ce-foot a { color: #1e3a5f; }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a class="logo" href="/"><picture><source srcset="/images/Iris/Iris%20color%20side%20silhouette.webp" type="image/webp"/><img class="logo-mark" src="/images/Iris/Iris%20color%20side%20silhouette.png" alt="" width="32" height="32" /></picture><span class="logo-text">Woogoro</span></a>
    </div>
  </header>

  <main>
    <div class="ce-wrap">
      <div class="ce-card">
        <picture>
          <source srcset="/images/Iris/Iris%20happy.webp" type="image/webp" />
          <img class="ce-iris" src="/images/Iris/Iris%20happy.png" alt="" />
        </picture>
        <h1 class="ce-h1">Check your email</h1>
        <p class="ce-sub">We sent a one-time sign-in link to <span id="ceEmail" class="ce-email">your inbox</span>. The link expires in 15 minutes.</p>
        <div id="ceDev" class="ce-dev" style="display:none;">
          <strong>Dev mode:</strong> email sending is not wired yet. Use this link to sign in:
          <code id="ceDevLink"></code>
          <p style="margin:10px 0 0;"><a id="ceDevA" href="#">Open sign-in link &rarr;</a></p>
        </div>
        <p class="ce-foot">Didn't get it? <a href="/beta/login.html">Try again</a> or email <a href="mailto:hello@woogoro.com">hello@woogoro.com</a>.</p>
      </div>
    </div>
  </main>

  <script>
    (function () {
      var qs = new URLSearchParams(location.search);
      var email = qs.get("email");
      if (email) document.getElementById("ceEmail").textContent = email;

      var dev = qs.get("dev");
      if (dev) {
        document.getElementById("ceDev").style.display = "block";
        document.getElementById("ceDevLink").textContent = dev;
        document.getElementById("ceDevA").href = dev;
      }
    })();
  </script>
</body>
</html>
