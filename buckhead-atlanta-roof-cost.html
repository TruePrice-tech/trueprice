<section class="section">
<h2>What Buckhead residents ask about roofing</h2>
<div class="faq-list">

<details class="faq-item">
<summary>Why do roofing quotes vary so much?</summary>
<div class="faq-answer">
<p>Quotes differ based on material quality, labor assumptions, flashing work, ventilation, and warranty coverage. Lower bids often exclude items that appear as change orders later.</p>
</div>
</details>

<details class="faq-item">
<summary>How long does a roof replacement take?</summary>
<div class="faq-answer">
<p>Most residential roofs take 1-3 days to replace. Complex roofs with multiple layers, steep pitch, or extensive damage can take 4-7 days.</p>
</div>
</details>

<details class="faq-item">
<summary>What is the most affordable roofing option?</summary>
<div class="faq-answer">
<p>Three-tab asphalt shingles are the most affordable at </div>
</section>-5 per square foot installed. Architectural shingles cost $4-7/sqft but last 10-15 years longer, making them a better value over time.</p>
</div>
</details>

<details class="faq-item">
<summary>Does homeowners insurance cover roof replacement?</summary>
<div class="faq-answer">
<p>Insurance covers sudden damage (storms, falling trees) but not wear-and-tear or maintenance neglect. Verify your policy covers replacement cost, not depreciated value.</p>
</div>
</details>

<details class="faq-item">
<summary>Should I repair or replace my roof?</summary>
<div class="faq-answer">
<p>If damage covers less than 30% of the roof and the roof is under 15 years old, repair is usually sufficient. Beyond that, replacement provides better long-term value.</p>
</div>
</details>
