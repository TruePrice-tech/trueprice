<details class="faq-item">

<p>

drip edge, ventilation, ridge vent, starter strip, ridge cap, decking inspection,
disposal/cleanup, and the permit. If any of these are missing, ask your contractor why.

<details class="faq-item">
<summary>How long does a roof last in Chapel Hill?</summary>
<div class="faq-answer"><p>In Chapel Hill's climate, architectural asphalt shingles typically last 20-25 years, standard 3-tab shingles 15-20 years, metal roofing 40-60 years, and tile 50+ years. These estimates assume proper ventilation and no major storm damage. UV exposure is the primary degradation factor here, so lighter-colored materials and adequate attic ventilation both extend lifespan meaningfully.</p></div>
</details>
<details class="faq-item">
<summary>Do I need a permit to replace my roof in Chapel Hill?</summary>
<div class="faq-answer"><p>In most jurisdictions including Chapel Hill, a building permit is required for a full roof replacement. Your contractor should pull the permit before work begins. Unpermitted roofing work can void your homeowners insurance coverage and create disclosure issues when selling the home.</p></div>
</details>
<details class="faq-item">
<summary>When is the best time to replace a roof in Chapel Hill?</summary>
<div class="faq-answer"><p>The optimal window for roof replacement in Chapel Hill is early fall, after summer storms subside and before winter weather complicates scheduling. Scheduling during off-peak periods can save 10-15% on labor costs since contractors have more availability and may offer competitive pricing to fill their calendar. Avoid scheduling immediately after a major storm event when contractor demand (and prices) spike.</p></div>
</details>
