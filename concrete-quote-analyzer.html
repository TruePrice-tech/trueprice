  <script>
  (function() {
    "use strict";

    // ── Concrete Pricing Model ──
    var CONC_PRICING = {
      basePricePerSqft: {
        standard_driveway: { label: "Standard Driveway", low: 8, high: 15, mid: 11.50 },
        stamped_concrete: { label: "Stamped Concrete", low: 12, high: 20, mid: 16.00 },
        concrete_patio: { label: "Concrete Patio", low: 8, high: 16, mid: 12.00 },
        sidewalk: { label: "Sidewalk", low: 8, high: 14, mid: 11.00 },
        asphalt_driveway: { label: "Asphalt Driveway", low: 5, high: 10, mid: 7.50 }
      },
      laborMultiplierByRegion: { south: 1.00, southeast: 1.03, northeast: 1.18, midwest: 1.06, mountain: 1.10, west: 1.22 },
      scopeItems: [
        { key: "demolition", label: "Demolition of existing surface", weight: 12 },
        { key: "grading", label: "Grading and leveling", weight: 10 },
        { key: "basePrep", label: "Base preparation (gravel/compaction)", weight: 10 },
        { key: "forms", label: "Formwork", weight: 8 },
        { key: "rebarMesh", label: "Rebar or wire mesh reinforcement", weight: 10 },
        { key: "concretePour", label: "Concrete pour and placement", weight: 15 },
        { key: "finishing", label: "Finishing (broom, smooth, or stamped)", weight: 10 },
        { key: "sealing", label: "Sealing / curing compound", weight: 6 },
        { key: "expansionJoints", label: "Expansion joints", weight: 5 },
        { key: "permits", label: "Permits and inspections", weight: 4 },
        { key: "cleanup", label: "Site cleanup", weight: 3 },
        { key: "warranty", label: "Warranty", weight: 5 },
        { key: "cureTime", label: "Cure time / restrictions noted", weight: 2 }
      ]
    };

    var STATE_REGIONS = {
      AL:"southeast",AK:"west",AZ:"west",AR:"south",CA:"west",CO:"mountain",CT:"northeast",
      DE:"northeast",FL:"southeast",GA:"southeast",HI:"west",ID:"mountain",IL:"midwest",
      IN:"midwest",IA:"midwest",KS:"midwest",KY:"southeast",LA:"south",ME:"northeast",
      MD:"northeast",MA:"northeast",MI:"midwest",MN:"midwest",MS:"south",MO:"midwest",
      MT:"mountain",NE:"midwest",NV:"west",NH:"northeast",NJ:"northeast",NM:"mountain",
      NY:"northeast",NC:"southeast",ND:"midwest",OH:"midwest",OK:"south",OR:"west",
      PA:"northeast",RI:"northeast",SC:"southeast",SD:"midwest",TN:"southeast",TX:"south",
      UT:"mountain",VT:"northeast",VA:"southeast",WA:"west",WV:"southeast",WI:"midwest",
      WY:"mountain",DC:"northeast"
    };

    var US_STATES = {
      "alabama":"AL","alaska":"AK","arizona":"AZ","arkansas":"AR","california":"CA",
      "colorado":"CO","connecticut":"CT","delaware":"DE","florida":"FL","georgia":"GA",
      "hawaii":"HI","idaho":"ID","illinois":"IL","indiana":"IN","iowa":"IA","kansas":"KS",
      "kentucky":"KY","louisiana":"LA","maine":"ME","maryland":"MD","massachusetts":"MA",
      "michigan":"MI","minnesota":"MN","mississippi":"MS","missouri":"MO","montana":"MT",
      "nebraska":"NE","nevada":"NV","new hampshire":"NH","new jersey":"NJ","new mexico":"NM",
      "new york":"NY","north carolina":"NC","north dakota":"ND","ohio":"OH","oklahoma":"OK",
      "oregon":"OR","pennsylvania":"PA","rhode island":"RI","south carolina":"SC",
      "south dakota":"SD","tennessee":"TN","texas":"TX","utah":"UT","vermont":"VT",
      "virginia":"VA","washington":"WA","west virginia":"WV","wisconsin":"WI","wyoming":"WY",
      "district of columbia":"DC"
    };

    // ── State ──
    var appRoot = document.getElementById("concApp");
    var state = {
      step: "address",        // address | uploading | estimator | result
      address: { street: "", city: "", stateCode: "", zip: "" },
      uploadedFile: null,
      extractedText: "",
      // estimator answers
      est: { projectType: null, projectSize: null, thickness: null, demolition: null },
      // result
      result: null
    };

    // ── Helpers ──
    function $(sel, el) { return (el || document).querySelector(sel); }
    function fmt(n) { return "$" + Number(n).toLocaleString("en-US", { maximumFractionDigits: 0 }); }
    function roundTo50(n) { return Math.round(n / 50) * 50; }

    function getRegionFromState(sc) {
      return STATE_REGIONS[(sc || "").toUpperCase()] || "south";
    }

    // City-level multiplier
    var cityMultCache = {};
    function fetchCityMult(city, stateCode) {
      if (!city || !stateCode) return;
      var key = city + "|" + stateCode;
      if (cityMultCache[key]) return;
      fetch("/api/city-multiplier?city=" + encodeURIComponent(city) + "&state=" + encodeURIComponent(stateCode))
        .then(function(r) { return r.json(); })
        .then(function(d) { if (d && d.multiplier) cityMultCache[key] = d.multiplier; })
        .catch(function() {});
    }
    function getCityMult(city, stateCode) {
      var key = city + "|" + stateCode;
      return cityMultCache[key] || null;
    }

    // Inflation: 3% annual from 2025
    var _now = new Date();
    var INFLATION_MULT = Math.pow(1.03, Math.max(0, _now.getFullYear() - 2025 + _now.getMonth() / 12));
    // Seasonal: concrete peaks in summer
    var SEASONAL_MULTS = { 1:0.92, 2:0.93, 3:0.96, 4:1.00, 5:1.06, 6:1.10, 7:1.12, 8:1.10, 9:1.04, 10:0.98, 11:0.94, 12:0.90 };
    var SEASONAL_MULT = SEASONAL_MULTS[_now.getMonth() + 1] || 1.0;

    function sqftFromSize(sizeLabel) {
      var map = { "200": 200, "400": 400, "600": 600, "800": 800, "1000": 1000 };
      return map[sizeLabel] || 400;
    }

    function calcBenchmark(projectType, sqft, thicknessMult, demoMult) {
      var proj = CONC_PRICING.basePricePerSqft[projectType];
      if (!proj) proj = CONC_PRICING.basePricePerSqft.standard_driveway;

      var midPerSqft = proj.mid;
      var cityMult = getCityMult(state.address.city, state.address.stateCode);
      var region = getRegionFromState(state.address.stateCode);
      var laborMult = cityMult || (CONC_PRICING.laborMultiplierByRegion[region] || 1.0);

      var total = midPerSqft * sqft * laborMult * thicknessMult * demoMult * INFLATION_MULT * SEASONAL_MULT;
      return roundTo50(total);
    }

    function verdictFromRatio(ratio) {
      if (ratio < 0.78) return { label: "Unusually Low", css: "low", emoji: "" };
      if (ratio <= 0.90) return { label: "Below Average", css: "low", emoji: "" };
      if (ratio <= 1.12) return { label: "Fair Price", css: "fair", emoji: "" };
      if (ratio <= 1.25) return { label: "Above Average", css: "high", emoji: "" };
      return { label: "Overpriced", css: "high", emoji: "" };
    }

    // ── Quote parsing helpers ──
    function detectConcreteType(text) {
      var t = text.toLowerCase();
      if (/stamp(ed)?[\s-]*concrete/i.test(t) || /decorative[\s-]*concrete/i.test(t)) return { value: "stamped_concrete", label: "Stamped Concrete" };
      if (/asphalt/i.test(t)) return { value: "asphalt_driveway", label: "Asphalt Driveway" };
      if (/patio/i.test(t)) return { value: "concrete_patio", label: "Concrete Patio" };
      if (/sidewalk/i.test(t) || /walkway/i.test(t)) return { value: "sidewalk", label: "Sidewalk" };
      if (/driveway/i.test(t)) return { value: "standard_driveway", label: "Standard Driveway" };
      return { value: "standard_driveway", label: "Standard Driveway" };
    }

    function detectArea(text) {
      // Match patterns like "600 sq ft", "600 sqft", "600 square feet", "20x30", "20' x 30'"
      var sqftMatch = text.match(/(\d[\d,]*)\s*(?:sq\.?\s*ft|sqft|square\s*feet)/i);
      if (sqftMatch) return parseFloat(sqftMatch[1].replace(/,/g, ""));

      var dimMatch = text.match(/(\d+)['\s]*x\s*(\d+)/i);
      if (dimMatch) return parseInt(dimMatch[1]) * parseInt(dimMatch[2]);

      return null;
    }

    function detectThickness(text) {
      var match = text.match(/(\d+)\s*(?:inch|in\.?|")\s*(?:thick|concrete|slab|depth)/i);
      if (match) {
        var inches = parseInt(match[1]);
        if (inches >= 6) return { value: 6, label: '6 inch (heavy duty)' };
        return { value: 4, label: '4 inch (standard)' };
      }
      // Also check for "6 in" or "6"" standalone near concrete context
      var match2 = text.match(/(?:thickness|depth|thick)\s*(?:of|:)?\s*(\d+)/i);
      if (match2) {
        var inches2 = parseInt(match2[1]);
        if (inches2 >= 6) return { value: 6, label: '6 inch (heavy duty)' };
        return { value: 4, label: '4 inch (standard)' };
      }
      return null;
    }

    function detectConcreteScope(text) {
      var t = text.toLowerCase();
      var signals = {};
      var checks = {
        demolition: [/demoli|tear[\s-]*out|remov(e|al)\s*(of\s*)?(existing|old|current)/],
        grading: [/grad(e|ing)|level(ing)?|slope/],
        basePrep: [/base\s*prep|gravel|compact(ion|ed)|sub[\s-]*base|crushed\s*stone/],
        forms: [/form(s|work)?|framing/],
        rebarMesh: [/rebar|reinforc|wire\s*mesh|steel\s*mesh|#\d\s*bar/],
        concretePour: [/pour|concrete\s*(?:work|install|place)|ready[\s-]*mix|yard(s)?\s*(?:of\s*)?concrete/],
        finishing: [/finish(ing)?|broom|smooth|stamp(ed)?|texture|trowel/],
        sealing: [/seal(ant|er|ing)?|cur(e|ing)\s*compound|protect(ant|ive)/],
        expansionJoints: [/expansion\s*joint|control\s*joint|saw[\s-]*cut|joint/],
        permits: [/permit|inspection|code\s*compliance/],
        cleanup: [/clean[\s-]*up|haul[\s-]*away|debris\s*removal|disposal/],
        warranty: [/warrant|guarant/],
        cureTime: [/cure\s*time|curing|dry(ing)?\s*time|\d+\s*day(s)?\s*(before|until|cure)/]
      };

      Object.keys(checks).forEach(function(key) {
        var found = checks[key].some(function(rx) { return rx.test(t); });
        signals[key] = { status: found ? "included" : "unclear" };
      });

      return signals;
    }

    window.submitFeedback = function(response) {
      var fb = document.getElementById("estimateFeedback");
      if (!fb) return;
      fetch("/api/analytics", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ type: "event", event: "estimate_feedback", meta: { response: response, service: "concrete", verdict: state.result ? state.result.verdict.label : "" }, path: window.location.pathname })
      }).catch(function() {});
      fb.innerHTML = '<div style="font-size:14px; color:#166534; padding:8px 0;">Thanks for the feedback! This helps us improve our estimates.</div>';
    };

    window.saveResultAsImage = function() {
      if (typeof html2canvas === "undefined") {
        window.loadVendorLibs && window.loadVendorLibs().then(doCapture);

          link.download = "trueprice-concrete-analysis.png";
          link.href = canvas.toDataURL("image/png");
          link.click();
        });
      }
    };

        case "estimator": renderEstimator(); break;

    }

    // ── Address / Upload Step ──
    function renderAddress() {
      appRoot.innerHTML = '\
        <div class="conc-hero">\
          <img src="/images/trudy-concrete.png" alt="Trudy" width="160" style="margin-bottom:12px;" />\
          <h1>Is your concrete quote fair?</h1>\
          <p>Upload your quote or get an instant estimate for your concrete project.</p>\
        </div>\
        <div class="conc-card">\
          <div class="conc-upload-zone" id="uploadZone">\
            <div style="font-size:36px; margin-bottom:8px;">&#128196;</div>\
            <p><strong>Analyze a Quote</strong></p>\
            <p class="hint">Upload a contractor quote (PDF or image) to check the price</p>\

    async function processFile(file) {
      try {
        setProgress(15, "Loading parsing libraries...");
        await window.loadVendorLibs();

        var text = "";
        if (file.type === "application/pdf") {
          setProgress(30, "Extracting text from PDF...");
          text = await extractPdfText(file);
        } else {
          setProgress(30, "Running OCR on image...");
          text = await extractImageText(file);
        }

        setProgress(70, "Analyzing concrete quote...");
        state.extractedText = text;

        // Use analyzer-parser.js for price extraction
        var parsed = null;
        try {
          if (typeof parseExtractedText === "function") {
            parsed = parseExtractedText(text);
          }
        } catch (parseErr) {
          console.warn("Parser error, falling back to regex:", parseErr);
        }

        // Fallback price extraction if parser fails or returns nothing
        if (!parsed || (!parsed.finalPrice && (!parsed.priceCandidates || !parsed.priceCandidates.length))) {
          var priceMatches = text.match(/\$[\d,]+(?:\.\d{2})?/g) || [];
          var prices = priceMatches.map(function(p) { return parseFloat(p.replace(/[$,]/g, "")); }).filter(function(v) { return v >= 500 && v <= 100000; });
          if (prices.length) {
            prices.sort(function(a, b) { return b - a; });
            parsed = parsed || {};
            parsed.finalPrice = prices[0];
            parsed.priceCandidates = prices.map(function(v) { return { value: v, score: 50 }; });
          }
        }

        // Concrete-specific detection
        var concreteType = detectConcreteType(text);
        var area = detectArea(text);
        var thickness = detectThickness(text);
        var scopeSignals = detectConcreteScope(text);

        // Location detection from parser
        var location = (parsed && parsed.location) ? parsed.location : null;
        if (location && location.stateCode && !state.address.stateCode) {
          state.address.stateCode = location.stateCode;
          if (location.city) state.address.city = location.city;
        }
        fetchCityMult(state.address.city, state.address.stateCode);

        // Determine price
        var quotePrice = 0;
        if (parsed && parsed.finalPrice && parsed.finalPrice > 300) {
          quotePrice = parsed.finalPrice;
        } else if (parsed && parsed.priceCandidates && parsed.priceCandidates.length) {
          var candidates = parsed.priceCandidates.filter(function(c) { return c.value >= 500 && c.value <= 100000; });
          candidates.sort(function(a, b) { return b.score - a.score; });
          if (candidates.length) quotePrice = candidates[0].value;
        }

        setProgress(85, "Calculating verdict...");

        var effectiveArea = area || 400;
        var thicknessMult = (thickness && thickness.value >= 6) ? 1.30 : 1.0;
        // Check if demolition is mentioned for demo multiplier
        var demoMult = (scopeSignals.demolition && scopeSignals.demolition.status === "included") ? 1.15 : 1.0;

        var benchmark = calcBenchmark(concreteType.value, effectiveArea, thicknessMult, demoMult);

        var ratio = quotePrice > 0 ? quotePrice / benchmark : 1.0;
        var verdict = verdictFromRatio(ratio);

        // Per sqft cost
        var perSqft = quotePrice > 0 && effectiveArea > 0 ? (quotePrice / effectiveArea) : null;

        setProgress(100, "Done!");

        state.result = {
          source: "upload",
          quotePrice: quotePrice,
          benchmark: benchmark,
          ratio: ratio,
          verdict: verdict,
          concreteType: concreteType,
          area: area,
          thickness: thickness,
          demolition: (scopeSignals.demolition && scopeSignals.demolition.status === "included") ? "Yes" : "Not mentioned",
          perSqft: perSqft,
          scopeSignals: scopeSignals,
          region: getRegionFromState(state.address.stateCode),
          location: location,
          parsed: parsed
        };

        state.step = "result";
        setTimeout(render, 400);

      } catch (err) {
        console.error("Concrete analysis error:", err);
        appRoot.innerHTML = '\
          <div class="conc-hero"><h1>We couldn\'t read that file</h1></div>\
          <div class="conc-card" style="text-align:center;">\
            <p style="color:#475569;margin-bottom:16px;">The file might be a scanned image that\'s hard to read, or in an unsupported format.</p>\
            <p style="color:#475569;margin-bottom:20px;">You can enter the quote total manually:</p>\
            <div style="display:flex;gap:10px;justify-content:center;align-items:center;margin-bottom:20px;">\
              <span style="font-size:20px;font-weight:700;">$</span>\
              <input type="number" id="manualPrice" placeholder="e.g. 5400" style="padding:10px 14px;border:1px solid #e2e8f0;border-radius:10px;font-size:18px;width:180px;" />\
            </div>\
            <button class="conc-btn conc-btn-primary" id="manualPriceBtn">Analyze this price</button>\
            <div style="margin-top:14px;"><button class="conc-btn conc-btn-secondary" onclick="state.step=\'address\';render();">Start over</button></div>\
          </div>';
        document.getElementById("manualPriceBtn").addEventListener("click", function() {
          var price = parseFloat(document.getElementById("manualPrice").value);
          if (!price || price < 200) { alert("Please enter a valid price."); return; }
          var benchmark = calcBenchmark("standard_driveway", 400, 1.0, 1.0);
          var ratio = price / benchmark;
          state.result = {
            source: "manual",
            quotePrice: price,
            benchmark: benchmark,
            ratio: ratio,
            verdict: verdictFromRatio(ratio),
            concreteType: { value: "standard_driveway", label: "Standard Driveway" },
            area: null, thickness: null, demolition: "Unknown", perSqft: null,
            scopeSignals: {}, region: getRegionFromState(state.address.stateCode), location: null, parsed: null
          };
          state.step = "result";
          render();
        });
      }
    }

    async function extractPdfText(file) {
      var arrayBuffer = await file.arrayBuffer();
      var pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
      var allText = [];
      for (var i = 1; i <= pdf.numPages; i++) {
        var page = await pdf.getPage(i);
        var content = await page.getTextContent();
        var pageText = content.items.map(function(item) { return item.str; }).join(" ");
        allText.push(pageText);
      }
      return allText.join("\n");
    }

    async function preprocessImage(file, mode) {
      return new Promise(function(resolve, reject) {
        var reader = new FileReader();
        reader.onload = function() {
          var img = new Image();
          img.onload = function() {
            var canvas = document.createElement("canvas");
            var scale = Math.max(1.5, Math.min(2.5, 2400 / Math.max(img.width, img.height)));
            canvas.width = Math.round(img.width * scale);
            canvas.height = Math.round(img.height * scale);
            var ctx = canvas.getContext("2d");
            ctx.imageSmoothingEnabled = true;
            ctx.imageSmoothingQuality = "high";
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            var imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            var data = imageData.data;
            if (mode === "strong") {
              for (var i = 0; i < data.length; i += 4) {
                var gray = 0.299 * data[i] + 0.587 * data[i+1] + 0.114 * data[i+2];
                gray = (gray - 128) * 1.6 + 128;
                gray = gray > 170 ? 255 : gray < 85 ? 0 : gray;
                gray = Math.max(0, Math.min(255, gray));
                data[i] = gray; data[i+1] = gray; data[i+2] = gray;
              }
            } else {
              for (var i = 0; i < data.length; i += 4) {
                var gray = 0.299 * data[i] + 0.587 * data[i+1] + 0.114 * data[i+2];
                gray = (gray - 128) * 1.3 + 128;
                gray = Math.max(0, Math.min(255, gray));
                data[i] = gray; data[i+1] = gray; data[i+2] = gray;
              }
            }
            ctx.putImageData(imageData, 0, 0);
            resolve(canvas.toDataURL("image/png"));
          };
          img.onerror = reject;
          img.src = reader.result;
        };
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    async function extractImageText(file) {
      var softImage = await preprocessImage(file, "soft");
      var worker = await Tesseract.createWorker("eng");
      var result = await worker.recognize(softImage);
      var text = (result.data.text || "").trim();

      if (text.length < 50) {
        var strongImage = await preprocessImage(file, "strong");
        var result2 = await worker.recognize(strongImage);
        var text2 = (result2.data.text || "").trim();
        if (text2.length > text.length) text = text2;
      }

      await worker.terminate();
      return text;
    }

    function calculateEstimate() {
      var est = state.est;
      var sqft = sqftFromSize(est.projectSize);
      var thicknessMult = est.thickness === "6" ? 1.30 : 1.0;
      var demoMult = est.demolition === "yes" ? 1.15 : 1.0;

      var benchmark = calcBenchmark(est.projectType, sqft, thicknessMult, demoMult);

      var low = roundTo50(benchmark * 0.88);
      var high = roundTo50(benchmark * 1.15);

      var proj = CONC_PRICING.basePricePerSqft[est.projectType];
      var projLabel = proj ? proj.label : est.projectType;
      var perSqft = benchmark / sqft;

      state.result = {
        source: "estimator",
        quotePrice: benchmark,
        benchmark: benchmark,
        low: low,
        high: high,
        ratio: 1.0,
        verdict: { label: "Estimated Cost", css: "fair", emoji: "" },
        concreteType: { value: est.projectType, label: projLabel },
        area: sqft,
        thickness: { value: Number(est.thickness), label: est.thickness === "6" ? "6 inch (heavy duty)" : "4 inch (standard)" },
        demolition: est.demolition === "yes" ? "Yes" : "No",
        perSqft: perSqft,
        scopeSignals: {},
        region: getRegionFromState(state.address.stateCode),
        location: null,
        parsed: null

      render();
    }

      // Build details

      detailsHtml += '<div class="conc-detail"><div class="label">Pricing Source</div><div class="value">' + pricingLabel + '</div></div>';
      detailsHtml += '</div>';

      // Scope checklist (upload only)
      var scopeHtml = "";
      if (isUpload && r.scopeSignals && Object.keys(r.scopeSignals).length > 0) {
        scopeHtml = '<div class="conc-card"><h3 style="margin-bottom:0.75rem;">Scope Review</h3><ul class="conc-scope">';
        CONC_PRICING.scopeItems.forEach(function(item) {
          var sig = r.scopeSignals[item.key];
          var status = sig ? sig.status : "unclear";
          var iconClass = status === "included" ? "scope-included" : status === "excluded" ? "scope-missing" : "scope-unclear";
          var iconChar = status === "included" ? "&#10003;" : status === "excluded" ? "&#10007;" : "?";
          var statusLabel = status === "included" ? "Included" : status === "excluded" ? "Not included" : "Not mentioned";
          scopeHtml += '<li><span class="scope-icon ' + iconClass + '">' + iconChar + '</span><span>' + item.label + '</span><span style="margin-left:auto;font-size:0.8rem;color:#94a3b8;">' + statusLabel + '</span></li>';
        });
        scopeHtml += '</ul>';
        // Missing cost estimate
        var concScopeCosts = { demolition: [2,5], grading: [1,3], basePrep: [1,3], forms: [1,2], rebarMesh: [0.50,1.50], concretePour: [3,6], finishing: [1,4], sealing: [0.50,2], expansionJoints: [0.25,1], permits: [100,500], cleanup: [0.25,1], warranty: [0,0], cureTime: [0,0] };
        var missingItems = CONC_PRICING.scopeItems.filter(function(item) { var sig = r.scopeSignals[item.key]; return !sig || sig.status !== "included"; });
        if (missingItems.length > 0) {
          var mLow = 0, mHigh = 0;
          var effectiveArea = r.area || 400;
          missingItems.forEach(function(item) {
            var c = concScopeCosts[item.key];
            if (c) {
              // permits are flat, others are per sqft
              if (item.key === "permits" || item.key === "warranty" || item.key === "cureTime") { mLow += c[0]; mHigh += c[1]; }
              else { mLow += c[0] * effectiveArea; mHigh += c[1] * effectiveArea; }
            }
          });
          if (mLow > 0) {
            scopeHtml += '<div style="font-size:14px;padding:10px 14px;background:#fef2f2;border:1px solid #fecaca;border-radius:10px;margin-top:12px;color:#991b1b;"><strong>' + missingItems.length + ' missing item' + (missingItems.length !== 1 ? 's' : '') + '</strong> could add <strong>$' + Math.round(mLow).toLocaleString() + ' to $' + Math.round(mHigh).toLocaleString() + '</strong> in change orders if not included.</div>';
          }
        }
        scopeHtml += '</div>';
      }

      // Estimator scope info
      if (!isUpload) {
        scopeHtml = '<div class="conc-card"><h3 style="margin-bottom:0.75rem;">What This Estimate Includes</h3><ul class="conc-scope">';
        var typicalItems = ["grading", "basePrep", "forms", "rebarMesh", "concretePour", "finishing", "sealing", "expansionJoints", "cleanup"];
        typicalItems.forEach(function(key) {
          var item = CONC_PRICING.scopeItems.find(function(s) { return s.key === key; });
          if (item) {
            scopeHtml += '<li><span class="scope-icon scope-included">&#10003;</span><span>' + item.label + '</span></li>';
          }
        });
        scopeHtml += '</ul><p style="font-size:0.85rem;color:#64748b;margin-top:0.75rem;">Estimate assumes standard installation. Demolition, permits, drainage work, or decorative finishes may add cost.</p></div>';
      }

      // Market context
      var contextHtml = '';
      if (isUpload && r.quotePrice > 0) {
        var tip = "";
        if (r.verdict.css === "high") {
          tip = "This quote is higher than typical market rates. Consider getting 2-3 additional quotes to compare.";
        } else if (r.verdict.css === "low") {
          tip = "This quote is lower than expected. Verify the scope includes base preparation, reinforcement, and proper finishing. Check that the concrete mix meets local code requirements.";
        } else {
          tip = "This quote appears to be within the typical market range for your area and project specifications.";
        }
        contextHtml = '<div class="conc-card"><h3 style="margin-bottom:0.5rem;">Market Context</h3><p style="color:#475569;font-size:0.95rem;">' + tip + '</p></div>';
      }

      // Next Steps tips
      var tipsHtml = '<div class="conc-card"><h3 style="margin-bottom:0.75rem;">Next Steps</h3><ul style="padding-left:18px;color:#475569;font-size:0.95rem;line-height:1.8;">';
      tipsHtml += '<li>Confirm the concrete mix strength (typically 3,000-4,000 PSI for residential)</li>';
      tipsHtml += '<li>Ask about rebar or wire mesh reinforcement -- it prevents cracking</li>';
      tipsHtml += '<li>Verify the quote includes proper base preparation (gravel and compaction)</li>';
      tipsHtml += '<li>Check if sealing is included -- it extends the life of your concrete by years</li>';
      if (r.verdict.css === "high") {
        tipsHtml += '<li>Get 2-3 additional quotes from local contractors for comparison</li>';
        tipsHtml += '<li>Ask if scheduling for fall or winter could reduce the price</li>';
      }
      if (r.verdict.css === "low") {
        tipsHtml += '<li>Verify the thickness meets code (4" minimum for walkways, 6" for driveways with heavy vehicles)</li>';
        tipsHtml += '<li>Confirm the contractor is licensed and insured</li>';
      }
      tipsHtml += '</ul></div>';

      // Savings tips
      var savingsHtml = '<div class="conc-card" style="background:#eff6ff;border:1px solid #bfdbfe;">';
      savingsHtml += '<h3 style="margin-bottom:0.5rem;color:#1d4ed8;">Ways to Save</h3>';
      savingsHtml += '<ul style="padding-left:18px;color:#475569;font-size:0.95rem;line-height:1.8;">';
      savingsHtml += '<li>Schedule in late fall or winter when contractors are less busy (5-15% savings)</li>';
      savingsHtml += '<li>Bundle multiple concrete projects (driveway + patio) for a volume discount</li>';
      savingsHtml += '<li>Choose broom finish over stamped to save $4-8 per sq ft</li>';
      savingsHtml += '</ul></div>';

      // Feedback prompt
      var feedbackHtml = '\
<div id="estimateFeedback" style="margin-top:1.5rem; padding:16px; background:#f8fafc; border:1px solid #e2e8f0; border-radius:10px; text-align:center;">\
  <div style="font-size:14px; color:#475569; margin-bottom:10px;">Was this estimate close to your actual quote?</div>\
  <div style="display:flex; gap:8px; justify-content:center; flex-wrap:wrap;">\
    <button onclick="submitFeedback(\'accurate\')" style="padding:8px 16px; border:1px solid #e2e8f0; border-radius:8px; background:#fff; cursor:pointer; font-size:13px;">Yes, accurate</button>\
    <button onclick="submitFeedback(\'high\')" style="padding:8px 16px; border:1px solid #e2e8f0; border-radius:8px; background:#fff; cursor:pointer; font-size:13px;">My quote was higher</button>\
    <button onclick="submitFeedback(\'low\')" style="padding:8px 16px; border:1px solid #e2e8f0; border-radius:8px; background:#fff; cursor:pointer; font-size:13px;">My quote was lower</button>\
  </div>\
</div>';

      // Email report
      var emailSubject = encodeURIComponent("My Concrete Quote Analysis from TruePrice");
      var emailBody = encodeURIComponent(
        "Concrete Quote Analysis\n" +
        "Project: " + r.concreteType.label + "\n" +
        (r.area ? "Area: " + r.area + " sq ft\n" : "") +
        (r.thickness ? "Thickness: " + r.thickness.label + "\n" : "") +
        "Demolition: " + r.demolition + "\n" +
        (isUpload ? "Quote Price: " + fmt(r.quotePrice) + "\n" : "") +
        "Benchmark: " + fmt(r.benchmark) + "\n" +
        "Verdict: " + r.verdict.label + "\n" +
        "Region: " + capitalize(r.region) + "\n\n" +
        "Analyzed by TruePrice - https://truepricehq.com/concrete-quote-analyzer.html"
      );

      appRoot.innerHTML = '\
        <div class="conc-hero">\
          <h1>' + (isUpload ? "Concrete Quote Analysis" : "Your Concrete Estimate") + '</h1>\
        </div>\
        <div class="conc-verdict ' + verdictCss + '">\
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;"><img src="/images/trudy-concrete.png" alt="Trudy" width="48" /><div style="font-size:12px;font-weight:700;color:#1e3a5f;text-transform:uppercase;letter-spacing:0.04em;">TruePrice Concrete Verdict</div></div><div class="verdict-label">' + r.verdict.label + '</div>\
          <div class="verdict-price">' + priceDisplay + '</div>\
          <div class="verdict-range">' + rangeText + '</div>\
        </div>\
        <div class="conc-card">\
          <h3 style="margin-bottom:0.75rem;">Project Details</h3>\
          ' + detailsHtml + '\
        </div>\
        ' + scopeHtml + '\
        ' + contextHtml + '\
        ' + tipsHtml + '\
        ' + savingsHtml + '\
        <div class="conc-actions">\
          <a class="conc-btn conc-btn-primary conc-btn-full" href="/find-contractors.html?service=concrete">Find Concrete Contractors</a>\
          <a class="conc-btn conc-btn-secondary conc-btn-full" href="/concrete-cost.html">Concrete Cost Guide</a>\
          <a class="conc-btn conc-btn-secondary conc-btn-full" href="mailto:?subject=' + emailSubject + '&body=' + emailBody + '">Email Me This Report</a>\
          <button class="conc-btn conc-btn-secondary conc-btn-full" onclick="saveResultAsImage()">Save as Image</button>\
          <a class="conc-btn conc-btn-secondary conc-btn-full" href="/methodology.html" style="font-size:0.9rem;">How we calculate estimates</a>\
          <button class="conc-btn conc-btn-secondary conc-btn-full" id="btnStartOver">Start Over</button>\
        </div>\
        ' + feedbackHtml;

      document.getElementById("btnStartOver").addEventListener("click", function() {
        state = {
          step: "address",
          address: { street: "", city: "", stateCode: "", zip: "" },
          uploadedFile: null,
          extractedText: "",
          est: { projectType: null, projectSize: null, thickness: null, demolition: null },
          result: null
        };
        render();
      });
    }

    function capitalize(s) {
      return s ? s.charAt(0).toUpperCase() + s.slice(1) : "";
    }

    // ── Init ──
    render();

  })();
  </script>
<script src="/js/tp-analytics.min.js" async></script>
</body>
</html>
