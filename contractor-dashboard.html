<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex,nofollow" />
  <title>Contractors | TruePrice Admin</title>
  <link rel="icon" href="/favicon-trudy.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="/css/trueprice.min.css" />
  <style>
    .dash-wrap { max-width: 720px; margin: 32px auto; padding: 0 24px; }
    .dash-header { margin-bottom: 24px; }
    .dash-header h1 { font-size: 24px; margin: 0 0 4px; }
    .dash-header p { font-size: 14px; color: var(--text-muted); margin: 0; }
    .dash-login { max-width: 400px; margin: 120px auto; text-align: center; }
    .dash-login input { padding: 12px 16px; border: 1px solid var(--border); border-radius: 10px; font-size: 16px; width: 200px; font-family: inherit; margin-right: 8px; }
    .dash-count { font-size: 14px; color: var(--text-muted); margin-bottom: 12px; }
    .c-list { list-style: none; padding: 0; margin: 0; }
    .c-item { display: flex; align-items: center; gap: 12px; padding: 14px 0; border-bottom: 1px solid #f1f5f9; }
    .c-item:last-child { border-bottom: none; }
    .c-name { font-weight: 700; font-size: 15px; flex: 1; }
    .c-city { font-size: 14px; color: var(--text-secondary); }
    .c-tier { display: inline-block; padding: 2px 8px; border-radius: 6px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .03em; }
    .c-tier-basic { background: #f1f5f9; color: #64748b; }
    .c-tier-verified { background: #dcfce7; color: #166534; }
    .c-tier-featured { background: #e0e7ff; color: #3730a3; }
    .c-date { font-size: 12px; color: var(--text-muted); }
    .c-empty { text-align: center; padding: 48px; color: var(--text-muted); }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a class="logo" href="/">TruePrice</a>
      <nav>
        <a href="/analytics-dashboard.html">Analytics</a>
        <a href="/contractor-dashboard.html" style="font-weight:700;">Contractors</a>
      </nav>
    </div>
  </header>

  <div class="dash-wrap" id="app">
    <div class="dash-login">
      <h2>Contractor Dashboard</h2>
      <p style="color:var(--text-secondary); margin-bottom:16px;">Enter admin key to view</p>
      <input type="password" id="keyInput" placeholder="Admin key" />
      <button class="btn" id="loginBtn">Go</button>
    </div>
  </div>

  <script>
  (function() {
    var app = document.getElementById("app");
    var savedKey = localStorage.getItem("tp_admin_key") || "";

    document.getElementById("loginBtn").addEventListener("click", function() {
      savedKey = document.getElementById("keyInput").value.trim();
      localStorage.setItem("tp_admin_key", savedKey);
      loadData();
    });

    if (savedKey) loadData();

    function loadData() {
      app.innerHTML = '<div style="text-align:center; padding:60px; color:var(--text-muted);">Loading...</div>';

      fetch("/api/contractor-admin?action=list&key=" + encodeURIComponent(savedKey))
        .then(function(r) {
          if (r.status === 403) throw new Error("bad_key");
          return r.json();
        })
        .then(function(data) {
          renderList(data.contractors || []);
        })
        .catch(function(err) {
          if (err.message === "bad_key") {
            app.innerHTML = '<div class="dash-login"><h2>Invalid key</h2><p style="color:var(--text-secondary); margin-bottom:16px;">Check your admin key and try again.</p><input type="password" id="keyInput" placeholder="Admin key" /><button class="btn" id="loginBtn">Go</button></div>';
            document.getElementById("loginBtn").addEventListener("click", function() {
              savedKey = document.getElementById("keyInput").value.trim();
              localStorage.setItem("tp_admin_key", savedKey);
              loadData();
            });
          } else {
            app.innerHTML = '<div class="c-empty">Failed to load. Try refreshing.</div>';
          }
        });
    }

    function renderList(contractors) {
      if (!contractors.length) {
        app.innerHTML = '<div class="dash-header"><h1>Contractor Management</h1><p>No signups yet.</p></div><div class="c-empty">Contractors who sign up will appear here.</div>';
        return;
      }

      // Stats summary
      var stats = { total: contractors.length, basic: 0, verified: 0, featured: 0, pending: 0, approved: 0, rejected: 0 };
      contractors.forEach(function(c) {
        var t = c.tier || "basic";
        if (stats[t] !== undefined) stats[t]++;
        var s = c.status || "pending";
        if (stats[s] !== undefined) stats[s]++;
      });

      var html = '<div class="dash-header"><h1>Contractor Management</h1></div>';
      html += '<div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px;">';
      html += '<div style="padding:12px 20px;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px;"><strong>' + stats.approved + '</strong> Live</div>';
      html += '<div style="padding:12px 20px;background:#fffbeb;border:1px solid #fde68a;border-radius:10px;"><strong>' + stats.pending + '</strong> Pending</div>';
      html += '<div style="padding:12px 20px;background:#dbeafe;border:1px solid #93c5fd;border-radius:10px;"><strong>' + stats.basic + '</strong> Basic</div>';
      html += '<div style="padding:12px 20px;background:#d1fae5;border:1px solid #6ee7b7;border-radius:10px;"><strong>' + stats.verified + '</strong> Verified</div>';
      html += '<div style="padding:12px 20px;background:#fef3c7;border:1px solid #fbbf24;border-radius:10px;"><strong>' + stats.featured + '</strong> Featured</div>';
      html += '</div>';

      // Pending first
      var sorted = contractors.slice().sort(function(a, b) {
        if (a.status === "pending" && b.status !== "pending") return -1;
        if (a.status !== "pending" && b.status === "pending") return 1;
        return 0;
      });

      html += '<div class="dash-count">' + contractors.length + ' contractor' + (contractors.length !== 1 ? 's' : '') + '</div>';
      html += '<ul class="c-list">';

      sorted.forEach(function(c) {
        var biz = c.business || {};
        var tierClass = c.tier === "featured" ? "c-tier-featured" : c.tier === "verified" ? "c-tier-verified" : "c-tier-basic";
        var city = (biz.city || "") + (biz.state ? ", " + biz.state : "");
        var date = c.submittedAt ? new Date(c.submittedAt).toLocaleDateString() : "";
        var email = biz.email || c.email || "";
        var isPending = c.status === "pending";
        var statusBadge = isPending
          ? '<span style="padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700;background:#fef3c7;color:#92400e;">PENDING</span>'
          : c.status === "rejected"
            ? '<span style="padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700;background:#fee2e2;color:#991b1b;">REJECTED</span>'
            : '<span style="padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700;background:#d1fae5;color:#065f46;">LIVE</span>';
        var notes = c.reviewNotes ? '<div style="font-size:11px;color:#94a3b8;margin-top:2px;">' + escapeHtml(c.reviewNotes) + '</div>' : '';

        html += '<li class="c-item" style="align-items:center;">';
        html += '<div class="c-name">' + escapeHtml(biz.name || "Unknown") + '</div>';
        html += '<div class="c-city">' + escapeHtml(city) + '</div>';
        html += '<span class="c-tier ' + tierClass + '">' + escapeHtml(c.tier || "basic") + '</span>';
        html += statusBadge;
        html += '<div class="c-date">' + escapeHtml(date) + '</div>';
        if (isPending) {
          html += '<div style="display:flex;gap:6px;">';
          html += '<button onclick="approveContractor(\'' + escapeHtml(email) + '\')" style="padding:4px 12px;border:none;border-radius:6px;background:#16a34a;color:#fff;font-size:12px;font-weight:600;cursor:pointer;">Approve</button>';
          html += '<button onclick="rejectContractor(\'' + escapeHtml(email) + '\')" style="padding:4px 12px;border:none;border-radius:6px;background:#dc2626;color:#fff;font-size:12px;font-weight:600;cursor:pointer;">Reject</button>';
          html += '</div>';
        }
        html += notes;
        html += '</li>';
      });

      html += '</ul>';
      app.innerHTML = html;
    }

    window.approveContractor = function(email) {
      if (!confirm("Approve " + email + "?")) return;
      fetch("/api/contractor-admin", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ action: "update_status", email: email, status: "approved", key: savedKey })
      }).then(function() { loadData(); });
    };

    window.rejectContractor = function(email) {
      var reason = prompt("Rejection reason (optional):");
      fetch("/api/contractor-admin", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ action: "update_status", email: email, status: "rejected", notes: reason || "", key: savedKey })
      }).then(function() { loadData(); });
    };

    function escapeHtml(t) {
      var d = document.createElement("div");
      d.appendChild(document.createTextNode(String(t || "")));
      return d.innerHTML;
    }
  })();
  </script>
</body>
</html>
