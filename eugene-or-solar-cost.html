<p><strong>Local conditions.</strong> Eugene receives abundant rainfall in the marine climate zone, with extended wet seasons promoting moss growth and requiring proper ventilation to prevent moisture damage Eugene sees stable weather conditions year-round. 3.5-4.0 sun-hours/day — among the lowest in the lower 48; payback runs 12-16 years and depends heavily on net metering.</p>

<p><strong>Permits, codes, and licensing.</strong> A permit from Eugene's Code Enforcement or Building Department is required before starting a roof replacement project Algae and moss-resistant shingles or metal roofing are ideal for Eugene's wet climate, with zinc strip installations helping prevent biological growth</p>
