<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow,noarchive,nosnippet">
<title>Woogoro Accessories Lab (internal prototype)</title>
<style>
  :root {
    --bg: #0f1220;
    --panel: #1a1f38;
    --panel-hi: #262d4a;
    --border: #2e3557;
    --text: #e8ecff;
    --text-dim: #8a93bd;
    --accent: #7dd3fc;
    --accent-hi: #38bdf8;
    --danger: #f87171;
    --good: #34d399;
    --warn: #fbbf24;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 14px;
    -webkit-font-smoothing: antialiased;
  }
  header.bar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 16px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
  }
  header.bar h1 { margin: 0; font-size: 15px; font-weight: 600; letter-spacing: 0.3px; }
  header.bar .tag {
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 10px;
    background: var(--warn);
    color: #1a1200;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.6px;
  }
  header.bar .hint { color: var(--text-dim); font-size: 12px; margin-left: auto; }

  main {
    display: grid;
    grid-template-columns: 220px 1fr 300px;
    gap: 12px;
    padding: 12px;
    height: calc(100vh - 46px);
    min-height: 560px;
  }

  aside.picker, aside.inventory, section.stage {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  h3.label {
    margin: 0 0 10px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-dim);
    font-weight: 600;
  }

  .woogoro-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    overflow-y: auto;
    padding-right: 4px;
  }
  .woogoro-tile {
    aspect-ratio: 1;
    background: var(--panel-hi);
    border: 2px solid transparent;
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 6px;
    transition: border-color 0.12s, transform 0.12s;
    position: relative;
  }
  .woogoro-tile:hover { border-color: var(--border); transform: translateY(-1px); }
  .woogoro-tile.active { border-color: var(--accent); }
  .woogoro-tile img { max-width: 100%; max-height: 100%; }
  .woogoro-tile .name {
    position: absolute;
    bottom: 4px; left: 4px; right: 4px;
    font-size: 9px;
    text-align: center;
    color: var(--text-dim);
    background: rgba(15,18,32,0.75);
    padding: 1px 3px;
    border-radius: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  section.stage { align-items: center; justify-content: space-between; }
  .canvas-wrap {
    width: 100%;
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 0;
  }
  .canvas {
    position: relative;
    width: min(480px, 100%, 70vh);
    aspect-ratio: 1;
    background: radial-gradient(circle at center, #2a3158 0%, #141830 100%);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: visible;
    user-select: none;
  }
  .canvas .base {
    width: 80%;
    height: 80%;
    object-fit: contain;
    position: relative;
    z-index: 2;
    pointer-events: none;
  }
  .accessories-layer {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }
  .accessory-slot {
    position: absolute;
    pointer-events: none;
    transform: translate(-50%, -50%);
    transition: filter 0.15s;
  }
  .accessory-slot.slot-background { z-index: 1; }
  .accessory-slot.slot-bandana { z-index: 3; }
  .accessory-slot.slot-hat { z-index: 4; }
  .accessory-slot.slot-glasses { z-index: 5; }
  .accessory-slot svg { display: block; width: 100%; height: 100%; }

  .canvas.calib .accessory-slot {
    pointer-events: auto;
    cursor: grab;
    filter: drop-shadow(0 0 4px var(--accent));
  }
  .canvas.calib .accessory-slot:active { cursor: grabbing; }

  .toolbar {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    width: 100%;
    padding-top: 12px;
    border-top: 1px solid var(--border);
    margin-top: 12px;
  }
  .toolbar label.switch {
    display: inline-flex; align-items: center; gap: 6px;
    color: var(--text-dim);
    cursor: pointer;
  }
  .toolbar label.switch input { accent-color: var(--accent); }
  button.btn {
    background: var(--panel-hi);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 500;
    transition: background 0.12s, border-color 0.12s;
  }
  button.btn:hover { background: #323a5e; border-color: var(--accent); }
  button.btn.danger { color: var(--danger); }
  button.btn.primary { background: var(--accent); color: #061522; border-color: var(--accent); }
  button.btn.primary:hover { background: var(--accent-hi); }

  aside.inventory { overflow: hidden; }
  .tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 10px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 8px;
  }
  .tab {
    background: transparent;
    color: var(--text-dim);
    border: 0;
    font-size: 12px;
    padding: 6px 10px;
    border-radius: 6px;
    cursor: pointer;
    font-weight: 500;
  }
  .tab:hover { background: var(--panel-hi); color: var(--text); }
  .tab.active { background: var(--accent); color: #061522; }

  .items-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    overflow-y: auto;
    padding-right: 4px;
  }
  .item-card {
    background: var(--panel-hi);
    border: 2px solid transparent;
    border-radius: 8px;
    padding: 8px 6px 6px;
    cursor: pointer;
    text-align: center;
    position: relative;
    transition: transform 0.12s, border-color 0.12s;
  }
  .item-card:hover { transform: translateY(-2px); border-color: var(--border); }
  .item-card.equipped { border-color: var(--good); }
  .item-card.equipped::after {
    content: "✓";
    position: absolute;
    top: 4px; right: 4px;
    font-size: 10px;
    color: var(--good);
    font-weight: 700;
  }
  .item-card svg {
    width: 56px;
    height: 56px;
    display: block;
    margin: 0 auto 4px;
  }
  .item-card .item-name {
    font-size: 10px;
    color: var(--text-dim);
    line-height: 1.2;
  }

  .readout {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 8px;
    font-family: ui-monospace, monospace;
    background: rgba(0,0,0,0.25);
    padding: 6px 8px;
    border-radius: 4px;
    max-height: 90px;
    overflow-y: auto;
    white-space: pre-wrap;
    word-break: break-all;
    display: none;
  }
  .readout.show { display: block; }

  /* responsive collapse for narrow screens */
  @media (max-width: 900px) {
    main { grid-template-columns: 1fr; grid-template-rows: auto auto auto; height: auto; min-height: 0; }
    .woogoro-grid { grid-template-columns: repeat(6, 1fr); }
    .items-grid { grid-template-columns: repeat(4, 1fr); }
  }
</style>
</head>
<body>

<header class="bar">
  <h1>Woogoro Accessories Lab</h1>
  <span class="tag">internal</span>
  <span class="hint">Experimental UX playground. Not indexed, not linked, not prod.</span>
</header>

<main>
  <aside class="picker">
    <h3 class="label">Pick a Woogoro</h3>
    <div class="woogoro-grid" id="woogoroGrid"></div>
  </aside>

  <section class="stage">
    <div class="canvas-wrap">
      <div class="canvas" id="canvas">
        <img class="base" id="baseImg" alt="">
        <div class="accessories-layer" id="accLayer"></div>
      </div>
    </div>
    <div class="toolbar">
      <label class="switch">
        <input type="checkbox" id="calibToggle">
        Calibration mode <span style="opacity:0.6">(drag equipped items)</span>
      </label>
      <button class="btn" id="shuffleBtn">Shuffle look</button>
      <button class="btn danger" id="resetBtn">Strip all</button>
      <button class="btn" id="exportBtn">Export JSON</button>
      <button class="btn primary" id="copyBtn">Copy for prod</button>
    </div>
    <pre class="readout" id="readout"></pre>
  </section>

  <aside class="inventory">
    <h3 class="label">Inventory</h3>
    <div class="tabs" id="tabs"></div>
    <div class="items-grid" id="itemsGrid"></div>
  </aside>
</main>

<script>
// --- data ------------------------------------------------------------------

const WOOGOROS = [
  {id:'auto',       name:'Auto Repair',  img:'/images/Vertical Woogoro/Auto.png'},
  {id:'concrete',   name:'Concrete',     img:'/images/Vertical Woogoro/Concrete.png'},
  {id:'electrical', name:'Electrical',   img:'/images/Vertical Woogoro/Electrical.png'},
  {id:'fencing',    name:'Fencing',      img:'/images/Vertical Woogoro/Fencing.png'},
  {id:'foundation', name:'Foundation',   img:'/images/Vertical Woogoro/Foundation.png'},
  {id:'garage',     name:'Garage Door',  img:'/images/Vertical Woogoro/Garage Door.png'},
  {id:'gutter',     name:'Gutter',       img:'/images/Vertical Woogoro/Gutter.png'},
  {id:'hvac',       name:'HVAC',         img:'/images/Vertical Woogoro/HVAC.png'},
  {id:'insulation', name:'Insulation',   img:'/images/Vertical Woogoro/Insulation.png'},
  {id:'kitchen',    name:'Kitchen',      img:'/images/Vertical Woogoro/Kitchen.png'},
  {id:'landscaping',name:'Landscaping',  img:'/images/Vertical Woogoro/Landscaping.png'},
  {id:'legal',      name:'Legal',        img:'/images/Vertical Woogoro/Legal.png'},
  {id:'medical',    name:'Medical',      img:'/images/Vertical Woogoro/Medical.png'},
  {id:'moving',     name:'Moving',       img:'/images/Vertical Woogoro/Moving.png'},
  {id:'painting',   name:'Painting',     img:'/images/Vertical Woogoro/Painting.png'},
  {id:'plumbing',   name:'Plumbing',     img:'/images/Vertical Woogoro/Plumbing.png'},
  {id:'roofing',    name:'Roofing',      img:'/images/Vertical Woogoro/Roofing.png'},
  {id:'siding',     name:'Siding',       img:'/images/Vertical Woogoro/Siding.png'},
  {id:'solar',      name:'Solar',        img:'/images/Vertical Woogoro/Solar.png'},
  {id:'window',     name:'Windows',      img:'/images/Vertical Woogoro/Window.png'},
];

// placeholder inline SVGs (designed to be replaced by Fiverr art later)
const SVG = {
  tophat: `<svg viewBox="0 0 100 100"><rect x="25" y="65" width="50" height="8" fill="#111" rx="2"/><rect x="33" y="15" width="34" height="55" fill="#1a1a1a"/><rect x="33" y="42" width="34" height="9" fill="#c0392b"/></svg>`,
  beanie: `<svg viewBox="0 0 100 100"><path d="M20 65 Q20 20 50 18 Q80 20 80 65 Z" fill="#e74c3c"/><rect x="20" y="60" width="60" height="10" fill="#c0392b"/><circle cx="50" cy="14" r="7" fill="#fff"/></svg>`,
  partycone: `<svg viewBox="0 0 100 100"><polygon points="50,8 25,70 75,70" fill="#8e44ad"/><circle cx="38" cy="40" r="3" fill="#fff"/><circle cx="55" cy="28" r="3" fill="#f1c40f"/><circle cx="60" cy="55" r="3" fill="#2ecc71"/><circle cx="45" cy="60" r="3" fill="#e74c3c"/><circle cx="50" cy="7" r="4" fill="#f1c40f"/></svg>`,
  hardhat: `<svg viewBox="0 0 100 100"><path d="M15 65 Q15 30 50 25 Q85 30 85 65 Z" fill="#f1c40f"/><rect x="15" y="62" width="70" height="8" fill="#d4a017" rx="2"/><rect x="46" y="30" width="8" height="35" fill="#d4a017"/><rect x="30" y="46" width="40" height="3" fill="#d4a017"/></svg>`,
  crown: `<svg viewBox="0 0 100 100"><polygon points="20,75 20,35 35,50 50,25 65,50 80,35 80,75" fill="#f1c40f" stroke="#b8860b" stroke-width="2"/><circle cx="35" cy="47" r="4" fill="#e74c3c"/><circle cx="50" cy="30" r="5" fill="#3498db"/><circle cx="65" cy="47" r="4" fill="#27ae60"/><rect x="18" y="75" width="64" height="6" fill="#d4a017"/></svg>`,
  flatcap: `<svg viewBox="0 0 100 100"><path d="M20 55 Q20 30 50 28 Q80 30 80 55 L80 65 L20 65 Z" fill="#7f8c8d"/><rect x="15" y="62" width="72" height="6" fill="#5f6a6a" rx="3"/></svg>`,
  neckRed: `<svg viewBox="0 0 120 60"><path d="M10 10 Q60 40 110 10 L110 40 Q60 55 10 40 Z" fill="#c0392b"/><circle cx="30" cy="25" r="3" fill="#fff"/><circle cx="55" cy="32" r="3" fill="#fff"/><circle cx="82" cy="28" r="3" fill="#fff"/><circle cx="45" cy="18" r="2.5" fill="#fff"/><circle cx="72" cy="18" r="2.5" fill="#fff"/></svg>`,
  neckBlue: `<svg viewBox="0 0 120 60"><path d="M10 10 Q60 40 110 10 L110 40 Q60 55 10 40 Z" fill="#2980b9"/><path d="M30 20 L34 24 L30 28 L26 24 Z" fill="#fff"/><path d="M60 25 L64 29 L60 33 L56 29 Z" fill="#fff"/><path d="M85 20 L89 24 L85 28 L81 24 Z" fill="#fff"/></svg>`,
  bowtie: `<svg viewBox="0 0 120 60"><polygon points="10,10 50,30 10,50" fill="#8e44ad"/><polygon points="110,10 70,30 110,50" fill="#8e44ad"/><rect x="48" y="22" width="24" height="16" fill="#6c3483" rx="3"/></svg>`,
  capeRed: `<svg viewBox="0 0 140 80"><path d="M20 10 Q70 5 120 10 L130 70 Q70 85 10 70 Z" fill="#c0392b"/><path d="M20 10 Q70 5 120 10 L120 25 Q70 20 20 25 Z" fill="#8b2418"/></svg>`,
  sunglasses: `<svg viewBox="0 0 120 40"><circle cx="28" cy="20" r="16" fill="#111" stroke="#333" stroke-width="2"/><circle cx="92" cy="20" r="16" fill="#111" stroke="#333" stroke-width="2"/><rect x="42" y="18" width="36" height="4" fill="#333"/><path d="M14 14 L18 16 M107 14 L102 16" stroke="#fff" stroke-width="2" opacity="0.4"/></svg>`,
  roundGlasses: `<svg viewBox="0 0 120 40"><circle cx="28" cy="20" r="14" fill="none" stroke="#d4a017" stroke-width="3"/><circle cx="92" cy="20" r="14" fill="none" stroke="#d4a017" stroke-width="3"/><rect x="42" y="18" width="36" height="3" fill="#d4a017"/></svg>`,
  monocle: `<svg viewBox="0 0 60 60"><circle cx="30" cy="30" r="20" fill="none" stroke="#d4a017" stroke-width="3"/><path d="M50 35 Q55 45 50 55" fill="none" stroke="#d4a017" stroke-width="2"/></svg>`,
  sparkles: `<svg viewBox="0 0 200 200"><g fill="#f1c40f" opacity="0.85"><path d="M30 30 L34 42 L46 46 L34 50 L30 62 L26 50 L14 46 L26 42 Z"/><path d="M170 25 L173 34 L182 37 L173 40 L170 49 L167 40 L158 37 L167 34 Z"/><path d="M50 170 L54 180 L64 184 L54 188 L50 198 L46 188 L36 184 L46 180 Z"/><path d="M160 165 L164 175 L174 179 L164 183 L160 193 L156 183 L146 179 L156 175 Z"/><path d="M100 100 L105 115 L120 120 L105 125 L100 140 L95 125 L80 120 L95 115 Z"/></g></svg>`,
  sunbeam: `<svg viewBox="0 0 200 200"><g fill="#fbbf24" opacity="0.3"><polygon points="100,100 80,0 120,0"/><polygon points="100,100 140,10 160,30"/><polygon points="100,100 180,70 200,100"/><polygon points="100,100 190,140 170,180"/><polygon points="100,100 140,190 100,200"/><polygon points="100,100 60,190 40,170"/><polygon points="100,100 10,140 0,110"/><polygon points="100,100 10,70 30,40"/></g></svg>`,
  confetti: `<svg viewBox="0 0 200 200"><g><rect x="20" y="20" width="6" height="14" fill="#e74c3c" transform="rotate(15 23 27)"/><rect x="170" y="30" width="6" height="14" fill="#3498db" transform="rotate(-25 173 37)"/><rect x="50" y="175" width="6" height="14" fill="#2ecc71" transform="rotate(45 53 182)"/><rect x="160" y="160" width="6" height="14" fill="#f1c40f" transform="rotate(-15 163 167)"/><rect x="30" y="100" width="6" height="14" fill="#9b59b6" transform="rotate(60 33 107)"/><rect x="175" y="100" width="6" height="14" fill="#e67e22" transform="rotate(-35 178 107)"/><circle cx="80" cy="30" r="4" fill="#1abc9c"/><circle cx="120" cy="180" r="4" fill="#e74c3c"/></g></svg>`,
};

// slots & their default anchor (% of canvas, -- these are the starting positions)
// each accessory renders as a box centered on (x,y) with the given widthPct.
// height auto-scales with the SVG aspect ratio in CSS.
const SLOTS = ['background', 'bandana', 'hat', 'glasses'];
const DEFAULT_ANCHORS = {
  hat:        { x: 50, y: 22, widthPct: 44, aspect: 1.0 },
  glasses:    { x: 50, y: 42, widthPct: 52, aspect: 3.0 },
  bandana:    { x: 50, y: 60, widthPct: 62, aspect: 2.0 },
  background: { x: 50, y: 50, widthPct: 120, aspect: 1.0 },
};

// catalog: which accessories live in which slot
const CATALOG = {
  hat: [
    {id:'tophat',    name:'Top Hat'},
    {id:'beanie',    name:'Beanie'},
    {id:'partycone', name:'Party Cone'},
    {id:'hardhat',   name:'Hard Hat'},
    {id:'crown',     name:'Crown'},
    {id:'flatcap',   name:'Flat Cap'},
  ],
  bandana: [
    {id:'neckRed',   name:'Red Bandana'},
    {id:'neckBlue',  name:'Blue Bandana'},
    {id:'bowtie',    name:'Bow Tie'},
    {id:'capeRed',   name:'Red Cape'},
  ],
  glasses: [
    {id:'sunglasses',   name:'Sunglasses'},
    {id:'roundGlasses', name:'Round Glasses'},
    {id:'monocle',      name:'Monocle'},
  ],
  background: [
    {id:'sparkles', name:'Sparkles'},
    {id:'sunbeam',  name:'Sunbeam'},
    {id:'confetti', name:'Confetti'},
  ],
};

// --- state -----------------------------------------------------------------

const LS_KEY = 'woogoroAccessoriesLab.v1';
const loadState = () => {
  try { return JSON.parse(localStorage.getItem(LS_KEY)) || {}; }
  catch { return {}; }
};
const saveState = () => localStorage.setItem(LS_KEY, JSON.stringify(state));

// state shape:
// {
//   selectedId: 'plumbing',
//   activeTab: 'hat',
//   calib: false,
//   // per-woogoro equipped items:  { [woogoroId]: { [slot]: accessoryId|null } }
//   equipped: {},
//   // per-woogoro per-slot anchor overrides (x, y, widthPct as numbers)
//   anchors: {},
// }
const state = Object.assign({
  selectedId: 'plumbing',
  activeTab: 'hat',
  calib: false,
  equipped: {},
  anchors: {},
}, loadState());

// --- render ----------------------------------------------------------------

const $ = (id) => document.getElementById(id);

function renderPicker() {
  const grid = $('woogoroGrid');
  grid.innerHTML = '';
  for (const w of WOOGOROS) {
    const tile = document.createElement('div');
    tile.className = 'woogoro-tile' + (w.id === state.selectedId ? ' active' : '');
    tile.innerHTML = `<img src="${w.img}" alt="${w.name}"><span class="name">${w.name}</span>`;
    tile.addEventListener('click', () => {
      state.selectedId = w.id;
      saveState();
      renderAll();
    });
    grid.appendChild(tile);
  }
}

function renderTabs() {
  const tabs = $('tabs');
  tabs.innerHTML = '';
  for (const slot of ['hat', 'bandana', 'glasses', 'background']) {
    const btn = document.createElement('button');
    btn.className = 'tab' + (slot === state.activeTab ? ' active' : '');
    btn.textContent = slot.charAt(0).toUpperCase() + slot.slice(1);
    btn.addEventListener('click', () => {
      state.activeTab = slot;
      saveState();
      renderTabs();
      renderInventory();
    });
    tabs.appendChild(btn);
  }
}

function renderInventory() {
  const grid = $('itemsGrid');
  grid.innerHTML = '';
  const slot = state.activeTab;
  const equippedForThis = (state.equipped[state.selectedId] || {})[slot];
  for (const item of CATALOG[slot]) {
    const card = document.createElement('div');
    card.className = 'item-card' + (equippedForThis === item.id ? ' equipped' : '');
    card.innerHTML = `${SVG[item.id]}<div class="item-name">${item.name}</div>`;
    card.addEventListener('click', () => toggleEquip(slot, item.id));
    grid.appendChild(card);
  }
}

function renderCanvas() {
  const w = WOOGOROS.find(x => x.id === state.selectedId);
  $('baseImg').src = w.img;
  $('baseImg').alt = w.name;

  const canvas = $('canvas');
  canvas.classList.toggle('calib', state.calib);
  $('calibToggle').checked = state.calib;

  const layer = $('accLayer');
  layer.innerHTML = '';

  const equipped = state.equipped[state.selectedId] || {};
  for (const slot of SLOTS) {
    const accId = equipped[slot];
    if (!accId) continue;
    const anchor = getAnchor(state.selectedId, slot);
    const el = document.createElement('div');
    el.className = `accessory-slot slot-${slot}`;
    el.dataset.slot = slot;
    el.style.left = anchor.x + '%';
    el.style.top = anchor.y + '%';
    el.style.width = anchor.widthPct + '%';
    el.style.aspectRatio = DEFAULT_ANCHORS[slot].aspect;
    el.innerHTML = SVG[accId];
    layer.appendChild(el);
    wireDrag(el, slot);
  }
}

function renderAll() {
  renderPicker();
  renderTabs();
  renderInventory();
  renderCanvas();
}

// --- state ops -------------------------------------------------------------

function toggleEquip(slot, accId) {
  const id = state.selectedId;
  if (!state.equipped[id]) state.equipped[id] = {};
  if (state.equipped[id][slot] === accId) {
    delete state.equipped[id][slot];
  } else {
    state.equipped[id][slot] = accId;
  }
  saveState();
  renderInventory();
  renderCanvas();
}

function getAnchor(woogoroId, slot) {
  const override = (state.anchors[woogoroId] || {})[slot];
  if (override) return { ...DEFAULT_ANCHORS[slot], ...override };
  return { ...DEFAULT_ANCHORS[slot] };
}

function setAnchor(woogoroId, slot, partial) {
  if (!state.anchors[woogoroId]) state.anchors[woogoroId] = {};
  state.anchors[woogoroId][slot] = {
    ...getAnchor(woogoroId, slot),
    ...partial,
  };
  saveState();
}

// --- drag (calibration mode) ----------------------------------------------

function wireDrag(el, slot) {
  let startX = 0, startY = 0, startAX = 0, startAY = 0, bounds = null;
  const onDown = (e) => {
    if (!state.calib) return;
    e.preventDefault();
    const p = pt(e);
    startX = p.x; startY = p.y;
    const a = getAnchor(state.selectedId, slot);
    startAX = a.x; startAY = a.y;
    bounds = $('canvas').getBoundingClientRect();
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
    window.addEventListener('touchmove', onMove, { passive: false });
    window.addEventListener('touchend', onUp);
  };
  const onMove = (e) => {
    e.preventDefault();
    const p = pt(e);
    const dxPct = ((p.x - startX) / bounds.width) * 100;
    const dyPct = ((p.y - startY) / bounds.height) * 100;
    const x = clamp(startAX + dxPct, -20, 120);
    const y = clamp(startAY + dyPct, -20, 120);
    setAnchor(state.selectedId, slot, { x, y });
    el.style.left = x + '%';
    el.style.top = y + '%';
    updateReadout();
  };
  const onUp = () => {
    window.removeEventListener('mousemove', onMove);
    window.removeEventListener('mouseup', onUp);
    window.removeEventListener('touchmove', onMove);
    window.removeEventListener('touchend', onUp);
  };
  el.addEventListener('mousedown', onDown);
  el.addEventListener('touchstart', onDown, { passive: false });

  // scroll-wheel to scale while hovering in calib mode
  el.addEventListener('wheel', (e) => {
    if (!state.calib) return;
    e.preventDefault();
    const a = getAnchor(state.selectedId, slot);
    const delta = e.deltaY < 0 ? 2 : -2;
    const widthPct = clamp(a.widthPct + delta, 10, 160);
    setAnchor(state.selectedId, slot, { widthPct });
    el.style.width = widthPct + '%';
    updateReadout();
  }, { passive: false });
}

function pt(e) {
  const t = e.touches ? e.touches[0] : e;
  return { x: t.clientX, y: t.clientY };
}
function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

// --- toolbar actions -------------------------------------------------------

$('calibToggle').addEventListener('change', (e) => {
  state.calib = e.target.checked;
  saveState();
  renderCanvas();
  updateReadout();
});

$('resetBtn').addEventListener('click', () => {
  const id = state.selectedId;
  state.equipped[id] = {};
  saveState();
  renderInventory();
  renderCanvas();
});

$('shuffleBtn').addEventListener('click', () => {
  const id = state.selectedId;
  const pick = (arr) => arr[Math.floor(Math.random() * arr.length)];
  state.equipped[id] = {
    hat: pick(CATALOG.hat).id,
    bandana: pick(CATALOG.bandana).id,
    glasses: Math.random() > 0.5 ? pick(CATALOG.glasses).id : null,
    background: Math.random() > 0.4 ? pick(CATALOG.background).id : null,
  };
  saveState();
  renderInventory();
  renderCanvas();
});

$('exportBtn').addEventListener('click', () => {
  const data = {
    equipped: state.equipped,
    anchors: state.anchors,
    exportedAt: new Date().toISOString(),
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'woogoro-accessories-layout.json';
  a.click();
});

$('copyBtn').addEventListener('click', async () => {
  const data = {
    anchors: state.anchors,
    catalog: CATALOG,
    slots: SLOTS,
    defaultAnchors: DEFAULT_ANCHORS,
  };
  const payload = JSON.stringify(data, null, 2);
  try {
    await navigator.clipboard.writeText(payload);
    $('copyBtn').textContent = 'Copied ✓';
    setTimeout(() => $('copyBtn').textContent = 'Copy for prod', 1500);
  } catch {
    $('readout').textContent = payload;
    $('readout').classList.add('show');
  }
});

function updateReadout() {
  if (!state.calib) {
    $('readout').classList.remove('show');
    return;
  }
  const id = state.selectedId;
  const anchors = state.anchors[id] || {};
  const lines = Object.entries(anchors).map(([slot, a]) =>
    `${slot.padEnd(11)} x:${a.x.toFixed(1).padStart(5)}%  y:${a.y.toFixed(1).padStart(5)}%  w:${(a.widthPct ?? DEFAULT_ANCHORS[slot].widthPct).toFixed(1)}%`
  );
  if (!lines.length) lines.push('(no overrides yet — drag any equipped item; scroll wheel resizes)');
  $('readout').textContent = `${id}:\n${lines.join('\n')}`;
  $('readout').classList.add('show');
}

// --- boot ------------------------------------------------------------------

renderAll();
</script>
</body>
