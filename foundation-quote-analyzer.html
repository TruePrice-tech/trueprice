  <script>
  (function() {
    "use strict";

    // ── Foundation Repair Pricing Model ──
    var FOUND_PRICING = {
      basePriceByType: {
        pier_installation: { label: "Pier Installation", basePrice: 1500, unit: "per pier" },
        slabjacking: { label: "Slabjacking/Mudjacking", basePrice: 1000 },
        wall_stabilization: { label: "Wall Stabilization", basePrice: 8000 },
        drainage_correction: { label: "Drainage Correction", basePrice: 4000 },
        crack_repair: { label: "Crack Repair", basePrice: 525, unit: "per crack" }
      },
      projectSizes: [
        { label: "Minor (1-3 cracks)", multiplier: 0.6 },
        { label: "Moderate (4-8 piers)", multiplier: 1.0 },
        { label: "Major (8-12 piers + drainage)", multiplier: 1.8 },
        { label: "Extensive (full perimeter)", multiplier: 2.8 }
      ],
      laborMultiplierByRegion: { south: 1.00, southeast: 1.03, northeast: 1.18, midwest: 1.06, mountain: 1.10, west: 1.22 },
      overheadMultiplier: 1.15,
      roundTo: 50,
      homeAgeMultipliers: {
        pre_1960: 1.25,
        "1960_1989": 1.10,
        "1990_plus": 1.00
      },
      scopeItems: [
        { key: "inspection", label: "Structural inspection / engineering report" },
        { key: "piers", label: "Piers (steel push piers or helical piers)" },
        { key: "brackets", label: "Pier brackets and hardware" },
        { key: "excavation", label: "Excavation and soil work" },
        { key: "waterproofing", label: "Waterproofing / sealant" },
        { key: "drainage", label: "Drainage system installation" },
        { key: "backfill", label: "Backfill and compaction" },
        { key: "monitoring", label: "Post-repair monitoring / follow-up" },
        { key: "warranty", label: "Warranty (transferable / lifetime)" },
        { key: "permits", label: "Permits and inspections" },
        { key: "landscaping", label: "Landscaping restoration" }
      ]
    };

    var STATE_REGIONS = {
      AL:"southeast",AK:"west",AZ:"west",AR:"south",CA:"west",CO:"mountain",CT:"northeast",
      DE:"northeast",FL:"southeast",GA:"southeast",HI:"west",ID:"mountain",IL:"midwest",
      IN:"midwest",IA:"midwest",KS:"midwest",KY:"southeast",LA:"south",ME:"northeast",
      MD:"northeast",MA:"northeast",MI:"midwest",MN:"midwest",MS:"south",MO:"midwest",
      MT:"mountain",NE:"midwest",NV:"west",NH:"northeast",NJ:"northeast",NM:"mountain",
      NY:"northeast",NC:"southeast",ND:"midwest",OH:"midwest",OK:"south",OR:"west",
      PA:"northeast",RI:"northeast",SC:"southeast",SD:"midwest",TN:"southeast",TX:"south",
      UT:"mountain",VT:"northeast",VA:"southeast",WA:"west",WV:"southeast",WI:"midwest",
      WY:"mountain",DC:"northeast"
    };

    var US_STATES = {
      "alabama":"AL","alaska":"AK","arizona":"AZ","arkansas":"AR","california":"CA",
      "colorado":"CO","connecticut":"CT","delaware":"DE","florida":"FL","georgia":"GA",
      "hawaii":"HI","idaho":"ID","illinois":"IL","indiana":"IN","iowa":"IA","kansas":"KS",
      "kentucky":"KY","louisiana":"LA","maine":"ME","maryland":"MD","massachusetts":"MA",
      "michigan":"MI","minnesota":"MN","mississippi":"MS","missouri":"MO","montana":"MT",
      "nebraska":"NE","nevada":"NV","new hampshire":"NH","new jersey":"NJ","new mexico":"NM",
      "new york":"NY","north carolina":"NC","north dakota":"ND","ohio":"OH","oklahoma":"OK",
      "oregon":"OR","pennsylvania":"PA","rhode island":"RI","south carolina":"SC",
      "south dakota":"SD","tennessee":"TN","texas":"TX","utah":"UT","vermont":"VT",
      "virginia":"VA","washington":"WA","west virginia":"WV","wisconsin":"WI","wyoming":"WY",
      "district of columbia":"DC"
    };

    // ── State ──
    var appRoot = document.getElementById("foundApp");
    var state = {
      step: "address",        // address | uploading | estimator | result
      address: { street: "", city: "", stateCode: "", zip: "" },
      uploadedFile: null,
      extractedText: "",
      // estimator answers
      est: { repairType: null, severity: null, homeAge: null },
      // result
      result: null
    };

    // ── Helpers ──
    function $(sel, el) { return (el || document).querySelector(sel); }
    function fmt(n) { return "$" + Number(n).toLocaleString("en-US", { maximumFractionDigits: 0 }); }
    function roundTo50(n) { return Math.round(n / 50) * 50; }

    function getRegionFromState(sc) {
      return STATE_REGIONS[(sc || "").toUpperCase()] || "south";
    }

    // City-level multiplier + inflation
    var cityMultCache = {};
    function fetchCityMult(city, stateCode) {
      if (!city || !stateCode) return;
      var key = city + "|" + stateCode;
      if (cityMultCache[key]) return;
      fetch("/api/city-multiplier?city=" + encodeURIComponent(city) + "&state=" + encodeURIComponent(stateCode))
        .then(function(r) { return r.json(); })
        .then(function(d) { if (d && d.multiplier) cityMultCache[key] = d.multiplier; })
        .catch(function() {});
    }
    function getCityMult(city, stateCode) {
      var key = city + "|" + stateCode;
      return cityMultCache[key] || null;
    }
    // Inflation: 3% annual from 2025
    var _now = new Date();
    var INFLATION_MULT = Math.pow(1.03, Math.max(0, _now.getFullYear() - 2025 + _now.getMonth() / 12));

    function getAgeMultiplier(homeAge) {
      if (homeAge === "pre_1960") return FOUND_PRICING.homeAgeMultipliers.pre_1960;
      if (homeAge === "1960_1989") return FOUND_PRICING.homeAgeMultipliers["1960_1989"];
      return FOUND_PRICING.homeAgeMultipliers["1990_plus"];
    }

    function getSeverityMultiplier(severity) {
      var sizes = FOUND_PRICING.projectSizes;
      for (var i = 0; i < sizes.length; i++) {
        if (i === 0 && severity === "minor") return sizes[0].multiplier;
        if (i === 1 && severity === "moderate") return sizes[1].multiplier;
        if (i === 2 && severity === "major") return sizes[2].multiplier;
        if (i === 3 && severity === "extensive") return sizes[3].multiplier;
      }
      return 1.0;
    }

    function getDefaultPierCount(severity) {
      if (severity === "minor") return 2;
      if (severity === "moderate") return 6;
      if (severity === "major") return 10;
      if (severity === "extensive") return 16;
      return 6;
    }

    function getDefaultCrackCount(severity) {
      if (severity === "minor") return 2;
      if (severity === "moderate") return 4;
      if (severity === "major") return 6;
      if (severity === "extensive") return 10;
      return 3;
    }

    function calcBenchmark(repairType, severity, homeAge, region) {
      var typeData = FOUND_PRICING.basePriceByType[repairType];
      if (!typeData) typeData = FOUND_PRICING.basePriceByType.pier_installation;

      var cityMult = getCityMult(state.address.city, state.address.stateCode);
      var laborMult = cityMult || (FOUND_PRICING.laborMultiplierByRegion[region] || 1.0);
      var severityMult = getSeverityMultiplier(severity);
      var ageMult = getAgeMultiplier(homeAge);

      var total = 0;

      if (repairType === "pier_installation") {
        var pierCount = getDefaultPierCount(severity);
        total = typeData.basePrice * pierCount * laborMult * INFLATION_MULT;
      } else if (repairType === "crack_repair") {
        var crackCount = getDefaultCrackCount(severity);
        total = typeData.basePrice * crackCount * laborMult * INFLATION_MULT;
      } else {
        total = typeData.basePrice * severityMult * laborMult * ageMult * INFLATION_MULT;
      }

      total *= FOUND_PRICING.overheadMultiplier;
      return roundTo50(total);
    }

    function verdictFromRatio(ratio) {
      if (ratio < 0.78) return { label: "Unusually Low", css: "low", emoji: "" };
      if (ratio <= 0.90) return { label: "Below Average", css: "low", emoji: "" };
      if (ratio <= 1.12) return { label: "Fair Price", css: "fair", emoji: "" };
      if (ratio <= 1.25) return { label: "Above Average", css: "high", emoji: "" };
      return { label: "Overpriced", css: "high", emoji: "" };
    }

    window.submitFeedback = function(response) {
      var fb = document.getElementById("estimateFeedback");
      if (!fb) return;
      fetch("/api/analytics", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ type: "event", event: "estimate_feedback", meta: { response: response, service: "foundation", verdict: state.result ? state.result.verdict.label : "" }, path: window.location.pathname })
      }).catch(function() {});
      fb.innerHTML = '<div style="font-size:14px; color:#166534; padding:8px 0;">Thanks for the feedback! This helps us improve our estimates.</div>';
    };

    window.saveResultAsImage = function() {
      if (typeof html2canvas === "undefined") {
        window.loadVendorLibs && window.loadVendorLibs().then(doCapture);
      } else { doCapture(); }
      function doCapture() {
        html2canvas(document.getElementById("foundApp"), { scale: 2, useCORS: true, backgroundColor: "#ffffff" }).then(function(canvas) {
          var link = document.createElement("a");
          link.download = "trueprice-foundation-analysis.png";
          link.href = canvas.toDataURL("image/png");
          link.click();
        });
      }
    };

    // ── Render functions ──
    function render() {
      switch (state.step) {
        case "address": renderAddress(); break;
        case "uploading": renderUploading(); break;
        case "estimator": renderEstimator(); break;
        case "result": renderResult(); break;
      }
    }

    // ── Address / Upload Step ──
    function renderAddress() {
      appRoot.innerHTML = '\
        <div class="found-hero">\
          <img src="/images/trudy-foundation.png" alt="Trudy" width="160" style="margin-bottom:12px;" />\
          <h1>Is your foundation repair quote fair?</h1>\
          <p>Upload your quote or get an instant estimate for your foundation project.</p>\
        </div>\
        <div class="found-card">\
          <div class="found-upload-zone" id="uploadZone">\
            <div style="font-size:36px; margin-bottom:8px;">&#128196;</div>\
            <p><strong>Analyze a Quote</strong></p>\
            <p class="hint">Upload a contractor quote (PDF or image) to check the price</p>\
            <input type="file" id="fileInput" accept=".pdf,image/*" style="display:none" />\
          </div>\
          <div style="margin-top:12px; font-size:12px; color:#94a3b8; text-align:center;">Your quote stays private. Processed in your browser, never stored or shared.</div>\
          <div class="found-divider">or enter your address for an estimate</div>\
          <div class="found-address-form">\
            <div style="position:relative">\
              <input type="text" id="addrStreet" placeholder="Start typing your address..." autocomplete="off" />\
              <div id="addrSuggestions" style="display:none;position:absolute;top:100%;left:0;right:0;z-index:50;background:#fff;border:1px solid #e2e8f0;border-top:none;border-radius:0 0 10px 10px;box-shadow:0 8px 24px rgba(0,0,0,0.1);max-height:220px;overflow-y:auto;"></div>\
            </div>\
            <div class="found-row">\
              <input type="text" id="addrCity" placeholder="City" />\
              <input type="text" id="addrState" placeholder="State" style="max-width:100px" />\
            </div>\
            <input type="text" id="addrZip" placeholder="ZIP code" maxlength="5" style="max-width:160px" />\
            <button class="found-btn found-btn-primary found-btn-full" id="btnEstimate">Get Foundation Estimate</button>\
          </div>\
        </div>';

      // Events
      var zone = document.getElementById("uploadZone");
      var fileInput = document.getElementById("fileInput");

      zone.addEventListener("click", function() { fileInput.click(); });
      zone.addEventListener("dragover", function(e) { e.preventDefault(); zone.style.borderColor = "#3b82f6"; });
      zone.addEventListener("dragleave", function() { zone.style.borderColor = "#cbd5e1"; });
      zone.addEventListener("drop", function(e) {
        e.preventDefault();
        zone.style.borderColor = "#cbd5e1";
        if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
      });
      fileInput.addEventListener("change", function() {
        if (fileInput.files.length) handleFile(fileInput.files[0]);
      });

      // Address autocomplete
      (function() {
        var addrInput = document.getElementById("addrStreet");
        var sugBox = document.getElementById("addrSuggestions");
        if (!addrInput || !sugBox) return;
        var timer = null;
        addrInput.addEventListener("input", function() {
          clearTimeout(timer);
          var q = addrInput.value.trim();
          if (q.length < 4) { sugBox.style.display = "none"; return; }
          timer = setTimeout(function() {

    async function processFile(file) {
      try {
        setProgress(15, "Loading parsing libraries...");
        await window.loadVendorLibs();

        var text = "";
        if (file.type === "application/pdf") {
          setProgress(30, "Extracting text from PDF...");
          text = await extractPdfText(file);
        } else {
          setProgress(30, "Running OCR on image...");
          text = await extractImageText(file);
        }

        setProgress(70, "Analyzing foundation repair quote...");
        state.extractedText = text;

        // Use analyzer-parser.js for price extraction
        var parsed = null;
        try {
          if (typeof parseExtractedText === "function") {
            parsed = parseExtractedText(text);
          }
        } catch (parseErr) {
          console.warn("Parser error, falling back to regex:", parseErr);
        }

        // Fallback price extraction if parser fails or returns nothing
        if (!parsed || (!parsed.finalPrice && (!parsed.priceCandidates || !parsed.priceCandidates.length))) {
          var priceMatches = text.match(/\$[\d,]+(?:\.\d{2})?/g) || [];
          var prices = priceMatches.map(function(p) { return parseFloat(p.replace(/[$,]/g, "")); }).filter(function(v) { return v >= 400 && v <= 100000; });
          if (prices.length) {
            prices.sort(function(a, b) { return b - a; });
            parsed = parsed || {};
            parsed.finalPrice = prices[0];
            parsed.priceCandidates = prices.map(function(v) { return { value: v, score: 50 }; });
          }
        }

        // Detect foundation repair type from text
        var repairType = detectFoundationRepairType(text);

        // Detect scope signals
        var scopeSignals = detectFoundationScopeSignals(text);

        // Location detection from parser
        var location = (parsed && parsed.location) ? parsed.location : null;
        if (location && location.stateCode && !state.address.stateCode) {
          state.address.stateCode = location.stateCode;
          if (location.city) state.address.city = location.city;
        }
        fetchCityMult(state.address.city, state.address.stateCode);

        // Determine price
        var quotePrice = 0;
        if (parsed && parsed.finalPrice && parsed.finalPrice > 300) {
          quotePrice = parsed.finalPrice;
        } else if (parsed && parsed.priceCandidates && parsed.priceCandidates.length) {
          var candidates = parsed.priceCandidates.filter(function(c) { return c.value >= 400 && c.value <= 100000; });
          candidates.sort(function(a, b) { return b.score - a.score; });
          if (candidates.length) quotePrice = candidates[0].value;
        }

        setProgress(85, "Calculating verdict...");

        var region = getRegionFromState(state.address.stateCode);
        var benchmark = calcBenchmark(repairType.value, "moderate", "1990_plus", region);

        var ratio = quotePrice > 0 ? quotePrice / benchmark : 1.0;
        var verdict = verdictFromRatio(ratio);

        setProgress(100, "Done!");

        state.result = {
          source: "upload",
          quotePrice: quotePrice,
          benchmark: benchmark,
          ratio: ratio,
          verdict: verdict,
          repairType: repairType,
          scopeSignals: scopeSignals,
          region: region,
          location: location,
          parsed: parsed
        };

        state.step = "result";
        setTimeout(render, 400);

      } catch (err) {
        console.error("Foundation analysis error:", err);
        appRoot.innerHTML = '\
          <div class="found-hero"><h1>We couldn\'t read that file</h1></div>\
          <div class="found-card" style="text-align:center;">\
            <p style="color:#475569;margin-bottom:16px;">The file might be a scanned image that\'s hard to read, or in an unsupported format.</p>\
            <p style="color:#475569;margin-bottom:20px;">You can enter the quote total manually:</p>\
            <div style="display:flex;gap:10px;justify-content:center;align-items:center;margin-bottom:20px;">\
              <span style="font-size:20px;font-weight:700;">$</span>\
              <input type="number" id="manualPrice" placeholder="e.g. 8500" style="padding:10px 14px;border:1px solid #e2e8f0;border-radius:10px;font-size:18px;width:180px;" />\
            </div>\
            <button class="found-btn found-btn-primary" id="manualPriceBtn">Analyze this price</button>\
            <div style="margin-top:14px;"><button class="found-btn found-btn-secondary" onclick="state.step=\'address\';render();">Start over</button></div>\
          </div>';
        document.getElementById("manualPriceBtn").addEventListener("click", function() {
          var price = parseFloat(document.getElementById("manualPrice").value);
          if (!price || price < 200) { alert("Please enter a valid price."); return; }
          var region = getRegionFromState(state.address.stateCode);
          var benchmark = calcBenchmark("pier_installation", "moderate", "1990_plus", region);
          var ratio = price / benchmark;

            verdict: verdictFromRatio(ratio),

          };
          state.step = "result";
          render();
        });
      }
    }

    // ── Foundation-specific detection ──
    function detectFoundationRepairType(text) {
      var t = (text || "").toLowerCase();
      if (/\bpier\b|push\s*pier|helical|underpinning/i.test(t)) return { value: "pier_installation", label: "Pier Installation" };
      if (/slabjack|mudjack|foam\s*inject|polyurethane\s*inject|poly\s*lift/i.test(t)) return { value: "slabjacking", label: "Slabjacking/Mudjacking" };
      if (/wall\s*stab|carbon\s*fiber|wall\s*anchor|bowing\s*wall|i[\-\s]*beam/i.test(t)) return { value: "wall_stabilization", label: "Wall Stabilization" };
      if (/french\s*drain|drain(age)?\s*correct|sump\s*pump|gutter|grading/i.test(t)) return { value: "drainage_correction", label: "Drainage Correction" };
      if (/crack\s*repair|epoxy\s*inject|crack\s*seal|crack\s*fill/i.test(t)) return { value: "crack_repair", label: "Crack Repair" };
      return { value: "pier_installation", label: "Pier Installation" };
    }

    function detectFoundationScopeSignals(text) {
      var t = (text || "").toLowerCase();
      var signals = {};
      var patterns = {
        inspection: /inspect|engineer|structural\s*report|assessment/i,
        piers: /\bpier|push\s*pier|helical|steel\s*pier/i,
        brackets: /bracket|hardware|mounting|attachment/i,
        excavation: /excavat|dig|trench|soil\s*remov/i,
        waterproofing: /waterproof|sealant|membrane|vapor\s*barrier/i,
        drainage: /drain|french\s*drain|sump|grading/i,
        backfill: /backfill|compact|fill\s*material|soil\s*replac/i,
        monitoring: /monitor|follow[\-\s]*up|check[\-\s]*up|post[\-\s]*repair/i,
        warranty: /warranty|guarantee|transferable|lifetime/i,
        permits: /permit|inspection|code|compliance/i,
        landscaping: /landscap|yard|lawn|restoration|cleanup/i
      };
      Object.keys(patterns).forEach(function(key) {
        if (patterns[key].test(t)) {
          signals[key] = { status: "included" };
        }
      });
      return signals;
    }

    async function extractPdfText(file) {
      var arrayBuffer = await file.arrayBuffer();
      var pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
      var allText = [];
      for (var i = 1; i <= pdf.numPages; i++) {
        var page = await pdf.getPage(i);
        var content = await page.getTextContent();
        var pageText = content.items.map(function(item) { return item.str; }).join(" ");
        allText.push(pageText);
      }
      return allText.join("\n");
    }

    async function preprocessImage(file, mode) {
      return new Promise(function(resolve, reject) {
        var reader = new FileReader();
        reader.onload = function() {
          var img = new Image();
          img.onload = function() {
            var canvas = document.createElement("canvas");
            var scale = Math.max(1.5, Math.min(2.5, 2400 / Math.max(img.width, img.height)));
            canvas.width = Math.round(img.width * scale);
            canvas.height = Math.round(img.height * scale);
            var ctx = canvas.getContext("2d");
            ctx.imageSmoothingEnabled = true;
            ctx.imageSmoothingQuality = "high";
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            var imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            var data = imageData.data;
            if (mode === "strong") {
              for (var i = 0; i < data.length; i += 4) {
                var gray = 0.299 * data[i] + 0.587 * data[i+1] + 0.114 * data[i+2];
                gray = (gray - 128) * 1.6 + 128;
                gray = gray > 170 ? 255 : gray < 85 ? 0 : gray;
                gray = Math.max(0, Math.min(255, gray));
                data[i] = gray; data[i+1] = gray; data[i+2] = gray;
              }
            } else {
              for (var i = 0; i < data.length; i += 4) {
                var gray = 0.299 * data[i] + 0.587 * data[i+1] + 0.114 * data[i+2];
                gray = (gray - 128) * 1.3 + 128;
                gray = Math.max(0, Math.min(255, gray));
                data[i] = gray; data[i+1] = gray; data[i+2] = gray;
              }
            }
            ctx.putImageData(imageData, 0, 0);
            resolve(canvas.toDataURL("image/png"));
          };
          img.onerror = reject;
          img.src = reader.result;
        };
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    async function extractImageText(file) {
      var softImage = await preprocessImage(file, "soft");
      var worker = await Tesseract.createWorker("eng");
      var result = await worker.recognize(softImage);
      var text = (result.data.text || "").trim();

      if (text.length < 50) {
        var strongImage = await preprocessImage(file, "strong");
        var result2 = await worker.recognize(strongImage);
        var text2 = (result2.data.text || "").trim();
        if (text2.length > text.length) text = text2;
      }

      await worker.terminate();
      return text;
    }

        var tip = "";
        if (r.verdict.css === "high") {
          tip = "This quote is higher than typical market rates. Consider getting 2-3 additional quotes to compare.";
        } else if (r.verdict.css === "low") {
          tip = "This quote is lower than expected. Verify the scope includes structural engineering, proper pier depth, and a transferable warranty.";
        } else {
          tip = "This quote appears to be within the typical market range for your area and repair type.";
        }
        contextHtml = '<div class="found-card"><h3 style="margin-bottom:0.5rem;">Market Context</h3><p style="color:#475569;font-size:0.95rem;">' + tip + '</p></div>';
      }

      // Next Steps tips
      var tipsHtml = '<div class="found-card"><h3 style="margin-bottom:0.75rem;">Next Steps</h3><ul style="padding-left:18px;color:#475569;font-size:0.95rem;line-height:1.8;">';
      tipsHtml += '<li>Get a structural engineer\'s report before committing to a repair plan</li>';
      tipsHtml += '<li>Ask if the warranty is transferable to future homeowners</li>';
      tipsHtml += '<li>Verify pier depth reaches stable, load-bearing soil (not just bedrock)</li>';
      tipsHtml += '<li>Confirm the quote includes permits and post-repair inspections</li>';
      if (r.verdict.css === "high") {
        tipsHtml += '<li>Get 2-3 additional quotes from local foundation specialists, not just general contractors</li>';
        tipsHtml += '<li>Ask about phased repairs if budget is a concern -- not all issues need immediate attention</li>';
      }
      if (r.verdict.css === "low") {
        tipsHtml += '<li>Verify the contractor uses steel push piers or helical piers, not concrete piers</li>';
        tipsHtml += '<li>Confirm the number of piers and their spacing matches the engineer\'s recommendation</li>';
      }
      tipsHtml += '</ul></div>';

      // Warning signs card
      var warningHtml = '<div class="found-card" style="background:#eff6ff;border:1px solid #bfdbfe;">';
      warningHtml += '<h3 style="margin-bottom:0.5rem;color:#1d4ed8;">Red Flags to Watch For</h3>';
      warningHtml += '<ul style="padding-left:18px;color:#475569;font-size:0.95rem;line-height:1.8;">';
      warningHtml += '<li>Contractor skips the inspection and jumps straight to a repair plan</li>';
      warningHtml += '<li>No structural engineer involved in the assessment</li>';
      warningHtml += '<li>Warranty is not transferable or has excessive exclusions</li>';
      warningHtml += '<li>High-pressure sales tactics or "today only" pricing</li>';
      warningHtml += '</ul></div>';

      // Feedback prompt
      var feedbackHtml = '\
<div id="estimateFeedback" style="margin-top:1.5rem; padding:16px; background:#f8fafc; border:1px solid #e2e8f0; border-radius:10px; text-align:center;">\
  <div style="font-size:14px; color:#475569; margin-bottom:10px;">Was this estimate close to your actual quote?</div>\
  <div style="display:flex; gap:8px; justify-content:center; flex-wrap:wrap;">\
    <button onclick="submitFeedback(\'accurate\')" style="padding:8px 16px; border:1px solid #e2e8f0; border-radius:8px; background:#fff; cursor:pointer; font-size:13px;">Yes, accurate</button>\
    <button onclick="submitFeedback(\'high\')" style="padding:8px 16px; border:1px solid #e2e8f0; border-radius:8px; background:#fff; cursor:pointer; font-size:13px;">My quote was higher</button>\
    <button onclick="submitFeedback(\'low\')" style="padding:8px 16px; border:1px solid #e2e8f0; border-radius:8px; background:#fff; cursor:pointer; font-size:13px;">My quote was lower</button>\
  </div>\
</div>';

      // Email report
      var emailSubject = encodeURIComponent("My Foundation Repair Quote Analysis from TruePrice");
      var emailBody = encodeURIComponent(
        "Foundation Repair Quote Analysis\n" +
        "Repair Type: " + r.repairType.label + "\n" +
        (r.severity ? "Severity: " + r.severity + "\n" : "") +
        (r.homeAge ? "Home Age: " + r.homeAge + "\n" : "") +
        (isUpload ? "Quote Price: " + fmt(r.quotePrice) + "\n" : "") +
        "Benchmark: " + fmt(r.benchmark) + "\n" +
        "Verdict: " + r.verdict.label + "\n" +
        "Region: " + capitalize(r.region) + "\n\n" +
        "Analyzed by TruePrice - https://truepricehq.com/foundation-quote-analyzer.html"
      );

      appRoot.innerHTML = '\
        <div class="found-hero">\
          <h1>' + (isUpload ? "Foundation Repair Quote Analysis" : "Your Foundation Repair Estimate") + '</h1>\
        </div>\
        <div class="found-verdict ' + verdictCss + '">\
          <div class="verdict-label">' + r.verdict.label + '</div>\
          <div class="verdict-price">' + priceDisplay + '</div>\
          <div class="verdict-range">' + rangeText + '</div>\
        </div>\
        <div class="found-card">\
          <h3 style="margin-bottom:0.75rem;">Repair Details</h3>\
          ' + detailsHtml + '\
        </div>\
        ' + scopeHtml + '\
        ' + contextHtml + '\
        ' + tipsHtml + '\
        ' + warningHtml + '\
        <div class="found-actions">\
          <a class="found-btn found-btn-primary found-btn-full" href="/find-contractors.html?service=foundation">Find Foundation Contractors</a>\
          <a class="found-btn found-btn-secondary found-btn-full" href="/foundation-repair-cost.html">Foundation Repair Cost Guide</a>\
          <a class="found-btn found-btn-secondary found-btn-full" href="mailto:?subject=' + emailSubject + '&body=' + emailBody + '">Email Me This Report</a>\
          <button class="found-btn found-btn-secondary found-btn-full" onclick="saveResultAsImage()">Save as Image</button>\
          <a class="found-btn found-btn-secondary found-btn-full" href="/methodology.html" style="font-size:0.9rem;">How we calculate estimates</a>\
          <button class="found-btn found-btn-secondary found-btn-full" id="btnStartOver">Start Over</button>\
        </div>\
        ' + feedbackHtml;

      document.getElementById("btnStartOver").addEventListener("click", function() {
        state = {
          step: "address",
          address: { street: "", city: "", stateCode: "", zip: "" },
          uploadedFile: null,
          extractedText: "",
          est: { repairType: null, severity: null, homeAge: null },
          result: null
        };
        render();
      });
    }

    function capitalize(s) {
      return s ? s.charAt(0).toUpperCase() + s.slice(1) : "";
    }

    // ── Init ──
    render();

  })();
  </script>
<script src="/js/tp-analytics.min.js" async></script>
</body>
</html>
