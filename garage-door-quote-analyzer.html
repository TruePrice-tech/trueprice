    };

    var STATE_REGIONS = {
      AL:"southeast",AK:"west",AZ:"west",AR:"south",CA:"west",CO:"mountain",CT:"northeast",
      DE:"northeast",FL:"southeast",GA:"southeast",HI:"west",ID:"mountain",IL:"midwest",

      NY:"northeast",NC:"southeast",ND:"midwest",OH:"midwest",OK:"south",OR:"west",
      PA:"northeast",RI:"northeast",SC:"southeast",SD:"midwest",TN:"southeast",TX:"south",
      UT:"mountain",VT:"northeast",VA:"southeast",WA:"west",WV:"southeast",WI:"midwest",
      WY:"mountain",DC:"northeast"
    };

    var US_STATES = {
      "alabama":"AL","alaska":"AK","arizona":"AZ","arkansas":"AR","california":"CA",
      "colorado":"CO","connecticut":"CT","delaware":"DE","florida":"FL","georgia":"GA",
      "hawaii":"HI","idaho":"ID","illinois":"IL","indiana":"IN","iowa":"IA","kansas":"KS",

      "oregon":"OR","pennsylvania":"PA","rhode island":"RI","south carolina":"SC",
      "south dakota":"SD","tennessee":"TN","texas":"TX","utah":"UT","vermont":"VT",
      "virginia":"VA","washington":"WA","west virginia":"WV","wisconsin":"WI","wyoming":"WY",
      "district of columbia":"DC"
    };

    // ── State ──
    var appRoot = document.getElementById("gdApp");
    var state = {
      step: "address",        // address | uploading | estimator | result
      address: { street: "", city: "", stateCode: "", zip: "" },
      uploadedFile: null,
      extractedText: "",
      // estimator answers
      est: { serviceType: null, material: null, includesOpener: null },
      // result
      result: null
    };

    // ── Helpers ──
    function $(sel, el) { return (el || document).querySelector(sel); }
    function fmt(n) { return "$" + Number(n).toLocaleString("en-US", { maximumFractionDigits: 0 }); }
    function roundTo50(n) { return Math.round(n / 50) * 50; }

    function getRegionFromState(sc) {
      return STATE_REGIONS[(sc || "").toUpperCase()] || "south";
    }

    // City-level multiplier + inflation
    var cityMultCache = {};
    function fetchCityMult(city, stateCode) {
      if (!city || !stateCode) return;
      var key = city + "|" + stateCode;
      if (cityMultCache[key]) return;
      fetch("/api/city-multiplier?city=" + encodeURIComponent(city) + "&state=" + encodeURIComponent(stateCode))
        .then(function(r) { return r.json(); })
        .then(function(d) { if (d && d.multiplier) cityMultCache[key] = d.multiplier; })
        .catch(function() {});
    }
    function getCityMult(city, stateCode) {
      var key = city + "|" + stateCode;
      return cityMultCache[key] || null;
    }
    // Inflation: 3% annual from 2025
    var _now = new Date();
    var INFLATION_MULT = Math.pow(1.03, Math.max(0, _now.getFullYear() - 2025 + _now.getMonth() / 12));

    function calcBenchmark(serviceType, materialKey, includesOpener, region) {
      var typeInfo = GD_PRICING.basePriceByType[serviceType];
      if (!typeInfo) typeInfo = GD_PRICING.basePriceByType.single_car;

      var basePrice = typeInfo.basePrice;
      var materialMult = 1.0;

      // Material only applies to door types, not opener_only or spring_replacement
      if (serviceType !== "opener_only" && serviceType !== "spring_replacement" && materialKey) {
        var mat = GD_PRICING.materialUpgrades[materialKey];
        if (mat) materialMult = mat.multiplier;
      }

      var cityMult = getCityMult(state.address.city, state.address.stateCode);
      var laborMult = cityMult || (GD_PRICING.laborMultiplierByRegion[region] || 1.0);

      var total = basePrice * materialMult * laborMult * INFLATION_MULT;

      // Add opener cost if applicable
      var openerCost = 0;
      if (includesOpener === "yes") {
        openerCost = (GD_PRICING.openerCost.low + GD_PRICING.openerCost.high) / 2; // $425 average
        openerCost = openerCost * laborMult * INFLATION_MULT;
      }

      return roundTo50(total + openerCost);
    }

    function verdictFromRatio(ratio) {
      if (ratio < 0.78) return { label: "Unusually Low", css: "low", emoji: "" };
      if (ratio <= 0.90) return { label: "Below Average", css: "low", emoji: "" };
      if (ratio <= 1.12) return { label: "Fair Price", css: "fair", emoji: "" };
      if (ratio <= 1.25) return { label: "Above Average", css: "high", emoji: "" };
      return { label: "Overpriced", css: "high", emoji: "" };
    }

    // Detect garage door service type from text
    function detectGdServiceType(text) {
      var t = (text || "").toLowerCase();
      if (/spring\s*(replace|repair|broken|torsion|extension)/i.test(t)) return { value: "spring_replacement", label: "Spring Replacement" };
      if (/opener\s*only|opener\s*install|opener\s*replace/i.test(t) && !/door\s*(install|replace|new)/i.test(t)) return { value: "opener_only", label: "Opener Only" };
      if (/carriage|custom\s*door|carriage\s*style|carriage\s*house/i.test(t)) return { value: "custom_carriage", label: "Custom/Carriage" };
      if (/double\s*car|16\s*x\s*7|16x7|two\s*car|2[\s-]*car/i.test(t)) return { value: "double_car", label: "Double Car (16x7)" };
      if (/single\s*car|8\s*x\s*7|8x7|one\s*car|1[\s-]*car|9\s*x\s*7|9x7/i.test(t)) return { value: "single_car", label: "Single Car (8x7)" };
      // default
      return { value: "single_car", label: "Single Car (8x7)" };
    }

    // Detect material from text
    function detectGdMaterial(text) {
      var t = (text || "").toLowerCase();
      if (/composite|faux\s*wood|simulated\s*wood/i.test(t)) return { value: "composite", label: "Composite/Faux Wood" };
      if (/\bwood\b(?!\s*grain)/i.test(t) && !/faux|composite|simulated/i.test(t)) return { value: "wood", label: "Wood" };
      if (/fiberglass/i.test(t)) return { value: "fiberglass", label: "Fiberglass" };
      if (/aluminum/i.test(t)) return { value: "aluminum", label: "Aluminum" };
      if (/insulated\s*steel|r[\s-]*value|polyurethane|polystyrene/i.test(t)) return { value: "steel_insulated", label: "Insulated Steel" };
      if (/\bsteel\b/i.test(t)) return { value: "steel_basic", label: "Basic Steel" };
      return null;
    }

    // Detect scope signals from text
    function detectGdScopeSignals(text) {
      var t = (text || "").toLowerCase();
      var signals = {};
      var checks = {
        oldDoorRemoval: /remov|dispos|haul\s*away|tear\s*out|old\s*door/,
        tracks: /track|rail|hardware/,
        springs: /spring|torsion|extension/,
        opener: /opener|motor|lift\s*master|chamberlain|genie/,
        remotes: /remote|transmitter|clicker/,
        weatherstripping: /weather\s*strip|seal|bottom\s*seal|threshold/,
        insulation: /insul|r[\s-]*value|polyurethane|polystyrene/,
        safetySensors: /sensor|safety|auto[\s-]*reverse|photo[\s-]*eye/,
        keypad: /keypad|keyless|wireless\s*entry/,
        warranty: /warrant|guarant/,
        permits: /permit|inspect|code\s*compliance/
      };
      for (var key in checks) {
        if (checks[key].test(t)) {
          signals[key] = { status: "included" };
        }
      }
      return signals;
    }

    async function processFile(file) {
      try {
        setProgress(15, "Loading parsing libraries...");
        await window.loadVendorLibs();

        var text = "";
        if (file.type === "application/pdf") {
          setProgress(30, "Extracting text from PDF...");
          text = await extractPdfText(file);
        } else {
          setProgress(30, "Running OCR on image...");
          text = await extractImageText(file);
        }

        setProgress(70, "Analyzing garage door quote...");
        state.extractedText = text;

        // Use analyzer-parser.js for price extraction
        var parsed = null;
        try {
          if (typeof parseExtractedText === "function") {
            parsed = parseExtractedText(text);
          }
        } catch (parseErr) {
          console.warn("Parser error, falling back to regex:", parseErr);
        }

        // Fallback price extraction if parser fails or returns nothing
        if (!parsed || (!parsed.finalPrice && (!parsed.priceCandidates || !parsed.priceCandidates.length))) {
          var priceMatches = text.match(/\$[\d,]+(?:\.\d{2})?/g) || [];
          var prices = priceMatches.map(function(p) { return parseFloat(p.replace(/[$,]/g, "")); }).filter(function(v) { return v >= 200 && v <= 20000; });
          if (prices.length) {
            prices.sort(function(a, b) { return b - a; });
            parsed = parsed || {};
            parsed.finalPrice = prices[0];
            parsed.priceCandidates = prices.map(function(v) { return { value: v, score: 50 }; });
          }
        }

        // Detect garage door specifics from text
        var serviceType = detectGdServiceType(text);
        var material = detectGdMaterial(text);
        var scopeSignals = detectGdScopeSignals(text);

        // Location detection from parser
        var location = (parsed && parsed.location) ? parsed.location : null;
        if (location && location.stateCode && !state.address.stateCode) {
          state.address.stateCode = location.stateCode;
          if (location.city) state.address.city = location.city;
        }
        fetchCityMult(state.address.city, state.address.stateCode);

        // Determine price
        var quotePrice = 0;
        if (parsed && parsed.finalPrice && parsed.finalPrice > 100) {
          quotePrice = parsed.finalPrice;
        } else if (parsed && parsed.priceCandidates && parsed.priceCandidates.length) {
          var candidates = parsed.priceCandidates.filter(function(c) { return c.value >= 200 && c.value <= 15000; });
          candidates.sort(function(a, b) { return b.score - a.score; });
          if (candidates.length) quotePrice = candidates[0].value;
        }

        setProgress(85, "Calculating verdict...");

        var region = getRegionFromState(state.address.stateCode);
        var materialKey = material ? material.value : "steel_basic";
        var hasOpener = scopeSignals.opener ? "yes" : "no";

        var benchmark = calcBenchmark(serviceType.value, materialKey, hasOpener, region);

        var ratio = quotePrice > 0 ? quotePrice / benchmark : 1.0;
        var verdict = verdictFromRatio(ratio);

        setProgress(100, "Done!");

        state.result = {
          source: "upload",
          quotePrice: quotePrice,
          benchmark: benchmark,
          ratio: ratio,
          verdict: verdict,
          serviceType: serviceType,
          material: material,
          includesOpener: hasOpener,
          scopeSignals: scopeSignals,
          region: region,
          location: location,
          parsed: parsed
        };

        state.step = "result";
        setTimeout(render, 400);

      } catch (err) {
        console.error("Garage door analysis error:", err);
        appRoot.innerHTML = '\
          <div class="gd-hero"><h1>We couldn\'t read that file</h1></div>\
          <div class="gd-card" style="text-align:center;">\
            <p style="color:#475569;margin-bottom:16px;">The file might be a scanned image that\'s hard to read, or in an unsupported format.</p>\
            <p style="color:#475569;margin-bottom:20px;">You can enter the quote total manually:</p>\
            <div style="display:flex;gap:10px;justify-content:center;align-items:center;margin-bottom:20px;">\
              <span style="font-size:20px;font-weight:700;">$</span>\
              <input type="number" id="manualPrice" placeholder="e.g. 2400" style="padding:10px 14px;border:1px solid #e2e8f0;border-radius:10px;font-size:18px;width:180px;" />\
            </div>\
            <button class="gd-btn gd-btn-primary" id="manualPriceBtn">Analyze this price</button>\
            <div style="margin-top:14px;"><button class="gd-btn gd-btn-secondary" onclick="state.step=\'address\';render();">Start over</button></div>\
          </div>';
        document.getElementById("manualPriceBtn").addEventListener("click", function() {
          var price = parseFloat(document.getElementById("manualPrice").value);
          if (!price || price < 100) { alert("Please enter a valid price."); return; }
          var region = getRegionFromState(state.address.stateCode);
          var benchmark = calcBenchmark("single_car", "steel_basic", "yes", region);
          var ratio = price / benchmark;

    async function extractPdfText(file) {
      var arrayBuffer = await file.arrayBuffer();
      var pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
      var allText = [];
      for (var i = 1; i <= pdf.numPages; i++) {
        var page = await pdf.getPage(i);
        var content = await page.getTextContent();
        var pageText = content.items.map(function(item) { return item.str; }).join(" ");
        allText.push(pageText);
      }
      return allText.join("\n");
    }

    async function preprocessImage(file, mode) {
      return new Promise(function(resolve, reject) {
        var reader = new FileReader();
        reader.onload = function() {
          var img = new Image();
          img.onload = function() {
            var canvas = document.createElement("canvas");
            var scale = Math.max(1.5, Math.min(2.5, 2400 / Math.max(img.width, img.height)));
            canvas.width = Math.round(img.width * scale);
            canvas.height = Math.round(img.height * scale);
            var ctx = canvas.getContext("2d");
            ctx.imageSmoothingEnabled = true;
            ctx.imageSmoothingQuality = "high";
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            var imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            var data = imageData.data;
            if (mode === "strong") {
              for (var i = 0; i < data.length; i += 4) {
                var gray = 0.299 * data[i] + 0.587 * data[i+1] + 0.114 * data[i+2];
                gray = (gray - 128) * 1.6 + 128;
                gray = gray > 170 ? 255 : gray < 85 ? 0 : gray;
                gray = Math.max(0, Math.min(255, gray));
                data[i] = gray; data[i+1] = gray; data[i+2] = gray;
              }
            } else {
              for (var i = 0; i < data.length; i += 4) {
                var gray = 0.299 * data[i] + 0.587 * data[i+1] + 0.114 * data[i+2];
                gray = (gray - 128) * 1.3 + 128;
                gray = Math.max(0, Math.min(255, gray));
                data[i] = gray; data[i+1] = gray; data[i+2] = gray;
              }
            }
            ctx.putImageData(imageData, 0, 0);
            resolve(canvas.toDataURL("image/png"));
          };
          img.onerror = reject;
          img.src = reader.result;
        };
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    async function extractImageText(file) {
      var softImage = await preprocessImage(file, "soft");
      var worker = await Tesseract.createWorker("eng");
      var result = await worker.recognize(softImage);
      var text = (result.data.text || "").trim();

      if (text.length < 50) {
        var strongImage = await preprocessImage(file, "strong");
        var result2 = await worker.recognize(strongImage);
        var text2 = (result2.data.text || "").trim();
        if (text2.length > text.length) text = text2;
      }

      await worker.terminate();
      return text;
    }

    function calculateEstimate() {

      var low = roundTo50(benchmark * 0.85);
      var high = roundTo50(benchmark * 1.18);

      var typeLabel = GD_PRICING.basePriceByType[est.serviceType] ? GD_PRICING.basePriceByType[est.serviceType].label : est.serviceType;

      state.result = {
        source: "estimator",

        benchmark: benchmark,
        low: low,
        high: high,
        ratio: 1.0,
        verdict: { label: "Estimated Cost", css: "fair", emoji: "" },
        serviceType: { value: est.serviceType, label: typeLabel },
        material: est.material ? GD_PRICING.materialUpgrades[est.material] : null,
        materialKey: est.material,

      detailsHtml += '</div>';

      // Scope checklist (upload only)
      var scopeHtml = "";
      if (isUpload && r.scopeSignals && Object.keys(r.scopeSignals).length > 0) {
        scopeHtml = '<div class="gd-card"><h3 style="margin-bottom:0.75rem;">Scope Review</h3><ul class="gd-scope">';
        GD_PRICING.scopeItems.forEach(function(item) {
          var sig = r.scopeSignals[item.key];
          var status = sig ? sig.status : "unclear";
          var iconClass = status === "included" ? "scope-included" : status === "excluded" ? "scope-missing" : "scope-unclear";
          var iconChar = status === "included" ? "&#10003;" : status === "excluded" ? "&#10007;" : "?";
          var statusLabel = status === "included" ? "Included" : status === "excluded" ? "Not included" : "Not mentioned";
          scopeHtml += '<li><span class="scope-icon ' + iconClass + '">' + iconChar + '</span><span>' + item.label + '</span><span style="margin-left:auto;font-size:0.8rem;color:#94a3b8;">' + statusLabel + '</span></li>';
        });
        scopeHtml += '</ul>';

        var missingItems = GD_PRICING.scopeItems.filter(function(item) { var sig = r.scopeSignals[item.key]; return !sig || sig.status !== "included"; });
        if (missingItems.length > 0) {
          var mLow = 0, mHigh = 0;
          missingItems.forEach(function(item) { var c = gdScopeCosts[item.key]; if (c) { mLow += c[0]; mHigh += c[1]; } });
          if (mLow > 0) {
            scopeHtml += '<div style="font-size:14px;padding:10px 14px;background:#fef2f2;border:1px solid #fecaca;border-radius:10px;margin-top:12px;color:#991b1b;"><strong>' + missingItems.length + ' missing item' + (missingItems.length !== 1 ? 's' : '') + '</strong> could add <strong>$' + mLow.toLocaleString() + ' to $' + mHigh.toLocaleString() + '</strong> in change orders if not included.</div>';
          }
        }
        scopeHtml += '</div>';
      }

      // Estimator scope info
      if (!isUpload) {
        scopeHtml = '<div class="gd-card"><h3 style="margin-bottom:0.75rem;">What This Estimate Includes</h3><ul class="gd-scope">';
        var typicalItems = ["oldDoorRemoval", "tracks", "springs", "weatherstripping", "safetySensors", "warranty"];
        if (r.includesOpener === "yes") typicalItems.splice(3, 0, "opener", "remotes");
        typicalItems.forEach(function(key) {
          var item = GD_PRICING.scopeItems.find(function(s) { return s.key === key; });
          if (item) {
            scopeHtml += '<li><span class="scope-icon scope-included">&#10003;</span><span>' + item.label + '</span></li>';
          }
        });
        scopeHtml += '</ul><p style="font-size:0.85rem;color:#64748b;margin-top:0.75rem;">Estimate assumes standard installation. Custom framing, electrical work, or structural modifications may add cost.</p></div>';
      }

      // Market context
      var contextHtml = '';
      if (isUpload && r.quotePrice > 0) {
        var tip = "";
        if (r.verdict.css === "high") {
          tip = "This quote is higher than typical market rates. Consider getting 2-3 additional quotes to compare.";
        } else if (r.verdict.css === "low") {
          tip = "This quote is lower than expected. Verify the scope includes all necessary items like springs, tracks, weatherstripping, and warranty.";
        } else {
          tip = "This quote appears to be within the typical market range for your area and service type.";
        }
        contextHtml = '<div class="gd-card"><h3 style="margin-bottom:0.5rem;">Market Context</h3><p style="color:#475569;font-size:0.95rem;">' + tip + '</p></div>';
      }

      // Next Steps tips
      var tipsHtml = '<div class="gd-card"><h3 style="margin-bottom:0.75rem;">Next Steps</h3><ul style="padding-left:18px;color:#475569;font-size:0.95rem;line-height:1.8;">';
      tipsHtml += '<li>Ask if the quote includes removal and disposal of the old door</li>';
      tipsHtml += '<li>Confirm whether new tracks and hardware are included or if old ones will be reused</li>';
      tipsHtml += '<li>Verify the warranty covers both parts AND labor (many only cover parts)</li>';
      tipsHtml += '<li>Ask about insulation R-value if energy efficiency matters to you</li>';
      if (r.verdict.css === "high") {
        tipsHtml += '<li>Get 2-3 additional quotes from local contractors</li>';
        tipsHtml += '<li>Ask about manufacturer rebates or seasonal promotions</li>';
      }
      if (r.verdict.css === "low") {
        tipsHtml += '<li>Confirm the door brand and model are specified, not just "equivalent"</li>';
        tipsHtml += '<li>Ask if springs are torsion (preferred) or extension type</li>';
      }
      tipsHtml += '</ul></div>';

      // Safety tips (garage door specific)
      var safetyHtml = '<div class="gd-card" style="background:#eff6ff;border:1px solid #bfdbfe;">';
      safetyHtml += '<h3 style="margin-bottom:0.5rem;color:#1d4ed8;">Safety Reminders</h3>';
      safetyHtml += '<ul style="padding-left:18px;color:#475569;font-size:0.95rem;line-height:1.8;">';
      safetyHtml += '<li>Garage door springs are under extreme tension. Never attempt DIY spring replacement.</li>';
      safetyHtml += '<li>Ensure your installer includes safety sensors and auto-reverse per federal requirements</li>';
      safetyHtml += '<li>Ask about wind load rating if you live in a hurricane or high-wind zone</li>';
      safetyHtml += '</ul></div>';

      // Feedback prompt
      var feedbackHtml = '\
<div id="estimateFeedback" style="margin-top:1.5rem; padding:16px; background:#f8fafc; border:1px solid #e2e8f0; border-radius:10px; text-align:center;">\
  <div style="font-size:14px; color:#475569; margin-bottom:10px;">Was this estimate close to your actual quote?</div>\
  <div style="display:flex; gap:8px; justify-content:center; flex-wrap:wrap;">\
    <button onclick="submitFeedback(\'accurate\')" style="padding:8px 16px; border:1px solid #e2e8f0; border-radius:8px; background:#fff; cursor:pointer; font-size:13px;">Yes, accurate</button>\
    <button onclick="submitFeedback(\'high\')" style="padding:8px 16px; border:1px solid #e2e8f0; border-radius:8px; background:#fff; cursor:pointer; font-size:13px;">My quote was higher</button>\
    <button onclick="submitFeedback(\'low\')" style="padding:8px 16px; border:1px solid #e2e8f0; border-radius:8px; background:#fff; cursor:pointer; font-size:13px;">My quote was lower</button>\
  </div>\
</div>';

      // Email report
      var emailSubject = encodeURIComponent("My Garage Door Quote Analysis from TruePrice");
      var emailBody = encodeURIComponent(
        "Garage Door Quote Analysis\n" +
        "Service: " + r.serviceType.label + "\n" +
        (r.material ? "Material: " + (typeof r.material === "object" ? r.material.label : r.material) + "\n" : "") +
        (isUpload ? "Quote Price: " + fmt(r.quotePrice) + "\n" : "") +
        "Benchmark: " + fmt(r.benchmark) + "\n" +
        "Verdict: " + r.verdict.label + "\n" +
        "Region: " + capitalize(r.region) + "\n\n" +
        "Analyzed by TruePrice - https://truepricehq.com/garage-door-quote-analyzer.html"
      );

      appRoot.innerHTML = '\
        <div class="gd-hero">\
          <h1>' + (isUpload ? "Garage Door Quote Analysis" : "Your Garage Door Estimate") + '</h1>\
        </div>\
        <div class="gd-verdict ' + verdictCss + '">\
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;"><img src="/images/trudy-garage.png" alt="Trudy" width="48" /><div style="font-size:12px;font-weight:700;color:#1e3a5f;text-transform:uppercase;letter-spacing:0.04em;">TruePrice Garage Door Verdict</div></div><div class="verdict-label">' + r.verdict.label + '</div>\
          <div class="verdict-price">' + priceDisplay + '</div>\
          <div class="verdict-range">' + rangeText + '</div>\
        </div>\
        <div class="gd-card">\
          <h3 style="margin-bottom:0.75rem;">Project Details</h3>\
          ' + detailsHtml + '\
        </div>\
        ' + scopeHtml + '\
        ' + contextHtml + '\
        ' + tipsHtml + '\
        ' + safetyHtml + '\
        <div class="gd-actions">\
          <a class="gd-btn gd-btn-primary gd-btn-full" href="/find-contractors.html?service=garage-doors">Find Garage Door Contractors</a>\
          <a class="gd-btn gd-btn-secondary gd-btn-full" href="/garage-door-cost.html">Garage Door Cost Guide</a>\
          <a class="gd-btn gd-btn-secondary gd-btn-full" href="mailto:?subject=' + emailSubject + '&body=' + emailBody + '">Email Me This Report</a>\
          <button class="gd-btn gd-btn-secondary gd-btn-full" onclick="saveResultAsImage()">Save as Image</button>\
          <a class="gd-btn gd-btn-secondary gd-btn-full" href="/methodology.html" style="font-size:0.9rem;">How we calculate estimates</a>\
          <button class="gd-btn gd-btn-secondary gd-btn-full" id="btnStartOver">Start Over</button>\
        </div>\
        ' + feedbackHtml;

      document.getElementById("btnStartOver").addEventListener("click", function() {
        state = {
          step: "address",
          address: { street: "", city: "", stateCode: "", zip: "" },
          uploadedFile: null,
          extractedText: "",
          est: { serviceType: null, material: null, includesOpener: null },
          result: null
        };
        render();
      });
    }

    function capitalize(s) {
      return s ? s.charAt(0).toUpperCase() + s.slice(1) : "";
    }

    // ── Init ──
    render();

  })();
  </script>
<script src="/js/tp-analytics.min.js" async></script>
</body>
</html>
