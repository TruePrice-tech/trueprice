  <script>
  (function() {
    "use strict";

    // ── HVAC Pricing Model (embedded from hvac-pricing-model.json) ──
    var HVAC_PRICING = {
      basePriceBySystem: {
        central_ac: {
          label: "Central Air Conditioning",
          pricePerTon: { "14_seer": 2800, "16_seer": 3400, "18_seer": 4200, "20_seer": 5200 }
        },
        heat_pump: {
          label: "Heat Pump",
          pricePerTon: { "14_seer": 3200, "16_seer": 3900, "18_seer": 4800, "20_seer": 6000 }
        },
        furnace: {
          label: "Gas Furnace",
          priceByEfficiency: { "80_afue": 3200, "90_afue": 4000, "95_afue": 4800, "98_afue": 5800 }
        },
        mini_split: {
          label: "Ductless Mini-Split",
          pricePerZone: { single_zone: 3500, two_zone: 5800, three_zone: 8200, four_zone: 10500 }
        },
        full_system: {
          label: "Full HVAC System (AC + Furnace)",
          pricePerTon: { "14_seer_80_afue": 5500, "16_seer_90_afue": 7200, "18_seer_95_afue": 9500, "20_seer_98_afue": 12000 }
        }
      },
      laborMultiplierByRegion: { south: 1.00, southeast: 1.03, northeast: 1.18, midwest: 1.06, mountain: 1.10, west: 1.22 },
      overheadMultiplier: 1.15,
      roundTo: 50,
      homeSizes: [
        { label: "1000", tons: 1.5 }, { label: "1500", tons: 2.0 },
        { label: "2000", tons: 2.5 }, { label: "2500", tons: 3.0 },
        { label: "3000", tons: 3.5 }, { label: "3500", tons: 4.0 },
        { label: "4000", tons: 5.0 }
      ],
      scopeItems: [
        { key: "equipment", label: "Equipment (condenser + air handler)", weight: 20 },
        { key: "lineSet", label: "Refrigerant line set", weight: 12 },
        { key: "thermostat", label: "Thermostat", weight: 8 },
        { key: "ductwork", label: "Ductwork modification", weight: 10 },
        { key: "electrical", label: "Electrical disconnect/wiring", weight: 10 },
        { key: "pad", label: "Concrete/composite pad", weight: 4 },
        { key: "drainLine", label: "Drain line / condensate pump", weight: 6 },
        { key: "filterRack", label: "Filter rack / return", weight: 4 },
        { key: "permit", label: "Permits and inspections", weight: 6 },
        { key: "disposal", label: "Old equipment removal", weight: 4 },
        { key: "warranty", label: "Warranty (equipment + labor)", weight: 10 },
        { key: "loadCalc", label: "Manual J load calculation", weight: 8 }
      ],
      brands: {
        premium: ["Carrier", "Trane", "Lennox", "Daikin"],
        mid: ["Rheem", "Ruud", "York", "American Standard", "Amana"],
        value: ["Goodman", "Payne", "Heil", "Comfortmaker"]
      }
    };

    var STATE_REGIONS = {
      AL:"southeast",AK:"west",AZ:"west",AR:"south",CA:"west",CO:"mountain",CT:"northeast",
      DE:"northeast",FL:"southeast",GA:"southeast",HI:"west",ID:"mountain",IL:"midwest",
      IN:"midwest",IA:"midwest",KS:"midwest",KY:"southeast",LA:"south",ME:"northeast",
      MD:"northeast",MA:"northeast",MI:"midwest",MN:"midwest",MS:"south",MO:"midwest",
      MT:"mountain",NE:"midwest",NV:"west",NH:"northeast",NJ:"northeast",NM:"mountain",
      NY:"northeast",NC:"southeast",ND:"midwest",OH:"midwest",OK:"south",OR:"west",
      PA:"northeast",RI:"northeast",SC:"southeast",SD:"midwest",TN:"southeast",TX:"south",
      UT:"mountain",VT:"northeast",VA:"southeast",WA:"west",WV:"southeast",WI:"midwest",
      WY:"mountain",DC:"northeast"
    };

    var US_STATES = {
      "alabama":"AL","alaska":"AK","arizona":"AZ","arkansas":"AR","california":"CA",
      "colorado":"CO","connecticut":"CT","delaware":"DE","florida":"FL","georgia":"GA",
      "hawaii":"HI","idaho":"ID","illinois":"IL","indiana":"IN","iowa":"IA","kansas":"KS",
      "kentucky":"KY","louisiana":"LA","maine":"ME","maryland":"MD","massachusetts":"MA",
      "michigan":"MI","minnesota":"MN","mississippi":"MS","missouri":"MO","montana":"MT",
      "nebraska":"NE","nevada":"NV","new hampshire":"NH","new jersey":"NJ","new mexico":"NM",
      "new york":"NY","north carolina":"NC","north dakota":"ND","ohio":"OH","oklahoma":"OK",
      "oregon":"OR","pennsylvania":"PA","rhode island":"RI","south carolina":"SC",
      "south dakota":"SD","tennessee":"TN","texas":"TX","utah":"UT","vermont":"VT",
      "virginia":"VA","washington":"WA","west virginia":"WV","wisconsin":"WI","wyoming":"WY",
      "district of columbia":"DC"
    };

    // ── State ──
    var appRoot = document.getElementById("hvacApp");
    var state = {
      step: "address",        // address | uploading | estimator | result
      address: { street: "", city: "", stateCode: "", zip: "" },
      uploadedFile: null,
      extractedText: "",
      // estimator answers
      est: { systemType: null, efficiency: null, homeSqFt: "", ductwork: null, urgency: null },
      // result
      result: null
    };

    // ── Helpers ──
    function $(sel, el) { return (el || document).querySelector(sel); }
    function fmt(n) { return "$" + Number(n).toLocaleString("en-US", { maximumFractionDigits: 0 }); }
    function roundTo50(n) { return Math.round(n / 50) * 50; }

    function getRegionFromState(sc) {
      return STATE_REGIONS[(sc || "").toUpperCase()] || "south";
    }

    // City-level multiplier + inflation + seasonal
    var cityMultCache = {};
    function fetchCityMult(city, stateCode) {
      if (!city || !stateCode) return;
      var key = city + "|" + stateCode;
      if (cityMultCache[key]) return;
      fetch("/api/city-multiplier?city=" + encodeURIComponent(city) + "&state=" + encodeURIComponent(stateCode))
        .then(function(r) { return r.json(); })
        .then(function(d) { if (d && d.multiplier) cityMultCache[key] = d.multiplier; })
        .catch(function() {});
    }
    function getCityMult(city, stateCode) {
      var key = city + "|" + stateCode;
      return cityMultCache[key] || null;
    }
    // Inflation: 3% annual from 2025
    var _now = new Date();
    var INFLATION_MULT = Math.pow(1.03, Math.max(0, _now.getFullYear() - 2025 + _now.getMonth() / 12));
    // Seasonal: HVAC peaks in summer
    var SEASONAL_MULTS = { 1:0.94, 2:0.94, 3:0.96, 4:0.98, 5:1.04, 6:1.10, 7:1.12, 8:1.10, 9:1.04, 10:0.97, 11:0.93, 12:0.92 };
    var SEASONAL_MULT = SEASONAL_MULTS[_now.getMonth() + 1] || 1.0;

    function tonsFromSqFt(sqft) {
      var sizes = HVAC_PRICING.homeSizes;
      var n = Number(sqft) || 2000;
      for (var i = sizes.length - 1; i >= 0; i--) {
        if (n >= Number(sizes[i].label)) return sizes[i].tons;
      }
      return sizes[0].tons;
    }

    function seerToKey(seer) {
      var s = Number(seer) || 14;
      if (s >= 20) return "20_seer";
      if (s >= 18) return "18_seer";
      if (s >= 16) return "16_seer";
      return "14_seer";
    }

    function fullSystemEffKey(seer) {
      var s = Number(seer) || 14;
      if (s >= 20) return "20_seer_98_afue";
      if (s >= 18) return "18_seer_95_afue";
      if (s >= 16) return "16_seer_90_afue";
      return "14_seer_80_afue";
    }

    function afueToKey(afue) {
      var a = Number(afue) || 80;
      if (a >= 98) return "98_afue";
      if (a >= 95) return "95_afue";
      if (a >= 90) return "90_afue";
      return "80_afue";
    }

    function calcBenchmark(systemType, seer, tons, region, ductworkCond) {
      var sys = HVAC_PRICING.basePriceBySystem[systemType];
      if (!sys) sys = HVAC_PRICING.basePriceBySystem.central_ac;

      var basePrice = 0;
      if (systemType === "furnace") {
        var afueKey = afueToKey(seer); // for furnace, seer param holds AFUE
        basePrice = (sys.priceByEfficiency && sys.priceByEfficiency[afueKey]) || 3200;
        // furnace is flat price, no per-ton
      } else if (systemType === "mini_split") {
        // derive zones from tons
        var zones = Math.max(1, Math.round(tons));
        var zoneKey = zones >= 4 ? "four_zone" : zones === 3 ? "three_zone" : zones === 2 ? "two_zone" : "single_zone";
        basePrice = (sys.pricePerZone && sys.pricePerZone[zoneKey]) || 3500;
      } else if (systemType === "full_system") {
        var fKey = fullSystemEffKey(seer);
        basePrice = (sys.pricePerTon && sys.pricePerTon[fKey]) || 5500;
        basePrice = basePrice * tons;
      } else {
        // central_ac or heat_pump
        var sk = seerToKey(seer);
        basePrice = (sys.pricePerTon && sys.pricePerTon[sk]) || 2800;
        basePrice = basePrice * tons;
      }

      var cityMult = getCityMult(state.address.city, state.address.stateCode);
      var regionMult = cityMult || (HVAC_PRICING.laborMultiplierByRegion[region] || 1.0);
      var overheadMult = HVAC_PRICING.overheadMultiplier;

      var total = basePrice * regionMult * overheadMult * INFLATION_MULT * SEASONAL_MULT;

      // ductwork condition adjustment
      if (ductworkCond === "repair") total *= 1.12;
      else if (ductworkCond === "none") total *= 1.25;

      return roundTo50(total);
    }

    function verdictFromRatio(ratio) {
      if (ratio < 0.78) return { label: "Unusually Low", css: "low", emoji: "" };
      if (ratio <= 0.90) return { label: "Below Average", css: "low", emoji: "" };
      if (ratio <= 1.12) return { label: "Fair Price", css: "fair", emoji: "" };
      if (ratio <= 1.25) return { label: "Above Average", css: "high", emoji: "" };
      return { label: "Overpriced", css: "high", emoji: "" };
    }

    window.submitFeedback = function(response) {
      var fb = document.getElementById("estimateFeedback");
      if (!fb) return;
      fetch("/api/analytics", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ type: "event", event: "estimate_feedback", meta: { response: response, service: "hvac", verdict: state.result ? state.result.verdict.label : "" }, path: window.location.pathname })
      }).catch(function() {});
      fb.innerHTML = '<div style="font-size:14px; color:#166534; padding:8px 0;">Thanks for the feedback! This helps us improve our estimates.</div>';
    };

    window.saveResultAsImage = function() {
      if (typeof html2canvas === "undefined") {
        window.loadVendorLibs && window.loadVendorLibs().then(doCapture);
      } else { doCapture(); }
      function doCapture() {
        html2canvas(document.getElementById("hvacApp"), { scale: 2, useCORS: true, backgroundColor: "#ffffff" }).then(function(canvas) {
          var link = document.createElement("a");
          link.download = "trueprice-hvac-analysis.png";
          link.href = canvas.toDataURL("image/png");
          link.click();
        });
      }
    };

    // ── Render functions ──
    function render() {
      switch (state.step) {
        case "address": renderAddress(); break;
        case "uploading": renderUploading(); break;
        case "estimator": renderEstimator(); break;
        case "result": renderResult(); break;
      }
    }

    // ── Address / Upload Step ──
    function renderAddress() {

    async function processFile(file) {
      try {
        setProgress(15, "Loading parsing libraries...");
        await window.loadVendorLibs();

        var text = "";
        if (file.type === "application/pdf") {
          setProgress(30, "Extracting text from PDF...");
          text = await extractPdfText(file);
        } else {
          setProgress(30, "Running OCR on image...");
          text = await extractImageText(file);
        }

        setProgress(70, "Analyzing HVAC quote...");
        state.extractedText = text;

        // Use analyzer-parser.js for price extraction
        var parsed = null;
        try {
          if (typeof parseExtractedText === "function") {
            parsed = parseExtractedText(text);
          }
        } catch (parseErr) {
          console.warn("Parser error, falling back to regex:", parseErr);
        }

        // Fallback price extraction if parser fails or returns nothing
        if (!parsed || (!parsed.finalPrice && (!parsed.priceCandidates || !parsed.priceCandidates.length))) {
          var priceMatches = text.match(/\$[\d,]+(?:\.\d{2})?/g) || [];
          var prices = priceMatches.map(function(p) { return parseFloat(p.replace(/[$,]/g, "")); }).filter(function(v) { return v >= 1500 && v <= 80000; });
          if (prices.length) {
            prices.sort(function(a, b) { return b - a; });
            parsed = parsed || {};
            parsed.finalPrice = prices[0];
            parsed.priceCandidates = prices.map(function(v) { return { value: v, score: 50 }; });
          }
        }

        // Use HVAC parser for system-specific detection
        var systemType = (typeof detectHvacSystemType === "function") ? detectHvacSystemType(text) : { value: "central_ac", label: "Central Air Conditioning" };
        var seer = (typeof detectSeerRating === "function") ? detectSeerRating(text) : null;
        var tonnage = (typeof detectTonnage === "function") ? detectTonnage(text) : null;
        var afue = (typeof detectAfueRating === "function") ? detectAfueRating(text) : null;
        var brand = (typeof detectHvacBrand === "function") ? detectHvacBrand(text) : null;
        var scopeSignals = (typeof detectHvacScopeSignals === "function") ? detectHvacScopeSignals(text) : {};

        // Location detection from parser
        var location = (parsed && parsed.location) ? parsed.location : null;
        if (location && location.stateCode && !state.address.stateCode) {
          state.address.stateCode = location.stateCode;
          if (location.city) state.address.city = location.city;
        }
        fetchCityMult(state.address.city, state.address.stateCode);

        // Determine price
        var quotePrice = 0;
        if (parsed && parsed.finalPrice && parsed.finalPrice > 500) {
          quotePrice = parsed.finalPrice;
        } else if (parsed && parsed.priceCandidates && parsed.priceCandidates.length) {
          // pick highest-scored candidate in HVAC range
          var candidates = parsed.priceCandidates.filter(function(c) { return c.value >= 1500 && c.value <= 50000; });
          candidates.sort(function(a, b) { return b.score - a.score; });
          if (candidates.length) quotePrice = candidates[0].value;
        }

        setProgress(85, "Calculating verdict...");

        // Determine effective SEER / efficiency
        var effectiveSeer = seer || 14;
        var effectiveTons = tonnage || 3;
        var region = getRegionFromState(state.address.stateCode);

        var benchmark = calcBenchmark(systemType.value, effectiveSeer, effectiveTons, region, "good");

        var ratio = quotePrice > 0 ? quotePrice / benchmark : 1.0;
        var verdict = verdictFromRatio(ratio);

        // Brand tier adjustment context
        var brandNote = "";
        if (brand) {
          brandNote = brand.brand + " (" + brand.tier + " tier)";
        }

        setProgress(100, "Done!");

        state.result = {
          source: "upload",
          quotePrice: quotePrice,
          benchmark: benchmark,
          ratio: ratio,
          verdict: verdict,
          systemType: systemType,
          seer: seer,
          afue: afue,
          tonnage: tonnage,
          brand: brand,
          brandNote: brandNote,
          scopeSignals: scopeSignals,
          region: region,
          location: location,
          parsed: parsed
        };

        state.step = "result";
        setTimeout(render, 400);

      } catch (err) {
        console.error("HVAC analysis error:", err);
        appRoot.innerHTML = '\
          <div class="hvac-hero"><h1>We couldn\'t read that file</h1></div>\
          <div class="hvac-card" style="text-align:center;">\

            <p style="color:#475569;margin-bottom:20px;">You can enter the quote total manually:</p>\

            <div style="margin-top:14px;"><button class="hvac-btn hvac-btn-secondary" onclick="state.step=\'address\';render();">Start over</button></div>\
          </div>';
        document.getElementById("manualPriceBtn").addEventListener("click", function() {
          var price = parseFloat(document.getElementById("manualPrice").value);
          if (!price || price < 500) { alert("Please enter a valid price."); return; }
          var region = getRegionFromState(state.address.stateCode);

          var ratio = price / benchmark;
          state.result = {
            source: "manual",
            quotePrice: price,
            benchmark: benchmark,
            ratio: ratio,
            verdict: verdictFromRatio(ratio),
            systemType: { value: "central_ac", label: "Central Air Conditioning" },
            seer: null, afue: null, tonnage: null, brand: null, brandNote: "",
            scopeSignals: {}, region: region, location: null, parsed: null
          };
          state.step = "result";
          render();
        });
      }
    }

    async function extractPdfText(file) {
      var arrayBuffer = await file.arrayBuffer();
      var pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
      var allText = [];
      for (var i = 1; i <= pdf.numPages; i++) {
        var page = await pdf.getPage(i);
        var content = await page.getTextContent();
        var pageText = content.items.map(function(item) { return item.str; }).join(" ");
        allText.push(pageText);
      }
      return allText.join("\n");
    }

    async function preprocessImage(file, mode) {
      return new Promise(function(resolve, reject) {
        var reader = new FileReader();
        reader.onload = function() {
          var img = new Image();
          img.onload = function() {
            var canvas = document.createElement("canvas");
            var scale = Math.max(1.5, Math.min(2.5, 2400 / Math.max(img.width, img.height)));
            canvas.width = Math.round(img.width * scale);
            canvas.height = Math.round(img.height * scale);
            var ctx = canvas.getContext("2d");
            ctx.imageSmoothingEnabled = true;
            ctx.imageSmoothingQuality = "high";
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            var imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            var data = imageData.data;
            if (mode === "strong") {
              for (var i = 0; i < data.length; i += 4) {
                var gray = 0.299 * data[i] + 0.587 * data[i+1] + 0.114 * data[i+2];
                gray = (gray - 128) * 1.6 + 128;
                gray = gray > 170 ? 255 : gray < 85 ? 0 : gray;
                gray = Math.max(0, Math.min(255, gray));
                data[i] = gray; data[i+1] = gray; data[i+2] = gray;
              }
            } else {
              for (var i = 0; i < data.length; i += 4) {
                var gray = 0.299 * data[i] + 0.587 * data[i+1] + 0.114 * data[i+2];
                gray = (gray - 128) * 1.3 + 128;
                gray = Math.max(0, Math.min(255, gray));
                data[i] = gray; data[i+1] = gray; data[i+2] = gray;
              }
            }
            ctx.putImageData(imageData, 0, 0);
            resolve(canvas.toDataURL("image/png"));
          };
          img.onerror = reject;
          img.src = reader.result;
        };
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    async function extractImageText(file) {
      // Multi-pass: try soft preprocessing first, then strong if result is poor
      var softImage = await preprocessImage(file, "soft");
      var worker = await Tesseract.createWorker("eng");
      var result = await worker.recognize(softImage);
      var text = (result.data.text || "").trim();

      // If soft pass got very little text, try strong (better for dark/blurry images)
      if (text.length < 50) {
        var strongImage = await preprocessImage(file, "strong");
        var result2 = await worker.recognize(strongImage);
        var text2 = (result2.data.text || "").trim();
        if (text2.length > text.length) text = text2;
      }

      await worker.terminate();
      return text;
    }

    function getEstimatorStep() {
      var e = state.est;
      if (!e.systemType) return 1;
      if (!e.efficiency) return 2;
      if (!e.homeSqFt) return 3;
      if (!e.ductwork) return 4;
      if (!e.urgency) return 5;

    function bindOptions(containerId, field) {
      var container = document.getElementById(containerId);
      if (!container) return;
      container.addEventListener("click", function(e) {
        var opt = e.target.closest(".hvac-option");
        if (!opt) return;
        state.est[field] = opt.getAttribute("data-val");

        // Check if estimator is complete
        if (getEstimatorStep() > 5) {
          calculateEstimate();
        } else {
          render();
        }
      });
    }

    function calculateEstimate() {
      var est = state.est;
      var region = getRegionFromState(state.address.stateCode);
      var tons = tonsFromSqFt(est.homeSqFt);

      var effValue = est.efficiency;
      // For furnace, efficiency is already AFUE key; for others it's SEER number
      var seerNum = est.systemType === "furnace" ? 80 : Number(effValue) || 14;

      var benchmark = calcBenchmark(est.systemType, est.systemType === "furnace" ? effValue : seerNum, tons, region, est.ductwork);

      // Urgency adjustment
      var urgMult = est.urgency === "asap" ? 1.06 : est.urgency === "this_season" ? 1.02 : 1.0;
      benchmark = roundTo50(benchmark * urgMult);

      var low = roundTo50(benchmark * 0.88);
      var high = roundTo50(benchmark * 1.15);

      var sysLabel = HVAC_PRICING.basePriceBySystem[est.systemType] ? HVAC_PRICING.basePriceBySystem[est.systemType].label : est.systemType;

      state.result = {
        source: "estimator",
        quotePrice: benchmark,
        benchmark: benchmark,
        low: low,
        high: high,
        ratio: 1.0,
        verdict: { label: "Estimated Cost", css: "fair", emoji: "" },
        systemType: { value: est.systemType, label: sysLabel },
        seer: est.systemType === "furnace" ? null : Number(est.efficiency),
        afue: est.systemType === "furnace" ? Number(String(est.efficiency).replace("_afue","")) : null,
        tonnage: tons,
        brand: null,
        brandNote: "",
        scopeSignals: {},
        region: region,
        location: null,
        parsed: null,
        ductwork: est.ductwork,
        urgency: est.urgency,
        homeSqFt: est.homeSqFt
      };

      state.step = "result";
      render();
    }

    // ── Result Step ──
    function renderResult() {
      var r = state.result;
      if (!r) { state.step = "address"; render(); return; }

      var isUpload = r.source === "upload";
      var verdictCss = r.verdict.css;
      var priceDisplay = isUpload ? fmt(r.quotePrice) : fmt(r.benchmark);
      var rangeText = "";

      if (isUpload) {
        rangeText = "Market benchmark: " + fmt(r.benchmark);
        if (r.quotePrice > 0) {
          var pct = Math.round((r.ratio - 1) * 100);
          var dir = pct > 0 ? "above" : "below";
          rangeText += " &mdash; " + Math.abs(pct) + "% " + dir + " average";
        }
      } else {
        rangeText = "Expected range: " + fmt(r.low) + " &ndash; " + fmt(r.high);
      }

      // Build details
      var detailsHtml = '<div class="hvac-details">';
      detailsHtml += '<div class="hvac-detail"><div class="label">System Type</div><div class="value">' + r.systemType.label + '</div></div>';

      if (r.seer) {
        detailsHtml += '<div class="hvac-detail"><div class="label">SEER Rating</div><div class="value">' + r.seer + ' SEER</div></div>';
      }
      if (r.afue) {
        detailsHtml += '<div class="hvac-detail"><div class="label">AFUE Rating</div><div class="value">' + r.afue + '% AFUE</div></div>';
      }
      if (r.tonnage) {
        detailsHtml += '<div class="hvac-detail"><div class="label">System Size</div><div class="value">' + r.tonnage + ' Ton</div></div>';
      }
      if (r.brandNote) {
        detailsHtml += '<div class="hvac-detail"><div class="label">Brand</div><div class="value">' + r.brandNote + '</div></div>';
      }
      var pricingLabel = getCityMult(state.address.city, state.address.stateCode) ? (state.address.city + " local pricing") : (capitalize(r.region) + " regional pricing");
      detailsHtml += '<div class="hvac-detail"><div class="label">Pricing</div><div class="value">' + pricingLabel + '</div></div>';

      if (r.homeSqFt) {
        detailsHtml += '<div class="hvac-detail"><div class="label">Home Size</div><div class="value">' + Number(r.homeSqFt).toLocaleString() + ' sq ft</div></div>';
      }
      if (r.ductwork) {
        var ductLabels = { good: "Good condition", repair: "Needs repair", none: "No existing ducts" };
        detailsHtml += '<div class="hvac-detail"><div class="label">Ductwork</div><div class="value">' + (ductLabels[r.ductwork] || r.ductwork) + '</div></div>';
      }
      detailsHtml += '</div>';

      // Scope checklist (upload only)
      var scopeHtml = "";
      if (isUpload && r.scopeSignals && Object.keys(r.scopeSignals).length > 0) {
        scopeHtml = '<div class="hvac-card"><h3 style="margin-bottom:0.75rem;">Scope Review</h3><ul class="hvac-scope">';
        HVAC_PRICING.scopeItems.forEach(function(item) {
          var sig = r.scopeSignals[item.key];
          var status = sig ? sig.status : "unclear";
          var iconClass = status === "included" ? "scope-included" : status === "excluded" ? "scope-missing" : "scope-unclear";
          var iconChar = status === "included" ? "&#10003;" : status === "excluded" ? "&#10007;" : "?";
          var statusLabel = status === "included" ? "Included" : status === "excluded" ? "Not included" : "Not mentioned";
          scopeHtml += '<li><span class="scope-icon ' + iconClass + '">' + iconChar + '</span><span>' + item.label + '</span><span style="margin-left:auto;font-size:0.8rem;color:#94a3b8;">' + statusLabel + '</span></li>';
        });
        scopeHtml += '</ul>';
        // Missing cost estimate
        var hvacScopeCosts = { equipment: [500,2000], lineSet: [200,600], thermostat: [100,400], ductwork: [300,1500], electrical: [150,500], pad: [50,200], drainLine: [75,250], filterRack: [50,200], permit: [100,400], disposal: [75,300], warranty: [0,0], loadCalc: [200,500] };
        var missingItems = HVAC_PRICING.scopeItems.filter(function(item) { var sig = r.scopeSignals[item.key]; return !sig || sig.status !== "included"; });
        if (missingItems.length > 0) {
          var mLow = 0, mHigh = 0;
          missingItems.forEach(function(item) { var c = hvacScopeCosts[item.key]; if (c) { mLow += c[0]; mHigh += c[1]; } });
          if (mLow > 0) {
            scopeHtml += '<div style="font-size:14px;padding:10px 14px;background:#fef2f2;border:1px solid #fecaca;border-radius:10px;margin-top:12px;color:#991b1b;"><strong>' + missingItems.length + ' missing item' + (missingItems.length !== 1 ? 's' : '') + '</strong> could add <strong>$' + mLow.toLocaleString() + ' to $' + mHigh.toLocaleString() + '</strong> in change orders if not included.</div>';
          }
        }
        scopeHtml += '</div>';
      }

      // Estimator scope info
      if (!isUpload) {
        scopeHtml = '<div class="hvac-card"><h3 style="margin-bottom:0.75rem;">What This Estimate Includes</h3><ul class="hvac-scope">';
        var typicalItems = ["equipment", "lineSet", "thermostat", "electrical", "pad", "drainLine", "permit", "disposal", "warranty"];
        typicalItems.forEach(function(key) {
          var item = HVAC_PRICING.scopeItems.find(function(s) { return s.key === key; });
          if (item) {
            scopeHtml += '<li><span class="scope-icon scope-included">&#10003;</span><span>' + item.label + '</span></li>';
          }
        });
        scopeHtml += '</ul><p style="font-size:0.85rem;color:#64748b;margin-top:0.75rem;">Estimate assumes standard installation. Ductwork, electrical upgrades, or structural modifications may add cost.</p></div>';
      }

      // Market context
      var contextHtml = '';
      if (isUpload && r.quotePrice > 0) {
        var tip = "";
        if (r.verdict.css === "high") {
          tip = "This quote is higher than typical market rates. Consider getting 2-3 additional quotes to compare.";
        } else if (r.verdict.css === "low") {
          tip = "This quote is lower than expected. Verify the scope includes all necessary items like permits, warranty, and proper equipment sizing.";
        } else {
          tip = "This quote appears to be within the typical market range for your area and system specifications.";
        }
        contextHtml = '<div class="hvac-card"><h3 style="margin-bottom:0.5rem;">Market Context</h3><p style="color:#475569;font-size:0.95rem;">' + tip + '</p></div>';
      }

      // Next Steps tips
      var tipsHtml = '<div class="hvac-card"><h3 style="margin-bottom:0.75rem;">Next Steps</h3><ul style="padding-left:18px;color:#475569;font-size:0.95rem;line-height:1.8;">';
      tipsHtml += '<li>Ask for a Manual J load calculation to verify proper system sizing</li>';
      tipsHtml += '<li>Confirm warranty covers both parts AND labor (many only cover parts)</li>';
      tipsHtml += '<li>Ask if the quote includes a new thermostat and if it\'s smart/programmable</li>';
      tipsHtml += '<li>Check if permits and inspections are included in the price</li>';
      if (r.verdict.css === "high") {
        tipsHtml += '<li>Get 2-3 additional quotes from local contractors, not just national chains</li>';
        tipsHtml += '<li>Ask about rebates: many utilities offer $300-1,500 for high-efficiency upgrades</li>';
      }
      if (r.verdict.css === "low") {
        tipsHtml += '<li>Verify the brand and model are specified, not just "equivalent"</li>';
        tipsHtml += '<li>Confirm labor warranty duration (industry standard is 1-2 years minimum)</li>';
      }
      tipsHtml += '</ul></div>';

      // Rebate/savings tips
      var rebateHtml = '<div class="hvac-card" style="background:#eff6ff;border:1px solid #bfdbfe;">';
      rebateHtml += '<h3 style="margin-bottom:0.5rem;color:#1d4ed8;">Potential Savings</h3>';
      rebateHtml += '<ul style="padding-left:18px;color:#475569;font-size:0.95rem;line-height:1.8;">';
      rebateHtml += '<li>Federal tax credit: up to $2,000 for qualifying heat pumps (25C credit)</li>';
      rebateHtml += '<li>Utility rebates: check with your local utility for efficiency upgrade incentives</li>';
      rebateHtml += '<li>Off-season scheduling: HVAC installs in spring or fall can be 5-10% cheaper</li>';
      rebateHtml += '</ul></div>';

      // Feedback prompt
      var feedbackHtml = '\
<div id="estimateFeedback" style="margin-top:1.5rem; padding:16px; background:#f8fafc; border:1px solid #e2e8f0; border-radius:10px; text-align:center;">\
  <div style="font-size:14px; color:#475569; margin-bottom:10px;">Was this estimate close to your actual quote?</div>\
  <div style="display:flex; gap:8px; justify-content:center; flex-wrap:wrap;">\
    <button onclick="submitFeedback(\'accurate\')" style="padding:8px 16px; border:1px solid #e2e8f0; border-radius:8px; background:#fff; cursor:pointer; font-size:13px;">Yes, accurate</button>\
    <button onclick="submitFeedback(\'high\')" style="padding:8px 16px; border:1px solid #e2e8f0; border-radius:8px; background:#fff; cursor:pointer; font-size:13px;">My quote was higher</button>\
    <button onclick="submitFeedback(\'low\')" style="padding:8px 16px; border:1px solid #e2e8f0; border-radius:8px; background:#fff; cursor:pointer; font-size:13px;">My quote was lower</button>\
  </div>\
</div>';

      // Email report
      var emailSubject = encodeURIComponent("My HVAC Quote Analysis from TruePrice");
      var emailBody = encodeURIComponent(
        "HVAC Quote Analysis\n" +
        "System: " + r.systemType.label + "\n" +
        (r.seer ? "SEER: " + r.seer + "\n" : "") +
        (r.tonnage ? "Size: " + r.tonnage + " ton\n" : "") +
        (r.brandNote ? "Brand: " + r.brandNote + "\n" : "") +
        (isUpload ? "Quote Price: " + fmt(r.quotePrice) + "\n" : "") +
        "Benchmark: " + fmt(r.benchmark) + "\n" +
        "Verdict: " + r.verdict.label + "\n" +
        "Region: " + capitalize(r.region) + "\n\n" +
        "Analyzed by TruePrice - https://truepricehq.com/hvac-quote-analyzer.html"
      );

      appRoot.innerHTML = '\
        <div class="hvac-hero">\
          <h1>' + (isUpload ? "HVAC Quote Analysis" : "Your HVAC Estimate") + '</h1>\
        </div>\
        <div class="hvac-verdict ' + verdictCss + '">\
          <div class="verdict-label">' + r.verdict.label + '</div>\
          <div class="verdict-price">' + priceDisplay + '</div>\
          <div class="verdict-range">' + rangeText + '</div>\
        </div>\
        <div class="hvac-card">\
          <h3 style="margin-bottom:0.75rem;">System Details</h3>\
          ' + detailsHtml + '\
        </div>\
        ' + scopeHtml + '\
        ' + contextHtml + '\
        ' + tipsHtml + '\
        ' + rebateHtml + '\
        <div class="hvac-actions">\
          <a class="hvac-btn hvac-btn-primary hvac-btn-full" href="/find-contractors.html?service=hvac">Find HVAC Contractors</a>\
          <a class="hvac-btn hvac-btn-secondary hvac-btn-full" href="mailto:?subject=' + emailSubject + '&body=' + emailBody + '">Email Me This Report</a>\
          <button class="hvac-btn hvac-btn-secondary hvac-btn-full" onclick="saveResultAsImage()">Save as Image</button>\
          <a class="hvac-btn hvac-btn-secondary hvac-btn-full" href="/methodology.html" style="font-size:0.9rem;">How we calculate estimates</a>\
          <button class="hvac-btn hvac-btn-secondary hvac-btn-full" id="btnStartOver">Start Over</button>\
        </div>\
        ' + feedbackHtml;

      document.getElementById("btnStartOver").addEventListener("click", function() {
        state = {
          step: "address",
          address: { street: "", city: "", stateCode: "", zip: "" },
          uploadedFile: null,
          extractedText: "",
          est: { systemType: null, efficiency: null, homeSqFt: "", ductwork: null, urgency: null },
          result: null
        };
        render();
      });
    }

    function capitalize(s) {
      return s ? s.charAt(0).toUpperCase() + s.slice(1) : "";
    }

    // ── Init ──
    render();

  })();
  </script>
<script src="/js/tp-analytics.min.js" async></script>
</body>
</html>
