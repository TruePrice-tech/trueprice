<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 120">
  <!-- Woogoro Combo Logo - Fox Icon + Wordmark (Light) -->
  <rect width="500" height="120" fill="white"/>

  <!-- Fox icon (small) -->
  <g transform="translate(50, 60) scale(0.45)">
    <!-- Left ear -->
    <polygon points="-55,-15 -45,-80 -20,-30" fill="#f4a460"/>
    <polygon points="-48,-25 -43,-65 -27,-35" fill="#ffd4a8"/>
    <!-- Right ear -->
    <polygon points="55,-15 45,-80 20,-30" fill="#f4a460"/>
    <polygon points="48,-25 43,-65 27,-35" fill="#ffd4a8"/>
    <!-- Head -->
    <ellipse cx="0" cy="5" rx="52" ry="48" fill="#f4a460"/>
    <ellipse cx="0" cy="15" rx="38" ry="35" fill="#fdebd0"/>
    <!-- Eyes -->
    <ellipse cx="-18" cy="-2" rx="7" ry="8" fill="#1a1a2e"/>
    <ellipse cx="-16" cy="-4" rx="2.5" ry="3" fill="white"/>
    <ellipse cx="18" cy="-2" rx="7" ry="8" fill="#1a1a2e"/>
    <ellipse cx="20" cy="-4" rx="2.5" ry="3" fill="white"/>
    <!-- Nose -->
    <ellipse cx="0" cy="12" rx="4.5" ry="3" fill="#1a1a2e"/>
    <!-- Mouth -->
    <path d="M-4,16 Q0,21 4,16" fill="none" stroke="#1a1a2e" stroke-width="1.5"/>
    <!-- Bow -->
    <g transform="translate(40, -45)">
      <path d="M0,0 Q-8,-6 -4,-12 Q0,-8 0,0" fill="#1d4ed8"/>
      <path d="M0,0 Q8,-6 4,-12 Q0,-8 0,0" fill="#1d4ed8"/>
      <path d="M0,0 Q-8,6 -4,12 Q0,8 0,0" fill="#1d4ed8"/>
      <path d="M0,0 Q8,6 4,12 Q0,8 0,0" fill="#1d4ed8"/>
      <circle cx="0" cy="0" r="2.5" fill="#3b82f6"/>
    </g>
  </g>

  <!-- Wordmark -->
  <text x="110" y="72" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-weight="800" font-size="48" fill="#0f172a" letter-spacing="-1.5">
    W<tspan fill="#1d4ed8">oo</tspan>goro
  </text>

  <!-- Tagline -->
  <text x="112" y="92" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-weight="400" font-size="14" fill="#64748b" letter-spacing="3">
    KNOW WHAT IT REALLY COSTS
  </text>
</svg>