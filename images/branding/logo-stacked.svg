<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <!-- Woogoro Stacked Logo - Fox on top, wordmark below -->
  <rect width="300" height="300" fill="#0f172a"/>

  <!-- Fox icon (centered, larger) -->
  <g transform="translate(150, 120) scale(0.7)">
    <!-- Left ear -->
    <polygon points="-55,-15 -45,-80 -20,-30" fill="#f4a460" stroke="#e8944a" stroke-width="1.5"/>
    <polygon points="-48,-25 -43,-65 -27,-35" fill="#ffd4a8"/>
    <!-- Right ear -->
    <polygon points="55,-15 45,-80 20,-30" fill="#f4a460" stroke="#e8944a" stroke-width="1.5"/>
    <polygon points="48,-25 43,-65 27,-35" fill="#ffd4a8"/>
    <!-- Head -->
    <ellipse cx="0" cy="5" rx="52" ry="48" fill="#f4a460"/>
    <ellipse cx="0" cy="15" rx="38" ry="35" fill="#fdebd0"/>
    <!-- Eyes -->
    <ellipse cx="-18" cy="-2" rx="8" ry="9" fill="#1a1a2e"/>
    <ellipse cx="-15.5" cy="-4.5" rx="3" ry="3.5" fill="white"/>
    <ellipse cx="18" cy="-2" rx="8" ry="9" fill="#1a1a2e"/>
    <ellipse cx="20.5" cy="-4.5" rx="3" ry="3.5" fill="white"/>
    <!-- Nose -->
    <ellipse cx="0" cy="12" rx="5" ry="3.5" fill="#1a1a2e"/>
    <!-- Mouth -->
    <path d="M-5,16 Q0,22 5,16" fill="none" stroke="#1a1a2e" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Bow -->
    <g transform="translate(42, -48)">
      <path d="M0,0 Q-10,-8 -5,-15 Q0,-10 0,0" fill="#3b82f6"/>
      <path d="M0,0 Q10,-8 5,-15 Q0,-10 0,0" fill="#3b82f6"/>
      <path d="M0,0 Q-10,8 -5,15 Q0,10 0,0" fill="#3b82f6"/>
      <path d="M0,0 Q10,8 5,15 Q0,10 0,0" fill="#3b82f6"/>
      <circle cx="0" cy="0" r="3" fill="#60a5fa"/>
    </g>
  </g>

  <!-- Wordmark -->
  <text x="150" y="240" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-weight="800" font-size="48" fill="white" letter-spacing="-1.5">
    W<tspan fill="#60a5fa">oo</tspan>goro
  </text>

  <!-- Tagline -->
  <text x="150" y="265" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-weight="400" font-size="12" fill="#94a3b8" letter-spacing="4">
    KNOW WHAT IT REALLY COSTS
  </text>
</svg>