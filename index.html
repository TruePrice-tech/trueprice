<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TruePrice | Roofing Quote Calculator</title>
<meta name="description" content="Estimate a fair roofing price and compare contractor quotes with the TruePrice roofing estimator.">

<link rel="canonical" href="https://trueprice-tech.github.io/trueprice/">

<meta property="og:title" content="TruePrice Roofing Calculator">
<meta property="og:description" content="Estimate fair roofing costs and compare contractor quotes.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://trueprice-tech.github.io/trueprice/">

<style>

body{
font-family:Arial,Helvetica,sans-serif;
margin:0;
background:#f5f7fa;
color:#222;
}

.container{
max-width:900px;
margin:auto;
padding:30px;
}

h1,h2{
margin-top:0;
}

.card{
background:white;
padding:25px;
border-radius:8px;
margin-bottom:30px;
box-shadow:0 2px 6px rgba(0,0,0,0.08);
}

label{
display:block;
margin-top:15px;
font-weight:bold;
}

input,select{
width:100%;
padding:10px;
margin-top:6px;
border:1px solid #ccc;
border-radius:4px;
}

button{
margin-top:20px;
padding:12px 18px;
border:none;
border-radius:6px;
cursor:pointer;
font-size:15px;
}

.btn-primary{
background:#2b6df6;
color:white;
}

.btn-secondary{
background:#555;
color:white;
}

.result{
font-size:22px;
font-weight:bold;
margin-top:15px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

th,td{
border:1px solid #ddd;
padding:8px;
text-align:left;
}

th{
background:#f1f1f1;
}

@media(max-width:600px){

.container{
padding:15px;
}

}

</style>
</head>

<body>

<div class="container">

<h1>TruePrice Roofing Calculator</h1>
<p>Estimate a fair roofing price and compare contractor quotes.</p>


<div class="card">

<h2>Roof Price Estimator</h2>

<label>Roof Size (sq ft)</label>
<input id="roofSize">

<label>Material</label>
<select id="material">
<option value="500">Architectural Shingles</option>
<option value="400">3-Tab Shingles</option>
<option value="900">Metal Roofing</option>
<option value="1200">Tile Roofing</option>
</select>

<label>Pitch</label>
<select id="pitch">
<option value="1">Low</option>
<option value="1.1">Medium</option>
<option value="1.2">Steep</option>
</select>

<label>Number of Stories</label>
<select id="stories">
<option value="1">1</option>
<option value="1.1">2</option>
<option value="1.2">3</option>
</select>

<label>Complexity</label>
<select id="complexity">
<option value="1">Standard</option>
<option value="1.1">Moderate</option>
<option value="1.2">Complex</option>
</select>

<label>Contractor Quote (optional)</label>
<input id="quotePrice">

<button class="btn-primary" id="estimateBtn">Estimate Fair Price</button>

<div class="result" id="result"></div>

<button class="btn-secondary" id="downloadReportBtn">Download TruePrice Report</button>

</div>


<div class="card">

<h2>Compare Roofing Quotes</h2>

<table>
<thead>
<tr>
<th>Contractor</th>
<th>Price</th>
<th>Roof Size</th>
<th>Price / Square</th>
</tr>
</thead>

<tbody id="comparisonTable">
<tr>
<td><input class="contractor"></td>
<td><input class="price"></td>
<td><input class="size"></td>
<td class="pps"></td>
</tr>

<tr>
<td><input class="contractor"></td>
<td><input class="price"></td>
<td><input class="size"></td>
<td class="pps"></td>
</tr>

<tr>
<td><input class="contractor"></td>
<td><input class="price"></td>
<td><input class="size"></td>
<td class="pps"></td>
</tr>

<tr>
<td><input class="contractor"></td>
<td><input class="price"></td>
<td><input class="size"></td>
<td class="pps"></td>
</tr>

</tbody>

</table>

<button class="btn-primary" id="compareBtn">Compare Quotes</button>

</div>


</div>


<script>

let latestReportData = {}

function currency(v){
return "$"+Number(v).toLocaleString()
}

document.getElementById("estimateBtn").addEventListener("click",function(){

let roofSize=parseFloat(document.getElementById("roofSize").value)
let material=parseFloat(document.getElementById("material").value)
let pitch=parseFloat(document.getElementById("pitch").value)
let stories=parseFloat(document.getElementById("stories").value)
let complexity=parseFloat(document.getElementById("complexity").value)

if(!roofSize){
alert("Enter roof size")
return
}

let pricePerSq=material*pitch*stories*complexity

let squares=roofSize/100

let low=pricePerSq*squares*0.9
let high=pricePerSq*squares*1.1

document.getElementById("result").innerText=
"Estimated fair range: "+currency(low)+" – "+currency(high)

let quote=document.getElementById("quotePrice").value

let status="No quote entered"

if(quote){

quote=parseFloat(quote)

if(quote<low) status="Quote is LOW"
else if(quote>high) status="Quote is HIGH"
else status="Quote is FAIR"

}

latestReportData={
roofSize,
material,
low,
high,
quote,
status
}

})


document.getElementById("compareBtn").addEventListener("click",function(){

let rows=document.querySelectorAll("#comparisonTable tr")

rows.forEach(r=>{

let price=r.querySelector(".price").value
let size=r.querySelector(".size").value
let cell=r.querySelector(".pps")

if(price && size){

let pps=price/(size/100)

cell.innerText=currency(Math.round(pps))

}

})

})


document.getElementById("downloadReportBtn").addEventListener("click",function(){

if(!latestReportData.low){

alert("Run estimate first")
return

}

let report=`

TRUEPRICE ROOF REPORT

Roof Size
${latestReportData.roofSize}

Fair Price Range
${currency(latestReportData.low)} – ${currency(latestReportData.high)}

Contractor Quote
${latestReportData.quote || "Not entered"}

Status
${latestReportData.status}

Generated by
https://trueprice-tech.github.io/trueprice/

`

let blob=new Blob([report],{type:"text/plain"})

let link=document.createElement("a")
link.href=URL.createObjectURL(blob)
link.download="trueprice-report.txt"
link.click()

})


</script>


<script type="application/ld+json">

{
"@context":"https://schema.org",
"@type":"WebApplication",
"name":"TruePrice Roofing Calculator",
"url":"https://trueprice-tech.github.io/trueprice/",
"applicationCategory":"FinanceApplication",
"operatingSystem":"Any",
"description":"Estimate fair roofing costs and compare contractor quotes."
}

</script>


</body>
</html>
