<details class="faq-item">
<summary>How long does a roof replacement take?</summary>
<div class="faq-answer">
<p>Most residential roofs take 1-3 days to replace. Complex roofs with multiple layers, steep pitch, or extensive damage can take 4-7 days.</p>
</div>
</details>

<details class="faq-item">
<summary>What is the most affordable roofing option?</summary>
<div class="faq-answer">
<p>Three-tab asphalt shingles are the most affordable at $3-5 per square foot installed. Architectural shingles cost $4-7/sqft but last 10-15 years longer, making them a better value over time.</p>
</div>
</details>

<details class="faq-item">
<summary>How much does a new roof cost in Lakeview?</summary>

</details>
