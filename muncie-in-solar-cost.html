<p><strong>Permits, codes, and licensing.</strong> The City of Muncie requires building permits for roof replacements, with inspections typically required before and after the work Architectural shingles rated for cold climates with strong freeze-thaw resistance are recommended in Muncie, with ice and water shield at all eaves and valleys</p>
