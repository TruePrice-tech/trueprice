  <script>
  (function() {
    "use strict";

    var STATE_REGIONS = {
      AL:"southeast",AK:"west",AZ:"west",AR:"south",CA:"west",CO:"mountain",CT:"northeast",
      DE:"northeast",FL:"southeast",GA:"southeast",HI:"west",ID:"mountain",IL:"midwest",
      IN:"midwest",IA:"midwest",KS:"midwest",KY:"southeast",LA:"south",ME:"northeast",
      MD:"northeast",MA:"northeast",MI:"midwest",MN:"midwest",MS:"south",MO:"midwest",
      MT:"mountain",NE:"midwest",NV:"west",NH:"northeast",NJ:"northeast",NM:"mountain",
      NY:"northeast",NC:"southeast",ND:"midwest",OH:"midwest",OK:"south",OR:"west",
      PA:"northeast",RI:"northeast",SC:"southeast",SD:"midwest",TN:"southeast",TX:"south",
      UT:"mountain",VT:"northeast",VA:"southeast",WA:"west",WV:"southeast",WI:"midwest",
      WY:"mountain",DC:"northeast"
    };

    var BASE_PRICE_PER_SQUARE = {
      asphalt: 425, architectural: 525, metal: 1150, tile: 1200, cedar: 900, flat: 550, slate: 2800, concrete: 775, unknown: 525
    };
    var WASTE_FACTOR = 1.0;
    var OVERHEAD_MULT = 1.0;
    var LABOR_MULT_BY_REGION = { south: 1.00, southeast: 1.03, northeast: 1.15, midwest: 1.06, mountain: 1.08, west: 1.18 };

    // Inflation + seasonal
    var now = new Date();
    var INFLATION_MULT = Math.pow(1.03, Math.max(0, now.getFullYear() - 2025 + now.getMonth() / 12));
    var SEASONAL_MULTS = { 1:0.92, 2:0.93, 3:0.96, 4:0.99, 5:1.04, 6:1.08, 7:1.10, 8:1.10, 9:1.06, 10:1.00, 11:0.94, 12:0.90 };
    var SEASONAL_MULT = SEASONAL_MULTS[now.getMonth() + 1] || 1.0;

    var app = document.getElementById("peApp");
    var urlService = new URLSearchParams(window.location.search).get("service") || "roofing";
    if (!["roofing", "hvac", "solar"].includes(urlService)) urlService = "roofing";
    var state = {
      step: "capture",
      service: urlService,
      imageData: null,
      imagePreview: null,
      city: "",
      stateCode: "",
      address: "",
      zip: "",
      lat: null,
      lng: null,
      browserLat: null,
      browserLng: null,
      locationStatus: "pending", // pending | granted | denied | unavailable
      result: null,
      cityMult: null,
      confirmed: null
    };

    // Request browser geolocation on load (fallback if EXIF GPS missing)
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(
        function(pos) {
          state.browserLat = pos.coords.latitude;
          state.browserLng = pos.coords.longitude;
          state.locationStatus = "granted";
          // Remove banner if it exists
          var banner = document.getElementById("locationBanner");
          if (banner) banner.remove();
        },
        function(err) {
          state.locationStatus = err.code === 1 ? "denied" : "unavailable";
          // Show banner on capture step
          if (state.step === "capture") showLocationBanner();
        },
        { timeout: 5000, maximumAge: 300000 }
      );
    } else {
      state.locationStatus = "unavailable";
    }

    function showLocationBanner() {
      if (document.getElementById("locationBanner")) return;
      var banner = document.createElement("div");
      banner.id = "locationBanner";
      banner.style.cssText = "background:#fef3c7; border:1px solid #f59e0b; border-radius:10px; padding:12px 16px; margin-bottom:16px; font-size:14px; color:#92400e; text-align:center; line-height:1.5;";
      banner.innerHTML = '<strong>Location services are off.</strong> Enable them for accurate roof sizing from your photo.' +
        '<br><a href="#" id="retryLocationBtn" style="color:#1d4ed8; font-weight:600; text-decoration:none;">Try enabling now</a>';
      var app = document.getElementById("peApp");
      if (app && app.firstChild) app.insertBefore(banner, app.firstChild);
      var retryBtn = document.getElementById("retryLocationBtn");
      if (retryBtn) {
        retryBtn.addEventListener("click", function(e) {
          e.preventDefault();
          navigator.geolocation.getCurrentPosition(
            function(pos) {
              state.browserLat = pos.coords.latitude;
              state.browserLng = pos.coords.longitude;
              state.locationStatus = "granted";
              banner.remove();
            },
            function() {
              banner.innerHTML = '<strong>Location still unavailable.</strong> On iPhone: Settings > Privacy > Location Services > Safari. On Android: Settings > Location > App permissions > Browser.';
            },
            { timeout: 5000 }
          );
        });
      }
    }

    function fmt(n) { return "$" + Math.round(n).toLocaleString("en-US"); }
    function roundTo(n, r) { return Math.round(n / r) * r; }
    function esc(s) { var d = document.createElement("div"); d.textContent = s; return d.innerHTML; }

    function render() {
      if (state.step === "capture") renderCapture();
      else if (state.step === "analyzing") renderAnalyzing();
      else if (state.step === "confirm") renderConfirm();
      else if (state.step === "result") renderResult();
    }

    /* ── STEP 1: CAPTURE ── */
    function renderCapture() {
      var isMobile = /Mobi|Android|iPhone/i.test(navigator.userAgent);
      var photoLabels = {
        roofing: { title: "Take a photo of your house", desc: "We'll estimate your roof size, material, and replacement price", addressLink: "/roofing-quote-analyzer.html?mode=estimator" },
        hvac: { title: "Take a photo of your AC unit", desc: "We'll detect the brand, system type, and estimate replacement price", addressLink: null },
        solar: { title: "Take a photo of your house", desc: "We'll assess your roof for solar potential and estimate installation price", addressLink: "/solar-quote-analyzer.html?mode=estimator" },
        general: { title: "Take a photo of your home", desc: "We'll identify the project and estimate cost", addressLink: null }
      };
      var labels = photoLabels[state.service] || photoLabels.general;

      var serviceSelector =
        '<div style="display:flex; justify-content:center; gap:8px; margin-bottom:20px;">' +
          '<button type="button" class="pe-service-option' + (state.service === "roofing" ? " selected" : "") + '" onclick="switchService(\'roofing\')">Roofing</button>' +
          '<button type="button" class="pe-service-option' + (state.service === "hvac" ? " selected" : "") + '" onclick="switchService(\'hvac\')">HVAC</button>' +
          '<button type="button" class="pe-service-option' + (state.service === "solar" ? " selected" : "") + '" onclick="switchService(\'solar\')">Solar</button>' +
        '</div>';

      app.innerHTML =
        '<div style="text-align:center; margin-bottom:28px;">' +
          '<img src="/images/trudy-thumbsup.png" alt="Trudy" width="200" style="margin-bottom:10px;" />' +
          '<h1 style="font-size:26px; margin:0 0 8px; color:#0f172a;">' + labels.title + '</h1>' +
          '<p style="font-size:15px; color:#64748b; margin:0; max-width:380px; margin-left:auto; margin-right:auto; line-height:1.5;">' + labels.desc + '</p>' +
        '</div>' +
        serviceSelector +

        '<div class="pe-capture-zone" id="captureZone" style="padding:3rem 1.5rem; transition:border-color 0.2s, background 0.2s, transform 0.15s;" onmouseover="this.style.borderColor=\'#3b82f6\';this.style.background=\'#eff6ff\';this.style.transform=\'translateY(-2px)\'" onmouseout="this.style.borderColor=\'#cbd5e1\';this.style.background=\'#f8fafc\';this.style.transform=\'none\'">' +
          '<div style="font-size:48px; margin-bottom:12px;">&#128247;</div>' +
          '<p style="font-size:18px; font-weight:600; color:#1e293b; margin:0 0 6px;">' + (isMobile ? "Tap to take a photo" : "Click to upload a photo") + '</p>' +
          '<p style="font-size:14px; color:#94a3b8; margin:0 0 12px;">' + (isMobile ? "Camera or photo library" : "Drag and drop or click to browse") + '</p>' +
          '<div style="font-size:11px; color:#94a3b8; padding-top:12px; border-top:1px solid #e2e8f0;">Your photo is analyzed by AI and never stored</div>' +
        '</div>' +
        '<input type="file" id="photoInput" accept="image/*" style="display:none;" />' +

        (labels.addressLink
          ? '<div style="text-align:center; margin-top:16px;"><a href="' + labels.addressLink + '" style="font-size:14px; color:#64748b; text-decoration:none; padding:8px 16px; border:1px solid #e2e8f0; border-radius:8px; display:inline-block;">or enter your address manually &rarr;</a></div>'
          : '') +

        '<div style="text-align:center; margin-top:12px;"><a href="/analyze-quote.html#' + esc(state.service) + '" style="font-size:13px; color:#94a3b8; text-decoration:none;">&larr; Back</a></div>';

      // Bind events
      var zone = document.getElementById("captureZone");
      var input = document.getElementById("photoInput");

      zone.addEventListener("click", function() { input.click(); });
      zone.addEventListener("dragover", function(e) { e.preventDefault(); zone.style.borderColor = "#1d4ed8"; zone.style.background = "#dbeafe"; });
      zone.addEventListener("dragleave", function() { zone.style.borderColor = "#cbd5e1"; zone.style.background = "#f8fafc"; });
      zone.addEventListener("drop", function(e) {
        e.preventDefault(); zone.style.borderColor = "#cbd5e1"; zone.style.background = "#f8fafc";
        var file = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
        if (file && file.type.startsWith("image/")) { var dt = new DataTransfer(); dt.items.add(file); input.files = dt.files; input.dispatchEvent(new Event("change")); }
      });
      input.addEventListener("change", function() {
        var file = input.files && input.files[0];
        if (!file) return;
        var reader = new FileReader();
        reader.onload = function(e) {
          var dataUrl = e.target.result;
          state.originalBase64 = dataUrl;
          var img = new Image();
          img.onload = function() {
            try {
              var maxDim = 1024;
              var w = img.width;
              var h = img.height;
              if (w > maxDim || h > maxDim) {
                if (w > h) { h = Math.round(h * maxDim / w); w = maxDim; }
                else { w = Math.round(w * maxDim / h); h = maxDim; }
              }
              var canvas = document.createElement("canvas");
              canvas.width = w;
              canvas.height = h;
              var ctx = canvas.getContext("2d");
              ctx.drawImage(img, 0, 0, w, h);
              var resized = canvas.toDataURL("image/jpeg", 0.85);
              state.imageData = resized;
              state.imagePreview = resized;
            } catch(err) {
              state.imageData = dataUrl;
              state.imagePreview = dataUrl;
            }
            startAnalysis();
          };
          img.onerror = function() {
            state.imageData = dataUrl;
            state.imagePreview = dataUrl;
            startAnalysis();
          };
          img.src = dataUrl;
        };
        reader.readAsDataURL(file);
      });
    }

    /* ── STEP 2: ANALYZING ── */
    function renderAnalyzing() {
      app.innerHTML =
        '<div class="pe-hero">' +
          '<img src="/images/trudy-working.png" alt="Trudy" width="200" style="margin-bottom:12px;" />' +
          '<h1>Trudy is analyzing your photo...</h1>' +
        '</div>' +
        '<div class="pe-result-card" style="text-align:center; padding:3rem;">' +
          '<div class="pe-progress">' +
            '<div class="pe-progress-bar"><div class="pe-progress-fill" id="peProgress" style="width:10%;"></div></div>' +
            '<div class="pe-progress-text" id="peStatus">Trudy is looking at your photo...</div>' +
          '</div>' +
        '</div>';

      var phasesByService = {
        roofing: [
          { pct: 30, text: "Trudy is examining the roof...", delay: 1500 },
          { pct: 60, text: "Trudy is detecting material and size...", delay: 3000 },
          { pct: 80, text: "Trudy is calculating local pricing...", delay: 5000 }
        ],
        hvac: [
          { pct: 30, text: "Trudy is examining your AC unit...", delay: 1500 },
          { pct: 60, text: "Trudy is detecting brand and system type...", delay: 3000 },
          { pct: 80, text: "Trudy is calculating replacement cost...", delay: 5000 }
        ],
        solar: [
          { pct: 30, text: "Trudy is examining your roof...", delay: 1500 },
          { pct: 60, text: "Trudy is assessing solar potential...", delay: 3000 },
          { pct: 80, text: "Trudy is calculating installation cost...", delay: 5000 }
        ]
      };
      var phases = phasesByService[state.service] || phasesByService.roofing;
      phases.forEach(function(p) {
        setTimeout(function() {
          var bar = document.getElementById("peProgress");
          var status = document.getElementById("peStatus");
          if (bar) bar.style.width = p.pct + "%";
          if (status) status.textContent = p.text;
        }, p.delay);
      });
    }

    function startAnalysis() {
      state.step = "analyzing";
      render();

      var parts = state.imageData.match(/^data:(image\/[^;]+);base64,(.+)$/);
      if (!parts) { alert("Could not process image. Try a different photo."); state.step = "capture"; render(); return; }

      var exifBase64 = null;
      if (state.originalBase64) {
        var origParts = state.originalBase64.match(/^data:image\/jpeg;base64,(.+)$/);
        if (origParts) exifBase64 = origParts[1].substring(0, 65536);
      }

      fetch("/api/photo-estimate", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ base64: parts[2], mediaType: parts[1], service: state.service, exifData: exifBase64, city: null, state: null, browserLat: state.browserLat, browserLng: state.browserLng })
      })
      .then(function(r) {
        if (!r.ok) throw new Error("Server returned " + r.status + ". Your API balance may be depleted or the image may be too large.");
        return r.json();
      })
      .then(function(d) {
        if (d.error) throw new Error(d.error);
        state.result = d.data;
        if (d.location) {
          state.city = d.location.city || "";
          state.stateCode = d.location.state || "";
          state.address = d.location.address || "";
          state.zip = d.location.zip || "";
          state.lat = d.location.lat || null;
          state.lng = d.location.lng || null;
        }
        if (d.cityMultiplier) {
          state.cityMult = d.cityMultiplier;
        }
        // Use OSM satellite footprint for roof size if available and within sane range
        if (d.buildingFootprint && d.buildingFootprint.footprintSqFt) {
          var fp = d.buildingFootprint.footprintSqFt;
          if (fp >= 500 && fp <= 10000) {
            var pitchFactor = state.result.pitch === "steep" ? 1.25 : state.result.pitch === "low" ? 1.05 : state.result.pitch === "flat" ? 1.0 : 1.12;
            state.result.estimatedFootprintSqFt = fp;
            state.result.estimatedRoofSqFt = Math.round(fp * pitchFactor);
            state.result.roofSizeSource = "satellite";
          }
        }
        state.step = "confirm";
        render();
      })
      .catch(function(err) {
        app.innerHTML =
          '<div class="pe-hero"><h1>Analysis unavailable</h1></div>' +
          '<div class="pe-result-card" style="text-align:center;">' +
            '<p style="color:#64748b; margin-bottom:16px;">We couldn\'t analyze this photo. This can happen if the image is unclear or the AI service is temporarily unavailable.</p>' +
            '<p style="color:#64748b; margin-bottom:24px;">Error: ' + esc(err.message || "Unknown error") + '</p>' +
            '<button class="pe-btn pe-btn-primary" id="retryBtn">Try again</button>' +
            ' <a class="pe-btn pe-btn-secondary" href="/roofing-quote-analyzer.html">Use guided estimator instead</a>' +
          '</div>';
        document.getElementById("retryBtn").addEventListener("click", function() {
          state.step = "capture";
          render();
        });
      });
    }

      } else {

            buildOptionGroup("material", [
              {value:"asphalt",label:"Asphalt"},{value:"architectural",label:"Architectural"},

            ], r.material || "architectural") +
          '</div>' +

          '<div style="margin-bottom:16px;">' +
            '<div class="pe-detail-label" style="margin-bottom:6px;">Complexity</div>' +
            buildOptionGroup("complexity", [
              {value:"simple",label:"Simple"},{value:"moderate",label:"Moderate"},{value:"complex",label:"Complex"}
            ], r.complexity || "simple") +
          '</div>' +

            '<div class="pe-detail-label" style="margin-bottom:6px;">Condition</div>' +

            '<div class="pe-detail-label" style="margin-bottom:6px;">Work Type</div>' +

                '<input type="text" id="confirmState" placeholder="ST" maxlength="2" value="' + esc(state.stateCode) + '" style="padding:10px 14px; border:1px solid #cbd5e1; border-radius:10px; font-size:14px; font-family:inherit; width:70px;" />' +
                '<input type="text" id="confirmZip" placeholder="Zip" maxlength="5" value="' + esc(state.zip) + '" style="padding:10px 14px; border:1px solid #cbd5e1; border-radius:10px; font-size:14px; font-family:inherit; width:90px;" />' +
              '</div>' +
            '</div>' +
          '</div>';
      } else {
        // No location detected - show all fields open
        html +=
          '<div style="margin-bottom:16px;">' +
            '<div class="pe-detail-label" style="margin-bottom:6px;">City, State, Zip</div>' +
            '<div style="display:flex; gap:8px;">' +
              '<input type="text" id="confirmCity" placeholder="City" value="' + esc(state.city) + '" style="padding:10px 14px; border:1px solid #cbd5e1; border-radius:10px; font-size:14px; font-family:inherit; flex:1;" />' +
              '<input type="text" id="confirmState" placeholder="ST" maxlength="2" value="' + esc(state.stateCode) + '" style="padding:10px 14px; border:1px solid #cbd5e1; border-radius:10px; font-size:14px; font-family:inherit; width:70px;" />' +
              '<input type="text" id="confirmZip" placeholder="Zip" maxlength="5" value="' + esc(state.zip) + '" style="padding:10px 14px; border:1px solid #cbd5e1; border-radius:10px; font-size:14px; font-family:inherit; width:90px;" />' +
            '</div>' +

      }
      html +=

        '</div>' +

        '<button class="pe-btn pe-btn-full" id="confirmBtn" style="background:#16a34a; color:#fff; margin-top:16px; font-size:16px; padding:14px 24px;">Looks good - get my estimate</button>' +
        '<div style="text-align:center; margin-top:10px;"><a href="#" id="retakeLink" style="font-size:13px; color:#64748b;">Retake photo</a></div>';

      app.innerHTML = html;

      // Tap-to-select behavior for option groups
      document.querySelectorAll('[data-group]').forEach(function(btn) {
        btn.addEventListener("click", function() {
          var group = btn.dataset.group;

          btn.classList.add("selected");

      // Edit location toggle
      var editLocLink = document.getElementById("editLocationLink");
      if (editLocLink) {

      // Retake link
      document.getElementById("retakeLink").addEventListener("click", function(e) {
        e.preventDefault();
        state.imageData = null;

        state.confirmed = null;
        state.step = "capture";
        render();
      });

      // Load satellite view if we have location
      if (state.city && state.stateCode) {
        var satContainer = document.getElementById("satelliteViewContainer");
        var satMap = document.getElementById("satelliteMapArea");
        var satSize = document.getElementById("satelliteRoofSize");

        // Try to get satellite image
        var satAddress = (state.city + ", " + state.stateCode);
        fetch("/api/satellite-view?address=" + encodeURIComponent(satAddress) + "&zoom=20")
          .then(function(r) { return r.json(); })
          .then(function(d) {
            if (d.available && d.staticMapUrl) {

              satMap.innerHTML = '<img src="' + d.staticMapUrl + '" alt="Satellite view of your roof" style="width:100%; height:100%; object-fit:cover;" />';
              if (state.result && state.result.estimatedRoofSqFt) {
                satSize.textContent = "Estimated roof area: " + Math.round(state.result.estimatedRoofSqFt).toLocaleString() + " sq ft" + (state.result.roofSizeSource === "satellite" ? " (measured from satellite data)" : " (AI estimate)");
              }

          .catch(function() { /* satellite view not available, no problem */ });
      }

      // Confirm button
      document.getElementById("confirmBtn").addEventListener("click", function() {
        var btn = document.getElementById("confirmBtn");

        btn.textContent = "Calculating...";

        function getSelected(group) {
          var el = document.querySelector('[data-group="' + group + '"].selected');
          return el ? el.dataset.val : "";
        }
        var addressVal = (document.getElementById("confirmAddress").value || "").trim();
        var cityVal = (document.getElementById("confirmCity").value || "").trim();
        var stateVal = (document.getElementById("confirmState").value || "").trim().toUpperCase();

        var confirmed = { city: cityVal, stateCode: stateVal, address: addressVal, zip: zipVal, condition: getSelected("condition") || "fair" };

        // Validate roof size if applicable
        var roofInput = document.getElementById("confirmRoofSqFt");
        if (roofInput && (svc === "roofing" || svc === "solar")) {

        state.confirmed = confirmed;
        state.city = cityVal;

        var addressChanged = addressVal && addressVal !== state.address;

        function finishConfirm() {
          // Fetch city multiplier then go to result
          if (cityVal && stateVal) {
            fetch("/api/city-multiplier?city=" + encodeURIComponent(cityVal) + "&state=" + encodeURIComponent(stateVal))
              .then(function(r) { return r.json(); })
              .then(function(d) { if (d && d.multiplier) { state.cityMult = d.multiplier; state.cityRange = { low: d.rangeLow || 0.82, high: d.rangeHigh || 1.22 }; } })
              .catch(function() {})
              .then(function() {
                state.step = "result";
                render();
              });
          } else {
            state.step = "result";
            render();
          }
        }

        // Re-lookup building footprint from address if address provided and we need it
        if (needsFootprint) {
          var lookupAddress = addressVal + ", " + cityVal + ", " + stateVal + (zipVal ? " " + zipVal : "");
          fetch("/api/address-lookup?address=" + encodeURIComponent(lookupAddress))
            .then(function(r) { return r.json(); })
            .then(function(d) {
              if (d.lat && d.lng) {
                state.lat = d.lat;
                state.lng = d.lng;
              }
              if (d.footprint && d.footprint.footprintSqFt) {
                var footprint = d.footprint.footprintSqFt;
                // Sanity check: residential footprint should be 500-10,000 sq ft
                if (footprint >= 500 && footprint <= 10000) {
                  var pitch = state.result.pitch || "normal";
                  var pitchFactor = pitch === "steep" ? 1.25 : pitch === "low" ? 1.05 : pitch === "flat" ? 1.0 : 1.12;
                  var newRoofSqFt = Math.round(footprint * pitchFactor);
                  state.result.estimatedFootprintSqFt = footprint;
                  state.result.estimatedRoofSqFt = newRoofSqFt;
                  state.result.roofSizeSource = "satellite";
                  confirmed.roofSqFt = newRoofSqFt;
                  state.confirmed = confirmed;
                } else {
                  console.log("[photo-estimate] OSM footprint out of range:", footprint, "sq ft - ignoring");
                }
              }
            })
            .catch(function() {})
            .then(finishConfirm);
        } else {
          finishConfirm();
        }
      });

    /* ── STEP 4: RESULT ── */
    function renderResult() {
      var r = state.result;
      var c = state.confirmed;
      if (!r || !c) { state.step = "capture"; render(); return; }
      var svc = state.service;

      var region = STATE_REGIONS[c.stateCode] || "south";
      var laborMult = state.cityMult || LABOR_MULT_BY_REGION[region] || 1.0;
      var rangeLow = state.cityRange ? state.cityRange.low : 0.82;
      var rangeHigh = state.cityRange ? state.cityRange.high : 1.22;
      var locationLabel = c.city ? esc(c.city) + ", " + esc(c.stateCode) : "your area";
      var pricingSource = state.cityMult ? (esc(c.city) + " local pricing") : "regional pricing";

      var mid, low, high, verdictLabel, verdictDesc, detailsHtml, ctaHtml, disclaimerHtml;
      var conditionClass = c.condition === "good" ? "pe-condition-good" : c.condition === "poor" ? "pe-condition-poor" : "pe-condition-fair";
      var conditionLabel = c.condition === "good" ? "Good condition" : c.condition === "poor" ? "Needs attention" : c.condition === "fair" ? "Normal wear" : "Condition unknown";
      var conditionNotesHtml = (r.conditionNotes && r.conditionNotes.length > 0) ? r.conditionNotes.map(function(n) { return esc(n); }).join(", ") : "";

      if (svc === "hvac") {
        var hvacPrices = {
          central_ac: { "14_seer": 2800, "16_seer": 3400, "18_seer": 4200, "20_seer": 5200 },
          heat_pump: { "14_seer": 3200, "16_seer": 3900, "18_seer": 4800, "20_seer": 6000 },
          mini_split: { "14_seer": 3500, "16_seer": 5800, "18_seer": 8200, "20_seer": 10500 },
          full_system: { "14_seer": 3200, "16_seer": 4000, "18_seer": 5200, "20_seer": 6500 }
        };
        var furnacePrices = { "14_seer": 3200, "16_seer": 4000, "18_seer": 4800, "20_seer": 5800 };

        var systemType = c.systemType || "central_ac";
        var tonnage = c.tonnage || 3;
        var efficiency = c.efficiency || "16_seer";
        var brandMult = c.brandTier === "premium" ? 1.12 : c.brandTier === "value" ? 0.90 : 1.0;

        var basePricePerTon;
        if (systemType === "furnace") {
          basePricePerTon = furnacePrices[efficiency] || 4000;
        } else if (systemType === "mini_split") {
          // Mini splits price by zone count, approximate from tonnage
          var zones = tonnage <= 1.5 ? 1 : tonnage <= 2.5 ? 2 : tonnage <= 3.5 ? 3 : 4;
          var miniPrices = { 1: 3500, 2: 5800, 3: 8200, 4: 10500 };
          basePricePerTon = (miniPrices[zones] || 5800) / tonnage;
        } else {
          basePricePerTon = (hvacPrices[systemType] || hvacPrices.central_ac)[efficiency] || 3400;
        }

        var totalCost = basePricePerTon * tonnage * laborMult * brandMult * INFLATION_MULT * SEASONAL_MULT;
        mid = roundTo(totalCost, 50);
        low = roundTo(mid * rangeLow, 50);
        high = roundTo(mid * rangeHigh, 50);

        var systemLabels = { central_ac: "Central AC", heat_pump: "Heat Pump", furnace: "Gas Furnace", mini_split: "Mini-Split", full_system: "Full HVAC System" };
        var effLabels = { "14_seer": "14 SEER", "16_seer": "16 SEER", "18_seer": "18 SEER", "20_seer": "20 SEER" };

        verdictLabel = "Estimated HVAC Replacement Cost";
        verdictDesc = "for a " + tonnage + "-ton " + (systemLabels[systemType] || systemType) + " in " + locationLabel;

        detailsHtml =
          '<div class="pe-detail"><div class="pe-detail-label">System Type</div><div class="pe-detail-value">' + esc(systemLabels[systemType] || systemType) + '</div></div>' +
          '<div class="pe-detail"><div class="pe-detail-label">Tonnage</div><div class="pe-detail-value">' + tonnage + ' ton</div></div>' +
          '<div class="pe-detail"><div class="pe-detail-label">Efficiency</div><div class="pe-detail-value">' + esc(effLabels[efficiency] || efficiency) + '</div></div>' +
          '<div class="pe-detail"><div class="pe-detail-label">Brand Tier</div><div class="pe-detail-value">' + esc((c.brandTier || "mid").charAt(0).toUpperCase() + (c.brandTier || "mid").slice(1)) + '</div></div>' +
          '<div class="pe-detail"><div class="pe-detail-label">Home Size</div><div class="pe-detail-value">' + (c.homeSqFt || 2000).toLocaleString() + ' sq ft</div></div>' +
          '<div class="pe-detail"><div class="pe-detail-label">Pricing</div><div class="pe-detail-value">' + pricingSource + '</div></div>';

        var hvacAnalyzerUrl = "/hvac-quote-analyzer.html" + (c.city ? "?city=" + encodeURIComponent(c.city) + "&state=" + encodeURIComponent(c.stateCode) : "");
        ctaHtml =
          '<a class="pe-btn pe-btn-primary pe-btn-full" href="' + hvacAnalyzerUrl + '">Get a detailed estimate</a>' +
          '<a class="pe-btn pe-btn-secondary pe-btn-full" href="/find-contractors.html?service=hvac">Find HVAC contractors in ' + locationLabel + '</a>';
        disclaimerHtml = 'This is an AI-powered estimate based on a single photo. For a more precise estimate, <a href="' + hvacAnalyzerUrl + '" style="color:#1d4ed8; font-weight:600;">upload an HVAC quote</a>.';

      } else if (svc === "solar") {
        var systemSizeKW = c.systemSizeKW || 8;
        var pricePerWatt = c.panelTier === "premium" ? 3.75 : 3.00;
        var systemWatts = systemSizeKW * 1000;
        var shadeMult = c.shadeLevel === "heavy" ? 0.85 : c.shadeLevel === "moderate" ? 0.95 : 1.0;

        var solarCost = systemWatts * pricePerWatt * laborMult * INFLATION_MULT;
        var batteryCost = c.battery ? 14000 : 0;
        var grossCost = solarCost + batteryCost;
        var taxCredit = Math.round(grossCost * 0.30);
        var netCost = grossCost - taxCredit;

        mid = roundTo(netCost, 100);
        low = roundTo(roundTo(grossCost * rangeLow, 100) - taxCredit, 100);
        high = roundTo(roundTo(grossCost * rangeHigh, 100) - taxCredit, 100);
        var grossMid = roundTo(grossCost, 100);

        var monthlyOffset = { 5: "$100", 8: "$150", 10: "$200", 12: "$250", 15: "$300" };

        verdictLabel = "Estimated Solar Installation Cost";
        verdictDesc = "for a " + systemSizeKW + " kW system in " + locationLabel + " (after 30% federal tax credit)";

        detailsHtml =
          '<div class="pe-detail"><div class="pe-detail-label">System Size</div><div class="pe-detail-value">' + systemSizeKW + ' kW</div></div>' +
          '<div class="pe-detail"><div class="pe-detail-label">Panel Tier</div><div class="pe-detail-value">' + (c.panelTier === "premium" ? "Premium" : "Standard") + '</div></div>' +
          '<div class="pe-detail"><div class="pe-detail-label">Gross Cost</div><div class="pe-detail-value">' + fmt(grossMid) + '</div></div>' +
          '<div class="pe-detail"><div class="pe-detail-label">Federal Tax Credit (30%)</div><div class="pe-detail-value" style="color:#16a34a;">-' + fmt(taxCredit) + '</div></div>' +
          '<div class="pe-detail"><div class="pe-detail-label">Monthly Bill Offset</div><div class="pe-detail-value">~' + (monthlyOffset[systemSizeKW] || "$150") + '/mo</div></div>' +
          (c.battery ? '<div class="pe-detail"><div class="pe-detail-label">Battery Storage</div><div class="pe-detail-value">Included ($12K-$16K)</div></div>' : '') +
          '<div class="pe-detail"><div class="pe-detail-label">Pricing</div><div class="pe-detail-value">' + pricingSource + '</div></div>';

        var solarAnalyzerUrl = "/solar-quote-analyzer.html" + (c.city ? "?city=" + encodeURIComponent(c.city) + "&state=" + encodeURIComponent(c.stateCode) : "");
        ctaHtml =
          '<a class="pe-btn pe-btn-primary pe-btn-full" href="' + solarAnalyzerUrl + '">Get a detailed estimate</a>' +
          '<a class="pe-btn pe-btn-secondary pe-btn-full" href="/find-contractors.html?service=solar">Find solar installers in ' + locationLabel + '</a>';
        disclaimerHtml = 'This is an AI-powered estimate based on a single photo. For a more precise estimate, <a href="' + solarAnalyzerUrl + '" style="color:#1d4ed8; font-weight:600;">upload a solar quote</a>.';

      } else {
        // Roofing (default)
        var material = c.material || "architectural";
        var stories = c.stories || 1;
        var roofSqFt = c.roofSqFt || 2000;
        var roofSquares = roofSqFt / 100;

        var basePricePerSquare = BASE_PRICE_PER_SQUARE[material] || 525;
        var complexityMult = c.complexity === "complex" ? 1.20 : c.complexity === "moderate" ? 1.10 : 1.0;
        var conditionMult = c.condition === "poor" ? 1.10 : 1.0;
        var workTypeMults = { new_roof: 1.0, reroof: 0.65, overlay: 0.55, tile_reinstall: 0.42, repair: 0.35 };
        var workTypeMult = workTypeMults[c.workType] || 1.0;

        var totalCost = roofSquares * basePricePerSquare * WASTE_FACTOR * OVERHEAD_MULT * laborMult * complexityMult * conditionMult * workTypeMult * INFLATION_MULT * SEASONAL_MULT;
        mid = roundTo(totalCost, 100);
        low = roundTo(mid * rangeLow, 100);
        high = roundTo(mid * rangeHigh, 100);
        var perSqFt = (mid / roofSqFt).toFixed(2);

        var materialLabels = { asphalt: "Asphalt Shingles", architectural: "Architectural Shingles", metal: "Metal Roofing", tile: "Tile Roofing", flat: "Flat / TPO", cedar: "Cedar Shake", unknown: "Standard Shingles" };
        var materialLabel = materialLabels[material] || material;

        verdictLabel = "Estimated Roof Replacement Cost";
        verdictDesc = fmt(mid) + " for " + esc(materialLabel) + " in " + locationLabel;

        detailsHtml =
          '<div class="pe-detail"><div class="pe-detail-label">Roof Size</div><div class="pe-detail-value">' + Math.round(roofSqFt).toLocaleString() + ' sq ft</div></div>' +
          '<div class="pe-detail"><div class="pe-detail-label">Material</div><div class="pe-detail-value">' + esc(materialLabel) + '</div></div>' +
          '<div class="pe-detail"><div class="pe-detail-label">Cost per Sq Ft</div><div class="pe-detail-value">$' + perSqFt + '</div></div>' +
          '<div class="pe-detail"><div class="pe-detail-label">Complexity</div><div class="pe-detail-value">' + esc(c.complexity.charAt(0).toUpperCase() + c.complexity.slice(1)) + '</div></div>' +
          '<div class="pe-detail"><div class="pe-detail-label">Stories</div><div class="pe-detail-value">' + stories + '-story</div></div>' +
          '<div class="pe-detail"><div class="pe-detail-label">Pricing</div><div class="pe-detail-value">' + pricingSource + '</div></div>';

        ctaHtml =
          '<a class="pe-btn pe-btn-primary pe-btn-full" href="/roofing-quote-analyzer.html' + (c.city ? '?city=' + encodeURIComponent(c.city) + '&state=' + encodeURIComponent(c.stateCode) : '') + '">Get a detailed estimate</a>' +
          '<a class="pe-btn pe-btn-secondary pe-btn-full" href="/find-contractors.html?service=roofing">Find contractors in ' + locationLabel + '</a>';
        disclaimerHtml = 'This is an AI-powered estimate based on a single photo. For a more precise estimate, use our <a href="/roofing-quote-analyzer.html" style="color:#1d4ed8; font-weight:600;">guided estimator</a> or upload a contractor quote.';
      }

      // Store estimate for feedback flywheel
      state.lastEstimate = { mid: mid, low: low, high: high };

      var html =
        '<div class="pe-hero">' +
          '<h1>Your Photo Estimate</h1>' +
        '</div>' +

        '<div class="pe-result-card">' +
          '<div style="margin-bottom:1.5rem;">' +
            '<img src="' + state.imagePreview + '" alt="Your photo" style="width:100%; border-radius:12px; max-height:300px; object-fit:cover;" />' +
          '</div>' +

          '<div class="pe-verdict">' +
            '<div class="pe-verdict-label">' + verdictLabel + '</div>' +
            '<div class="pe-verdict-price">' + fmt(low) + ' &ndash; ' + fmt(high) + '</div>' +
            '<div class="pe-verdict-range">' + (svc === "roofing" ? "Midpoint: " + verdictDesc : verdictDesc) + '</div>' +
          '</div>' +

          '<div class="pe-details">' + detailsHtml + '</div>' +

          '<div class="pe-condition ' + conditionClass + '">' +
            '<strong>' + conditionLabel + '</strong>' +
            (conditionNotesHtml ? ' &mdash; ' + conditionNotesHtml : '') +
          '</div>' +

          (r.additionalNotes ? '<p style="font-size:14px; color:#64748b; margin-top:12px;">' + esc(r.additionalNotes) + '</p>' : '') +

          '<div style="margin-top:16px; padding:12px 16px; background:#eff6ff; border:1px solid #bfdbfe; border-radius:10px; font-size:13px; color:#1e40af;">' +
            disclaimerHtml +
          '</div>' +
        '</div>' +

        '<div id="estimateFeedback" style="padding:16px; background:#f8fafc; border:1px solid #e2e8f0; border-radius:12px; text-align:center; margin-bottom:1rem;">' +
          '<div style="font-size:14px; color:#475569; margin-bottom:10px;">How does this compare to quotes you\'ve received?</div>' +
          '<div style="display:flex; gap:8px; justify-content:center; flex-wrap:wrap;">' +
            '<button class="pe-btn pe-btn-secondary" onclick="submitPhotoFeedback(\'accurate\')" style="font-size:13px; padding:8px 16px;">Looks right</button>' +
            '<button class="pe-btn pe-btn-secondary" onclick="submitPhotoFeedback(\'high\')" style="font-size:13px; padding:8px 16px;">Seems high</button>' +
            '<button class="pe-btn pe-btn-secondary" onclick="submitPhotoFeedback(\'low\')" style="font-size:13px; padding:8px 16px;">Seems low</button>' +
          '</div>' +
        '</div>' +

        '<div class="pe-actions">' +
          ctaHtml +
          '<button class="pe-btn pe-btn-secondary pe-btn-full" id="newPhotoBtn">Estimate another property</button>' +
        '</div>' +
        '<div style="text-align:center; margin-top:12px;">' +
          '<a href="mailto:hello@truepricehq.com?subject=TruePrice Feedback" style="font-size:13px; color:#94a3b8; text-decoration:none;">Have a suggestion? Email hello@truepricehq.com</a>' +
        '</div>';

      app.innerHTML = html;

      document.getElementById("newPhotoBtn").addEventListener("click", function() {
        state.imageData = null;
        state.imagePreview = null;
        state.result = null;
        state.confirmed = null;
        state.step = "capture";
        render();
      });

      // Track with full data including AI vs user corrections
      var r = state.result || {};
      fetch("/api/analytics", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          type: "event",
          event: "photo_estimate_completed",
          meta: {
            service: state.service,
            mid: String(mid),
            low: String(low),
            high: String(high),
            city: c.city || "",
            stateCode: c.stateCode || "",
            cityMult: String(state.cityMult || 0),
            // AI original values
            aiMaterial: r.material || r.systemType || "",
            aiRoofSqFt: String(r.estimatedRoofSqFt || r.estimatedUsableRoofSqFt || 0),
            aiStories: String(r.stories || 0),
            aiCondition: r.condition || r.roofCondition || "",
            aiComplexity: r.complexity || "",
            aiBrand: r.brand || "",
            aiTonnage: String(r.estimatedTonnage || 0),
            aiShadeLevel: r.shadeLevel || "",
            // User confirmed values
            userMaterial: c.material || c.systemType || c.panelTier || "",
            userRoofSqFt: String(c.roofSqFt || 0),
            userStories: String(c.stories || 0),
            userCondition: c.condition || "",
            userComplexity: c.complexity || "",
            userTonnage: String(c.tonnage || 0),
            userWorkType: c.workType || "",
            userEfficiency: c.efficiency || "",
            userBrandTier: c.brandTier || "",
            userSystemSizeKW: String(c.systemSizeKW || 0),
            userBattery: String(c.battery || false),
            // Source data
            roofSizeSource: r.roofSizeSource || "ai_estimate",
            hasExifGps: String(!!(state.city && state.stateCode)),
            buildingFootprintSqFt: String(r.buildingFootprintSqFt || 0)
          },
          path: "/photo-estimate.html"
        })
      }).catch(function() {});
    }

    window.switchService = function(svc) {
      state.service = svc;
      state.imageData = null;
      state.imagePreview = null;
      state.result = null;
      state.confirmed = null;
      state.step = "capture";
      render();
    };

    window.submitPhotoFeedback = function(response) {
      var fb = document.getElementById("estimateFeedback");
      if (!fb) return;
      var c = state.confirmed || {};
      var r = state.result || {};
      fetch("/api/analytics", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          type: "event",
          event: "photo_estimate_feedback",
          meta: {
            response: response,
            service: state.service,
            material: c.material || c.systemType || c.panelTier || "",
            city: c.city || "",
            stateCode: c.stateCode || "",
            roofSqFt: String(c.roofSqFt || 0),
            tonnage: String(c.tonnage || 0),
            systemSizeKW: String(c.systemSizeKW || 0),
            aiMaterial: r.material || r.systemType || "",
            aiRoofSqFt: String(r.estimatedRoofSqFt || r.estimatedUsableRoofSqFt || 0),
            aiBrand: r.brand || "",
            aiCondition: r.condition || "",
            userCorrectedRoofSqFt: String(c.roofSqFt !== (r.estimatedRoofSqFt || r.estimatedUsableRoofSqFt) ? c.roofSqFt || 0 : 0),
            userCorrectedMaterial: c.material !== r.material ? (c.material || "") : ""
          },
          path: "/photo-estimate.html"
        })
      }).catch(function() {});
      fb.innerHTML = '<div style="font-size:14px; color:#166534; padding:8px 0;">Thanks! This helps us improve photo estimates.</div>';

      // Feed into calibration flywheel
      if (c.city && c.stateCode && state.lastEstimate && state.lastEstimate.mid > 0) {
        var feedbackPrice = state.lastEstimate.mid;
        if (response === "high") feedbackPrice = Math.round(state.lastEstimate.mid * 0.85);
        else if (response === "low") feedbackPrice = Math.round(state.lastEstimate.mid * 1.15);

        fetch("/api/calibration", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            price: feedbackPrice,
            contractor: "photo_estimate_feedback",
            city: c.city,
            stateCode: c.stateCode,
            material: c.material || c.systemType || c.panelTier || "",
            roofSize: c.roofSqFt || 0,
            warrantyYears: 0,
            source: "photo_feedback_" + response,
            service: state.service || "roofing",
            modelEstimate: state.lastEstimate.mid
          })
        }).catch(function() {});
      }
    };

    render();
  })();
  </script>
</body>
</html>
