      PA:"northeast",RI:"northeast",SC:"southeast",SD:"midwest",TN:"southeast",TX:"south",

      ],
      bathroom_rough_in: [

      ],
      gas_line: [

    var SERVICE_TYPE_OPTIONS = [

      { value: "repipe", label: "Whole House Repipe" },
      { value: "sewer_line", label: "Sewer Line" },
      { value: "drain_cleaning", label: "Drain Cleaning" },

    // =========================================================================
    // HELPERS
    // =========================================================================
    function escapeHtml(text) {
      var div = document.createElement("div");
      div.appendChild(document.createTextNode(String(text || "")));
      return div.innerHTML;
    }

    function fmtPrice(n) {
      return "$" + Number(n).toLocaleString("en-US", { maximumFractionDigits: 0 });
    }

    function roundTo(value, step) {
      return Math.round(value / step) * step;
    }

    function makeOptionCard(group, value, label, sublabel) {
      return '<button type="button" class="est-option" data-group="' + group + '" data-value="' + value + '">'
        + '<span class="est-option-label">' + label + '</span>'
        + (sublabel ? '<span class="est-option-sub">' + sublabel + '</span>' : '')
        + '</button>';
    }

    function setUploadStatus(message, type, percent) {
      var el = document.getElementById("uploadStatus");
      if (!el) return;
      var progressHtml = "";
      if (typeof percent === "number") {
        progressHtml = '<div class="upload-progress"><div class="upload-progress-bar" style="width:' + percent + '%"></div></div>';
      }
      el.className = "upload-status " + (type || "info");
      el.innerHTML = '<div>' + message + '</div>' + progressHtml;
    }

    // =========================================================================
    // PRICING CALCULATION
    // =========================================================================
    function getBasePrice(serviceType, subType) {
      var svc = PLUMBING_PRICING.basePriceByService[serviceType];
      if (!svc) return 2000;
      var priceMap = svc.priceByType || svc.priceByMaterial || svc.priceByMethod || svc.priceByScope || svc.priceByLength || {};
      return priceMap[subType] || Object.values(priceMap)[0] || 2000;
    }

    function calculatePlumbingCost(serviceType, subType, stateCode, urgency) {
      var base = getBasePrice(serviceType, subType);
      var region = STATE_REGIONS[(stateCode || "").toUpperCase()] || "south";
      var laborMult = PLUMBING_PRICING.laborMultiplierByRegion[region] || 1.0;
      var overheadMult = PLUMBING_PRICING.overheadMultiplier;

      var urgencyMult = 1.0;
      if (urgency === "asap") urgencyMult = 1.08;
      else if (urgency === "this_season") urgencyMult = 1.02;

      var total = base * laborMult * overheadMult * urgencyMult;
      var mid = roundTo(total, 25);
      var low = roundTo(mid * 0.85, 25);
      var high = roundTo(mid * 1.20, 25);

      return { low: low, mid: mid, high: high, base: base, region: region, laborMult: laborMult };
    }

    function getVerdict(quotePrice, low, mid, high) {
      if (quotePrice <= 0 || !isFinite(quotePrice)) return { verdict: "Unknown", className: "unknown" };
      var ratio = quotePrice / mid;
      if (ratio <= 0.70) return { verdict: "Unusually Low", className: "unusually-low" };
      if (ratio <= 0.82) return { verdict: "Possible Scope Risk", className: "potential-red-flag" };
      if (ratio <= 0.92) return { verdict: "Excellent Value", className: "excellent-value" };
      if (ratio <= 1.15) return { verdict: "Fair Price", className: "fair-price" };
      if (ratio <= 1.35) return { verdict: "Higher Than Expected", className: "slightly-high" };
      return { verdict: "Overpriced", className: "overpriced" };
    }

    function getServiceLabel(serviceType) {
      var svc = PLUMBING_PRICING.basePriceByService[serviceType];
      return svc ? svc.label : "Plumbing Service";
    }

    function getSubTypeLabel(serviceType, subType) {
      var opts = SUBTYPE_OPTIONS[serviceType] || [];
      for (var i = 0; i < opts.length; i++) {
        if (opts[i].value === subType) return opts[i].label;
      }
      return subType || "";
    }

    // =========================================================================

        + '<input id="quoteFile" type="file" accept=".pdf,image/*" style="display:none;" />'

        + '</div>'

        // Address / estimator
        + '<div style="border-top:1px solid #e5e7eb; padding-top:18px;">'
        + '<p class="small muted" style="margin:0 0 12px;">No quote handy? Enter your location and we\'ll estimate the cost:</p>'
        + '<div class="journey-address-grid">'
        + '<div><input id="journeyCity" type="text" placeholder="City" /></div>'
        + '<div><input id="journeyState" type="text" maxlength="2" placeholder="State (e.g. TX)" /></div>'
        + '</div>'
        + '<button class="btn secondary" style="margin-top:12px;" id="goEstimatorBtn">Get an estimate without a quote &rarr;</button>'
        + '<div id="journeyAddressError" class="small" style="margin-top:10px; color:#b91c1c;"></div>'
        + '</div>'

        + '</div>'
        + '</div>';
    }

    // =========================================================================
    // RENDER: ESTIMATOR STEP
    // =========================================================================
    function renderEstimatorStep() {
      var cityState = [journeyState.city, journeyState.stateCode].filter(Boolean).join(", ");

      var html = '<div style="max-width:720px; margin:48px auto; padding:0 24px;">'
        + '<div style="padding:30px; background:#fff; border:1px solid #e5e7eb; border-radius:24px; box-shadow:0 10px 30px rgba(15,23,42,0.06);">';

      if (cityState) {
        html += '<div style="font-size:13px; color:var(--muted); margin-bottom:16px; padding:8px 14px; background:#f8fafc; border:1px solid #e2e8f0; border-radius:8px; display:inline-block;">' + escapeHtml(cityState) + '</div>';
      }

      html += '<h1 style="margin:0 0 6px; font-size:32px; line-height:1.08; letter-spacing:-0.03em; color:#0f172a;">'
        + 'What would your plumbing job actually cost?'
        + '</h1>'
        + '<p class="muted" style="margin:0 0 28px; font-size:15px;">'
        + 'Answer a few questions and we\'ll build a custom estimate using regional labor rates and your specific situation.'

      html += '<div class="est-section">'
        + '<div class="est-section-label">What type of plumbing work do you need?</div>'
        + '<div class="est-options est-options-wrap" id="estServiceType">';
      SERVICE_TYPE_OPTIONS.forEach(function(opt) {

      });
      html += '</div></div>';

      // Sub-type (dynamic)

      html += '</div></div>';

      // Error + submit
      html += '<div id="estError" style="display:none; margin-top:16px; padding:10px 14px; background:#fef2f2; border:1px solid #fecaca; border-radius:10px; font-size:14px; color:#b91c1c;"></div>';

        + 'Build my estimate'
        + '</button>';

      html += '<div style="text-align:center; margin-top:14px;">'
        + '<span class="small muted">Already have a quote? </span>'
        + '<a href="#" id="backToUploadLink" class="small" style="color:var(--brand);">Upload it for a detailed analysis</a>'
        + '</div>';

      html += '</div></div>';
      return html;
    }

    // =========================================================================

      var r = window.__plumbingEstimatorResult;
      if (!r) return '<div style="max-width:800px; margin:40px auto; text-align:center;"><p>No estimate available.</p></div>';

      var cityState = [r.city, r.stateCode].filter(Boolean).join(", ");
      var regionLabel = (r.region || "").charAt(0).toUpperCase() + (r.region || "").slice(1);
      var urgencyNote = r.urgency === "asap" ? " (includes 8% urgency premium)" : r.urgency === "this_season" ? " (includes 2% seasonal factor)" : "";

      // Scope items relevant to service type

      return '<div style="max-width:800px; margin:40px auto; padding:0 24px;">'

        // Main estimate card

        + '<div style="font-size:16px; color:#475569; margin:0 0 20px;">'
        + 'Midpoint: <strong>' + fmtPrice(r.mid) + '</strong> for ' + escapeHtml(r.serviceLabel)
        + (r.subTypeLabel ? ' (' + escapeHtml(r.subTypeLabel) + ')' : '')
        + (cityState ? ' in ' + escapeHtml(cityState) : '')
        + urgencyNote
        + '</div>'

        + '<div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(140px, 1fr)); gap:10px;">'
        + '<div style="padding:14px; background:#f8fafc; border:1px solid #e5e7eb; border-radius:14px;">'
        + '<div style="font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.04em; color:#64748b;">Service</div>'
        + '<div style="font-size:18px; font-weight:700; color:#0f172a;">' + escapeHtml(r.serviceLabel) + '</div>'
        + '</div>'
        + '<div style="padding:14px; background:#f8fafc; border:1px solid #e5e7eb; border-radius:14px;">'
        + '<div style="font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.04em; color:#64748b;">Type</div>'
        + '<div style="font-size:18px; font-weight:700; color:#0f172a;">' + escapeHtml(r.subTypeLabel) + '</div>'
        + '</div>'
        + '<div style="padding:14px; background:#f8fafc; border:1px solid #e5e7eb; border-radius:14px;">'
        + '<div style="font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.04em; color:#64748b;">Region</div>'
        + '<div style="font-size:18px; font-weight:700; color:#0f172a;">' + escapeHtml(regionLabel) + '</div>'
        + '</div>'
        + '</div>'
        + '</div>'

        // Scope items
        + scopeHtml

        // Email capture
        + '<div style="padding:20px 24px; background:#fff; border:1px solid #e5e7eb; border-radius:18px; margin-bottom:20px;">'
        + '<div style="font-size:16px; font-weight:700; color:#0f172a; margin-bottom:6px;">Save your estimate</div>'
        + '<div style="font-size:14px; color:#475569; margin-bottom:14px;">Email yourself a summary to reference when talking to plumbers.</div>'
        + '<a href="mailto:?subject=' + encodeURIComponent("My Plumbing Cost Estimate" + (cityState ? " - " + cityState : ""))
        + '&body=' + encodeURIComponent(
            "Estimated plumbing cost: " + fmtPrice(r.low) + " - " + fmtPrice(r.high)

    // =========================================================================
    // SCOPE CHECKLIST (for estimator, based on service type)
    // =========================================================================
    function getScopeChecklistForService(serviceType) {
      var relevantScopes = {
        water_heater: ["permits", "shutoff", "disposal", "warranty", "expansion_tank", "supply_lines", "drain_pan", "venting", "codeCompliance", "cleanup"],
        repipe: ["permits", "shutoff", "drywall", "testing", "warranty", "cleanup", "codeCompliance"],
        sewer_line: ["permits", "testing", "drywall", "cleanup", "warranty", "codeCompliance"],
        drain_cleaning: ["warranty", "cleanup"],
        bathroom_rough_in: ["permits", "shutoff", "drywall", "testing", "supply_lines", "venting", "warranty", "cleanup", "codeCompliance"],
        gas_line: ["permits", "testing", "warranty", "codeCompliance", "cleanup"]
      };

      var keys = relevantScopes[serviceType] || Object.keys(PLUMBING_PRICING.scopeItems.reduce(function(m, s) { m[s.key] = s; return m; }, {}));
      var scopeMap = {};
      PLUMBING_PRICING.scopeItems.forEach(function(s) { scopeMap[s.key] = s; });

      var html = '<div style="padding:24px; background:#fff; border:1px solid #e5e7eb; border-radius:18px; margin-bottom:20px;">'
        + '<h3 style="margin:0 0 14px; font-size:18px; color:#0f172a;">What a typical ' + escapeHtml(getServiceLabel(serviceType).toLowerCase()) + ' should include</h3>'
        + '<div style="display:grid; grid-template-columns:1fr 1fr; gap:8px;">';

      for (var i = 0; i < keys.length; i++) {
        var item = scopeMap[keys[i]];
        if (item) {
          html += '<div style="font-size:14px; color:#475569; padding:6px 0;">&#10003; ' + escapeHtml(item.label) + '</div>';
        }
      }

      html += '</div></div>';
      return html;
    }

    // =========================================================================
    // NAVIGATION
    // =========================================================================
    function setStep(step) {
      journeyState.step = step;
      render();
    }

    function render() {
      var root = document.getElementById("appRoot");
      if (!root) return;

      switch (journeyState.step) {
        case "address":
          root.innerHTML = renderAddressStep();
          bindAddressEvents();
          break;
        case "estimator":
          root.innerHTML = renderEstimatorStep();
          bindEstimatorEvents();
          break;
        case "estimator_result":
          root.innerHTML = renderEstimatorResult();
          bindEstimatorResultEvents();
          break;
        case "quote_result":
          root.innerHTML = renderQuoteResult();
          break;
        default:
          root.innerHTML = renderAddressStep();
          bindAddressEvents();
      }
    }

    // =========================================================================

      setTimeout(function() {
        var uploadBtn = document.getElementById("uploadQuoteBtn");
        var fileInput = document.getElementById("quoteFile");

    // =========================================================================
    // QUOTE UPLOAD HANDLER
    // =========================================================================
    function handleQuoteUpload(file) {
      if (!file) return;

      setUploadStatus("Loading document processing libraries...", "info", 10);

      window.loadVendorLibs().then(function() {
        setUploadStatus("Processing your quote...", "info", 30);

        var isPdf = file.type === "application/pdf" || file.name.toLowerCase().endsWith(".pdf");

        if (isPdf) {
          extractTextFromPdf(file);
        } else {
          extractTextFromImage(file);
        }
      }).catch(function(err) {
        console.error("Failed to load vendor libs:", err);
        setUploadStatus("Failed to load processing libraries. Please refresh and try again.", "error");
      });
    }

    function extractTextFromPdf(file) {
      var reader = new FileReader();
      reader.onload = function(e) {
        var typedArray = new Uint8Array(e.target.result);
        setUploadStatus("Reading PDF...", "info", 50);

        pdfjsLib.getDocument(typedArray).promise.then(function(pdf) {
          var allText = "";
          var numPages = pdf.numPages;
          var pagesProcessed = 0;

          function processPage(pageNum) {
            if (pageNum > numPages) {
              setUploadStatus("Analyzing quote...", "info", 85);
              analyzeExtractedText(allText, "pdf");
              return;
            }
            pdf.getPage(pageNum).then(function(page) {
              page.getTextContent().then(function(content) {
                var pageText = content.items.map(function(item) { return item.str; }).join(" ");
                allText += pageText + "\n";
                pagesProcessed++;
                var pct = 50 + Math.round((pagesProcessed / numPages) * 30);
                setUploadStatus("Reading page " + pagesProcessed + " of " + numPages + "...", "info", pct);
                processPage(pageNum + 1);
              });
            });
          }

          processPage(1);
        }).catch(function(err) {
          console.error("PDF parsing failed:", err);
          setUploadStatus("Could not read PDF. Try uploading a screenshot instead.", "error");
        });
      };
      reader.readAsArrayBuffer(file);
    }

    function extractTextFromImage(file) {
      setUploadStatus("Running OCR on your image...", "info", 40);

      var reader = new FileReader();
      reader.onload = function(e) {
        if (typeof Tesseract === "undefined") {
          setUploadStatus("OCR library not loaded. Please refresh and try again.", "error");
          return;
        }

        Tesseract.recognize(e.target.result, "eng", {
          logger: function(m) {
            if (m.status === "recognizing text" && typeof m.progress === "number") {
              var pct = 40 + Math.round(m.progress * 45);
              setUploadStatus("Reading text from image... " + Math.round(m.progress * 100) + "%", "info", pct);
            }
          }
        }).then(function(result) {
          setUploadStatus("Analyzing quote...", "info", 90);
          analyzeExtractedText(result.data.text || "", "ocr");
        }).catch(function(err) {
          console.error("OCR failed:", err);
          setUploadStatus("Could not read the image. Try a clearer photo or PDF.", "error");
        });
      };
      reader.readAsDataURL(file);
    }

    // =========================================================================
    // QUOTE TEXT ANALYSIS
    // =========================================================================
    function analyzeExtractedText(rawText, method) {
      console.log("Plumbing analyzer: extracted " + rawText.length + " chars via " + method);

      // 1. Detect service type
      var serviceDetect = { value: "water_heater", label: "Water Heater Replacement" };
      if (typeof detectPlumbingServiceType === "function") {
        serviceDetect = detectPlumbingServiceType(rawText);
      }

      // 2. Detect sub-type based on service
      var subType = null;
      var subTypeLabel = "";
      if (serviceDetect.value === "water_heater" && typeof detectWaterHeaterType === "function") {
        subType = detectWaterHeaterType(rawText);
        subTypeLabel = getSubTypeLabel("water_heater", subType);
      } else if (serviceDetect.value === "repipe" && typeof detectPipeMaterial === "function") {
        var material = detectPipeMaterial(rawText);
        subType = material || "pex";
        subTypeLabel = getSubTypeLabel("repipe", subType);
      } else if (serviceDetect.value === "sewer_line") {
        if (/trenchless|pipe burst/i.test(rawText)) subType = "trenchless";
        else if (/pipe lin/i.test(rawText) || /cipp/i.test(rawText)) subType = "pipe_lining";
        else subType = "traditional_dig";
        subTypeLabel = getSubTypeLabel("sewer_line", subType);
      } else if (serviceDetect.value === "drain_cleaning") {
        if (/hydro.?jet/i.test(rawText)) subType = "hydro_jet";
        else if (/camera/i.test(rawText)) subType = "camera_inspection";
        else if (/main.?line/i.test(rawText)) subType = "main_line";
        else subType = "simple_clog";
        subTypeLabel = getSubTypeLabel("drain_cleaning", subType);
      } else if (serviceDetect.value === "bathroom_rough_in") {
        if (/master/i.test(rawText)) subType = "master_bath";
        else if (/full bath|tub|shower/i.test(rawText)) subType = "full_bath";
        else subType = "half_bath";
        subTypeLabel = getSubTypeLabel("bathroom_rough_in", subType);
      } else if (serviceDetect.value === "gas_line") {
        if (/over 50|long run|50\+/i.test(rawText)) subType = "long_over_50ft";
        else if (/20.*50|medium/i.test(rawText)) subType = "medium_20_50ft";
        else subType = "short_under_20ft";
        subTypeLabel = getSubTypeLabel("gas_line", subType);
      }

      // 3. Detect brand
      var brandInfo = null;
      if (typeof detectPlumbingBrand === "function") {
        brandInfo = detectPlumbingBrand(rawText);
      }

      // 4. Extract price using analyzer-parser.js
      var quotePrice = 0;
      if (typeof extractPriceFromText === "function") {
        quotePrice = extractPriceFromText(rawText);
      } else {
        // Fallback: simple price extraction
        quotePrice = extractPriceFallback(rawText);
      }

      // 5. Detect scope signals
      var scopeSignals = null;
      if (typeof detectPlumbingScopeSignals === "function") {
        scopeSignals = detectPlumbingScopeSignals(rawText);
      }

      // 6. Calculate fair range
      var stateCode = journeyState.stateCode || "";
      var city = journeyState.city || "";
      var cost = calculatePlumbingCost(serviceDetect.value, subType, stateCode, "this_season");

      // Brand premium adjustment
      if (brandInfo && brandInfo.tier === "premium") {
        cost.low = roundTo(cost.low * 1.10, 25);
        cost.mid = roundTo(cost.mid * 1.10, 25);
        cost.high = roundTo(cost.high * 1.10, 25);
      } else if (brandInfo && brandInfo.tier === "value") {
        cost.low = roundTo(cost.low * 0.92, 25);
        cost.mid = roundTo(cost.mid * 0.92, 25);
        cost.high = roundTo(cost.high * 0.92, 25);
      }

      window.__plumbingAnalysisResult = {
        quotePrice: quotePrice,
        serviceType: serviceDetect.value,
        serviceLabel: serviceDetect.label,
        subType: subType,
        subTypeLabel: subTypeLabel,
        brand: brandInfo ? brandInfo.brand : null,
        brandTier: brandInfo ? brandInfo.tier : null,
        scopeSignals: scopeSignals,
        low: cost.low,
        mid: cost.mid,
        high: cost.high,
        region: cost.region,
        city: city,
        stateCode: stateCode,
        rawText: rawText,
        extractionMethod: method
      };

      if (quotePrice > 0) {
        setStep("quote_result");
      } else {
        // No price found - show result with note
        setUploadStatus("", "info");
        window.__plumbingAnalysisResult.quotePrice = 0;
        showNoPriceFound();
      }
    }

    // Fallback price extraction if analyzer-parser.js extractPriceFromText isn't available
    function extractPriceFallback(text) {
      // Use the scoring functions from analyzer-parser.js if available
      if (typeof scoreMoneyCandidate === "function" && typeof classifyMoneyLine === "function") {
        return extractWithScoring(text);
      }

      // Simple fallback
      var candidates = [];
      var lines = text.split(/\n/);
      var moneyPattern = /\$\s?([\d,]+(?:\.\d{2})?)/g;

      for (var i = 0; i < lines.length; i++) {
        var match;
        moneyPattern.lastIndex = 0;
        while ((match = moneyPattern.exec(lines[i])) !== null) {
          var val = parseFloat(match[1].replace(/,/g, ""));
          if (val >= 50 && val <= 200000) {
            var lineLC = lines[i].toLowerCase();
            var score = 50;
            if (/total|amount due|contract price|estimate|project cost/.test(lineLC)) score += 100;
            if (/deposit|down payment|tax|per |unit/.test(lineLC)) score -= 50;
            candidates.push({ value: val, score: score, line: lines[i] });
          }
        }
      }

      if (candidates.length === 0) return 0;
      candidates.sort(function(a, b) { return b.score - a.score; });
      return candidates[0].value;
    }

    function extractWithScoring(text) {
      var candidates = [];
      var lines = text.split(/\n/);
      var moneyPattern = /\$\s?([\d,]+(?:\.\d{2})?)/g;

      for (var i = 0; i < lines.length; i++) {
        var match;
        moneyPattern.lastIndex = 0;
        var contextStart = Math.max(0, i - 2);
        var contextEnd = Math.min(lines.length - 1, i + 2);
        var contextLines = [];
        for (var c = contextStart; c <= contextEnd; c++) contextLines.push(lines[c]);
        var contextText = contextLines.join(" ");

        while ((match = moneyPattern.exec(lines[i])) !== null) {
          var val = parseFloat(match[1].replace(/,/g, ""));
          if (val >= 50 && val <= 200000) {
            var score = scoreMoneyCandidate(val, contextText, lines[i]);
            candidates.push({ value: val, score: score, line: lines[i] });
          }
        }
      }

      if (candidates.length === 0) return 0;
      candidates.sort(function(a, b) { return b.score - a.score; });
      return candidates[0].value;
    }

    function showNoPriceFound() {
      var root = document.getElementById("appRoot");
      if (!root) return;

      var r = window.__plumbingAnalysisResult || {};

      root.innerHTML = '<div style="max-width:720px; margin:60px auto; padding:0 24px;">'
        + '<div style="padding:28px; background:#fff; border:1px solid #e5e7eb; border-radius:18px; box-shadow:0 4px 16px rgba(15,23,42,0.06);">'
        + '<h2 style="margin:0 0 8px; font-size:28px; letter-spacing:-0.02em; color:#0f172a;">We couldn\'t find a price in your quote</h2>'
        + '<p style="color:#475569; margin:0 0 16px; font-size:15px;">We detected <strong>' + escapeHtml(r.serviceLabel || "a plumbing service") + '</strong>, but couldn\'t extract a total price. This sometimes happens with scanned images.</p>'

        + '<div style="margin:0 0 20px; padding:16px; background:#f8fafc; border:1px solid #e2e8f0; border-radius:12px;">'
        + '<div style="font-size:14px; font-weight:600; color:#0f172a; margin-bottom:4px;">Enter your quote price manually:</div>'
        + '<div style="display:flex; gap:10px; align-items:center;">'
        + '<span style="font-size:20px; color:#64748b;">$</span>'
        + '<input type="number" id="manualPrice" placeholder="e.g. 3500" style="padding:12px 14px; border:2px solid #e2e8f0; border-radius:14px; font-size:16px; width:180px; font-family:inherit;" />'
        + '<button class="btn" id="manualPriceBtn" style="font-size:14px; padding:12px 20px;">Analyze</button>'
        + '</div>'
        + '</div>'

        + '<div style="text-align:center;">'
        + '<a href="/plumbing-quote-analyzer.html" style="font-size:14px; color:var(--muted, #6b7280);">Start over</a>'
        + '</div>'
        + '</div></div>';

      setTimeout(function() {
        var btn = document.getElementById("manualPriceBtn");
        if (btn) {
          btn.addEventListener("click", function() {
            var val = parseFloat((document.getElementById("manualPrice") || {}).value || "0");
            if (val > 0) {
              window.__plumbingAnalysisResult.quotePrice = val;
              setStep("quote_result");
            }
          });
        }
      }, 0);
    }

    // =========================================================================
    // INIT
    // =========================================================================
    function init() {
      // Check URL params for prefill
      var params = new URLSearchParams(window.location.search);
      if (params.get("city")) journeyState.city = params.get("city");
      if (params.get("state")) journeyState.stateCode = params.get("state").toUpperCase();

      render();
    }

    // Run on DOM ready
    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", init);
    } else {
      init();
    }
  })();
  </script>
<script src="/js/tp-analytics.js" async></script>
