    function getBasePrice(serviceType, subType) {
      var svc = PLUMBING_PRICING.basePriceByService[serviceType];
      if (!svc) return 2000;
      // Each service stores sub-prices under a different key
      var priceMap = svc.priceByType || svc.priceByMaterial || svc.priceByMethod || svc.priceByScope || svc.priceByLength || {};
      return priceMap[subType] || 2000;
    }

    function calcBenchmark(serviceType, subType, region, bathrooms, homeAge) {
      var basePrice = getBasePrice(serviceType, subType);

      var regionMult = PLUMBING_PRICING.laborMultiplierByRegion[region] || 1.0;
      var overheadMult = PLUMBING_PRICING.overheadMultiplier;

      var total = basePrice * regionMult * overheadMult;

      // Bathroom count adjustment for repipe and bathroom_rough_in
      if (serviceType === "repipe" && bathrooms) {
        var baths = Number(bathrooms) || 2;
        if (baths >= 3) total *= 1.15;
        else if (baths >= 2) total *= 1.05;
      }

      // Home age adjustment: older homes often cost more
      if (homeAge === "pre_1970") total *= 1.18;
      else if (homeAge === "1970_1990") total *= 1.08;
      // 1990+ no adjustment

      return roundTo25(total);
    }

    function verdictFromRatio(ratio) {
      if (ratio < 0.78) return { label: "Unusually Low", css: "low", emoji: "" };

      if (ratio <= 1.12) return { label: "Fair Price", css: "fair", emoji: "" };
      if (ratio <= 1.25) return { label: "Above Average", css: "high", emoji: "" };
      return { label: "Overpriced", css: "high", emoji: "" };

    async function processFile(file) {
      try {
        setProgress(15, "Loading parsing libraries...");
        await window.loadVendorLibs();

        var text = "";
        if (file.type === "application/pdf") {
          setProgress(30, "Extracting text from PDF...");
          text = await extractPdfText(file);
        } else {
          setProgress(30, "Running OCR on image...");
          text = await extractImageText(file);
        }

        setProgress(70, "Analyzing plumbing quote...");
        state.extractedText = text;

        // Use analyzer-parser.js for price extraction
        var parsed = null;
        if (typeof parseExtractedText === "function") {
          parsed = parseExtractedText(text);
        }

        // Use plumbing parser for service-specific detection
        var serviceType = (typeof detectPlumbingServiceType === "function") ? detectPlumbingServiceType(text) : { value: "water_heater", label: "Water Heater Replacement" };
        var brand = (typeof detectPlumbingBrand === "function") ? detectPlumbingBrand(text) : null;
        var scopeSignals = (typeof detectPlumbingScopeSignals === "function") ? detectPlumbingScopeSignals(text) : {};

        // Detect sub-type based on service
        var subType = null;
        if (serviceType.value === "water_heater" && typeof detectWaterHeaterType === "function") {
          subType = detectWaterHeaterType(text);
        } else if (serviceType.value === "repipe" && typeof detectPipeMaterial === "function") {
          subType = detectPipeMaterial(text) || "pex";
        } else if (serviceType.value === "sewer_line") {
          if (/trenchless/i.test(text)) subType = "trenchless";
          else if (/pipe lining|lining/i.test(text)) subType = "pipe_lining";
          else subType = "traditional_dig";
        } else if (serviceType.value === "drain_cleaning") {
          if (/hydro jet|jetting/i.test(text)) subType = "hydro_jet";
          else if (/main line|main sewer/i.test(text)) subType = "main_line";
          else if (/camera/i.test(text)) subType = "camera_inspection";
          else subType = "simple_clog";
        } else if (serviceType.value === "bathroom_rough_in") {
          if (/master/i.test(text)) subType = "master_bath";
          else if (/half bath/i.test(text)) subType = "half_bath";
          else subType = "full_bath";
        } else if (serviceType.value === "gas_line") {
          if (/over 50|long/i.test(text)) subType = "long_over_50ft";
          else if (/20.*50|medium/i.test(text)) subType = "medium_20_50ft";
          else subType = "short_under_20ft";
        }

        // Location detection from parser
        var location = (parsed && parsed.location) ? parsed.location : null;
        if (location && location.stateCode && !state.address.stateCode) {
          state.address.stateCode = location.stateCode;
          if (location.city) state.address.city = location.city;
        }

        // Determine price
        var quotePrice = 0;
        if (parsed && parsed.finalPrice && parsed.finalPrice > 100) {
          quotePrice = parsed.finalPrice;
        } else if (parsed && parsed.priceCandidates && parsed.priceCandidates.length) {
          var candidates = parsed.priceCandidates.filter(function(c) { return c.value >= 100 && c.value <= 50000; });
          candidates.sort(function(a, b) { return b.score - a.score; });
          if (candidates.length) quotePrice = candidates[0].value;
        }

        setProgress(85, "Calculating verdict...");

        var region = getRegionFromState(state.address.stateCode);
        var benchmark = calcBenchmark(serviceType.value, subType, region, null, null);

        var ratio = quotePrice > 0 ? quotePrice / benchmark : 1.0;
        var verdict = verdictFromRatio(ratio);

        // Brand tier note
        var brandNote = "";
        if (brand) {
          brandNote = brand.brand + " (" + brand.tier + " tier)";
        }

        setProgress(100, "Done!");

        state.result = {
          source: "upload",
          quotePrice: quotePrice,
          benchmark: benchmark,
          ratio: ratio,
          verdict: verdict,
          serviceType: serviceType,
          subType: subType,
          brand: brand,
          brandNote: brandNote,
          scopeSignals: scopeSignals,
          region: region,
          location: location,
          parsed: parsed
        };

        state.step = "result";
        setTimeout(render, 400);

      } catch (err) {
        console.error("Plumbing analysis error:", err);
        appRoot.innerHTML = '\
          <div class="plumb-hero"><h1>We couldn\'t read that file</h1></div>\
          <div class="plumb-card" style="text-align:center;">\
            <p style="color:#475569;margin-bottom:16px;">The file might be a scanned image that\'s hard to read, or in an unsupported format.</p>\
            <p style="color:#475569;margin-bottom:20px;">You can enter the quote total manually:</p>\
            <div style="display:flex;gap:10px;justify-content:center;align-items:center;margin-bottom:20px;">\
              <span style="font-size:20px;font-weight:700;">$</span>\
              <input type="number" id="manualPrice" placeholder="e.g. 4500" style="padding:10px 14px;border:1px solid #e2e8f0;border-radius:10px;font-size:18px;width:180px;" />\
            </div>\
            <button class="plumb-btn plumb-btn-primary" id="manualPriceBtn">Analyze this price</button>\
            <div style="margin-top:14px;"><button class="plumb-btn plumb-btn-secondary" onclick="state.step=\'address\';render();">Start over</button></div>\
          </div>';
        document.getElementById("manualPriceBtn").addEventListener("click", function() {
          var price = parseFloat(document.getElementById("manualPrice").value);
          if (!price || price < 100) { alert("Please enter a valid price."); return; }
          var region = getRegionFromState(state.address.stateCode);
          var benchmark = calcBenchmark("water_heater", "tank_50_gas", region, null, null);
          var ratio = price / benchmark;
          state.result = {
            source: "manual", quotePrice: price, benchmark: benchmark,
            ratio: ratio, verdict: verdictFromRatio(ratio),
            serviceType: { value: "water_heater", label: "Water Heater Replacement" },
            subType: "tank_50_gas", brand: null,
            scopeSignals: {}, region: region, location: null, parsed: null
          };
          state.step = "result";
          render();
        });
      }
    }

    async function extractPdfText(file) {
      var arrayBuffer = await file.arrayBuffer();
      var pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
      var allText = [];
      for (var i = 1; i <= pdf.numPages; i++) {
        var page = await pdf.getPage(i);
        var content = await page.getTextContent();
        var pageText = content.items.map(function(item) { return item.str; }).join(" ");
        allText.push(pageText);
      }
      return allText.join("\n");
    }

    async function extractImageText(file) {
      var worker = await Tesseract.createWorker("eng");
      var result = await worker.recognize(file);
      await worker.terminate();
      return result.data.text;
    }

    function getEstimatorStep() {
      var e = state.est;

    function bindOptions(containerId, field) {
      var container = document.getElementById(containerId);

        state.est[field] = opt.getAttribute("data-val");

          state.est.subType = null;

          calculateEstimate();
        } else {

    function calculateEstimate() {
      var est = state.est;
      var region = getRegionFromState(state.address.stateCode);

      var benchmark = calcBenchmark(est.serviceType, est.subType, region, est.bathrooms, est.homeAge);

      // Urgency adjustment
      var urgMult = est.urgency === "asap" ? 1.08 : est.urgency === "this_season" ? 1.02 : 1.0;
      benchmark = roundTo25(benchmark * urgMult);

      var low = roundTo25(benchmark * 0.85);
      var high = roundTo25(benchmark * 1.18);

      var svcLabel = PLUMBING_PRICING.basePriceByService[est.serviceType] ? PLUMBING_PRICING.basePriceByService[est.serviceType].label : est.serviceType;

      // Find sub-type label
      var subLabel = est.subType;
      var subDef = SUB_TYPE_OPTIONS[est.serviceType];
      if (subDef) {
        var found = subDef.options.find(function(o) { return o.value === est.subType; });
        if (found) subLabel = found.label;
      }

      state.result = {
        source: "estimator",
        quotePrice: benchmark,
        benchmark: benchmark,
        low: low,
        high: high,
        ratio: 1.0,
        verdict: { label: "Estimated Cost", css: "fair", emoji: "" },
        serviceType: { value: est.serviceType, label: svcLabel },
        subType: est.subType,
        subLabel: subLabel,
        brand: null,
        brandNote: "",

        region: region,
        location: null,
        parsed: null,
        bathrooms: est.bathrooms,
        homeAge: est.homeAge,
        urgency: est.urgency
      };

      state.step = "result";
      render();
    }

      var emailSubject = encodeURIComponent("My Plumbing Quote Analysis from TruePrice");
      var emailBody = encodeURIComponent(
        "Plumbing Quote Analysis\n" +
        "Service: " + r.serviceType.label + "\n" +
        (r.subLabel ? "Details: " + r.subLabel + "\n" : "") +
        (r.brandNote ? "Brand: " + r.brandNote + "\n" : "") +
        (isUpload ? "Quote Price: " + fmt(r.quotePrice) + "\n" : "") +
        "Benchmark: " + fmt(r.benchmark) + "\n" +
        "Verdict: " + r.verdict.label + "\n" +
        "Region: " + capitalize(r.region) + "\n\n" +
        "Analyzed by TruePrice - https://truepricehq.com/plumbing-quote-analyzer.html"
      );

      appRoot.innerHTML = '\
        <div class="plumb-hero">\
          <h1>' + (isUpload ? "Plumbing Quote Analysis" : "Your Plumbing Estimate") + '</h1>\
        </div>\
        <div class="plumb-verdict ' + verdictCss + '">\
          <div class="verdict-label">' + r.verdict.label + '</div>\
          <div class="verdict-price">' + priceDisplay + '</div>\
          <div class="verdict-range">' + rangeText + '</div>\
        </div>\
        <div class="plumb-card">\
          <h3 style="margin-bottom:0.75rem;">Service Details</h3>\
          ' + detailsHtml + '\
        </div>\
        ' + scopeHtml + '\
        ' + contextHtml + '\
        <div class="plumb-actions">\
          <a class="plumb-btn plumb-btn-primary plumb-btn-full" href="/find-contractors.html?service=plumbing">Find Plumbing Contractors</a>\
          <a class="plumb-btn plumb-btn-secondary plumb-btn-full" href="mailto:?subject=' + emailSubject + '&body=' + emailBody + '">Email Me This Report</a>\
          <button class="plumb-btn plumb-btn-secondary plumb-btn-full" id="btnStartOver">Start Over</button>\
        </div>';

      document.getElementById("btnStartOver").addEventListener("click", function() {
        state = {
          step: "address",
          address: { street: "", city: "", stateCode: "", zip: "" },
          uploadedFile: null,
          extractedText: "",
          est: { serviceType: null, subType: null, bathrooms: "", homeAge: null, urgency: null },
          result: null
        };
        render();
      });
    }

    function capitalize(s) {
      return s ? s.charAt(0).toUpperCase() + s.slice(1) : "";
    }

    // ── Init ──
    render();

  })();
  </script>
<script src="/js/tp-analytics.js" async></script>
</body>
</html>
