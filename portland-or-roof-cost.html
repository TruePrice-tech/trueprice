<section class="section fp-section"><h2>Portland neighborhood roof pricing</h2>
<div style="overflow-x:auto;"><table class="price-table fp-table" style="width:100%; border-collapse:collapse; font-size:14px;"><thead><tr style="border-bottom:2px solid var(--border); background:var(--bg-subtle,#f8fafc);"><th style="text-align:left; padding:12px 16px;">Neighborhood</th><th style="text-align:right; padding:12px 16px;">3-Tab Composition</th><th style="text-align:right; padding:12px 16px;">Architectural</th><th style="text-align:right; padding:12px 16px;">Standing-Seam Metal</th></tr></thead><tbody><tr><td style="padding:12px 16px; font-weight:600;">Alberta Arts</td><td style="padding:12px 16px; text-align:right;">$11.4K</td><td style="padding:12px 16px; text-align:right;">$14.1K</td><td style="padding:12px 16px; text-align:right;">$30.9K</td></tr><tr><td style="padding:12px 16px; font-weight:600;">Hawthorne</td><td style="padding:12px 16px; text-align:right;">$11.0K</td><td style="padding:12px 16px; text-align:right;">$13.6K</td><td style="padding:12px 16px; text-align:right;">$29.8K</td></tr><tr><td style="padding:12px 16px; font-weight:600;">Sellwood</td><td style="padding:12px 16px; text-align:right;">$10.9K</td><td style="padding:12px 16px; text-align:right;">$13.4K</td><td style="padding:12px 16px; text-align:right;">$29.5K</td></tr><tr><td style="padding:12px 16px; font-weight:600;">Northwest</td><td style="padding:12px 16px; text-align:right;">$9.8K</td><td style="padding:12px 16px; text-align:right;">$12.0K</td><td style="padding:12px 16px; text-align:right;">$26.3K</td></tr><tr><td style="padding:12px 16px; font-weight:600;">Laurelhurst</td><td style="padding:12px 16px; text-align:right;">$10.2K</td><td style="padding:12px 16px; text-align:right;">$12.5K</td><td style="padding:12px 16px; text-align:right;">$27.5K</td></tr><tr><td style="padding:12px 16px; font-weight:600;">Mississippi</td><td style="padding:12px 16px; text-align:right;">$10.3K</td><td style="padding:12px 16px; text-align:right;">$12.6K</td><td style="padding:12px 16px; text-align:right;">$27.8K</td></tr></tbody></table></div>
<p style="font-size:13px; color:var(--text-muted); margin-top:8px;"><a href="/analyze-my-quote.html?city=Portland&state=OR" style="color:var(--brand);">Upload your Portland quote for line-item comparison.</a></p></section><section class="section fp-section"><h2>Portland climate and roof performance</h2><p>Portland roofs face 43 inches of rain concentrated almost entirely between October and May, creating the wettest sustained-moisture environment of any major US metro outside the Pacific Northwest. Moss is THE dominant degradation factor in Portland roofing: it grows aggressively on north-facing slopes and in canopy-shaded neighborhoods like Laurelhurst, Eastmoreland, and Southwest Hills, infiltrating composition shingle edges and lifting granules within 3-5 years of installation if untreated. Portland averages only 15 freeze-thaw cycles per year, but the January 2021 ice storm coated the metro in 1-2 inches of radial ice, bringing down trees onto roofs across the east side and causing widespread structural damage in Irvington and Alameda. Portland's water is extremely soft (sourced from Bull Run Reservoir), which means mineral staining and efflorescence are essentially nonexistent here, but biological growth replaces mineral degradation as the primary aesthetic and structural concern.</p><p>Portland hail is minimal (annual expectation 0-1 damaging events) but Pacific winter windstorms drive 50-70 mph sustained gusts from October through March, with the December 2015 and January 2021 ice storms producing widespread roof damage across the metro. ASCE 7-22 rates Portland at 85-95 mph design wind speed depending on specific location. The Columbia Gorge channeling effect creates localized high-wind zones in East Portland and Troutdale. Persistent winter rain (43 inches annually) rather than acute weather events is the primary roof-degradation factor; moss, algae, and moisture drive more replacements than storm damage.</p></section><section class="section fp-section"><h2>Portland dominant roofing materials</h2><p>Portland's dominant roofing materials are architectural composition with algae-resistant granules (AR rating is essential here due to sustained moisture), cedar shake on mid-century ranch and Craftsman-period homes in Laurelhurst and Eastmoreland, and standing-seam metal on architect-designed hillside builds in Southwest Hills and the West Hills. Malarkey Roofing Products is headquartered in Portland and their Legacy and Vista AR lines are the most commonly specified local product. Moss-prevention zinc or copper ridge strips are a Portland-specific essential spec that delivers 10-15 years of moss prevention at a modest cost premium. Synthetic underlayment (vs organic felt) is the Portland-critical spec because organic felt degrades in sustained moisture conditions within 5-7 years.</p><p>Portland's dominant roofing is architectural composition with algae-resistant granules on 1910s-1940s bungalows and Craftsman homes across Laurelhurst, Irvington, and Sellwood, cedar shake on 1950s-1970s mid-century modern homes in the West Hills and Dunthorpe, and increasingly standing-seam metal and stone-coated steel on renovation and new construction. Moss growth on north-facing slopes is the defining Portland roof-maintenance issue: non-AR composition shows visible moss colonization within 2-4 years. Malarkey (headquartered in Portland) has the strongest local brand presence.</p><p>Malarkey Roofing Products manufactures composition at three Portland-area plants (Milwaukie, Portland, Clackamas County), providing same-day or next-day delivery to every Portland jobsite. GAF ships through the Sacramento and Seattle distribution hubs. Owens Corning ships from Kansas City and Denver plants. CertainTeed ships from Shakopee MN. Atlas ships from Texas and Georgia. IKO ships from Canadian plants. Portland distributors include ABC Supply (multiple metro locations), Beacon Roofing Supply, SRS Distribution, and Pacific Supply. Malarkey's local manufacturing presence gives Portland contractors the broadest in-stock AR composition selection in the country.</p></section><section class="section fp-section"><h2>Portland permits, codes, and licensing</h2><p>Oregon requires a Construction Contractors Board (CCB) license for any paid roofing installation, verified at oregon.gov/ccb. Portland Bureau of Development Services issues reroof permits and enforces 2021 Oregon Residential Specialty Code with Portland-specific amendments focused on moisture management and continuous air-barrier requirements. Irvington and Ladd's Addition historic districts require Portland Historic Landmarks Commission approval before any exterior alteration, and approved replacement materials must match original cedar shake, slate, or specific composition profiles on contributing structures. Cedar shake replacement in these districts requires fire-retardant-treated material per Oregon Fire Code, and untreated cedar is no longer code-compliant for new installations.</p><p>City of Portland Bureau of Development Services (BDS) permits residential reroofs through the online portal within 5-10 business days at $200 minimum. Beaverton, Lake Oswego, and Tigard use separate permit processes. Portland Historic Landmarks Commission oversees 20+ designated districts including Irvington, Ladd's Addition, Piedmont, Albina, Lair Hill, and King's Hill. Landmark review adds 4-8 weeks. Oregon Residential Specialty Code plus Oregon Construction Contractors Board (CCB) licensing are both required; verify CCB license status at ccb.oregon.gov before signing.</p><p>Portland has 20+ locally designated historic districts under Portland Historic Landmarks Commission including Irvington, Ladd's Addition, Piedmont, Albina, Lair Hill, King's Hill/Nob Hill, Alphabet, Buckman, Sunnyside, South Portland, East Portland Grand Avenue, and Eliot. National Register listings include Laurelhurst, Eastmoreland, and Portland Heights. Landmark review on contributing structures requires matching original composition, cedar shake, or slate profiles from 1880s-1940s construction. Portland's Craftsman bungalow heritage drives specific profile requirements on contributing structures in Irvington and Laurelhurst.</p></section><section class="section fp-section"><h2>Portland roofing insurance and claims</h2><p>Portland homeowners insurance covers wind and windstorm damage but treats moss-driven decay as homeowner-responsibility wear, which catches many Portland homeowners off guard when their first claim is denied. The January 2021 ice storm generated $150M+ in residential roof claims across the metro, and carriers have since tightened underwriting on canopy-adjacent properties. PGE (Portland General Electric) and NW Natural offer envelope credits on qualifying whole-home retrofits but no direct roofing rebates. Moss-prevention zinc or copper ridge strips cost $300-$600 installed and can prevent $2,000-$5,000 in moss-remediation costs over a 10-year cycle, making them the highest-ROI spec add in the Portland market.</p><p>Oregon carriers handle windstorm and ice-storm damage under standard policies but treat moss-driven and moisture-driven decay as homeowner-responsibility maintenance. Oregon's moderate hail exposure means Class 4 impact-rated products do not drive premium incentives the way they do in Denver or Dallas. Pacific windstorm damage claims must be filed promptly; Oregon Revised Statutes Section 746.230 prohibits unfair claim settlement. The December 2015 and January 2021 ice storms produced multi-year claim backlogs that pushed metro reroof timelines to 12-16 weeks for six months afterward.</p></section><section class="section fp-section"><h2>Vetting a Portland roofing contractor</h2><p>Portland contractor verification starts at oregon.gov/ccb for active CCB license, bond status, and complaint history. Oregon CCB publishes full complaint and disciplinary history by license number, which is more transparent than most states. Portland's biggest contractor risk is unlicensed handyman operators performing reroof work under the $1,000 exemption threshold and then expanding scope mid-project; any work over $1,000 requires CCB licensing and the homeowner loses surety-bond recovery rights if the contractor is unlicensed. Malarkey Roofing Products is headquartered in Portland and maintains strong local contractor relationships, so Malarkey-certified installers have above-average accountability in this market.</p><p>Malarkey Roofing Products (headquartered in Portland) dominates the local market with Vista AR (algae-resistant, 30-year), Legacy Scotchgard (Class 4, 50-year), and Highlander NEX AR (40-year rubberized asphalt). GAF Golden Pledge, OC Platinum Preferred, and CertainTeed SureStart PLUS also available through Portland distributors. Cedar shake contractors offer 15-25 year stain warranties with periodic retreatment requirements. Stone-coated steel (Decra, Gerard) carries 50-year limited lifetime warranty. Portland's persistent moisture makes AR granule and anti-moss treatment warranties functionally important.</p></section><section class="section fp-section"><h2>Portland qualified installer pool</h2><p>Portland's installer pool benefits uniquely from Malarkey Roofing Products' local headquarters: more Portland crews hold Malarkey certification than in any other US metro, giving homeowners the broadest Malarkey product selection anywhere. Approximately 160-250 active residential crews serve the four-county metro. The June-September dry-season install window compresses demand into 4 months, pushing peak-season lead times to 10-16 weeks. Oregon CCB license verification at ccb.oregon.gov is the mandatory first vetting step.</p></section><section class="section fp-section"><h2>Portland gutter and solar integration</h2><p>Portland gutter integration is critical due to 43 inches of annual rainfall concentrated from October through May. K-style aluminum 6-inch gutters with 3x4 downspouts are the metro spec; many Portland homes need 7-inch K-style on large-eave Craftsman bungalows. Gutter guards are essential ($6-$12 per linear foot) in tree-dense neighborhoods like Laurelhurst, Eastmoreland, and West Hills where Douglas fir needle debris clogs unprotected gutters within weeks. Copper gutters appear on Irvington and Portland Heights landmarked homes. Zinc-strip ridge installation ($3-$5 per linear foot) retards moss growth at the roof-gutter transition zone.</p><p>Portland solar adoption is moderate under the 30% federal ITC plus Portland General Electric (PGE) and Pacific Power net-metering plus Oregon Solar + Storage Rebate Program (up to $5,000). Portland's solar resource is the lowest of any major West Coast metro due to cloud cover, but the combination of federal ITC plus state rebate plus net-metering still produces 10-14 year payback on a 7-10 kW south-facing system. Pearl District and inner-eastside flat-roof solar uses ballasted racking requiring structural verification. Critical coordination: schedule reroof BEFORE solar when panels are within 3-5 years.</p></section><section class="section fp-section"><h2>Portland tear-off and disposal logistics</h2><p>Portland tear-off debris routes to Metro South or Metro Central transfer stations at $65-$95 per ton, Oregon's highest among major metros. Cedar shake tear-off contains creosote-treated material that some facilities reject outright, requiring specialty hauling to Coffin Butte Landfill in Corvallis. Knife River Materials accepts composition shingle recyclate for hot-mix asphalt at their Wilsonville plant. Oregon DEQ tracks construction debris diversion rates by contractor license number.</p></section><section class="section fp-section"><h2>Portland rebates and tax credits on reroof scope</h2><p>Energy Trust of Oregon provides $0.50-$1.25 per sqft rebates on attic insulation upgrades bundled with reroof scope, among the most generous utility-funded programs in the country. Portland Clean Energy Fund may provide additional funding for qualifying low-income properties in specific census tracts. The federal 25C credit stacks at 30% up to $1,200 annually. PGE and Pacific Power net-metering programs coordinate with solar installations paired with reroof scope through the Energy Trust solar pathway.</p></section><section class="section fp-section"><h2>Portland reroof upsells to accept and decline</h2><p>Portland reroof upsells worth accepting: upgrade to AR (algae-resistant) granules (mandatory in Portland's persistent moisture climate; non-AR shows visible moss within 2-4 years), upgrade to synthetic underlayment (Portland rain degrades organic felt in 12-18 years), zinc-strip ridge installation for continuous moss prevention ($3-$5 per linear foot, lasts 15-20 years), and upgrade to 6-foot ice-and-water-shield at eaves (Portland rarely freezes hard but east-wind ice events occur). Upsells to decline: excessive Class 4 impact-rated upgrade (Portland hail too infrequent for ROI), unnecessary powered attic ventilation, and "Pacific Northwest-specific" proprietary products without independent certification.</p></section><section class="section fp-section"><h2>Portland post-install maintenance cadence</h2><p>Portland maintenance is dominated by moss management: treat north-facing slopes with zinc-sulfate solution every February before spring growth season in Laurelhurst, Eastmoreland, and Alameda Ridge neighborhoods. Clear Douglas fir needle debris from valleys and gutters quarterly during the October-May wet season. Inspect cedar shake homes in Dunthorpe and Lake Oswego for split shakes and failed stain every 3-5 years. Malarkey AR-granule products installed by local crews resist moss colonization 3-5 years longer than non-AR composition on equivalent north-facing exposures.</p></section><section class="section fp-section"><h2>Portland residential roof market scale</h2><p>Portland metro (Multnomah, Washington, Clackamas, Clark WA counties) has approximately 680,000 single-family homes. Composition dominates at roughly 82%, cedar shake at 8% (declining as homes convert to composition or stone-coated steel), standing-seam metal at 5%, stone-coated steel at 3%, and other at 2%. Average reroof cycle is 22-30 years on AR composition (moss-managed) and 12-18 years on non-AR or unmaintained composition. Portland BDS pulls approximately 12,000-18,000 roof permits annually; metro-wide runs 30,000-50,000 in typical years.</p></section><section class="section fp-section"><h2>Portland pricing cycle across the calendar</h2><p>Portland reroof pricing peaks June through September during the reliable dry-weather install window. October through May rainfall disrupts install scheduling; most Portland contractors stop composition work during sustained rain events and reschedule to the next dry window. This compresses peak-season demand into 4 months, making July-August bookings competitive (8-14 week lead times common). Best pricing runs late May (before peak) and October (after peak) at 10-15% below midsummer rates. Malarkey's local manufacturing means Portland contractors face fewer supply chain delays than most US metros.</p></section><section class="section fp-section"><h2>When to reroof in Portland and what jobs cost</h2>
<p><strong>Portland best months:</strong> June through September, the only reliable dry-weather window for installation.</p>
<p><strong>Portland worst months:</strong> October through April sustained precipitation disrupts scheduling and adhesive cure.</p>
<p>A 2,000-square-foot Portland reroof in 2026 dollars at prevailing Portland labor rates: basic composition with Portland-compliant underlayment runs approximately $9.5K; mid-range architectural composition with enhanced warranty runs $13.0K; premium standing-seam metal runs $31.5K. These numbers reflect Portland installer rates, not national averages. The dominant Portland material story is algae-resistant composition with moss-prevention zinc strips and cedar shake on Craftsman-period homes, which frames nearly every Portland reroof decision.</p>

<summary>How long does a roof last in Portland?</summary>
<div class="faq-answer"><p>In Portland's climate, architectural asphalt shingles typically last 20-25 years, standard 3-tab shingles 15-20 years, metal roofing 40-60 years, and tile 50+ years. These estimates assume proper ventilation and no major storm damage. UV exposure is the primary degradation factor here, so lighter-colored materials and adequate attic ventilation both extend lifespan meaningfully.</p></div>

<div class="faq-answer"><p>In most jurisdictions including Portland, a building permit is required for a full roof replacement. Your contractor should pull the permit before work begins. Unpermitted roofing work can void your homeowners insurance coverage and create disclosure issues when selling the home.</p></div>

<details class="faq-item">
<summary>When is the best time to replace a roof in Portland?</summary>
<div class="faq-answer"><p>The optimal window for roof replacement in Portland is late summer or early fall, stable weather allows proper curing and contractors are less backlogged than spring. Scheduling during off-peak periods can save 10-15% on labor costs since contractors have more availability and may offer competitive pricing to fill their calendar. Avoid scheduling immediately after a major storm event when contractor demand (and prices) spike.</p></div>
</details>

<p><strong>Why pricing varies in Portland.</strong> Labor rates here run roughly 32% above the national average per BLS metro data, which is the single biggest driver of how this city's pricing differs from the national midpoint. For roofing specifically, our cost-multiplier model puts Portland at roughly 15% above the national midpoint.</p>

<p><strong>Local conditions.</strong> Portland receives abundant rainfall in the marine climate zone, with extended wet seasons promoting moss growth and requiring proper ventilation to prevent moisture damage Portland sees stable weather conditions year-round. Moss-resistant shingles or metal are worth the upgrade; the constant moisture grows moss on standard asphalt within 3-5 years.</p>

<p><strong>Permits, codes, and licensing.</strong> A roofing permit is required in Portland for complete tear-off and replacement projects; apply through the Portland Building Division Algae and moss-resistant shingles or metal roofing are ideal for Portland's wet climate, with zinc strip installations helping prevent biological growth</p>

<p><strong>Contractor market.</strong> As a major metro of 609,456 residents, the local contractor market is deep — expect 10+ legitimate bidders on any standard residential job. Portland has seen steady growth, which means a healthy supply of established contractors with multi-year track records.</p>
