<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="/favicon.png" type="image/png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout Canceled | Woogoro</title>
  <meta name="robots" content="noindex,nofollow" />
  <link rel="canonical" href="https://woogoro.com/pro-cancel.html" />
  <link rel="stylesheet" href="/css/woogoro.min.css" />
  <style>
    .pc-wrap { max-width:520px; margin:48px auto; padding:0 20px; text-align:center; }
    .pc-card { background:#fff; border:1px solid #e2e8f0; border-radius:16px; padding:36px 28px; }
    .pc-h { font-size:22px; margin:0 0 12px; color:#0f172a; }
    .pc-msg { font-size:15px; color:#334155; line-height:1.6; margin:0 0 22px; }
    .pc-actions { display:flex; gap:12px; justify-content:center; flex-wrap:wrap; }
    .pc-btn { display:inline-block; padding:10px 20px; background:#1d4ed8; color:#fff; border-radius:8px; text-decoration:none; font-weight:600; font-size:14px; }
    .pc-btn:hover { background:#1e40af; }
    .pc-btn-ghost { background:#fff; color:#1d4ed8; border:2px solid #1d4ed8; }
    .pc-btn-ghost:hover { background:#f0f7ff; }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a class="logo" href="/"><picture><source srcset="/images/Iris/Iris%20color%20side%20silhouette.webp" type="image/webp"/><img class="logo-mark" src="/images/Iris/Iris%20color%20side%20silhouette.png" alt="" width="32" height="32" /></picture><span class="logo-text">Woogoro</span></a>
    </div>
  </header>

  <main>
    <div class="pc-wrap">
      <div class="pc-card">
        <h1 class="pc-h">Checkout canceled.</h1>
        <p class="pc-msg">No charges were made. Your free analysis is still available, and you can come back to Pro any time.</p>
        <div class="pc-actions">
          <a href="javascript:history.back()" class="pc-btn">Back to your quote</a>
          <a href="/" class="pc-btn pc-btn-ghost">Browse Woogoro</a>
        </div>
      </div>
    </div>
  </main>
</body>
</html>
