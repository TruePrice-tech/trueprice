<!DOCTYPE html>
<html>
<head>

<title>Roof Replacement Cost Calculator | TruePrice</title>

<meta name="description" content="Estimate roof replacement cost using the TruePrice roof calculator.">

<style>

body{
font-family:Arial;
background:#f5f7fa;
padding:40px;
}

.card{
background:white;
padding:30px;
border-radius:10px;
max-width:700px;
margin:auto;
}

button{
padding:12px 16px;
background:#2563eb;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="card">

<h1>Roof Replacement Cost Calculator</h1>

<p>Estimate a fair roof replacement price.</p>

<label>Roof size (sq ft)</label>
<input type="number" id="roofSize">

<br><br>

<button onclick="estimate()">
Estimate Cost
</button>

<p id="result"></p>

</div>

<script>

function estimate(){

let size=document.getElementById("roofSize").value;

let low=size*5;
let high=size*8;

document.getElementById("result").innerText=
"Estimated cost: $"+low+" to $"+high;

}

</script>

</body>
</html>
