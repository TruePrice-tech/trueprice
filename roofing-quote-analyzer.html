<section class="card">

<h2>Quick Roofing Quote Analysis</h2>

<p>
Enter the key numbers from your roofing quote to estimate whether the price appears low, typical, or high for many markets.
</p>

<label>Roof Size (square feet)</label>
<input id="roofSize" type="number" placeholder="ex: 2400">

<label>Total Quote Price ($)</label>
<input id="quotePrice" type="number" placeholder="ex: 16500">

<br><br>

<button class="btn" onclick="analyzeQuote()">Analyze Quote</button>

</section>

<section class="card">

<h2>Analysis Result</h2>

<div id="analysisOutput">
Enter values above to analyze the quote.
</div>

</section>

<script>

function analyzeQuote(){

const roofSize = parseFloat(document.getElementById("roofSize").value);
const price = parseFloat(document.getElementById("quotePrice").value);

if(!roofSize || !price){
document.getElementById("analysisOutput").innerHTML =
"Please enter both roof size and quote price.";
return;
}

const pricePerSqFt = price / roofSize;
const squares = roofSize / 100;
const pricePerSquare = price / squares;

let category;

if(pricePerSqFt < 4.5){
category = "Low";
}
else if(pricePerSqFt < 8){
category = "Typical";
}
else{
category = "High";
}

document.getElementById("analysisOutput").innerHTML = `
<p><strong>Price per square foot:</strong> $${pricePerSqFt.toFixed(2)}</p>
<p><strong>Price per roofing square:</strong> $${pricePerSquare.toFixed(0)}</p>
<p><strong>Estimated pricing category:</strong> ${category}</p>
<p>Pricing varies by material, roof complexity, and region, but this gives a directional benchmark.</p>
`;

}

</script>
