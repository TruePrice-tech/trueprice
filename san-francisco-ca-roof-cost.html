<h2>Local Roofing Guide for San Francisco, CA</h2>
<p>San Francisco's moderate four-season climate is relatively forgiving on roofing materials, giving homeowners more flexibility in material choice. That said, local factors like tree coverage, wind exposure, and occasional severe weather still matter.</p>
<p>With an average home age of 52 years, many San Francisco roofs are on their second or third replacement. Older homes frequently need decking repairs, upgraded ventilation to current code, and sometimes structural reinforcement before new roofing goes on. Budget an additional 10-20% contingency for homes built before 1985.</p>

<section class="section fp-section"><h2>San Francisco neighborhood roof pricing</h2>
<div style="overflow-x:auto;"><table class="price-table fp-table" style="width:100%; border-collapse:collapse; font-size:14px;"><thead><tr style="border-bottom:2px solid var(--border); background:var(--bg-subtle,#f8fafc);"><th style="text-align:left; padding:12px 16px;">Neighborhood</th><th style="text-align:right; padding:12px 16px;">3-Tab Composition</th><th style="text-align:right; padding:12px 16px;">Architectural</th><th style="text-align:right; padding:12px 16px;">Standing-Seam Metal</th></tr></thead><tbody><tr><td style="padding:12px 16px; font-weight:600;">Noe Valley</td><td style="padding:12px 16px; text-align:right;">$12.7K</td><td style="padding:12px 16px; text-align:right;">$15.7K</td><td style="padding:12px 16px; text-align:right;">$34.4K</td></tr><tr><td style="padding:12px 16px; font-weight:600;">Mission</td><td style="padding:12px 16px; text-align:right;">$12.3K</td><td style="padding:12px 16px; text-align:right;">$15.1K</td><td style="padding:12px 16px; text-align:right;">$33.1K</td></tr><tr><td style="padding:12px 16px; font-weight:600;">Sunset</td><td style="padding:12px 16px; text-align:right;">$12.2K</td><td style="padding:12px 16px; text-align:right;">$14.9K</td><td style="padding:12px 16px; text-align:right;">$32.8K</td></tr><tr><td style="padding:12px 16px; font-weight:600;">Richmond</td><td style="padding:12px 16px; text-align:right;">$10.9K</td><td style="padding:12px 16px; text-align:right;">$13.4K</td><td style="padding:12px 16px; text-align:right;">$29.3K</td></tr><tr><td style="padding:12px 16px; font-weight:600;">Pacific Heights</td><td style="padding:12px 16px; text-align:right;">$11.3K</td><td style="padding:12px 16px; text-align:right;">$13.9K</td><td style="padding:12px 16px; text-align:right;">$30.6K</td></tr><tr><td style="padding:12px 16px; font-weight:600;">Bernal Heights</td><td style="padding:12px 16px; text-align:right;">$11.4K</td><td style="padding:12px 16px; text-align:right;">$14.1K</td><td style="padding:12px 16px; text-align:right;">$30.9K</td></tr></tbody></table></div>
<p style="font-size:13px; color:var(--text-muted); margin-top:8px;"><a href="/analyze-my-quote.html?city=San Francisco&state=CA" style="color:var(--brand);">Upload your San Francisco quote for line-item comparison.</a></p></section><section class="section fp-section"><h2>San Francisco climate and roof performance</h2><p>San Francisco roofs face the combination of marine moisture (fog-belt saturation from June marine layer and winter atmospheric rivers), persistent moss and algae growth, and Title 24 cool-roof requirements for any low-slope replacement. SF's hill-and-canyon microclimates vary dramatically: Sunset and Richmond fog-belt homes see very different moisture loads than Bernal Heights and Potrero Hill sun-belt homes. The dominant SF roofing material is composition on Victorian and Edwardian replacements, clay or concrete tile on Mediterranean-style homes, and increasingly standing-seam metal on architect-designed modern builds.</p><p>San Francisco hail is nearly zero (annual expectation 0 damaging events metro-wide) but Pacific winter windstorms drive 50-70 mph gusts and occasional 80-100 mph atmospheric-river windstorm events. ASCE 7-22 rates SF at 85 mph design wind speed with Exposure B/C for most residential zones. SF's fog-belt microclimate (Sunset, Richmond, Outer Sunset) drives persistent moisture saturation; sun-belt microclimate (Mission, Bernal, Potrero) sees minimal moisture and more UV exposure. WUI fire-hazard zones near the Presidio and Twin Peaks trigger Chapter 7A Class A fire-rated assembly requirements.</p></section><section class="section fp-section"><h2>San Francisco dominant roofing materials</h2><p>SF's dominant roofing materials are architectural composition with algae-resistance on Victorian and Edwardian replacements (most SF residential), clay and concrete tile on Mediterranean-style homes, and standing-seam metal on modern architect-designed homes. SF's marine climate makes algae-resistance (AR granules with copper or zinc compounds) essential on north-facing slopes across the city. Cool-roof reflective coatings on low-slope portions meet Title 24 requirements.</p><p>San Francisco's dominant roofing is architectural composition with algae-resistant granules (GAF Timberline HDZ, Owens Corning Duration, CertainTeed Landmark) on Victorian and Edwardian replacements across Haight-Ashbury, Noe Valley, Bernal Heights, and Mission District, clay and concrete tile on Mediterranean-style homes in Sunset and Richmond, and standing-seam metal on architect-designed hillside modern builds in Twin Peaks, Forest Hill, and St. Francis Wood. Flat-roof modified bitumen and TPO appear on modern Mission Bay and SoMa residential construction.</p><p>GAF ships to San Francisco through the Oakland and Sacramento distribution hubs with 1-3 day lead times. Owens Corning manufactures at Medina OH and ships West Coast through Sacramento. CertainTeed ships from California plants with 2-4 day lead times. Atlas ships from Cordele GA. Malarkey manufactures in Portland OR, providing 3-5 day lead times. IKO ships from Canadian plants. Eagle Roofing Products ships tile from Rialto CA with 2-4 day lead times. US Tile/Boral ships from Corona CA. SF distributors include ABC Supply, Beacon Roofing Supply (Brisbane, San Jose), and Dunn-Edwards Supply.</p></section><section class="section fp-section"><h2>San Francisco permits, codes, and licensing</h2><p>California requires a C-39 roofing contractor license from CSLB. San Francisco DBI additionally requires city contractor registration for permit-pulling. SF Historic Preservation Commission plus Planning Code Articles 10 and 11 cover 270+ designated landmarks and 11 historic districts; landmarked replacements require commission approval before any material is ordered. Title 24 Part 6 cool-roof provisions require minimum solar reflectance on all low-slope replacements, and the California Energy Commission publishes approved product lists.</p><p>San Francisco Department of Building Inspection (DBI) permits residential reroofs through the Permit Center within 5-10 business days at $285 minimum. Scope changes trigger Plan Check review adding 2-6 weeks. SF Historic Preservation Commission plus Planning Code Articles 10 and 11 cover 270+ designated landmarks and 11 historic districts including Alamo Square, Jackson Square, Liberty-Hill, Dogpatch, Chinatown, and Webster Street. Landmark review adds 6-14 weeks. SF dust-control ordinance §3428 requires HEPA-vacuum cleanup verification; pre-1978 homes also require EPA RRP lead-safe certification.</p><p>San Francisco has 270+ designated landmarks under Article 10 plus 11 historic districts under Article 11 of Planning Code. Districts include Alamo Square, Jackson Square, Liberty-Hill, Dogpatch, Chinatown, Webster Street, Willis Polk Residences, Bush Street-Cottage Row, Northeast Waterfront, and South End. Individually landmarked buildings appear across Pacific Heights, Presidio Heights, Nob Hill, Russian Hill, Telegraph Hill, North Beach, Haight-Ashbury, and Noe Valley. Landmark review applies to contributing structures, and approved materials typically match original composition, wood shake, slate, or tile profiles from 1850s-1920s construction.</p></section><section class="section fp-section"><h2>San Francisco roofing insurance and claims</h2><p>SF homeowners insurance covers sudden and accidental damage but treats moss-driven and moisture-driven decay as homeowner wear. Wildfire coverage is a separate consideration: most major California carriers have pulled new-policy writing in WUI zones near the Presidio and Twin Peaks. SF's marine climate also creates unusual moisture-damage claim patterns that carriers increasingly exclude from standard policies. PG&E and BayREN offer envelope credits on qualifying whole-home retrofits but no direct roofing rebates.</p><p>SF insurance carriers handle windstorm damage under standard policies but treat moss-driven and moisture-driven decay as homeowner wear. Wildfire coverage is increasingly constrained: State Farm, Allstate, Farmers have pulled new-policy writing in WUI zones near the Presidio and Twin Peaks since 2022. California FAIR Plan provides fallback coverage when private-market writing is unavailable; Class A fire-rated assemblies are required for FAIR Plan eligibility. Earthquake coverage is separate (California Earthquake Authority or private wraparound). SF's marine climate also creates unusual moisture-damage claim patterns that carriers increasingly exclude.</p></section><section class="section fp-section"><h2>Vetting a San Francisco roofing contractor</h2><p>SF contractor verification: active CSLB C-39 license at cslb.ca.gov, SF DBI city contractor registration, and complaint history at sfdbi.org. SF lead-safe renovation rules (pre-1978 homes) require EPA RRP certification for any job disturbing lead-painted surfaces. SF's dust-control ordinance §3428 imposes HEPA-vacuum cleanup verification before final inspection on lead-impacted projects.</p><p>SF composition contractors offer GAF Golden Pledge, Owens Corning Platinum Preferred, and CertainTeed SureStart PLUS with algae-resistant granule warranties. Tile contractors offer Eagle Roofing Products or US Tile 50-year material warranty plus separate 20-25 year underlayment warranty on synthetic underlayment. Standing-seam metal warranties run 40-50 years on paint plus 50 years on substrate. SF's marine climate makes underlayment warranty the controlling factor on tile-roof longevity; organic felt typically fails at 20-25 years in SF moisture exposure, synthetic underlayment extends that to 30-40 years.</p></section><section class="section fp-section"><h2>San Francisco qualified installer pool</h2><p>San Francisco has roughly 1,200 active CSLB C-39 roofing contractors serving the city and inner Bay Area, with about 150-220 holding current factory-certified status. Victorian and Edwardian restoration specialty installers number 25-45 crews metro-wide, driving 12-20 week lead times on Alamo Square, Pacific Heights, and Haight-Ashbury landmarked projects. SF's brief reliable install window (June-October) plus microclimate variability (fog-belt vs sun-belt) compress peak-season demand. Coastal Commission permitting for coastal-zone properties adds 4-8 weeks to permit timelines.</p></section><section class="section fp-section"><h2>San Francisco gutter and solar integration</h2><p>SF gutter integration is critical on pitched-roof housing due to winter atmospheric-river rainfall. K-style aluminum 6-inch gutters with 3x4 downspouts are the SF spec; half-round copper gutters appear on landmarked Victorian and Edwardian homes in Alamo Square and Pacific Heights. Hillside properties in Twin Peaks, Forest Hill, and Sea Cliff require specific downspout routing to prevent foundation drainage issues. Gutter guards are essential ($6-$12 per linear foot) in tree-dense neighborhoods like Presidio Heights, Pacific Heights, and portions of Noe Valley with heavy eucalyptus and cypress debris. Moss growth on north-facing gutters requires zinc-strip mitigation.</p><p>SF solar adoption is moderate under 30% federal ITC plus PG&E NEM 3.0 net-metering (2023 revision reduced solar export compensation materially) plus BayREN incentives. A 6-10 kW south-facing SF composition or tile roof solar installation returns 10-14 year payback under current incentive structure. SF's fog-belt microclimate reduces solar resource significantly on Sunset and Richmond District homes; Mission, Bernal, and Potrero homes see better production. Critical coordination: schedule reroof BEFORE solar when panels are within 3-5 years. Victorian and Edwardian tile or composition roofs require specific flashing coordination with solar installer.</p></section><section class="section fp-section"><h2>San Francisco tear-off and disposal logistics</h2><p>San Francisco tear-off disposal is complicated by dense urban geometry: dumpster placement requires SF DPW permits at $75-$150 per day plus parking-meter-bagging fees. Tear-off routes to Bay Area-regulated C&D facilities with 65% CalRecycle diversion mandate. Asbestos in pre-1980 built-up flat-roof and pre-1930 slate substrates requires Bay Area Air Quality Management District (BAAQMD) notification and licensed abatement, adding $3,500-$12,000. Lead-painted substrates trigger EPA RRP scope on pre-1978 homes plus SF dust-control ordinance §3428 HEPA-vacuum cleanup verification. Victorian restoration debris may preserve architectural salvage value.</p></section><section class="section fp-section"><h2>San Francisco rebates and tax credits on reroof scope</h2><p>San Francisco homeowners layer PG&E Home Efficiency Rebate Plus plus BayREN Home+ incentives (combined $2,000-$3,500 on whole-home weatherization) plus federal 25C credit (30% of cost up to $1,200 annually). California Mills Act property-tax reduction applies to qualifying historic landmark properties. Federal 30% ITC applies to coordinated solar installations; SF solar returns 10-14 year payback under NEM 3.0 (reduced from pre-2023 structure). California Earthquake Authority brace-and-bolt rebates coordinate with reroof scope on seismic retrofits.</p></section><section class="section fp-section"><h2>San Francisco reroof upsells to accept and decline</h2><p>SF reroof upsells worth accepting: upgrade to algae-resistant granules (essential in SF marine humidity; non-AR composition shows visible algae within 3-5 years on north-facing slopes), upgrade to synthetic underlayment (SF moisture degrades organic felt faster), upgrade to Class A fire-rated assembly in WUI-adjacent zones (mandatory for FAIR Plan eligibility), and upgrade to Title 24-compliant cool-roof coating on low-slope portions. Upsells to decline: unnecessary skylight additions during reroof (SF Planning Code can restrict skylight installation on contributing structures), excessive ridge ventilation, and "Victorian-specific" proprietary products without historic-preservation approval.</p></section><section class="section fp-section"><h2>San Francisco post-install maintenance cadence</h2><p>SF reroof maintenance cycles: composition roof inspection every 3-5 years with algae and moss assessment (microclimate-variable, aggressive in fog-belt Sunset and Richmond); tile-roof underlayment inspection every 10-15 years. Gutter cleaning three times annually on tree-canopy properties in Presidio Heights, Pacific Heights, and Noe Valley due to heavy eucalyptus and cypress debris. Post-atmospheric-river storm inspection baseline. Seismic inspection post-earthquake for fastener integrity. Victorian and Edwardian landmarked roofs require specialty restoration protocols with matching period materials.</p></section><section class="section fp-section"><h2>San Francisco residential roof market scale</h2><p>San Francisco city and county has approximately 180,000 single-family and small multi-family residential roofs, with SF Bay Area metro (SF, San Mateo, Marin, Alameda, Contra Costa, Santa Clara counties) totaling approximately 1.7 million. Composition dominates SF at roughly 72%, with tile at 15%, standing-seam metal at 6%, slate at 3%, and flat-roof membrane at 4%. SF's reroof cycle is 22-30 years on composition (biological-growth-driven), 30-45 years on tile (underlayment-driven), and 40-60 years on standing-seam metal. SF DBI pulls approximately 4,500-7,500 roof permits annually.</p></section><section class="section fp-section"><h2>San Francisco pricing cycle across the calendar</h2><p>San Francisco reroof pricing peaks June through October during the reliable dry-weather install window. November through March atmospheric-river rainfall disrupts install scheduling; most SF contractors stop composition work during major rain events and reschedule to next available dry window. This compresses peak-season demand into 5 months, making summer bookings competitive (10-18 week lead times common for July-September slots). April-May and late October are the sweet spot for pricing and scheduling. Winter (December-February) is feasible only for emergency-scope replacements; labor premiums run 20-35% above peak season.</p></section><section class="section fp-section"><h2>When to reroof in San Francisco and what jobs cost</h2>
<p><strong>San Francisco best months:</strong> June through October, when fog-season humidity drops enough for reliable install.</p>
<p><strong>San Francisco worst months:</strong> November through March rainy-season install disruption and winter atmospheric rivers.</p>
<p>A 2,000-square-foot San Francisco reroof in 2026 dollars at prevailing San Francisco labor rates: basic composition with San Francisco-compliant underlayment runs approximately $10.6K; mid-range architectural composition with enhanced warranty runs $14.5K; premium standing-seam metal runs $35.0K. These numbers reflect San Francisco installer rates, not national averages. The dominant San Francisco material story is algae-resistant composition on Victorian/Edwardian and clay tile on Mediterranean-style homes, which frames nearly every San Francisco reroof decision.</p>

<div class="faq-list">

<details class="faq-item">
<summary>Does homeowners insurance cover roof replacement?</summary>
<div class="faq-answer">
<p>Insurance covers sudden damage (storms, falling trees) but not wear-and-tear or maintenance neglect. Verify your policy covers replacement cost, not depreciated value.</p>
</div>
</details>

<details class="faq-item">
<summary>Should I repair or replace my roof?</summary>
<div class="faq-answer">
<p>If damage covers less than 30% of the roof and the roof is under 15 years old, repair is usually sufficient. Beyond that, replacement provides better long-term value.</p>
</div>
</details>

<details class="faq-item">
<summary>Should I choose the lowest roofing quote?</summary>
<div class="faq-answer">
<p>Not always. Lower bids sometimes exclude flashing, ventilation upgrades, or disposal costs that appear later as change orders. Compare scope, not just price.</p>
</div>
</details>

</div>
</section>
