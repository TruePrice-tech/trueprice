<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="/favicon-trudy.svg" type="image/svg+xml" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shared Estimate | Woogoro</title>
  <meta name="description" content="View a shared cost estimate from Woogoro." />
  <meta name="robots" content="noindex" />
  <link rel="stylesheet" href="/css/trueprice.min.css" />
  <link rel="stylesheet" href="/css/analyzer.min.css" />
  <style>
    .share-wrap { max-width: 720px; margin: 0 auto; padding: 2rem 1rem; }
    .share-hero { text-align: center; margin-bottom: 2rem; }
    .share-hero h1 { font-size: 1.8rem; color: #1e293b; margin-bottom: 0.5rem; }
    .share-hero p { color: #64748b; font-size: 1rem; }
    .share-loading { text-align: center; padding: 3rem; color: #64748b; }
    .share-error { text-align: center; padding: 3rem; }
    .share-error h2 { color: #dc2626; font-size: 1.3rem; margin-bottom: 0.5rem; }
    .share-error p { color: #64748b; }

    .share-card { background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; }
    .share-verdict { text-align: center; padding: 1.5rem; border-radius: 12px; margin-bottom: 1.5rem; }
    .share-verdict.fair { background: #f0fdf4; border: 2px solid #86efac; }
    .share-verdict.high { background: #fef2f2; border: 2px solid #fca5a5; }
    .share-verdict.low { background: #fffbeb; border: 2px solid #fcd34d; }
    .share-verdict .v-label { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 700; margin-bottom: 0.25rem; }
    .share-verdict.fair .v-label { color: #16a34a; }
    .share-verdict.high .v-label { color: #dc2626; }
    .share-verdict.low .v-label { color: #d97706; }
    .share-verdict .v-price { font-size: 2rem; font-weight: 800; color: #1e293b; }
    .share-verdict .v-range { font-size: 0.95rem; color: #64748b; margin-top: 0.25rem; }

    .share-details { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-bottom: 1rem; }
    .share-detail { background: #f8fafc; border-radius: 8px; padding: 0.75rem 1rem; }
    .share-detail .label { font-size: 0.8rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.03em; }
    .share-detail .value { font-size: 1.05rem; font-weight: 600; color: #1e293b; }

    .share-summary { background: #f8fafc; border-radius: 12px; padding: 1.25rem; margin-bottom: 1.5rem; line-height: 1.6; color: #334155; font-size: 0.95rem; }

    .share-cta { text-align: center; margin-top: 2rem; padding: 1.5rem; background: #eff6ff; border-radius: 12px; border: 1px solid #bfdbfe; }
    .share-cta p { color: #1e40af; font-weight: 600; margin-bottom: 0.75rem; }
    .share-cta a { display: inline-block; padding: 0.75rem 1.5rem; background: #2563eb; color: #fff; border-radius: 8px; text-decoration: none; font-weight: 600; }
    .share-cta a:hover { background: #1d4ed8; }

    .share-meta { text-align: center; font-size: 0.8rem; color: #94a3b8; margin-top: 1rem; }

    @media (max-width: 500px) {
      .share-details { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="share-wrap">
    <div id="shareRoot">
      <div class="share-loading">Loading estimate...</div>
    </div>
  </div>

  <script>
  (function() {
    var root = document.getElementById("shareRoot");

    // Extract ID from URL: /s/abc123
    var pathParts = window.location.pathname.split("/");
    var id = pathParts[pathParts.length - 1];

    if (!id || id.length < 6) {
      root.innerHTML = '<div class="share-error"><h2>Invalid link</h2><p>This estimate link is not valid.</p><p><a href="/">Go to Woogoro</a></p></div>';
      return;
    }

    fetch("/api/share-estimate?id=" + encodeURIComponent(id))
      .then(function(r) {
        if (!r.ok) throw new Error(r.status);
        return r.json();
      })
      .then(function(data) {
        if (data.error) throw new Error(data.error);
        renderEstimate(data);
      })
      .catch(function(err) {
        root.innerHTML = '<div class="share-error"><h2>Estimate not found</h2><p>This estimate may have expired or the link is invalid.</p><p style="margin-top:1rem;"><a href="/" style="color:#2563eb;">Get your own free estimate</a></p></div>';
      });

    function renderEstimate(data) {
      var r = data.result || {};
      var vertical = data.verticalLabel || data.vertical || "Service";
      var city = data.city || "";
      var state = data.stateCode || "";
      var location = (city && state) ? city + ", " + state : "";

      // Determine verdict style
      var verdictClass = "fair";
      var verdictLabel = r.verdictLabel || r.verdict || "Estimate";
      var vl = verdictLabel.toLowerCase();
      if (vl.indexOf("high") >= 0 || vl.indexOf("over") >= 0) verdictClass = "high";
      else if (vl.indexOf("low") >= 0 || vl.indexOf("below") >= 0) verdictClass = "low";

      // Price
      var price = r.quotePrice || r.totalPrice || r.mid || 0;
      var priceStr = price ? "$" + Number(price).toLocaleString() : "N/A";

      // Range
      var low = r.low || r.rangeLow || 0;
      var high = r.high || r.rangeHigh || 0;
      var rangeStr = (low && high) ? "Typical range: $" + Number(low).toLocaleString() + " - $" + Number(high).toLocaleString() : "";

      var html = '<div class="share-hero">'
        + '<h1>' + esc(vertical) + ' Estimate' + (location ? ' in ' + esc(location) : '') + '</h1>'
        + '<p>Shared via <a href="/" style="color:#2563eb;text-decoration:none;font-weight:600;">Woogoro</a></p>'
        + '</div>';

      // Verdict card
      html += '<div class="share-verdict ' + verdictClass + '">'
        + '<div class="v-label">' + esc(verdictLabel) + '</div>'
        + '<div class="v-price">' + priceStr + '</div>'
        + (rangeStr ? '<div class="v-range">' + rangeStr + '</div>' : '')
        + '</div>';

      // Details grid
      var details = [];
      if (r.contractor) details.push({ label: "Contractor", value: r.contractor });
      if (r.material || r.materialLabel) details.push({ label: "Material", value: r.materialLabel || r.material });
      if (r.systemType || r.systemLabel) details.push({ label: "System", value: r.systemLabel || r.systemType });
      if (r.roofSize) details.push({ label: "Roof Size", value: r.roofSize.toLocaleString() + " sq ft" });
      if (r.homeSqFt) details.push({ label: "Home Size", value: Number(r.homeSqFt).toLocaleString() + " sq ft" });
      if (r.confidenceLabel) details.push({ label: "Confidence", value: r.confidenceLabel });
      if (location) details.push({ label: "Location", value: location });

      if (details.length > 0) {
        html += '<div class="share-details">';
        for (var i = 0; i < details.length; i++) {
          html += '<div class="share-detail"><div class="label">' + esc(details[i].label) + '</div><div class="value">' + esc(details[i].value) + '</div></div>';
        }
        html += '</div>';
      }

      // Summary
      if (r.summary) {
        html += '<div class="share-summary">' + esc(r.summary) + '</div>';
      }

      // CTA
      var analyzerUrl = "/" + (data.vertical || "roofing") + "-quote-analyzer.html";
      html += '<div class="share-cta">'
        + '<p>Want to check your own quote?</p>'
        + '<a href="' + analyzerUrl + '">Get a free ' + esc(vertical) + ' estimate</a>'
        + '</div>';

      // Meta
      html += '<div class="share-meta">Shared ' + new Date(data.sharedAt).toLocaleDateString() + '</div>';

      root.innerHTML = html;
      document.title = vertical + " Estimate" + (location ? " in " + location : "") + " | Woogoro";
    }

    function esc(s) {
      var d = document.createElement("div");
      d.textContent = s || "";
      return d.innerHTML;
    }
  })();
  </script>
</body>
</html>
