    // ── Helpers ──
    function $(sel, el) { return (el || document).querySelector(sel); }
    function fmt(n) { return "$" + Number(n).toLocaleString("en-US", { maximumFractionDigits: 0 }); }
    function roundTo100(n) { return Math.round(n / 100) * 100; }

    function getRegionFromState(sc) {
      return STATE_REGIONS[(sc || "").toUpperCase()] || "south";
    }

    function kwFromSize(sizeKey, customKw) {
      if (customKw && Number(customKw) > 0) return Number(customKw);
      var map = { small: 5, medium: 8, large: 11, very_large: 14 };
      return map[sizeKey] || 8;
    }

    function detectSystemSizeKw(text) {
      var t = text.toLowerCase();
      // Match patterns like "6.5 kW", "8kW", "6500W", "6,500 W", "8.0 kw system"
      var kwMatch = t.match(/(\d+\.?\d*)\s*kw/);
      if (kwMatch) return parseFloat(kwMatch[1]);
      // Watt patterns: "6500W", "6,500 watts"
      var wMatch = t.match(/(\d[\d,]*)\s*(?:watts?|w(?:\s|$))/i);
      if (wMatch) {
        var watts = parseFloat(wMatch[1].replace(/,/g, ""));
        if (watts >= 1000) return Math.round(watts / 100) / 10; // convert to kW
      }
      return null;
    }

    function detectPanelBrand(text) {
      var t = text.toLowerCase();
      var allBrands = [];
      Object.keys(SOLAR_PRICING.brands).forEach(function(tier) {
        SOLAR_PRICING.brands[tier].forEach(function(b) {
          allBrands.push({ brand: b, tier: tier });
        });
      });
      for (var i = 0; i < allBrands.length; i++) {
        if (t.indexOf(allBrands[i].brand.toLowerCase()) !== -1) {
          return allBrands[i];
        }
      }
      // Also check "q-cells" and "qcells"
      if (t.indexOf("q-cells") !== -1 || t.indexOf("qcells") !== -1) return { brand: "Q Cells", tier: "mid" };
      if (t.indexOf("longi") !== -1) return { brand: "LONGi", tier: "mid" };
      return null;
    }

    function detectPanelCountAndWattage(text) {
      var t = text.toLowerCase();
      // "20 x 400W panels", "20x400w", "20 panels", "400W panels"
      var countWattMatch = t.match(/(\d+)\s*[x×]\s*(\d+)\s*w/);
      if (countWattMatch) return { count: parseInt(countWattMatch[1]), wattage: parseInt(countWattMatch[2]) };
      // "20 panels" + separate wattage
      var countMatch = t.match(/(\d+)\s*(?:solar\s+)?panels/);
      var wattMatch = t.match(/(\d{2,3})\s*w(?:att)?(?:\s+panels)?/);
      if (countMatch && wattMatch) return { count: parseInt(countMatch[1]), wattage: parseInt(wattMatch[1]) };
      if (countMatch) return { count: parseInt(countMatch[1]), wattage: null };
      return null;
    }

    function detectInverterType(text) {
      var t = text.toLowerCase();
      if (t.indexOf("enphase") !== -1 || t.indexOf("microinverter") !== -1 || t.indexOf("micro-inverter") !== -1 || t.indexOf("micro inverter") !== -1) {
        return { type: "microinverter", label: "Microinverters (Enphase)" };
      }
      if (t.indexOf("solaredge") !== -1 || t.indexOf("solar edge") !== -1 || t.indexOf("optimizer") !== -1 || t.indexOf("power optimizer") !== -1) {
        return { type: "optimizer", label: "Optimizers (SolarEdge)" };
      }
      if (t.indexOf("string inverter") !== -1 || t.indexOf("central inverter") !== -1) {
        return { type: "string", label: "String Inverter" };
      }
      return null;
    }

    function detectBattery(text) {
      var t = text.toLowerCase();
      if (t.indexOf("powerwall") !== -1 || t.indexOf("power wall") !== -1) return { type: "powerwall", label: "Tesla Powerwall" };
      if (t.indexOf("enphase") !== -1 && (t.indexOf("battery") !== -1 || t.indexOf("iq") !== -1 || t.indexOf("storage") !== -1)) return { type: "enphase_iq", label: "Enphase IQ Battery" };
      if (t.indexOf("lg resu") !== -1 || t.indexOf("lg chem") !== -1) return { type: "other", label: "LG RESU Battery" };
      if (t.indexOf("generac") !== -1 && (t.indexOf("pwrcell") !== -1 || t.indexOf("battery") !== -1)) return { type: "other", label: "Generac PWRcell" };
      if (t.indexOf("battery") !== -1 && (t.indexOf("storage") !== -1 || t.indexOf("backup") !== -1)) return { type: "other", label: "Battery Storage" };
      return null;
    }

    function detectSolarScopeSignals(text) {
      var t = text.toLowerCase();
      var signals = {};

      function check(key, positiveTerms, negativeTerms) {
        var found = false;
        var excluded = false;
        positiveTerms.forEach(function(term) { if (t.indexOf(term) !== -1) found = true; });
        if (negativeTerms) negativeTerms.forEach(function(term) { if (t.indexOf(term) !== -1) excluded = true; });
        if (excluded) signals[key] = { status: "excluded" };
        else if (found) signals[key] = { status: "included" };
        else signals[key] = { status: "unclear" };
      }

      check("panels", ["solar panel", "module", "pv panel", "photovoltaic", "panel", "sunpower", "lg solar", "panasonic", "q cells", "longi", "jinko", "trina", "rec ", "silfab", "canadian solar", "400w", "380w", "370w", "360w", "350w"]);

      check("wiring", ["wiring", "conduit", "electrical run", "wire run", "bos", "balance of system", "junction box", "combiner", "rapid shutdown", "disconnect", "ac disconnect", "dc disconnect"]);
      check("panelUpgrade", ["panel upgrade", "electrical panel", "main panel", "200 amp", "200a", "breaker panel", "subpanel", "sub-panel", "load center", "meter socket", "msp upgrade", "service upgrade"]);
      check("permits", ["permit", "plan review", "building permit", "inspection", "structural review", "engineering", "stamped plan", "city approval", "hoa approval"]);
      check("interconnection", ["interconnection", "utility connect", "grid connect", "pto", "permission to operate", "utility application", "net meter application", "grid tied", "grid-tied"]);
      check("netMetering", ["net meter", "net energy", "nem", "net metering", "buy-back", "buyback", "feed-in", "credit", "utility credit"]);
      check("monitoring", ["monitoring", "app", "online portal", "production monitor", "enlighten", "solaredge monitor", "solar monitoring", "wifi", "consumption monitor", "energy monitor"]);
      check("roofWork", ["roof penetration", "waterproof", "flashing", "roof seal", "roof repair", "roof work", "comp out", "tile remove", "re-roof", "roof condition"]);
      check("battery", ["battery", "powerwall", "storage", "backup", "iq battery", "resu", "pwrcell", "encharge", "tesla", "generac", "whole home backup", "backup power", "energy storage"]);
      check("warranty", ["workmanship warranty", "installation warranty", "labor warranty", "10 year", "10-year", "25 year", "25-year", "warranty", "guarantee", "production guarantee", "performance guarantee", "year parts", "year labor"]);

      return signals;
    }

    function detectFederalTaxCredit(text) {
      var t = text.toLowerCase();
      return t.indexOf("itc") !== -1 || t.indexOf("tax credit") !== -1 || t.indexOf("federal credit") !== -1 || t.indexOf("30%") !== -1 || t.indexOf("investment tax") !== -1;
    }

    function detectWarrantyTerms(text) {
      var t = text.toLowerCase();
      var terms = {};
      var panelMatch = t.match(/panel[s]?\s+(?:warranty|warranted)\s*[:\-]?\s*(\d+)\s*(?:year|yr)/);
      if (panelMatch) terms.panels = parseInt(panelMatch[1]);
      else if (t.indexOf("25 year") !== -1 || t.indexOf("25-year") !== -1) terms.panels = 25;
      var invMatch = t.match(/inverter\s+(?:warranty|warranted)\s*[:\-]?\s*(\d+)\s*(?:year|yr)/);
      if (invMatch) terms.inverter = parseInt(invMatch[1]);
      var workMatch = t.match(/workmanship\s+(?:warranty|warranted)\s*[:\-]?\s*(\d+)\s*(?:year|yr)/);
      if (workMatch) terms.workmanship = parseInt(workMatch[1]);
      return Object.keys(terms).length > 0 ? terms : null;
    }

    function calcSolarBenchmark(systemKw, panelTier, inverterType, batteryType, region, roofCondition) {
      var tier = SOLAR_PRICING.pricePerWatt[panelTier] || SOLAR_PRICING.pricePerWatt.mid;
      var basePerWatt = tier.base;

      // Inverter adder
      var invAdder = SOLAR_PRICING.inverterAdder[inverterType] || SOLAR_PRICING.inverterAdder.string;
      var totalPerWatt = basePerWatt + invAdder.perWatt;

      // System base cost in watts
      var systemWatts = systemKw * 1000;
      var baseCost = totalPerWatt * systemWatts;

      // Battery adder
      var bat = SOLAR_PRICING.batteryAdder[batteryType] || SOLAR_PRICING.batteryAdder.none;
      baseCost += bat.cost;

      // Regional labor multiplier
      var regionMult = SOLAR_PRICING.laborMultiplierByRegion[region] || 1.0;
      var overheadMult = SOLAR_PRICING.overheadMultiplier;

      var total = baseCost * regionMult * overheadMult;

      // Roof condition adjustment
      if (roofCondition === "minor_repair") total *= 1.05;
      else if (roofCondition === "significant_work") total *= 1.15;

      return roundTo100(total);
    }

    function verdictFromRatio(ratio) {
      if (ratio < 0.78) return { label: "Unusually Low", css: "low", emoji: "" };
      if (ratio <= 0.90) return { label: "Below Average", css: "low", emoji: "" };
      if (ratio <= 1.12) return { label: "Fair Price", css: "fair", emoji: "" };
      if (ratio <= 1.25) return { label: "Above Average", css: "high", emoji: "" };
      return { label: "Overpriced", css: "high", emoji: "" };
    }

    function calcPerWatt(totalCost, systemKw) {
      if (!systemKw || systemKw <= 0) return 0;
      return totalCost / (systemKw * 1000);
    }

    function calcPaybackYears(costAfterItc, systemKw) {
      // Rough estimate: system kW * 1,400 kWh/kW * $0.13/kWh = annual savings
      var annualSavings = systemKw * 1400 * 0.13;
      if (annualSavings <= 0) return null;
      return Math.round((costAfterItc / annualSavings) * 10) / 10;
    }

    async function processFile(file) {

        // Fallback if no text extracted
        if (!text || text.trim().length < 20) {
          throw new Error("Could not extract text from file");
        }

        // Use analyzer-parser.js for price extraction
        var parsed = null;
        if (typeof parseExtractedText === "function") {
          parsed = parseExtractedText(text);
        }

        // Solar-specific detection
        var systemKw = detectSystemSizeKw(text);
        var panelBrand = detectPanelBrand(text);
        var panelInfo = detectPanelCountAndWattage(text);
        var inverterInfo = detectInverterType(text);
        var batteryInfo = detectBattery(text);
        var scopeSignals = detectSolarScopeSignals(text);
        var taxCreditMentioned = detectFederalTaxCredit(text);
        var warrantyTerms = detectWarrantyTerms(text);

        // Infer system size from panel count * wattage if not directly detected
        if (!systemKw && panelInfo && panelInfo.count && panelInfo.wattage) {
          systemKw = Math.round((panelInfo.count * panelInfo.wattage) / 100) / 10;
        }
        if (!systemKw) systemKw = 8; // default

        // Location detection from parser
        var location = (parsed && parsed.location) ? parsed.location : null;
        if (location && location.stateCode && !state.address.stateCode) {
          state.address.stateCode = location.stateCode;
          if (location.city) state.address.city = location.city;
        }

        // Determine price
        var quotePrice = 0;
        if (parsed && parsed.finalPrice && parsed.finalPrice > 500) {
          quotePrice = parsed.finalPrice;
        } else if (parsed && parsed.priceCandidates && parsed.priceCandidates.length) {
          var candidates = parsed.priceCandidates.filter(function(c) { return c.value >= 3000 && c.value <= 120000; });
          candidates.sort(function(a, b) { return b.score - a.score; });
          if (candidates.length) quotePrice = candidates[0].value;

        setProgress(85, "Calculating verdict...");

        // Determine tier from brand
        var panelTier = "mid";

        var inverterType = inverterInfo ? inverterInfo.type : "string";
        var batteryType = batteryInfo ? batteryInfo.type : "none";
        var region = getRegionFromState(state.address.stateCode);

        var benchmark = calcSolarBenchmark(systemKw, panelTier, inverterType, batteryType, region, "good");

        var ratio = quotePrice > 0 ? quotePrice / benchmark : 1.0;
        var verdict = verdictFromRatio(ratio);

        // Brand note

          inverterInfo: inverterInfo,
          inverterType: inverterType,
          batteryInfo: batteryInfo,

          </div>';

          var region = getRegionFromState(state.address.stateCode);

          state.step = "result";

        });
      }
    }

    async function extractPdfText(file) {
      var arrayBuffer = await file.arrayBuffer();
      var pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
      var allText = [];
      for (var i = 1; i <= pdf.numPages; i++) {
        var page = await pdf.getPage(i);
        var content = await page.getTextContent();
        var pageText = content.items.map(function(item) { return item.str; }).join(" ");
        allText.push(pageText);
      }
      return allText.join("\n");
    }

    async function preprocessImage(file, mode) {
      return new Promise(function(resolve, reject) {
        var reader = new FileReader();
        reader.onload = function() {
          var img = new Image();
          img.onload = function() {
            var canvas = document.createElement("canvas");
            var scale = Math.max(1.5, Math.min(2.5, 2400 / Math.max(img.width, img.height)));
            canvas.width = Math.round(img.width * scale);
            canvas.height = Math.round(img.height * scale);
            var ctx = canvas.getContext("2d");
            ctx.imageSmoothingEnabled = true;
            ctx.imageSmoothingQuality = "high";
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            var imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            var data = imageData.data;
            if (mode === "strong") {
              for (var i = 0; i < data.length; i += 4) {
                var gray = 0.299 * data[i] + 0.587 * data[i+1] + 0.114 * data[i+2];
                gray = (gray - 128) * 1.6 + 128;
                gray = gray > 170 ? 255 : gray < 85 ? 0 : gray;
                gray = Math.max(0, Math.min(255, gray));
                data[i] = gray; data[i+1] = gray; data[i+2] = gray;
              }
            } else {
              for (var i = 0; i < data.length; i += 4) {
                var gray = 0.299 * data[i] + 0.587 * data[i+1] + 0.114 * data[i+2];
                gray = (gray - 128) * 1.3 + 128;
                gray = Math.max(0, Math.min(255, gray));
                data[i] = gray; data[i+1] = gray; data[i+2] = gray;
              }
            }
            ctx.putImageData(imageData, 0, 0);
            resolve(canvas.toDataURL("image/png"));
          };
          img.onerror = reject;
          img.src = reader.result;
        };
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    async function extractImageText(file) {
      var softImage = await preprocessImage(file, "soft");
      var worker = await Tesseract.createWorker("eng");
      var result = await worker.recognize(softImage);
      var text = (result.data.text || "").trim();
      if (text.length < 50) {
        var strongImage = await preprocessImage(file, "strong");
        var result2 = await worker.recognize(strongImage);
        var text2 = (result2.data.text || "").trim();
        if (text2.length > text.length) text = text2;
      }
      await worker.terminate();
      return text;
    }

            <div class="solar-options" id="optBattery">\
              <div class="solar-option' + (est.battery === "none" ? " selected" : "") + '" data-val="none">No battery</div>\
              <div class="solar-option' + (est.battery === "powerwall" ? " selected" : "") + '" data-val="powerwall">Tesla Powerwall (~$12K)</div>\
              <div class="solar-option' + (est.battery === "enphase_iq" ? " selected" : "") + '" data-val="enphase_iq">Enphase IQ Battery (~$10K)</div>\
              <div class="solar-option' + (est.battery === "other" ? " selected" : "") + '" data-val="other">Other Battery (~$10K)</div>\
            </div>\
          </div>';
        bindOptions("optBattery", "battery");
      } else if (stepNum === 5) {
        card.innerHTML = '\
          <div class="solar-step">\
            <h3>What is your roof condition?</h3>\
            <div class="solar-options" id="optRoof">\
              <div class="solar-option' + (est.roofCondition === "good" ? " selected" : "") + '" data-val="good">Good (no work needed)</div>\
              <div class="solar-option' + (est.roofCondition === "minor_repair" ? " selected" : "") + '" data-val="minor_repair">Needs minor repair</div>\
              <div class="solar-option' + (est.roofCondition === "significant_work" ? " selected" : "") + '" data-val="significant_work">Needs significant work</div>\
            </div>\
          </div>';
        bindOptions("optRoof", "roofCondition");
      } else if (stepNum === 6) {
        card.innerHTML = '\
          <div class="solar-step">\
            <h3>How soon do you need this done?</h3>\
            <div class="solar-options" id="optUrg">\
              <div class="solar-option' + (est.urgency === "asap" ? " selected" : "") + '" data-val="asap">ASAP</div>\
              <div class="solar-option' + (est.urgency === "this_year" ? " selected" : "") + '" data-val="this_year">This year</div>\
              <div class="solar-option' + (est.urgency === "exploring" ? " selected" : "") + '" data-val="exploring">Just exploring</div>\
            </div>\
          </div>';
        bindOptions("optUrg", "urgency");
      }

      // Show progress dots
      var totalSteps = 6;
      var dots = '';
      for (var d = 1; d <= totalSteps; d++) {
        dots += '<span style="display:inline-block;width:10px;height:10px;border-radius:50%;margin:0 3px;background:' + (d <= stepNum ? "#2563eb" : "#e2e8f0") + ';"></span>';
      }
      card.insertAdjacentHTML("afterbegin", '<div style="text-align:center;margin-bottom:1rem;">' + dots + '</div>');

      // Back button (except step 1)
      if (stepNum > 1) {
        card.insertAdjacentHTML("beforeend", '<div style="margin-top:1rem;text-align:center;"><button class="solar-btn solar-btn-secondary" id="estBack">Back</button></div>');
        document.getElementById("estBack").addEventListener("click", function() {
          if (stepNum === 6) est.urgency = null;
          else if (stepNum === 5) est.roofCondition = null;
          else if (stepNum === 4) est.battery = null;
          else if (stepNum === 3) est.inverterType = null;
          else if (stepNum === 2) est.panelTier = null;
          render();
        });
      }
    }

    function getEstimatorStep() {
      var e = state.est;
      if (!e.systemSize) return 1;
      if (!e.panelTier) return 2;
      if (!e.inverterType) return 3;
      if (!e.battery) return 4;
      if (!e.roofCondition) return 5;
      if (!e.urgency) return 6;
      return 7; // all done
    }

    function bindOptions(containerId, field) {
      var container = document.getElementById(containerId);
      if (!container) return;
      container.addEventListener("click", function(e) {
        var opt = e.target.closest(".solar-option");
        if (!opt) return;
        state.est[field] = opt.getAttribute("data-val");

        // Check if estimator is complete
        if (getEstimatorStep() > 6) {
          calculateEstimate();
        } else {
          render();
        }
      });
    }

    function calculateEstimate() {
      var est = state.est;
      var region = getRegionFromState(state.address.stateCode);
      var systemKw = kwFromSize(est.systemSize, est.customKw);

      var benchmark = calcSolarBenchmark(systemKw, est.panelTier, est.inverterType, est.battery, region, est.roofCondition);

      // Urgency adjustment
      var urgMult = est.urgency === "asap" ? 1.06 : est.urgency === "this_year" ? 1.02 : 1.0;
      benchmark = roundTo100(benchmark * urgMult);

      var low = roundTo100(benchmark * 0.88);
      var high = roundTo100(benchmark * 1.15);

      var tierLabel = SOLAR_PRICING.pricePerWatt[est.panelTier] ? SOLAR_PRICING.pricePerWatt[est.panelTier].label : est.panelTier;
      var invLabel = SOLAR_PRICING.inverterAdder[est.inverterType] ? SOLAR_PRICING.inverterAdder[est.inverterType].label : est.inverterType;
      var batLabel = SOLAR_PRICING.batteryAdder[est.battery] ? SOLAR_PRICING.batteryAdder[est.battery].label : est.battery;

      state.result = {
        source: "estimator",
        quotePrice: benchmark,
        benchmark: benchmark,
        low: low,
        high: high,
        ratio: 1.0,
        verdict: { label: "Estimated Cost", css: "fair", emoji: "" },
        systemKw: systemKw,
        panelBrand: null,
        panelInfo: null,
        panelTier: est.panelTier,
        panelTierLabel: tierLabel,
        inverterInfo: { type: est.inverterType, label: invLabel },
        inverterType: est.inverterType,
        batteryInfo: est.battery !== "none" ? { type: est.battery, label: batLabel } : null,
        batteryType: est.battery,
        brandNote: "",
        scopeSignals: {},
        taxCreditMentioned: false,
        warrantyTerms: null,
        region: region,
        location: null,
        parsed: null,
        roofCondition: est.roofCondition,
        urgency: est.urgency
      };

      state.step = "result";
      render();
    }

    // ── Result Step ──
    function renderResult() {
      var r = state.result;
      if (!r) { state.step = "address"; render(); return; }

      var isUpload = r.source === "upload";
      var verdictCss = r.verdict.css;
      var priceDisplay = isUpload ? fmt(r.quotePrice) : fmt(r.benchmark);
      var rangeText = "";
      var displayPrice = isUpload ? r.quotePrice : r.benchmark;

      if (isUpload) {
        rangeText = "Market benchmark: " + fmt(r.benchmark);
        if (r.quotePrice > 0) {
          var pct = Math.round((r.ratio - 1) * 100);
          var dir = pct > 0 ? "above" : "below";
          rangeText += " &mdash; " + Math.abs(pct) + "% " + dir + " average";
        }
      } else {
        rangeText = "Expected range: " + fmt(r.low) + " &ndash; " + fmt(r.high);
      }

      // Per-watt calculation
      var perWatt = calcPerWatt(displayPrice, r.systemKw);
      var perWattStr = perWatt > 0 ? "$" + perWatt.toFixed(2) + "/W" : "";

      // ITC calculation
      var priceBeforeItc = displayPrice;
      var itcAmount = roundTo100(priceBeforeItc * SOLAR_PRICING.federalTaxCredit);
      var priceAfterItc = priceBeforeItc - itcAmount;
      var perWattAfterItc = calcPerWatt(priceAfterItc, r.systemKw);

      // Payback period
      var paybackYears = calcPaybackYears(priceAfterItc, r.systemKw);

      // Build details
      var detailsHtml = '<div class="solar-details">';
      detailsHtml += '<div class="solar-detail"><div class="label">System Size</div><div class="value">' + r.systemKw + ' kW</div></div>';

      if (perWattStr) {
        detailsHtml += '<div class="solar-detail"><div class="label">Cost per Watt</div><div class="value">' + perWattStr + '</div></div>';
      }

      if (r.panelInfo && r.panelInfo.count) {
        var panelDesc = r.panelInfo.count + " panels";
        if (r.panelInfo.wattage) panelDesc += " (" + r.panelInfo.wattage + "W each)";
        detailsHtml += '<div class="solar-detail"><div class="label">Panels</div><div class="value">' + panelDesc + '</div></div>';
      }

      if (r.brandNote) {
        detailsHtml += '<div class="solar-detail"><div class="label">Panel Brand</div><div class="value">' + r.brandNote + '</div></div>';
      } else if (r.panelTierLabel) {
        detailsHtml += '<div class="solar-detail"><div class="label">Panel Tier</div><div class="value">' + capitalize(r.panelTier) + '</div></div>';
      }

      if (r.inverterInfo) {
        detailsHtml += '<div class="solar-detail"><div class="label">Inverter</div><div class="value">' + r.inverterInfo.label + '</div></div>';
      }

      if (r.batteryInfo) {
        detailsHtml += '<div class="solar-detail"><div class="label">Battery</div><div class="value">' + r.batteryInfo.label + '</div></div>';
      }

      detailsHtml += '<div class="solar-detail"><div class="label">Region</div><div class="value">' + capitalize(r.region) + '</div></div>';

      if (r.warrantyTerms) {
        var wParts = [];
        if (r.warrantyTerms.panels) wParts.push("Panels: " + r.warrantyTerms.panels + " yr");
        if (r.warrantyTerms.inverter) wParts.push("Inverter: " + r.warrantyTerms.inverter + " yr");
        if (r.warrantyTerms.workmanship) wParts.push("Workmanship: " + r.warrantyTerms.workmanship + " yr");
        if (wParts.length) {
          detailsHtml += '<div class="solar-detail"><div class="label">Warranty</div><div class="value">' + wParts.join(", ") + '</div></div>';
        }
      }

      if (paybackYears) {
        detailsHtml += '<div class="solar-detail"><div class="label">Est. Payback Period</div><div class="value">~' + paybackYears + ' years</div></div>';
      }

      if (r.roofCondition) {
        var roofLabels = { good: "Good condition", minor_repair: "Needs minor repair", significant_work: "Needs significant work" };
        detailsHtml += '<div class="solar-detail"><div class="label">Roof Condition</div><div class="value">' + (roofLabels[r.roofCondition] || r.roofCondition) + '</div></div>';
      }
      detailsHtml += '</div>';

      // ITC banner
      var itcHtml = '\
        <div class="solar-itc-banner">\
          <div class="itc-label">After 30% Federal Tax Credit (ITC)</div>\
          <div class="itc-price">' + fmt(priceAfterItc) + '</div>\
          <div class="itc-note">You save ' + fmt(itcAmount) + ' &mdash; ' + (perWattAfterItc > 0 ? "$" + perWattAfterItc.toFixed(2) + "/W after credit" : "") + '</div>\
        </div>';

      // Scope checklist (upload)
      var scopeHtml = "";
      if (isUpload && r.scopeSignals && Object.keys(r.scopeSignals).length > 0) {
        scopeHtml = '<div class="solar-card"><h3 style="margin-bottom:0.75rem;">Scope Review</h3><ul class="solar-scope">';
        SOLAR_PRICING.scopeItems.forEach(function(item) {
          var sig = r.scopeSignals[item.key];
          var status = sig ? sig.status : "unclear";
          var iconClass = status === "included" ? "scope-included" : status === "excluded" ? "scope-missing" : "scope-unclear";
          var iconChar = status === "included" ? "&#10003;" : status === "excluded" ? "&#10007;" : "?";
          var statusLabel = status === "included" ? "Included" : status === "excluded" ? "Not included" : "Not mentioned";
          scopeHtml += '<li><span class="scope-icon ' + iconClass + '">' + iconChar + '</span><span>' + item.label + '</span><span style="margin-left:auto;font-size:0.8rem;color:#94a3b8;">' + statusLabel + '</span></li>';
        });
        scopeHtml += '</ul>';
        var solarScopeCosts = { panels: [0,0], inverter: [500,2000], racking: [300,800], wiring: [200,600], panelUpgrade: [500,2000], permits: [200,800], interconnection: [100,500], netMetering: [0,200], monitoring: [100,400], roofWork: [200,1000], battery: [8000,15000], warranty: [0,0] };
        var solarMissing = SOLAR_PRICING.scopeItems.filter(function(item) { var sig = r.scopeSignals[item.key]; return !sig || sig.status !== "included"; });
        if (solarMissing.length > 0) {
          var mLow = 0, mHigh = 0;
          solarMissing.forEach(function(item) { var c = solarScopeCosts[item.key]; if (c) { mLow += c[0]; mHigh += c[1]; } });
          if (mLow > 0) {
            scopeHtml += '<div style="font-size:14px;padding:10px 14px;background:#fef2f2;border:1px solid #fecaca;border-radius:10px;margin-top:12px;color:#991b1b;"><strong>' + solarMissing.length + ' missing item' + (solarMissing.length !== 1 ? 's' : '') + '</strong> could add <strong>$' + mLow.toLocaleString() + ' to $' + mHigh.toLocaleString() + '</strong> in change orders if not included.</div>';
          }
        }
        scopeHtml += '</div>';
      }

      // Estimator scope info
      if (!isUpload) {
        scopeHtml = '<div class="solar-card"><h3 style="margin-bottom:0.75rem;">What This Estimate Includes</h3><ul class="solar-scope">';
        var typicalItems = ["panels", "inverter", "racking", "wiring", "permits", "interconnection", "netMetering", "monitoring", "roofWork", "warranty"];
        if (r.batteryType && r.batteryType !== "none") typicalItems.push("battery");
        typicalItems.forEach(function(key) {
          var item = SOLAR_PRICING.scopeItems.find(function(s) { return s.key === key; });
          if (item) {
            scopeHtml += '<li><span class="scope-icon scope-included">&#10003;</span><span>' + item.label + '</span></li>';
          }
        });
        scopeHtml += '</ul><p style="font-size:0.85rem;color:#64748b;margin-top:0.75rem;">Estimate assumes standard roof-mount installation. Electrical panel upgrades, tree removal, or structural modifications may add cost.</p></div>';
      }

      // Market context
      var contextHtml = '';
      if (isUpload && r.quotePrice > 0) {
        var tip = "";
        if (r.verdict.css === "high") {
          tip = "This quote is higher than typical market rates. Consider getting 2-3 additional quotes to compare. Check whether battery storage or premium components are driving the price up.";
        } else if (r.verdict.css === "low") {
          tip = "This quote is lower than expected. Verify the scope includes all necessary items like permits, interconnection fees, monitoring, and workmanship warranty. Check panel and inverter brands carefully.";
        } else {
          tip = "This quote appears to be within the typical market range for your area and system specifications. Remember to claim the 30% federal tax credit (ITC) when you file taxes.";
        }
        contextHtml = '<div class="solar-card"><h3 style="margin-bottom:0.5rem;">Market Context</h3><p style="color:#475569;font-size:0.95rem;">' + tip + '</p></div>';
      }

      // Payback context
      var paybackHtml = '';
      if (paybackYears) {
        var annualSavings = r.systemKw * 1400 * 0.13;
        paybackHtml = '<div class="solar-card"><h3 style="margin-bottom:0.5rem;">Estimated Payback</h3>\
          <p style="color:#475569;font-size:0.95rem;">Based on ' + r.systemKw + ' kW system producing ~' + (r.systemKw * 1400).toLocaleString() + ' kWh/year at $0.13/kWh, your estimated annual savings are <strong>' + fmt(annualSavings) + '</strong>.</p>\
          <p style="color:#475569;font-size:0.95rem;margin-top:0.5rem;">After the 30% federal tax credit, your system could pay for itself in approximately <strong>' + paybackYears + ' years</strong>.</p>\
        </div>';
      }

      // Email report
      var emailSubject = encodeURIComponent("My Solar Quote Analysis from TruePrice");
      var emailBody = encodeURIComponent(
        "Solar Quote Analysis\n" +
        "System Size: " + r.systemKw + " kW\n" +
        (r.brandNote ? "Panel Brand: " + r.brandNote + "\n" : "") +
        (r.inverterInfo ? "Inverter: " + r.inverterInfo.label + "\n" : "") +
        (r.batteryInfo ? "Battery: " + r.batteryInfo.label + "\n" : "") +
        (isUpload ? "Quote Price: " + fmt(r.quotePrice) + "\n" : "") +
        "Before Tax Credit: " + fmt(priceBeforeItc) + "\n" +
        "After 30% ITC: " + fmt(priceAfterItc) + "\n" +
        (perWattStr ? "Cost per Watt: " + perWattStr + "\n" : "") +
        "Verdict: " + r.verdict.label + "\n" +
        "Region: " + capitalize(r.region) + "\n" +
        (paybackYears ? "Est. Payback: ~" + paybackYears + " years\n" : "") +
        "\nAnalyzed by TruePrice - https://truepricehq.com/solar-quote-analyzer.html"
      );

      appRoot.innerHTML = '\
        <div class="solar-hero">\
          <h1>' + (isUpload ? "Solar Quote Analysis" : "Your Solar Estimate") + '</h1>\
        </div>\
        <div class="solar-verdict ' + verdictCss + '">\
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;"><img src="/images/trudy-solar.png" alt="Trudy" width="48" /><div style="font-size:12px;font-weight:700;color:#1e3a5f;text-transform:uppercase;letter-spacing:0.04em;">TruePrice Solar Verdict</div></div><div class="verdict-label">' + r.verdict.label + '</div>\
          <div class="verdict-price">' + priceDisplay + '</div>\
          <div class="verdict-range">' + rangeText + '</div>\
          ' + (perWattStr ? '<div style="font-size:0.9rem;color:#64748b;margin-top:0.25rem;">(' + perWattStr + ' before tax credit)</div>' : '') + '\
        </div>\
        ' + itcHtml + '\
        <div class="solar-card">\
          <h3 style="margin-bottom:0.75rem;">System Details</h3>\
          ' + detailsHtml + '\
        </div>\
        ' + scopeHtml + '\
        ' + contextHtml + '\
        ' + paybackHtml + '\
        <div class="solar-actions">\
          <a class="solar-btn solar-btn-primary solar-btn-full" href="/find-contractors.html?service=solar">Find Solar Contractors</a>\
          <a class="solar-btn solar-btn-secondary solar-btn-full" href="mailto:?subject=' + emailSubject + '&body=' + emailBody + '">Email Me This Report</a>\
          <button class="solar-btn solar-btn-secondary solar-btn-full" id="btnStartOver">Start Over</button>\
        </div>';

      document.getElementById("btnStartOver").addEventListener("click", function() {
        state = {
          step: "address",
          address: { street: "", city: "", stateCode: "", zip: "" },
          uploadedFile: null,
          extractedText: "",
          est: { systemSize: null, customKw: "", panelTier: null, inverterType: null, battery: null, roofCondition: null, urgency: null },
          result: null
        };
        render();
      });
    }

    function capitalize(s) {
      return s ? s.charAt(0).toUpperCase() + s.slice(1) : "";
    }

    // ── Init ──
    render();

  })();
  </script>
<script src="/js/tp-analytics.min.js" async></script>
</body>
</html>
